<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>42 — Every Way to Make 10 Game — ColorMyMath</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: #333;
    font-family: 'Nunito', Arial, sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .stage {
    position: relative;
    width: min(100vw, 56.25vh);
    aspect-ratio: 9 / 16;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .title {
    /* Pushed down below the new scoreboard at top: 1.2%. */
    position: absolute; top: 5.5%; left: 0; right: 0;
    text-align: center; font-size: 1.6vh; font-weight: 700;
    color: #333; letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 10;
  }
  .title .sub {
    display: block;
    font-size: 1.4vh; font-weight: 500;
    color: #666; letter-spacing: 0.06em;
    margin-top: 0.3vh;
  }

  /* Paint tray: vertical column on the LEFT side of the stage, big
     square paint chips stacked top-to-bottom.  White (0) is on top,
     red (1) directly below it.  Slots tagged `disabled` are hidden so
     this same tray will grow back to 10 colours when we re-enable
     the others -- just toggle `disabled` off.  The slot size below
     (width: 22%) is tuned for the current 2-colour set; when more
     colours come back we'll shrink the chips so they all fit. */
  .paint-tray {
    position: absolute;
    top: 10%; left: 3%;
    width: 22%;
    display: grid;
    grid-template-columns: 1fr;
    gap: 3%;
    z-index: 50;
  }
  .paint-slot {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--c);
    border: 2.5px solid #000;
    border-radius: 22%;
    cursor: pointer;
    padding: 0;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.18);
  }
  .paint-slot:hover { transform: scale(1.04); }
  .paint-slot.active {
    transform: scale(1.12);
    box-shadow: 0 0 0 3px #000, 0 6px 14px rgba(0,0,0,0.4),
                inset 0 2px 4px rgba(0,0,0,0.18);
  }
  /* "disabled" hides a paint slot without losing its grid placement --
     used while we're only enabling red + white.  Remove the class on a
     slot to bring its colour back into the tray. */
  .paint-slot.disabled { display: none; }

  /* Running equation across the top -- offset to the right so the
     left-side tray doesn't collide with long equations. */
  .equation {
    position: absolute; top: 10%; left: 22%; right: 4%;
    text-align: center;
    font-size: 3vh; font-weight: 800;
    color: #000;
    padding: 0 2%;
    line-height: 1.15;
    min-height: 7vh;
    pointer-events: none;
  }
  .equation .num {
    display: inline-block;
    transform-origin: center center;
  }

  /* Triangle play-area back at top: 22%, height: 60% to match the
     partition autoplay videos.  The big-triangle geometry below
     (DOT_R=22, viewBox 210x220) is already sized for this. */
  .play-area {
    position: absolute; top: 22%; left: 0; right: 0; height: 60%;
  }
  .play-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    overflow: visible;
  }

  /* "Clear all" pill -- bottom-left corner of the stage, below the
     number line and to the left of the brand text.  Out of the way
     of the scoreboard at the top and the triangle in the middle. */
  .reset-btn {
    position: absolute;
    bottom: 1%; left: 3%;
    padding: 0.55vh 1.4vh;
    border: 2px solid #000;
    border-radius: 999px;
    background: #fff;
    color: #000;
    font: 700 1.35vh 'Nunito', Arial, sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    z-index: 30;
  }
  .reset-btn:hover { background: #f4f4f4; }

  /* Number line shifted up so the strip sits right below the big
     triangle (the user wanted it closer).  Was bottom: 4.5%; now
     bottom: 8% puts the number-line top at ~stage 78% -- the
     triangle outline base is at stage 76.5%, so only a thin gap
     remains between them. */
  .number-line-wrap {
    position: absolute;
    bottom: 8%; left: 1%; right: 1%;
    height: 14%;
    z-index: 5;
    pointer-events: none;
  }
  .number-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.5%;
    height: 100%;
  }
  .nl-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4vh;
    min-width: 0;
    height: 100%;
  }
  .nl-quantity {
    width: 100%;
    height: 70%;
    position: relative;
  }
  .nl-quantity svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  .nl-label {
    height: 30%;
  }
  .nl-label svg {
    height: 100%; width: auto;
  }

  .brand {
    position: absolute; bottom: 1%; left: 0; right: 0;
    text-align: center; font-size: 2.2vh; font-weight: 600;
    color: #888; letter-spacing: 0.25em;
    pointer-events: none;
  }
  .brand-sig {
    position: absolute;
    right: 6%;
    top: 50%;
    transform: translateY(-50%);
    height: 1.8vh;
    width: auto;
    color: #000;
  }

  /* === Magic-42 game scoreboard (Score | Perfect | Screen) ===
     Same look as counting-to-10-game.html: each number rendered as
     a tiny dot-group in the ColorMyMath digit palette.  Score
     persists across partition games via localStorage so the child
     keeps going when they jump from partition 1 to partition 2. */
  .scorebox-left {
    position: absolute; top: 1.2%; left: 2.5%;
    z-index: 6; pointer-events: none;
  }
  .scorebox-center {
    position: absolute; top: 1.2%; left: 50%; transform: translateX(-50%);
    z-index: 6; pointer-events: none;
  }
  .scorebox-right {
    position: absolute; top: 1.2%; right: 2.5%;
    z-index: 6; pointer-events: none;
  }
  .scorebox-left   .score-row { justify-content: flex-start; }
  .scorebox-center .score-row { justify-content: center;     }
  .scorebox-right  .score-row { justify-content: flex-end;   }
  .score-row { display: flex; align-items: center; gap: 0.6em; }
  .score-label {
    font-size: 1.9vh; font-weight: 700; color: #555;
    letter-spacing: 0.04em;
  }
  .score-value {
    display: inline-flex; align-items: flex-end;
    gap: 0.5vh; min-height: 2.2vh;
  }
  .score-digit-group {
    display: inline-flex; flex-direction: column;
    align-items: center; gap: 0;
  }
  .score-digit-row {
    display: flex; align-items: center; justify-content: center; gap: 0;
  }
  .score-dot {
    width: 0.9vh; height: 0.9vh;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-dot.ring {
    background: transparent !important;
    border: 1.5px solid;
  }
  .score-dot.spacer { visibility: hidden; }
  .score-value.bw .score-dot { background: #000 !important; }
  .score-value.bw .score-dot.ring {
    background: transparent !important;
    border-color: #000 !important;
  }

  /* "Perfect!" celebration banner -- pops in when the running sum
     hits 10, snaps back out when the CLEAR pill is tapped.  Sits
     over the triangle area so the kid can't miss it. */
  .perfect-banner {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #00a12c;
    color: #fff;
    padding: 2vh 5vh;
    border-radius: 14px;
    font-size: 4.5vh; font-weight: 900;
    letter-spacing: 0.12em;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    border: 4px solid #000;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.4s ease;
    white-space: nowrap;
  }
  .perfect-banner.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="perfect-banner" id="perfectBanner">PERFECT!</div>


  <div class="scorebox-left" id="scorebox-left">
    <div class="score-row">
      <span class="score-label">Score</span>
      <span class="score-value" id="scoreValue"></span>
    </div>
  </div>
  <div class="scorebox-center" id="scorebox-center">
    <div class="score-row">
      <span class="score-label">Perfect</span>
      <span class="score-value" id="perfectValue"></span>
    </div>
  </div>
  <div class="scorebox-right" id="scorebox-right">
    <div class="score-row">
      <span class="score-label">Screen</span>
      <span class="score-value" id="screenValue"></span>
    </div>
  </div>

  <div class="title">42 — Every Way to Make 10<span class="sub">Partition 1 of 42 — build 10 with 1's</span></div>

  <!-- Paint tray.  Layout:
         Row 1: 0(white)  2(orange) 4(green)  6(purple) 8(pink)
         Row 2: 1(red)    3(yellow) 5(blue)   7(brown)  9(cyan)
       So white sits in the top-left and red sits directly below it. -->
  <div class="paint-tray" id="paintTray">
    <button class="paint-slot" data-color="#ffffff" data-value="0" style="--c:#ffffff; grid-column:1; grid-row:1;" aria-label="white (0)"></button>
    <button class="paint-slot disabled" data-color="#ff6200" data-value="2" style="--c:#ff6200;" aria-label="orange (2)"></button>
    <button class="paint-slot disabled" data-color="#00a12c" data-value="4" style="--c:#00a12c;" aria-label="green (4)"></button>
    <button class="paint-slot disabled" data-color="#7700dd" data-value="6" style="--c:#7700dd;" aria-label="purple (6)"></button>
    <button class="paint-slot disabled" data-color="#ff3fa6" data-value="8" style="--c:#ff3fa6;" aria-label="pink (8)"></button>

    <button class="paint-slot" data-color="#e63946" data-value="1" style="--c:#e63946; grid-column:1; grid-row:2;" aria-label="red (1)"></button>
    <button class="paint-slot disabled" data-color="#e6c800" data-value="3" style="--c:#e6c800;" aria-label="yellow (3)"></button>
    <button class="paint-slot disabled" data-color="#0066ff" data-value="5" style="--c:#0066ff;" aria-label="blue (5)"></button>
    <button class="paint-slot disabled" data-color="#7a3b00" data-value="7" style="--c:#7a3b00;" aria-label="brown (7)"></button>
    <button class="paint-slot disabled" data-color="#38c7ff" data-value="9" style="--c:#38c7ff;" aria-label="cyan (9)"></button>
  </div>

  <div class="equation" id="eq"></div>

  <div class="play-area">
    <svg class="play-svg" id="playSvg" viewBox="0 0 210 220" preserveAspectRatio="xMidYMid meet">
      <g id="bgGroup"></g>
      <g id="dotGroup"></g>
    </svg>
  </div>

  <!-- Number line: colour-coded quantity SVG on top, black digit below. -->
  <div class="number-line-wrap">
    <div class="number-line">
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty1"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">1</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty2"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">2</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty3"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">3</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty4"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">4</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty5"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">5</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty6"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">6</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty7"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">7</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty8"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">8</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty9"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">9</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty10"></svg></div><div class="nl-label"><svg viewBox="0 0 50 40" preserveAspectRatio="xMidYMid meet"><text x="25" y="33" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="40" fill="#000">10</text></svg></div></div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">CLEAR</button>

  <div class="brand">✦ ColorMyMath ✦<svg class="brand-sig" viewBox="0 0 72 40" preserveAspectRatio="xMidYMid meet" aria-hidden="true"><g stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="square" stroke-linejoin="miter"><line x1="14" y1="3" x2="14" y2="22"/><polyline points="30,3 30,22 42,22 42,36"/><polyline points="54,3 54,22 64,22"/></g></svg></div>
</div>

  // Single-instance audio player: one Audio per key, reused on each

    if (_curPlayer) return;

    if (!p) { _drainSpeech(); return; }
    _curPlayer = p;
    _curOnEnd = () => {
      p.removeEventListener("ended", _curOnEnd);
      _curPlayer = null; _curOnEnd = null;
      _drainSpeech();
    };
    p.addEventListener("ended", _curOnEnd);
    try { p.currentTime = 0; } catch (e) {}
    p.play().catch(_curOnEnd);
  }

    _speechQueue = [];
    if (_curPlayer && _curOnEnd) _curPlayer.removeEventListener("ended", _curOnEnd);

      try { players[k].pause(); players[k].currentTime = 0; } catch (e) {}

    const painted = dots
      .filter(d => d.value > 0)
      .map(d => d.value);
    if (painted.length === 0) { eqEl.innerHTML = ''; return; }
    const sum = painted.reduce((a, b) => a + b, 0);
    const lhs = painted.map(v => '<span class="num">' + v + '</span>').join(' + ');
    // All digits stay BLACK -- the sum doesn't flash green at 10; the
    // "equals ten" audio + the dots themselves carry that signal.
    const rhs = '<span class="num">' + sum + '</span>';
    eqEl.innerHTML = lhs + ' = ' + rhs;
  }

  // --- Reset button --------------------------------------------------
  document.getElementById('resetBtn').addEventListener('click', () => {
    _stopAllSpeech();
    hidePerfectBanner();
    for (const d of dots) {
      d.el.setAttribute('fill', '#ffffff');
      d.color = '#ffffff';
      d.value = 0;
    }
    updateEquation();
    // Drop any active paint too.
    document.querySelectorAll('.paint-slot.active').forEach(s => s.classList.remove('active'));
    activePaint = null;
    activeValue = 0;
  });

  // --- Number-line cells (coloured quantity above black digit) -------
  // Layouts mirror the counting-to-10-game.html number line: each
  // cell shows the dot-grouping for that digit in its ColorMyMath
  // colour, on top of the plain black digit label.  Cell #10 also
  // gets a black equilateral triangle wrapped around its 4-3-2-1
  // cluster (the same triangle motif used in every lesson).
  const NL_R = 10;
  const NL_CX = 50;
  const NL_YBOT = 92;
  const NL_D = 2 * NL_R;
  const NL_TRI_H = NL_D * Math.sqrt(3) / 2;
  const NUMBER_LINE_LAYOUTS = {
    1:  { color: '#e63946', centers: [{x: NL_CX, y: NL_YBOT}] },
    2:  { color: '#ff6200', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT}
          ] },
    3:  { color: '#e6c800', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX,        y: NL_YBOT - NL_TRI_H}
          ] },
    4:  { color: '#00a12c', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_D}, {x: NL_CX + NL_R, y: NL_YBOT - NL_D}
          ] },
    5:  { color: '#0066ff', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - NL_TRI_H}
          ] },
    6:  { color: '#7700dd', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX,        y: NL_YBOT - 2 * NL_TRI_H}
          ] },
    7:  { color: '#7a3b00', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_TRI_H}, {x: NL_CX, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_D, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX - NL_R, y: NL_YBOT - 2 * NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - 2 * NL_TRI_H}
          ] },
    8:  { color: '#ff3fa6', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_D},                                           {x: NL_CX + NL_D, y: NL_YBOT - NL_D},
            {x: NL_CX - NL_D, y: NL_YBOT - 2 * NL_D}, {x: NL_CX, y: NL_YBOT - 2 * NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - 2 * NL_D}
          ] },
    9:  { color: '#38c7ff', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_D}, {x: NL_CX, y: NL_YBOT - NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - NL_D},
            {x: NL_CX - NL_D, y: NL_YBOT - 2 * NL_D}, {x: NL_CX, y: NL_YBOT - 2 * NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - 2 * NL_D}
          ] },
    10: { color: '#e63946', centers: [
            {x: NL_CX - 3*NL_R, y: NL_YBOT}, {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT}, {x: NL_CX + 3*NL_R, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_TRI_H}, {x: NL_CX, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_D, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX - NL_R, y: NL_YBOT - 2 * NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - 2 * NL_TRI_H},
            {x: NL_CX,        y: NL_YBOT - 3 * NL_TRI_H}
          ] }
  };
  for (let n = 1; n <= 10; n++) {
    const svg = document.getElementById('nlQty' + n);
    if (!svg) continue;
    const { color, centers } = NUMBER_LINE_LAYOUTS[n];
    // For 10, draw the canonical 10-triangle outline before the dots.
    if (n === 10) {
      const halfW = 3 * NL_R + NL_R * Math.sqrt(3);
      const baseY = NL_YBOT + NL_R;
      const topY  = baseY - halfW * Math.sqrt(3);
      const tri = document.createElementNS(SVG_NS, 'polygon');
      tri.setAttribute('points',
        (NL_CX - halfW) + ',' + baseY + ' ' +
        (NL_CX + halfW) + ',' + baseY + ' ' +
        NL_CX + ',' + topY);
      tri.setAttribute('fill', 'none');
      tri.setAttribute('stroke', '#000');
      tri.setAttribute('stroke-width', '1.6');
      tri.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(tri);
    }
    for (const p of centers) {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', p.x);
      c.setAttribute('cy', p.y);
      c.setAttribute('r', NL_R);
      c.setAttribute('fill', color);
      c.setAttribute('stroke', '#000');
      c.setAttribute('stroke-width', '1.4');
      svg.appendChild(c);
    }
  }

  // === Magic-42 game scoreboard ============================================
  // Score:   every successful paint stroke (any colour).
  // Perfect: every successful stroke that wasn't immediately erased.
  // Screen:  taps that didn't paint anything (background, spent chips,
  //          already-painted dot taps without an active brush, etc.).
  // Persisted across the partition game pages via sessionStorage so
  // the child carries their score from partition 1 -> 2 -> ... within
  // a single play session, but the board resets clean when they
  // close the tab/browser and come back later (per user request --
  // localStorage was sticking the score across visits forever).
  const SCORE_STORAGE_KEY = 'colormymath.magic42.scoreboard';
  let scoreCount = 0;
  let screenCount = 0;
  let perfectCount = 0;
  const scoreValueEl   = document.getElementById('scoreValue');
  const screenValueEl  = document.getElementById('screenValue');
  const perfectValueEl = document.getElementById('perfectValue');

  function loadScoreboard() {
    // No persistence -- per user request, every page load starts fresh
    // at Score 0 / Perfect 0 / Screen 0.  Purge any leftover storage
    // from older builds so it can't sneak back in.
    try { sessionStorage.removeItem(SCORE_STORAGE_KEY); } catch (e) {}
    try { localStorage.removeItem(SCORE_STORAGE_KEY);   } catch (e) {}
  }
  function saveScoreboard() {
    // No-op: see loadScoreboard above for why persistence is off.
  }

  // Digital ColorMyMath number rendering -- each digit becomes a small
  // dot-group in its palette colour (0 = ring).
  const DIGIT_COLORS = {
    0: '#ffffff', 1: '#e63946', 2: '#ff6200', 3: '#e6c800', 4: '#00a12c',
    5: '#0066ff', 6: '#7700dd', 7: '#7a3b00', 8: '#ff3fa6', 9: '#38c7ff',
  };
  const DIGIT_ARRANGEMENT = {
    0: [1], 1: [1], 2: [2], 3: [1, 2], 4: [2, 2], 5: [2, 3],
    6: [1, 2, 3], 7: [2, 3, 2], 8: [3, 'split', 3], 9: [3, 3, 3],
  };
  function renderDigitalNumber(container, num) {
    container.innerHTML = '';
    const str = String(num);
    for (const ch of str) {
      const d = parseInt(ch, 10);
      if (isNaN(d)) continue;
      const isZero = d === 0;
      const color = DIGIT_COLORS[d];
      const group = document.createElement('span');
      group.className = 'score-digit-group';
      for (const rowSpec of DIGIT_ARRANGEMENT[d]) {
        const row = document.createElement('span');
        row.className = 'score-digit-row';
        if (rowSpec === 'split') {
          const a = document.createElement('span');
          a.className = 'score-dot';
          a.style.background = color;
          const sp = document.createElement('span');
          sp.className = 'score-dot spacer';
          const b = document.createElement('span');
          b.className = 'score-dot';
          b.style.background = color;
          row.appendChild(a); row.appendChild(sp); row.appendChild(b);
        } else {
          for (let i = 0; i < rowSpec; i++) {
            const dot = document.createElement('span');
            dot.className = 'score-dot' + (isZero ? ' ring' : '');
            dot.style.background = color;
            if (isZero) {
              dot.style.borderColor = '#000';
              dot.style.borderWidth = '1.5px';
            }
            row.appendChild(dot);
          }
        }
        group.appendChild(row);
      }
      container.appendChild(group);
    }
  }
  function renderScoreboard() {
    if (scoreValueEl)   renderDigitalNumber(scoreValueEl,   scoreCount);
    if (screenValueEl)  { screenValueEl.classList.add('bw'); renderDigitalNumber(screenValueEl,  screenCount); }
    if (perfectValueEl) renderDigitalNumber(perfectValueEl, perfectCount);
  }
  // Score hooks invoked from paintDot.
  window.bumpScoreForPaint = function() {
    scoreCount++;
    perfectCount++;
    renderScoreboard();
    saveScoreboard();
  };
  window.bumpScoreForErase = function() {
    // Erasing doesn't count toward Score or Perfect -- it undoes work.
    // We just save so the persisted board stays consistent.
    saveScoreboard();
  };
  // Capture-phase screen-tap listener: anything that lands on the stage
  // background (not a dot, not a paint chip, not the CLEAR pill, not the
  // scoreboard itself) counts as a "screen" miss.
  document.addEventListener('click', (ev) => {
    const t = ev.target;
    if (!t) return;
    if (t.closest('.paint-slot')) return;
    if (t.closest('.reset-btn')) return;
    if (t.closest('.scorebox-left, .scorebox-center, .scorebox-right')) return;
    if (t.closest('.number-line-wrap')) return;
    // SVG <circle> dots inside #dotGroup count as dot taps (handled
    // by paintDot), not screen misses.
    if (t.tagName === 'circle' && t.parentNode && t.parentNode.id === 'dotGroup') return;
    screenCount++;
    renderScoreboard();
    saveScoreboard();
  }, true);

  loadScoreboard();
  renderScoreboard();

  // === "Perfect!" banner ===================================================
  function showPerfectBanner() {
    const b = document.getElementById('perfectBanner');
    if (b) b.classList.add('show');
  }
  function hidePerfectBanner() {
    const b = document.getElementById('perfectBanner');
    if (b) b.classList.remove('show');
  }
  window.showPerfectBanner = showPerfectBanner;
  window.hidePerfectBanner = hidePerfectBanner;
</script>

</body>
</html>
