<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Addition 1 to 5 — Game — ColorMyMath</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: #333;
    font-family: 'Nunito', Arial, sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .stage {
    position: relative;
    width: min(100vw, 56.25vh);
    aspect-ratio: 9 / 16;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .title {
    /* Pushed down below the new scoreboard at top: 1.2%. */
    position: absolute; top: 5.5%; left: 0; right: 0;
    text-align: center; font-size: 1.6vh; font-weight: 700;
    color: #333; letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 10;
  }
  .title .sub {
    display: block;
    font-size: 1.4vh; font-weight: 500;
    color: #666; letter-spacing: 0.06em;
    margin-top: 0.3vh;
  }

  /* Paint tray: vertical column on the LEFT side of the stage, big
     square paint chips stacked top-to-bottom.  White (0) is on top,
     red (1) directly below it.  Slots tagged `disabled` are hidden so
     this same tray will grow back to 10 colours when we re-enable
     the others -- just toggle `disabled` off.  The slot size below
     (width: 22%) is tuned for the current 2-colour set; when more
     colours come back we'll shrink the chips so they all fit. */
  .paint-tray {
    /* The progressive-tap count-up doesn't need a palette: dots respond
       to direct taps and the count's colour is chosen by the count itself. */
    display: none;
  }
  .paint-slot {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--c);
    border: 2.5px solid #000;
    border-radius: 22%;
    cursor: pointer;
    padding: 0;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.18);
  }
  .paint-slot:hover { transform: scale(1.04); }
  .paint-slot.active {
    transform: scale(1.12);
    box-shadow: 0 0 0 3px #000, 0 6px 14px rgba(0,0,0,0.4),
                inset 0 2px 4px rgba(0,0,0,0.18);
  }
  /* "disabled" hides a paint slot without losing its grid placement --
     used while we're only enabling red + white.  Remove the class on a
     slot to bring its colour back into the tray. */
  .paint-slot.disabled { display: none; }

  /* Running equation across the top -- offset to the right so the
     left-side tray doesn't collide with long equations. */
  /* Big centre count -- the same number the voice says, displayed huge above
     the dots so the child can see and read it as they count up. */
  .equation {
    position: absolute; top: 13%; left: 4%; right: 4%;
    text-align: center;
    font-size: clamp(64px, 12vh, 140px);
    font-weight: 900;
    color: #000;
    padding: 0;
    line-height: 1;
    min-height: 12vh;
    pointer-events: none;
  }
  .equation .num {
    display: inline-block;
    transform-origin: center center;
  }
  /* Small running equation line below the big centre number: "1 + 1 = 2",
     "1 + 2 + 2 = 5", etc.  Sits just under the huge count so the child
     can read the addition that built that count. */
  .equation-line {
    position: absolute; top: 26%; left: 4%; right: 4%;
    text-align: center;
    font-size: clamp(20px, 3.4vh, 40px);
    font-weight: 700;
    color: #000;
    pointer-events: none;
    line-height: 1.1;
    min-height: 3vh;
  }

  /* Triangle play-area back at top: 22%, height: 60% to match the
     partition autoplay videos.  The big-triangle geometry below
     (DOT_R=22, viewBox 210x220) is already sized for this. */
  .play-area {
    position: absolute; top: 22%; left: 0; right: 0; height: 60%;
  }
  /* "Perfect!" celebration banner -- pops in when sum hits 5
     (the addition game's goal), snaps back out on CLEAR. */
  .perfect-banner {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #00a12c;
    color: #fff;
    padding: 2vh 5vh;
    border-radius: 14px;
    font-size: 4.5vh; font-weight: 900;
    letter-spacing: 0.12em;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    border: 4px solid #000;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.4s ease;
    white-space: nowrap;
  }
  .perfect-banner.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .play-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    overflow: visible;
  }

  /* "Clear all" pill -- bottom-left corner of the stage, below the
     number line and to the left of the brand text.  Out of the way
     of the scoreboard at the top and the triangle in the middle. */
  .reset-btn {
    position: absolute;
    bottom: 1%; left: 3%;
    padding: 0.55vh 1.4vh;
    border: 2px solid #000;
    border-radius: 999px;
    background: #fff;
    color: #000;
    font: 700 1.35vh 'Nunito', Arial, sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    z-index: 30;
  }
  .reset-btn:hover { background: #f4f4f4; }

  /* Number line shifted up so the strip sits right below the big
     triangle (the user wanted it closer).  Was bottom: 4.5%; now
     bottom: 8% puts the number-line top at ~stage 78% -- the
     triangle outline base is at stage 76.5%, so only a thin gap
     remains between them. */
  .number-line-wrap {
    position: absolute;
    bottom: 8%; left: 1%; right: 1%;
    height: 14%;
    z-index: 5;
    pointer-events: none;
  }
  .number-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.5%;
    height: 100%;
  }
  .nl-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4vh;
    min-width: 0;
    height: 100%;
  }
  .nl-quantity {
    width: 100%;
    height: 70%;
    position: relative;
  }
  .nl-quantity svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  .nl-label {
    height: 30%;
  }
  .nl-label svg {
    height: 100%; width: auto;
  }

  .brand {
    position: absolute; bottom: 1%; left: 0; right: 0;
    text-align: center; font-size: 2.2vh; font-weight: 600;
    color: #888; letter-spacing: 0.25em;
    pointer-events: none;
  }
  .brand-sig {
    position: absolute;
    right: 6%;
    top: 50%;
    transform: translateY(-50%);
    height: 1.8vh;
    width: auto;
    color: #000;
  }

  /* === Magic-42 game scoreboard (Score | Perfect | Screen) ===
     Same look as counting-to-10-game.html: each number rendered as
     a tiny dot-group in the ColorMyMath digit palette.  Score
     persists across partition games via localStorage so the child
     keeps going when they jump from partition 1 to partition 2. */
  .scorebox-left {
    position: absolute; top: 1.2%; left: 2.5%;
    z-index: 6; pointer-events: none;
  }
  .scorebox-center {
    position: absolute; top: 1.2%; left: 50%; transform: translateX(-50%);
    z-index: 6; pointer-events: none;
  }
  .scorebox-right {
    position: absolute; top: 1.2%; right: 2.5%;
    z-index: 6; pointer-events: none;
  }
  .scorebox-left   .score-row { justify-content: flex-start; }
  .scorebox-center .score-row { justify-content: center;     }
  .scorebox-right  .score-row { justify-content: flex-end;   }
  .score-row { display: flex; align-items: center; gap: 0.6em; }
  .score-label {
    font-size: 1.9vh; font-weight: 700; color: #555;
    letter-spacing: 0.04em;
  }
  .score-value {
    display: inline-flex; align-items: flex-end;
    gap: 0.5vh; min-height: 2.2vh;
  }
  .score-digit-group {
    display: inline-flex; flex-direction: column;
    align-items: center; gap: 0;
  }
  .score-digit-row {
    display: flex; align-items: center; justify-content: center; gap: 0;
  }
  .score-dot {
    width: 0.9vh; height: 0.9vh;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-dot.ring {
    background: transparent !important;
    border: 1.5px solid;
  }
  .score-dot.spacer { visibility: hidden; }
  .score-value.bw .score-dot { background: #000 !important; }
  .score-value.bw .score-dot.ring {
    background: transparent !important;
    border-color: #000 !important;
  }
  /* Soft "wait" emphasis on the next dot to tap -- a gentle breathing
     stroke borrowed verbatim from counting-to-10-game.html so every game
     feels the same.  Stroke gently grows and brightens over 3.6s. */
  @keyframes dotGlowBlack {
    0%, 100% { stroke-width: 1.0; stroke-opacity: 0.55; }
    50%      { stroke-width: 2.6; stroke-opacity: 1.0;  }
  }
  .wait-dot { stroke: #000; animation: dotGlowBlack 3.6s ease-in-out infinite; }
  /* Round 2 pair "ghost-fade" -- vestigial; pair phases now use the soft
     wait-dot stroke + a tiny pulsing orange dot INSIDE each pair circle
     (see .inner-hint below).  Kept for safety so any leftover .pair-ghost
     classes still render quietly. */
  @keyframes pairGhost {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.90; }
  }
  .pair-ghost { animation: pairGhost 1.4s ease-in-out infinite; }
  /* Inner orange "tap me" dot -- a small filled circle centred inside each
     dot slot.  When a slot is part of a pair phase, its inner hint pulses
     bigger/smaller continuously so the kid sees which two dots go together.
     Lives in #innerHintGroup, hidden by default; .show enables the pulse. */
  @keyframes innerHintPulse {
    0%, 100% { transform: scale(0.65); opacity: 0.85; }
    50%      { transform: scale(1.25); opacity: 1.0;  }
  }
  .inner-hint {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
    pointer-events: none;
  }
  .inner-hint.show {
    opacity: 1;
    animation: innerHintPulse 1.1s ease-in-out infinite;
  }
  /* Final-reveal emphasis: a brief bigger/brighter pulse on each dot
     group as its addend is voiced.  Dots keep their partition colour
     throughout -- the pulse just highlights "this group, right now". */
  @keyframes revealPulse {
    0%   { transform: scale(1.0);  filter: brightness(1.0); }
    50%  { transform: scale(1.18); filter: brightness(1.35); }
    100% { transform: scale(1.0);  filter: brightness(1.0); }
  }
  .reveal-pulse {
    transform-box: fill-box;
    transform-origin: center;
    animation: revealPulse 750ms ease-in-out;
  }
  /* End-of-game controls: a "Replay" button + a big "Next" arrow that
     advances to the next lesson page.  Hidden by default; appear after
     Round 6's review wraps up.  Positioned over the centre of the play
     area so the kid can't miss them. */
  .end-controls {
    position: fixed;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%) scale(0.7);
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 4vw, 32px);
    align-items: stretch;
    width: 92vw;
    max-width: 420px;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .end-controls.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .end-controls .replay-btn,
  .end-controls .next-btn {
    font-family: Nunito, Arial, sans-serif;
    font-weight: 900;
    text-align: center;
    border: 5px solid #fff;
    border-radius: 999px;
    padding: clamp(16px, 4vw, 26px) clamp(28px, 7vw, 48px);
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    box-shadow: 0 6px 22px rgba(0,0,0,0.45);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .end-controls .replay-btn {
    background: #0066ff;
    font-size: clamp(28px, 7vw, 48px);
    letter-spacing: 0.05em;
  }
  .end-controls .next-btn {
    background: #00a12c;
    font-size: clamp(44px, 11vw, 80px);
    line-height: 1;
  }
</style>
<script src="audio-library.js"></script>
<script src="praise-audio.js"></script>
</head>
<body>

<div class="stage" id="stage">

  <div class="perfect-banner" id="perfectBanner">PERFECT!</div>

  <!-- End-of-game controls: shown when Round 6's review finishes.
       Replay restarts at Round 1.  The big arrow opens the next lesson
       in the top-level window (we're inside an iframe). -->
  <div class="end-controls" id="endControls">
    <button class="replay-btn" id="replayBtn">↻  Replay</button>
    <a class="next-btn" id="nextLessonLink" href="counting-to-10.html?autostart=1" target="_top" rel="noopener">→</a>
  </div>

  <div class="scorebox-left" id="scorebox-left">
    <div class="score-row">
      <span class="score-label">Score</span>
      <span class="score-value" id="scoreValue"></span>
    </div>
  </div>
  <div class="scorebox-center" id="scorebox-center">
    <div class="score-row">
      <span class="score-label">Perfect</span>
      <span class="score-value" id="perfectValue"></span>
    </div>
  </div>
  <div class="scorebox-right" id="scorebox-right">
    <div class="score-row">
      <span class="score-label">Screen</span>
      <span class="score-value" id="screenValue"></span>
    </div>
  </div>

  <div class="title">Addition<span class="sub">Adding 1 to 5 — tap to build up to 5</span></div>

  <!-- Paint tray.  Layout:
         Row 1: 0(white)  2(orange) 4(green)  6(purple) 8(pink)
         Row 2: 1(red)    3(yellow) 5(blue)   7(brown)  9(cyan)
       So white sits in the top-left and red sits directly below it. -->
  <div class="paint-tray" id="paintTray">
    <button class="paint-slot" data-color="#ffffff" data-value="0" style="--c:#ffffff; grid-column:1; grid-row:1;" aria-label="white (0)"></button>
    <button class="paint-slot disabled" data-color="#ff6200" data-value="2" style="--c:#ff6200;" aria-label="orange (2)"></button>
    <button class="paint-slot disabled" data-color="#00a12c" data-value="4" style="--c:#00a12c;" aria-label="green (4)"></button>
    <button class="paint-slot disabled" data-color="#7700dd" data-value="6" style="--c:#7700dd;" aria-label="purple (6)"></button>
    <button class="paint-slot disabled" data-color="#ff3fa6" data-value="8" style="--c:#ff3fa6;" aria-label="pink (8)"></button>

    <button class="paint-slot" data-color="#e63946" data-value="1" style="--c:#e63946; grid-column:1; grid-row:2;" aria-label="red (1)"></button>
    <button class="paint-slot disabled" data-color="#e6c800" data-value="3" style="--c:#e6c800;" aria-label="yellow (3)"></button>
    <button class="paint-slot disabled" data-color="#0066ff" data-value="5" style="--c:#0066ff;" aria-label="blue (5)"></button>
    <button class="paint-slot disabled" data-color="#7a3b00" data-value="7" style="--c:#7a3b00;" aria-label="brown (7)"></button>
    <button class="paint-slot disabled" data-color="#38c7ff" data-value="9" style="--c:#38c7ff;" aria-label="cyan (9)"></button>
  </div>

  <div class="equation" id="eq"></div>
  <div class="equation-line" id="eqLine"></div>

  <div class="play-area">
    <svg class="play-svg" id="playSvg" viewBox="0 0 210 220" preserveAspectRatio="xMidYMid meet">
      <g id="bgGroup"></g>
      <g id="dotGroup"></g>
      <!-- One tiny orange "tap me" dot per slot, sitting inside the white
           dot circle.  Hidden by default; the JS adds .show to the two
           pair-slot hints during a pair phase so they pulse together. -->
      <g id="innerHintGroup"></g>
      <!-- Per-slot number labels used by the Round 1 count-up reveal
           ("one, two, three, four, five" walkthrough at the end). -->
      <g id="numLabelGroup"></g>
    </svg>
  </div>

  <!-- Number line: colour-coded quantity SVG on top, black digit below. -->
  <div class="number-line-wrap">
    <div class="number-line">
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty1"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">1</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty2"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">2</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty3"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">3</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty4"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">4</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty5"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">5</text></svg></div></div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">CLEAR</button>

  <div class="brand">✦ ColorMyMath ✦<svg class="brand-sig" viewBox="0 0 72 40" preserveAspectRatio="xMidYMid meet" aria-hidden="true"><g stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="square" stroke-linejoin="miter"><line x1="14" y1="3" x2="14" y2="22"/><polyline points="30,3 30,22 42,22 42,36"/><polyline points="54,3 54,22 64,22"/></g></svg></div>
</div>

<script>
  // === Embedded audio for the game (rebuilt by
  // Downloads/render-video/build_audio_and_no_persist.js -- do not
  // hand-edit the data URIs below; rerun the script to refresh). ===
  const NUMBER_AUDIO = {

    c.setAttribute('stroke', '#000');
    c.setAttribute('stroke-width', '2');
    c.style.transition = 'fill 0.2s ease';
    c.style.cursor = 'pointer';
    dotGroup.appendChild(c);
    return { el: c, i, color: '#ffffff', value: 0 };
  });

  // One tiny orange inner-hint dot per slot, centred inside the white circle.
  // Hidden by default; .show toggles a continuous bigger/smaller pulse.  Lives
  // in its own group so it always renders ON TOP of the dot fill.
  const innerHintGroup = document.getElementById('innerHintGroup');
  const innerHints = slots.map(({x, y}) => {
    const h = document.createElementNS(SVG_NS, 'circle');
    h.setAttribute('cx', x);
    h.setAttribute('cy', y);
    h.setAttribute('r', DOT_R * 0.38);          // ~13.3 -- visibly inside
    h.setAttribute('fill', '#ff6200');
    h.setAttribute('class', 'inner-hint');
    h.style.pointerEvents = 'none';
    innerHintGroup.appendChild(h);
    return h;
  });

  // Per-slot number labels (1..5).  Hidden by default; the Round 1
  // count-up reveal fades each one in as it voices its number.
  const numLabelGroup = document.getElementById('numLabelGroup');
  const numLabels = slots.map(({x, y}) => {
    const t = document.createElementNS(SVG_NS, 'text');
    t.setAttribute('x', x);
    t.setAttribute('y', y);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'central');
    t.setAttribute('font-family', 'Nunito, Arial, sans-serif');
    t.setAttribute('font-weight', '900');
    t.setAttribute('font-size', '34');
    t.setAttribute('fill', '#000');
    t.setAttribute('opacity', '0');
    t.style.pointerEvents = 'none';
    t.textContent = '';
    numLabelGroup.appendChild(t);
    return t;
  });


  // --- Paint tray ----------------------------------------------------
  // Tap a slot to load the brush.  Tap the active slot again to drop it.
  let activePaint = null;          // hex colour, or null
  let activeValue = 0;             // numeric value for the active paint
  function setActivePaint(slot) {
    const wasActive = slot.classList.contains('active');
    document.querySelectorAll('.paint-slot.active').forEach(s => s.classList.remove('active'));
    if (wasActive) {
      activePaint = null;
      activeValue = 0;
    } else {
      slot.classList.add('active');
      activePaint = slot.dataset.color;
      activeValue = parseInt(slot.dataset.value, 10);
    }
  }
  document.querySelectorAll('.paint-slot').forEach(slot => {
    slot.addEventListener('click', () => setActivePaint(slot));
  });

  // --- Dot counting (progressive reveal) -----------------------------
  // Lesson 1 is a COUNT-UP (user 2026-05-29): only one dot is visible at
  // first.  Each tap on the white "next" dot adds one to the count, recolours
  // the whole group to that number's colour (1 red, 2 orange, 3 yellow,
  // 4 green, 5 blue -- the same colours the number line below uses), reveals
  // the next dot, and the voice says the running count ("one" ... "five").
  // Tapping any already-coloured dot counts the group back down by one.
  const COUNT_COLORS = { 1: '#e63946', 2: '#ff6200', 3: '#e6c800', 4: '#00a12c', 5: '#0066ff' };
  // Any dot is tappable (user 2026-05-29): the child can pick any of the
  // five positions in any order.  The slot array's order only drives
  // auto-advance -- if the child stops tapping, the pulse + auto-fill move
  // through the slots in the predefined sequence (bottom-centre, bottom-
  // left, bottom-right, top-left, top-right).
  const colored = new Set();        // dot indices currently coloured
  let count = 0;                    // kept in sync with colored.size below
  // Round 1 (default): build to 5 by +1 each tap.
  // Round 2 (after the first Perfect): build to 5 by +2 each tap -- the
  // first dot is solo, then a PAIR of dots appears together and tapping
  // either one adds both. The kid hears "plus two" on each pair tap.
  let round = 1;     // 0 + 5 = 5 now comes at the very end as Round 7

  // Match counting-to-10-game.html's pattern (user 2026-05-30): only the
  // next white dot is visible; future dots are hidden until their turn.
  // The VERY FIRST dot hops (gentle bounce, like counting-to-10's dot 1).
  // Dots 2-5 use the soft "wait-dot" breathing stroke instead.  After
  // IDLE_FILL_MS with no tap the auto-fill simulates a tap.
  const EMPHASIS_DELAY_MS = 5000;       // dot stays plain for 5s before emphasis
  const IDLE_FILL_MS      = 10000;      // total time before auto-fill
  let _fillTimer = null;
  let _emphasisTimer = null;
  let _hopStop = null;
  // Physics-based hop borrowed verbatim from counting-to-10-game.html so the
  // first dot bounces with the same feel.  Returns a stop function.
  function startHopping(el) {
    const restCy = parseFloat(el.getAttribute('cy'));
    const gravity = 0.4;
    const initVelocity = -5.5;
    const velocityRetain = 0.7;
    const maxImpacts = 3;
    const pauseFrames = 55;
    let running = true;
    let velocityY = initVelocity, offsetY = 0;
    let impactCount = 0, pauseCount = 0, inPause = false;
    function step() {
      if (!running) return;
      if (!inPause) {
        velocityY += gravity;
        offsetY += velocityY;
        if (offsetY >= 0) {
          offsetY = 0;
          impactCount++;
          if (impactCount >= maxImpacts) { velocityY = 0; inPause = true; pauseCount = 0; }
          else { velocityY = -velocityY * velocityRetain; }
        }
      } else {
        pauseCount++;
        if (pauseCount >= pauseFrames) {
          inPause = false; impactCount = 0;
          velocityY = initVelocity; offsetY = 0;
        }
      }
      el.setAttribute('cy', restCy + offsetY);
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
    return () => { running = false; el.setAttribute('cy', restCy); };
  }
  function stopHopping() {
    if (_hopStop) { _hopStop(); _hopStop = null; }
  }
  function cancelIdleTimers() {
    if (_fillTimer) { clearTimeout(_fillTimer); _fillTimer = null; }
    if (_emphasisTimer) { clearTimeout(_emphasisTimer); _emphasisTimer = null; }
    dots.forEach(d => d.el.classList.remove('pair-ghost'));
    innerHints.forEach(h => h.classList.remove('show'));
  }
  // Every round: any uncoloured dot is tappable.  The kid picks order.
  function _getNextDots() {
    const arr = [];
    for (let i = 0; i < dots.length; i++) {
      if (!colored.has(i)) arr.push(i);
    }
    return arr;
  }

  // ---- Partition view ------------------------------------------------
  // After every Round 2/3 tap, render each dot in its PARTITION colour
  // (pair members = orange, solos = red) for a beat BEFORE recolouring
  // every dot to the new count's colour.  Lets the kid SEE "2 orange + 1
  // red = 3 yellow" instead of the dots snapping to yellow instantly.
  const PARTITION_VIEW_MS = 1800;
  let _partitionViewActive = false;
  let _partitionViewTimer = null;

  // Returns the partition colour for slot `i`, or null if Round 1 (Round 1
  // has no pair groupings -- every dot is +1, so partition view == count view).
  // Partition colour for a coloured slot.  Round 1: null (count colour).
  // Rounds 2-6: find the group the kid filled containing this slot and
  // return its colour (2->orange, 3->yellow, 4->green, 1->red).
  function _partitionColorForSlot(i) {
    if (round === 1) return null;
    for (const g of tappedGroups) {
      if (g.includes(i)) return COUNT_COLORS[g.length];
    }
    return null;
  }

  // Refresh + fire callback.  Used to be a timed "partition view" that
  // briefly showed partition colours then flipped to count colours; now
  // refreshDots paints partition colours for Rounds 2-6 directly and
  // keeps them through the whole round, so there's nothing to defer.
  function _enterPartitionView(onDone) {
    if (_partitionViewTimer) { clearTimeout(_partitionViewTimer); _partitionViewTimer = null; }
    _partitionViewActive = false;
    refreshDots();
    if (onDone) onDone();
  }

  // Round 1 = one addend per tap.  Rounds 2-6 = one addend per group
  // the kid filled (in order).
  function _computeAddends(/* unused */) {
    if (round === 1) {
      return tapOrder.filter(i => colored.has(i)).map(() => 1);
    }
    return tappedGroups.map(g => g.length);
  }
  // Build an audio chain from an addends list + total, e.g.
  // [2,1,1], 4 -> ['2','plus','1','plus','1','equals','4'].
  // A single-addend list (e.g. [2]) returns just ['2'] -- no "equals".
  function _chainFromAddends(addends, total) {
    if (addends.length === 0) return [];
    if (addends.length === 1) return [String(addends[0])];
    const chain = [];
    for (let k = 0; k < addends.length; k++) {
      if (k > 0) chain.push('plus');
      chain.push(String(addends[k]));
    }
    chain.push('equals');
    chain.push(String(total));
    return chain;
  }
  // Pick the chain for INTERMEDIATE (non-final) Round 2+ taps.
  //   First tap of the round (one addend):  just "N"  (e.g. "two")
  //   Subsequent intermediate tap:          "plus N"  (e.g. "plus one")
  // The FINAL tap of every round is handled by _playFinalReveal which
  // appends "equals five" and flips all dots to blue.
  function _chainForTap(addends, total) {
    if (addends.length === 0) return [];
    if (addends.length === 1) return [String(addends[0])];
    return ['plus', String(addends[addends.length - 1])];
  }

  // ---- Final cumulative reveal ----------------------------------------
  // At the final tap of Round 2 / Round 3, replay the WHOLE partition:
  // empty every dot, then fill each group in sync with the spoken
  // addends ("two" -> 2 orange dots, "plus", "two" -> 2 more orange
  // dots, "plus", "one" -> 1 red dot, [pause], all turn blue + "is five").
  // The on-screen equation line builds along with the voice.

  // Slot indices for each addend, in the order the kid filled them.
  function _slotsForAddendList() {
    return tappedGroups;
  }

  // Pulse a list of slot indices: add the .reveal-pulse class, then strip
  // it after the animation finishes so the next call can re-trigger.
  function _pulseSlots(slotList, durationMs) {
    for (const idx of slotList) {
      if (!dots[idx]) continue;
      const el = dots[idx].el;
      el.classList.remove('reveal-pulse');
      void el.offsetWidth;                       // reflow -> restart animation
      el.classList.add('reveal-pulse');
    }
    setTimeout(() => {
      for (const idx of slotList) {
        if (dots[idx]) dots[idx].el.classList.remove('reveal-pulse');
      }
    }, durationMs || 800);
  }

  // FINAL-tap reveal.  Dots are ALREADY in their partition colours from
  // every prior tap; we don't repaint anything.  Voice plays
  // "plus <newAddend>" + pulse the last group, hold ~800ms, then
  // "equals" + "five" with all-blue + a big shared pulse.
  // Round 1 count-up reveal.  Walks through the kid's tap order showing
  // a number label (1..5) on each dot, voicing the count, and recolouring
  // each dot to its count-position colour (1=red, 2=orange, 3=yellow,
  // 4=green, 5=blue).  Plays once after the kid's 5th Round 1 tap.
  function _playRound1Reveal(onDone) {
    cancelIdleTimers();
    stopHopping();
    // Reset every dot to white and hide every label so the walkthrough
    // starts from a clean slate.
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost', 'reveal-pulse');
      el.setAttribute('fill', '#ffffff');
      el.style.opacity = '1';
      el.style.pointerEvents = 'none';
      el.style.cursor = 'default';
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    innerHints.forEach(h => h.classList.remove('show'));
    if (eqEl) eqEl.innerHTML = '<span class="num">' + dots.length + '</span>';
    if (eqLineEl) eqLineEl.textContent = '';

    // Walk in reading order from the top-left down the LEFT column to
    // the bottom-centre, then jump back up to the top-right and down
    // the RIGHT column:
    //   beat 1: top-left      (slot 2)
    //   beat 2: bottom-left   (slot 1)
    //   beat 3: bottom-centre (slot 0)  -> canonical "3" triangle
    //                                     [2, 1, 0] = 2 bottom + 1 top
    //   beat 4: top-right     (slot 4)
    //   beat 5: bottom-right  (slot 3)  -> full domino-5
    const walkOrder = [2, 1, 0, 4, 3];
    const items = [];
    for (let k = 0; k < walkOrder.length; k++) {
      const slot  = walkOrder[k];
      const count = k + 1;
      const color = COUNT_COLORS[count];
      items.push({
        key: String(count),
        gap: 600,
        onStart: () => {
          numLabels[slot].textContent = String(count);
          numLabels[slot].setAttribute('opacity', '1');
          for (let j = 0; j <= k; j++) {
            const ds = walkOrder[j];
            dots[ds].el.setAttribute('fill', color);
          }
          _pulseSlots([slot], 800);
          if (eqEl) eqEl.innerHTML = '<span class="num">' + count + '</span>';
        }
      });
    }

    if (window.AudioLib) {
      AudioLib.playChain(items, { gap: 600, onDone: () => { if (onDone) onDone(); } });
    } else if (onDone) {
      onDone();
    }
  }

  // Rounds 2-6 end-of-round REVIEW.  Resets the dots, then walks through
  // the canonical partition ("two plus two plus one equals five" etc.)
  // with number labels 1..5 added in left-to-right top-to-bottom order
  // and each addend's slots filling in the addend's count colour.  The
  // final "five" flips every dot to blue with a shared pulse.
  function _playPartitionReview(addends, total, onDone) {
    cancelIdleTimers();
    stopHopping();
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost', 'reveal-pulse');
      el.setAttribute('fill', '#ffffff');
      el.style.opacity = '1';
      el.style.pointerEvents = 'none';
      el.style.cursor = 'default';
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    innerHints.forEach(h => h.classList.remove('show'));
    if (eqEl)     eqEl.innerHTML = '<span class="num">' + total + '</span>';
    if (eqLineEl) eqLineEl.textContent = '';

    // Walk in reading order matching the Round 1 review: top-left,
    // bottom-left, bottom-centre, top-right, bottom-right.  This puts
    // the "3" triangle on beat 3 in every round whose biggest group is
    // a triple, and keeps each round's groups tangent / connected:
    //   R2 (2+1+1+1): pair = left column,        solos = 0, 4, 3
    //   R3 (2+2+1):   pair1 = left column,
    //                 pair2 = bottom-centre + top-right (diagonal),
    //                 solo = bottom-right
    //   R4 (3+1+1):   triangle = [2,1,0],        solos = 4, 3
    //   R5 (3+2):     triangle = [2,1,0],        pair = right column
    //   R6 (4+1):     quad = [2,1,0,4],          solo = bottom-right
    const walkOrder = [2, 1, 0, 4, 3];
    const items = [];
    let labelIdx = 0;
    let textSoFar = '';
    for (let k = 0; k < addends.length; k++) {
      const groupSize  = addends[k];
      const groupColor = COUNT_COLORS[groupSize];
      const isFirst    = (k === 0);
      const slots      = walkOrder.slice(labelIdx, labelIdx + groupSize);
      const startLabel = labelIdx + 1;
      textSoFar = textSoFar ? (textSoFar + ' + ' + groupSize) : String(groupSize);
      const eqSnapshot = textSoFar;
      const visualStart = () => {
        for (let j = 0; j < slots.length; j++) {
          const s = slots[j];
          dots[s].el.setAttribute('fill', groupColor);
          numLabels[s].textContent = String(startLabel + j);
          numLabels[s].setAttribute('opacity', '1');
        }
        _pulseSlots(slots, 800);
        if (eqLineEl) eqLineEl.textContent = eqSnapshot;
      };
      if (!isFirst && groupSize === 1) {
        // "plus one" as a single fluid clip.
        items.push({ key: 'plus_one', gap: 600, onStart: visualStart });
      } else {
        if (!isFirst) items.push({ key: 'plus' });
        items.push({
          key: String(groupSize),
          gap: 600,
          onStart: visualStart
        });
      }
      labelIdx += groupSize;
    }
    // Short gap after "equals" so the word doesn't sit alone in silence
    // before "five" -- matches the snappier feel of the final-tap reveal.
    items.push({ key: 'equals', gap: 220 });
    items.push({
      key: String(total),
      onStart: () => {
        const blue = COUNT_COLORS[total];
        for (let i = 0; i < dots.length; i++) {
          dots[i].el.setAttribute('fill', blue);
        }
        _pulseSlots([0, 1, 2, 3, 4], 900);
        if (eqLineEl) eqLineEl.textContent = addends.join(' + ') + ' = ' + total;
      }
    });

    if (window.AudioLib) {
      AudioLib.playChain(items, { gap: 500, onDone: () => { if (onDone) onDone(); } });
    } else if (onDone) {
      onDone();
    }
  }

  function _playFinalReveal(newAddend, total, onDone) {
    cancelIdleTimers();
    stopHopping();
    if (_partitionViewTimer) { clearTimeout(_partitionViewTimer); _partitionViewTimer = null; }
    _partitionViewActive = false;
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost', 'reveal-pulse');
      el.style.pointerEvents = 'none';
      el.style.cursor = 'default';
    }
    innerHints.forEach(h => h.classList.remove('show'));
    if (eqEl) eqEl.innerHTML = '<span class="num">' + total + '</span>';

    const groups    = _slotsForAddendList();
    const lastSlots = groups[groups.length - 1] || [];
    const addends   = _computeAddends();
    // "plus 1" runs together as one clip so there's no awkward gap.
    const addPlus = (val, onStart) =>
      (val === 1) ? [{ key: 'plus_one', gap: 900, onStart }]
                  : [{ key: 'plus' }, { key: String(val), gap: 900, onStart }];

    const items = [];
    // Round 7's partition is "0 + 5 = 5" -- prefix the chain with the
    // "zero" clip so the voice walks the kid through the whole equation.
    if (round === 7) items.push({ key: '0' });
    items.push(
      ...addPlus(newAddend, () => {
        _pulseSlots(lastSlots, 750);
        if (eqLineEl) eqLineEl.textContent = (round === 7 ? '0 + ' : '') + addends.join(' + ');
      }),
      { key: 'equals' },
      {
        key: String(total),
        onStart: () => {
          const blue = COUNT_COLORS[total];
          for (let i = 0; i < dots.length; i++) {
            dots[i].el.setAttribute('fill', blue);
          }
          _pulseSlots([0, 1, 2, 3, 4], 900);
          if (eqLineEl) {
            const prefix = (round === 7) ? '0 + ' : '';
            eqLineEl.textContent = prefix + addends.join(' + ') + ' = ' + total;
          }
        }
      }
    );

    if (window.AudioLib) {
      AudioLib.playChain(items, { gap: 200, onDone: () => { if (onDone) onDone(); } });
    } else if (onDone) {
      onDone();
    }
  }

  // Default anchor + group for the upcoming tap when the kid is idle.
  // Used by both the idle hint and the auto-fill timer so the canonical
  // group appears at the same slots either way.
  function _defaultGroupForIdle() {
    if (round === 1) return null;
    const sizes = PARTITION_GROUPS[round] || [];
    const groupIdx = tappedGroups.length;
    if (groupIdx >= sizes.length) return null;
    const size = sizes[groupIdx];
    let anchor;
    if (groupIdx === 0) {
      // Canonical anchor for the round's FIRST (biggest) group.
      if (round === 2 || round === 3)            anchor = 1;   // pair from bottom-left
      else if (round === 4 || round === 5)       anchor = 0;   // triangle from bottom-centre
      else if (round === 6)                      anchor = 1;   // quad from bottom-left
      else                                        anchor = 0;
    } else {
      // Subsequent group: pick the first still-uncoloured slot.
      anchor = 0;
      for (let i = 0; i < dots.length; i++) {
        if (!colored.has(i)) { anchor = i; break; }
      }
    }
    return { slots: _pickGroup(anchor, size), color: COUNT_COLORS[size], anchor };
  }

  // Light up the canonical group slots with small coloured "hint" dots
  // inside the white circles -- e.g. 3 small yellow dots for the "3"
  // group, 4 small green dots for the "4" group.  Pulses to attract
  // the eye.  Hidden when cancelIdleTimers fires.
  function _showGroupHint(slots, color) {
    innerHints.forEach((h, i) => {
      if (slots.includes(i)) {
        h.setAttribute('fill', color);
        h.classList.remove('show');
        void h.offsetWidth;
        h.classList.add('show');
      } else {
        h.classList.remove('show');
      }
    });
  }

  function startIdleTimers() {
    cancelIdleTimers();
    if (colored.size >= dots.length) return;
    const nextDots = _getNextDots();
    if (nextDots.length === 0) return;
    const isFirstHopDot = (round === 1 && count === 0);
    // Phase 1: after EMPHASIS_DELAY_MS show a hint.  Round 1 first dot
    // hops; everything else gets the breathing wait-dot stroke + (for
    // Rounds 2-6) coloured hint dots inside the next group's slots.
    _emphasisTimer = setTimeout(() => {
      _emphasisTimer = null;
      if (isFirstHopDot && nextDots.length >= 1) {
        const el = dots[nextDots[0]].el;
        if (el) _hopStop = startHopping(el);
        return;
      }
      nextDots.forEach(idx => {
        const el = dots[idx] && dots[idx].el;
        if (el) el.classList.add('wait-dot');
      });
      if (round !== 1) {
        const g = _defaultGroupForIdle();
        if (g) _showGroupHint(g.slots, g.color);
      }
    }, EMPHASIS_DELAY_MS);
    // Phase 2: after IDLE_FILL_MS auto-fill.
    _fillTimer = setTimeout(() => {
      _fillTimer = null;
      if (round === 1) {
        handleDotTap(nextDots[0]);
      } else {
        const g = _defaultGroupForIdle();
        if (g) handleDotTap(g.anchor);
      }
    }, IDLE_FILL_MS);
  }

  function refreshDots() {
    stopHopping();
    count = colored.size;
    const groupColour = COUNT_COLORS[count];
    const nextDots = _getNextDots();
    const nextSet = new Set(nextDots);
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost');
      if (colored.has(i)) {
        // Coloured dot.  Round 1: count colour (every tap changes the
        // whole group's colour).  Rounds 2-6: dot stays in its PARTITION
        // colour for the entire round so the kid sees the breakdown
        // build up -- pair = orange, triple = yellow, quad = green,
        // solo = red.  Only the final reveal flips them all to blue.
        let fillColour = groupColour;
        if (round >= 2) {
          const pc = _partitionColorForSlot(i);
          if (pc) fillColour = pc;
        }
        el.setAttribute('fill', fillColour);
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
        el.style.cursor = 'pointer';
        dots[i].color = fillColour;
        dots[i].value = 1;
      } else {
        // Empty dot -- ALWAYS visible white.  In Round 1 every uncoloured
        // dot is tappable (the kid can pick any spot to count up at).
        // Rounds 2-6 only let the kid tap dots in the next canonical
        // group, so the partition picture stays intact.
        el.setAttribute('fill', '#ffffff');
        el.style.opacity = '1';
        const tappable = (round === 1) || nextSet.has(i);
        el.style.pointerEvents = tappable ? 'auto' : 'none';
        el.style.cursor      = tappable ? 'pointer' : 'default';
        dots[i].color = '#ffffff';
        dots[i].value = 0;
      }
    }
    updateEquation();
    startIdleTimers();
  }

  // When Round 1 reaches Perfect, show the banner, then after a beat clear
  // the dots and switch to Round 2.  Round 2 reaches Perfect and stays.
  // Move to the next round: clear state, hide banner + labels, refresh.
  function _advanceRound(nextRound) {
    hidePerfectBanner();
    colored.clear();
    tapOrder.length = 0;
    tappedGroups.length = 0;
    _hasTappedThisRound = false;
    _hideEndControls();
    round = nextRound;
    for (let i = 0; i < numLabels.length; i++) {
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    refreshDots();
    // Round 7 (0 + 5 = 5) intro: voice "zero" right as the blank dots
    // appear so the kid hears the starting number alongside the big "0".
    if (nextRound === 7) {
      setTimeout(() => { _playKey('0'); }, 350);
    }
  }

  function onPerfectReached() {
    showPerfectBanner();
    const BEFORE_REVIEW_MS = 3000;
    const AFTER_REVIEW_MS  = 1500;
    if (round === 1) {
      // Round 1: pause for praise voice, then count-up REVIEW (1..5),
      // then advance to Round 2.
      setTimeout(() => {
        hidePerfectBanner();
        _playRound1Reveal(() => {
          setTimeout(() => { _advanceRound(2); }, AFTER_REVIEW_MS);
        });
      }, BEFORE_REVIEW_MS);
      return;
    }
    // Rounds 2-6: pause for praise voice, then run the PARTITION REVIEW
    // (e.g. "two plus two plus one equals five" with number labels 1-5
    // in LTR-TTB order).  Then advance to the next round, or just hold
    // on the final blue + labelled state for Round 6.
    // Round 7 (0 + 5 = 5) is the last partition: no separate walkthrough
    // review (the reveal already voices the whole equation), just pop
    // the Replay + Next-lesson end controls.
    if (round === 7) {
      setTimeout(_showEndControls, BEFORE_REVIEW_MS);
      return;
    }
    const nextRound = (round < 7) ? round + 1 : null;
    setTimeout(() => {
      hidePerfectBanner();
      _playPartitionReview(_computeAddends(), dots.length, () => {
        if (nextRound != null) {
          setTimeout(() => { _advanceRound(nextRound); }, AFTER_REVIEW_MS);
        } else {
          // Fallback in case Round 7 ever lands here.
          setTimeout(_showEndControls, AFTER_REVIEW_MS);
        }
      });
    }, BEFORE_REVIEW_MS);
  }

  function _showEndControls() {
    const ec = document.getElementById('endControls');
    if (ec) ec.classList.add('show');
  }
  function _hideEndControls() {
    const ec = document.getElementById('endControls');
    if (ec) ec.classList.remove('show');
  }

  function _replayFromStart() {
    _hideEndControls();
    hidePerfectBanner();
    colored.clear();
    tapOrder.length = 0;
    tappedGroups.length = 0;
    _hasTappedThisRound = false;
    round = 1;
    for (let i = 0; i < numLabels.length; i++) {
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    refreshDots();
  }
  const replayBtn = document.getElementById('replayBtn');
  if (replayBtn) replayBtn.addEventListener('click', _replayFromStart);

  function handleDotTap(i) {
    if (!colored.has(i)) {
      cancelIdleTimers();
      _cancelNarration();
      _hasTappedThisRound = true;

      if (round === 1) {
        // Round 1: each tap fills exactly the tapped dot.
        colored.add(i);
        tapOrder.push(i);
        refreshDots();
        const newCount = colored.size;
        if (newCount === dots.length) {
          // Reach 5 -> say "five", then the Perfect celebration runs,
          // then (after a pause) the count-up review walks 1..5.
          _playKey(String(newCount));
          onPerfectReached();
        } else {
          _playKey(String(newCount));
        }
        if (typeof window.bumpScoreForPaint === 'function') window.bumpScoreForPaint();
        return;
      }

      // Rounds 2-6: one tap fills the next group.  The group is anchored
      // at the kid's tapped slot -- if it's a pair/triple/quad, the
      // system picks tangent partners around the tap.  Solos fill just
      // the tapped slot.
      const sizes = PARTITION_GROUPS[round] || [];
      const groupIdx = tappedGroups.length;
      if (groupIdx >= sizes.length) return;
      const groupSize = sizes[groupIdx];
      const group = _pickGroup(i, groupSize);
      tappedGroups.push(group);
      group.forEach(s => colored.add(s));
      refreshDots();

      const newCount = colored.size;
      const isFinal  = (newCount === dots.length);

      if (isFinal) {
        _playFinalReveal(groupSize, newCount, onPerfectReached);
      } else if (groupIdx === 0) {
        _playKey(String(groupSize));
      } else if (groupSize === 1) {
        // "plus one" as a single clip -- no gap between "plus" and "one".
        _playKey('plus_one');
      } else {
        _playChain(['plus', String(groupSize)]);
      }
      if (typeof window.bumpScoreForPaint === 'function') window.bumpScoreForPaint();
    } else if (round === 1 && colored.has(i)) {
      // Round 1 only: tap a coloured dot to untap it and count back down.
      // Rounds 2-6 lock in the partition once the kid taps a dot.
      colored.delete(i);
      const tIdx = tapOrder.indexOf(i);
      if (tIdx >= 0) tapOrder.splice(tIdx, 1);
      hidePerfectBanner();
      refreshDots();
      _cancelNarration();
      const n = colored.size;
      if (n > 0) {
        _playKey(String(n));
      } else if ("speechSynthesis" in window) {
        try { window.speechSynthesis.cancel(); } catch (e) {}
        const u = new SpeechSynthesisUtterance("zero");
        u.rate = 0.95;
        window.speechSynthesis.speak(u);
      }
      if (typeof window.bumpScoreForErase === 'function') window.bumpScoreForErase();
    }
  }
  for (let i = 0; i < dots.length; i++) {
    dots[i].el.addEventListener('click', () => handleDotTap(i));
  }
  refreshDots();                  // initial state: all 5 dots visible

  // Big centre count -- the same number the voice says, shown huge above
  // the dots so the child can read it as they count up.  Always shows the
  // current count, including 0 (so "0" is visible after the child counts
  // all the way back down).  Plus the small running-equation line below.
  function updateEquation() {
    // At the very start of each partition (no taps yet), show the TARGET
    // (5) as the big number so the kid sees what they're building toward.
    if (count === 0 && !_hasTappedThisRound) {
      // Round 7's intro shows ZERO (the starting number of the
      // 0 + 5 = 5 partition) instead of the target.  Every other round
      // shows the target 5 so the kid sees what they're building toward.
      const intro = (round === 7) ? 0 : dots.length;
      eqEl.innerHTML = '<span class="num">' + intro + '</span>';
      if (eqLineEl) eqLineEl.textContent = '';
      return;
    }
    eqEl.innerHTML = '<span class="num">' + count + '</span>';
    if (!eqLineEl) return;
    // Derive the addends from the CURRENT dot groups (Round 1: one per
    // dot; Round 2: pair 0+1 then solos; Round 3: pairs 0+1 and 3+4 then
    // solo 2).  Equation line ALWAYS matches what's painted.
    const addendsNow = _computeAddends(colored);
    // Round 7's partition is "0 + 5 = 5" -- prepend "0 + " so the kid
    // sees the equation that's about to be voiced.
    const r7prefix = (round === 7) ? '0 + ' : '';
    if (addendsNow.length === 0 || count === 0) {
      eqLineEl.textContent = '';
    } else if (addendsNow.length === 1) {
      eqLineEl.textContent = r7prefix + String(addendsNow[0]);
    } else if (count === dots.length) {
      // Round complete -- show "= N" alongside the full partition.
      eqLineEl.textContent = r7prefix + addendsNow.join(' + ') + ' = ' + count;
    } else {
      // Still building -- addends only, no "=" yet (matches the audio,
      // which doesn't say "equals" until the final tap).
      eqLineEl.textContent = r7prefix + addendsNow.join(' + ');
    }
  }

  // --- Reset button --------------------------------------------------
  document.getElementById('resetBtn').addEventListener('click', () => {
    hidePerfectBanner();
    colored.clear();
    tapOrder.length = 0;
    tappedGroups.length = 0;
    _hasTappedThisRound = false;            // show target "5" again on reset
    _hideEndControls();
    round = 1;
    for (let i = 0; i < numLabels.length; i++) {
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    refreshDots();
    // Drop any active paint too (the palette is hidden, but be safe).
    document.querySelectorAll('.paint-slot.active').forEach(s => s.classList.remove('active'));
    activePaint = null;
    activeValue = 0;
  });

  // --- Pause when the page isn't visible ------------------------------
  // AudioLib already stops sound + suspends its context on visibilitychange,
  // but THIS game also has idle timers (5s emphasis, 10s auto-fill) and a
  // hopping animation that would keep running.  Cut everything when hidden
  // so nothing fires while the kid is looking at another app.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      _cancelNarration();        // belt + suspenders with AudioLib
      cancelIdleTimers();
      stopHopping();
    }
  });
  window.addEventListener('pagehide', () => {
    _cancelNarration();
    cancelIdleTimers();
    stopHopping();
  });

  // --- Number-line cells (coloured quantity above black digit) -------
  // Layouts mirror the counting-to-10-game.html number line: each
  // cell shows the dot-grouping for that digit in its ColorMyMath
  // colour, on top of the plain black digit label.  Cell #10 also
  // gets a black equilateral triangle wrapped around its 4-3-2-1
  // cluster (the same triangle motif used in every lesson).
  const NL_R = 10;
  const NL_CX = 50;
  const NL_YBOT = 92;
  const NL_D = 2 * NL_R;
  const NL_TRI_H = NL_D * Math.sqrt(3) / 2;
  const NUMBER_LINE_LAYOUTS = {
    1:  { color: '#e63946', centers: [{x: NL_CX, y: NL_YBOT}] },
    2:  { color: '#ff6200', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT}
          ] },
    3:  { color: '#e6c800', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX,        y: NL_YBOT - NL_TRI_H}
          ] },
    4:  { color: '#00a12c', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_D}, {x: NL_CX + NL_R, y: NL_YBOT - NL_D}
          ] },
    5:  { color: '#0066ff', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - NL_TRI_H}
          ] },
    6:  { color: '#7700dd', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX,        y: NL_YBOT - 2 * NL_TRI_H}
          ] },
    7:  { color: '#7a3b00', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_TRI_H}, {x: NL_CX, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_D, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX - NL_R, y: NL_YBOT - 2 * NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - 2 * NL_TRI_H}
          ] },
    8:  { color: '#ff3fa6', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_D},                                           {x: NL_CX + NL_D, y: NL_YBOT - NL_D},
            {x: NL_CX - NL_D, y: NL_YBOT - 2 * NL_D}, {x: NL_CX, y: NL_YBOT - 2 * NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - 2 * NL_D}
          ] },
    9:  { color: '#38c7ff', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_D}, {x: NL_CX, y: NL_YBOT - NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - NL_D},
            {x: NL_CX - NL_D, y: NL_YBOT - 2 * NL_D}, {x: NL_CX, y: NL_YBOT - 2 * NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - 2 * NL_D}
          ] },
    10: { color: '#e63946', centers: [
            {x: NL_CX - 3*NL_R, y: NL_YBOT}, {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT}, {x: NL_CX + 3*NL_R, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_TRI_H}, {x: NL_CX, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_D, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX - NL_R, y: NL_YBOT - 2 * NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - 2 * NL_TRI_H},
            {x: NL_CX,        y: NL_YBOT - 3 * NL_TRI_H}
          ] }
  };
  for (let n = 1; n <= 10; n++) {
    const svg = document.getElementById('nlQty' + n);
    if (!svg) continue;
    const { color, centers } = NUMBER_LINE_LAYOUTS[n];
    // For 10, draw the canonical 10-triangle outline before the dots.
    if (n === 10) {
      const halfW = 3 * NL_R + NL_R * Math.sqrt(3);
      const baseY = NL_YBOT + NL_R;
      const topY  = baseY - halfW * Math.sqrt(3);
      const tri = document.createElementNS(SVG_NS, 'polygon');
      tri.setAttribute('points',
        (NL_CX - halfW) + ',' + baseY + ' ' +
        (NL_CX + halfW) + ',' + baseY + ' ' +
        NL_CX + ',' + topY);
      tri.setAttribute('fill', 'none');
      tri.setAttribute('stroke', '#000');
      tri.setAttribute('stroke-width', '1.6');
      tri.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(tri);
    }
    for (const p of centers) {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', p.x);
      c.setAttribute('cy', p.y);
      c.setAttribute('r', NL_R);
      c.setAttribute('fill', color);
      c.setAttribute('stroke', '#000');
      c.setAttribute('stroke-width', '1.4');
      svg.appendChild(c);
    }
  }

  // === Magic-42 game scoreboard ============================================
  // Score:   every successful paint stroke (any colour).
  // Perfect: every successful stroke that wasn't immediately erased.
  // Screen:  taps that didn't paint anything (background, spent chips,
  //          already-painted dot taps without an active brush, etc.).
  // Persisted across the partition game pages via localStorage so the
  // child carries their score from partition 1 -> 2 -> ...
  const SCORE_STORAGE_KEY = 'colormymath.addition.scoreboard';
  let scoreCount = 0;
  let screenCount = 0;
  let perfectCount = 0;
  const scoreValueEl   = document.getElementById('scoreValue');
  const screenValueEl  = document.getElementById('screenValue');
  const perfectValueEl = document.getElementById('perfectValue');

  function loadScoreboard() {
    // No persistence -- per user request, every page load starts fresh
    // at Score 0 / Perfect 0 / Screen 0.  Purge any leftover storage
    // from older builds so it can't sneak back in.
    try { sessionStorage.removeItem(SCORE_STORAGE_KEY); } catch (e) {}
    try { localStorage.removeItem(SCORE_STORAGE_KEY);   } catch (e) {}
  }
  function saveScoreboard() {
    // No-op: see loadScoreboard above for why persistence is off.
  }

  // Digital ColorMyMath number rendering -- each digit becomes a small
  // dot-group in its palette colour (0 = ring).
  const DIGIT_COLORS = {
    0: '#ffffff', 1: '#e63946', 2: '#ff6200', 3: '#e6c800', 4: '#00a12c',
    5: '#0066ff', 6: '#7700dd', 7: '#7a3b00', 8: '#ff3fa6', 9: '#38c7ff',
  };
  const DIGIT_ARRANGEMENT = {
    0: [1], 1: [1], 2: [2], 3: [1, 2], 4: [2, 2], 5: [2, 3],
    6: [1, 2, 3], 7: [2, 3, 2], 8: [3, 'split', 3], 9: [3, 3, 3],
  };
  function renderDigitalNumber(container, num) {
    container.innerHTML = '';
    const str = String(num);
    for (const ch of str) {
      const d = parseInt(ch, 10);
      if (isNaN(d)) continue;
      const isZero = d === 0;
      const color = DIGIT_COLORS[d];
      const group = document.createElement('span');
      group.className = 'score-digit-group';
      for (const rowSpec of DIGIT_ARRANGEMENT[d]) {
        const row = document.createElement('span');
        row.className = 'score-digit-row';
        if (rowSpec === 'split') {
          const a = document.createElement('span');
          a.className = 'score-dot';
          a.style.background = color;
          const sp = document.createElement('span');
          sp.className = 'score-dot spacer';
          const b = document.createElement('span');
          b.className = 'score-dot';
          b.style.background = color;
          row.appendChild(a); row.appendChild(sp); row.appendChild(b);
        } else {
          for (let i = 0; i < rowSpec; i++) {
            const dot = document.createElement('span');
            dot.className = 'score-dot' + (isZero ? ' ring' : '');
            dot.style.background = color;
            if (isZero) {
              dot.style.borderColor = '#000';
              dot.style.borderWidth = '1.5px';
            }
            row.appendChild(dot);
          }
        }
        group.appendChild(row);
      }
      container.appendChild(group);
    }
  }
  function renderScoreboard() {
    if (scoreValueEl)   renderDigitalNumber(scoreValueEl,   scoreCount);
    if (screenValueEl)  { screenValueEl.classList.add('bw'); renderDigitalNumber(screenValueEl,  screenCount); }
    if (perfectValueEl) renderDigitalNumber(perfectValueEl, perfectCount);
  }
  // Score hooks invoked from paintDot.
  window.bumpScoreForPaint = function() {
    scoreCount++;
    perfectCount++;
    renderScoreboard();
    saveScoreboard();
  };
  window.bumpScoreForErase = function() {
    // Erasing doesn't count toward Score or Perfect -- it undoes work.
    // We just save so the persisted board stays consistent.
    saveScoreboard();
  };
  // Capture-phase screen-tap listener: anything that lands on the stage
  // background (not a dot, not a paint chip, not the CLEAR pill, not the
  // scoreboard itself) counts as a "screen" miss.
  document.addEventListener('click', (ev) => {
    const t = ev.target;
    if (!t) return;
    if (t.closest('.paint-slot')) return;
    if (t.closest('.reset-btn')) return;
    if (t.closest('.scorebox-left, .scorebox-center, .scorebox-right')) return;
    if (t.closest('.number-line-wrap')) return;
    // SVG <circle> dots inside #dotGroup count as dot taps (handled
    // by paintDot), not screen misses.
    if (t.tagName === 'circle' && t.parentNode && t.parentNode.id === 'dotGroup') return;
    screenCount++;
    renderScoreboard();
    saveScoreboard();
  }, true);

  loadScoreboard();
  renderScoreboard();

  // === "Perfect!" banner ===================================================
  function showPerfectBanner() {
    const b = document.getElementById('perfectBanner');
    if (b) {
      b.textContent = 'PERFECT!';     // reset in case free-play swapped it
      b.classList.add('show');
    }
    // Delay the praise audio so it doesn't overlap whatever clip just
    // finished the round.  Pick a RANDOM praise clip from the pool
    // (great answer / fantastic / well done / etc.) so the kid hears
    // a fresh variant each round.  Falls back to the plain "perfect"
    // clip if the praise pool isn't loaded yet.
    setTimeout(() => {
      try {
        if (typeof window.playRandomPraise === 'function') {
          window.playRandomPraise();
        } else if (window.AudioLib) {
          AudioLib.play('perfect');
        }
      } catch (e) {}
    }, 700);
  }
  function hidePerfectBanner() {
    const b = document.getElementById('perfectBanner');
    if (b) b.classList.remove('show');
  }
  window.showPerfectBanner = showPerfectBanner;
  window.hidePerfectBanner = hidePerfectBanner;
</script>

</body>
</html>
