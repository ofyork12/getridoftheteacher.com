<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d1b2e">
<title>About Time — ColorMyMath Clock</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="About Time">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 50% 30%, #142c4e, #0d1b2e 70%);
    color:#eaf1fb; min-height:100%; display:flex; flex-direction:column;
    overflow-x:hidden; user-select:none; -webkit-user-select:none;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:12px 16px 4px;}
  .exit{color:#9bb0cc; text-decoration:none; font-size:14px; font-weight:600; border:1px solid #2b466e; padding:7px 12px; border-radius:999px;}
  .exit:hover{background:#15294a; color:#fff;}
  .brand{font-weight:800; font-size:18px; letter-spacing:.5px;}
  .brand b{color:#f0b32a;}

  .clockwrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:6px 14px 26px;}

  /* the round clock face */
  .dial{
    position:relative; width:min(86vw, 60vh); aspect-ratio:1/1; border-radius:50%;
    background:radial-gradient(circle at 50% 42%, #ffffff, #eef2f8);
    border:10px solid #2b3f5c; box-shadow:0 14px 40px rgba(0,0,0,.5), inset 0 0 0 4px #fff;
  }
  .numeral{position:absolute; transform:translate(-50%,-50%); pointer-events:none;}
  .numeral img{height:clamp(34px,9.5vw,66px); width:auto; object-fit:contain; display:block;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));}

  .hand{position:absolute; left:50%; bottom:50%; transform-origin:50% 100%; border-radius:999px; z-index:5;}
  .hand--hour  {width:2.6%; height:27%; margin-left:-1.3%; background:#22344f;}
  .hand--minute{width:1.8%; height:37%; margin-left:-0.9%; background:#22344f;}
  .hand--second{width:1.0%; height:41%; margin-left:-0.5%; background:#f0b32a;}
  .hub{position:absolute; left:50%; top:50%; width:5.5%; height:5.5%; transform:translate(-50%,-50%);
    background:#22344f; border:3px solid #fff; border-radius:50%; z-index:6;}

  .readout{font-size:15px; color:#9bb0cc; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:1px;}
  .readout b{color:#cdddf2;}

  .knobs{display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;}
  .knob{border:none; background:none; padding:0; cursor:pointer; transition:transform .06s;}
  .knob:active{transform:scale(.9);}
  .knob img{height:46px; width:auto; display:block; border-radius:10px;}
  .gauge{font-size:13px; color:#9bb0cc; font-weight:700; background:#15294a; padding:8px 14px; border-radius:999px;}
  .gauge b{color:#f0b32a;}
  .hint{font-size:12px; color:#6f86a8; text-align:center; max-width:340px;}
</style>
</head>
<body>
  <div class="topbar">
    <a class="exit" href="../games.html">← Games</a>
    <div class="brand">About <b>Time</b></div>
    <span style="width:64px"></span>
  </div>

  <div class="clockwrap">
    <div class="dial" id="dial">
      <div class="hand hand--hour"   id="handHour"></div>
      <div class="hand hand--minute" id="handMin"></div>
      <div class="hand hand--second" id="handSec"></div>
      <div class="hub"></div>
    </div>

    <div class="readout"><b id="readout">12:00</b> <span id="ampm">AM</span></div>

    <div class="knobs">
      <button class="knob" id="btnSlow"  title="Slower"><img src="gfx/device_frozen_time_slow.png" alt="Slower"></button>
      <button class="knob" id="btnReset" title="Reset to now"><img src="gfx/device_frozen_reset.png" alt="Reset"></button>
      <button class="knob" id="btnFast"  title="Faster"><img src="gfx/device_frozen_time_fast.png" alt="Faster"></button>
    </div>
    <div class="gauge" id="gauge">Real time</div>
    <div class="hint">The numbers are colored dots. Tap <b>Faster</b>/<b>Slower</b> to move the hands · <b>Reset</b> goes back to now.</div>
  </div>

<script>
"use strict";
(function(){
  const $=id=>document.getElementById(id);
  const WORD=['','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve'];
  function numeralSrc(n){ return n===5 ? 'gfx/a_five_house.png' : 'gfx/a_group_'+WORD[n]+'.png'; }

  // place the 12 dot-group numbers around the face (12 at top)
  const dial=$('dial');
  for(let n=1;n<=12;n++){
    const ang=(n/12)*Math.PI*2 - Math.PI/2;      // 3 o'clock = 0, go clockwise; offset so 12 is up
    const R=39;                                    // % of radius from center
    const x=50 + Math.cos(ang)*R, y=50 + Math.sin(ang)*R;
    const wrap=document.createElement('div'); wrap.className='numeral';
    wrap.style.left=x+'%'; wrap.style.top=y+'%';
    const im=document.createElement('img'); im.src=numeralSrc(n); im.alt=n;
    wrap.appendChild(im); dial.appendChild(wrap);
  }

  // ---- time model: simulated clock with adjustable rate ----
  const SPEEDS=[0, 0.25, 1, 30, 120, 600, 3600];
  const SPEED_LABELS=['Paused','¼ speed','Real time','×30','×120','×600','×3600'];
  let speedIdx=2, simMs=Date.now(), lastTs=performance.now();
  const rate=()=>SPEEDS[speedIdx];
  function setGauge(){ const r=rate(); $('gauge').innerHTML = r===1 ? 'Real time' : '<b>'+SPEED_LABELS[speedIdx]+'</b>'; }

  function render(){
    const d=new Date(simMs);
    const ms=d.getMilliseconds(), s=d.getSeconds()+ms/1000, m=d.getMinutes()+s/60, h=(d.getHours()%12)+m/60;
    $('handHour').style.transform='rotate('+(h*30)+'deg)';
    $('handMin').style.transform='rotate('+(m*6)+'deg)';
    $('handSec').style.transform='rotate('+(s*6)+'deg)';
    let hh=d.getHours()%12; if(hh===0) hh=12;
    const mm=d.getMinutes();
    $('readout').textContent = hh+':'+(mm<10?'0':'')+mm;
    $('ampm').textContent = d.getHours()>=12 ? 'PM':'AM';
  }
  function frame(ts){ const dt=ts-lastTs; lastTs=ts; simMs += dt*rate(); render(); requestAnimationFrame(frame); }

  $('btnFast').addEventListener('click', ()=>{ speedIdx=Math.min(SPEEDS.length-1, speedIdx+1); setGauge(); });
  $('btnSlow').addEventListener('click', ()=>{ speedIdx=Math.max(0, speedIdx-1); setGauge(); });
  $('btnReset').addEventListener('click', ()=>{ speedIdx=2; simMs=Date.now(); setGauge(); render(); });

  setGauge(); render(); requestAnimationFrame(frame);
  if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
})();
</script>
</body>
</html>
