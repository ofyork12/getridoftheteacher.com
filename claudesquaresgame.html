<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Game</title>
  <style>
    :root {
      --bg:    #080808;
      --text:  #f0ebe4;
      --muted: #444;
      --coral: #d97757;
      --dim:   #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Helvetica, Arial, sans-serif;
      touch-action: manipulation;
    }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; z-index: 10;
    }
    .logo { font-size: 14px; font-weight: 800; color: var(--coral); opacity: 0.7; }
    .stats { font-family: Helvetica, Arial, sans-serif; font-size: 11px; color: var(--muted); display: flex; gap: 14px; }
    .stats b { color: var(--coral); }
    .btns { display: flex; gap: 8px; }
    .topbtn {
      font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700;
      padding: 5px 12px; border-radius: 999px; border: 1px solid var(--dim);
      background: transparent; color: var(--muted); cursor: pointer; transition: all 0.18s;
    }
    .topbtn:hover, .topbtn.on { border-color: var(--coral); color: var(--coral); }

    .screen {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 70px 24px 24px;
    }

    /* ── square label (e.g. 1²) — superscript positioned up & right ── */
    .sq-label {
      font-size: clamp(60px, 13vw, 112px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: flex-start;
      align-self: center;
    }
    .sq-label sup {
      font-size: 0.45em;
      font-weight: 800;
      color: var(--coral);
      letter-spacing: 0;
      line-height: 1;
      margin-left: 0.06em;
      position: relative;
      top: -0.15em;
      vertical-align: baseline;
    }

    .digit-groups {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(10px, 3vw, 28px);
      margin-bottom: 20px;
      min-height: 80px;
    }

    .dg {
      animation: pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .dot {
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.ring {
      background: transparent !important;
      border-width: 3px;
      border-style: solid;
    }

    .single-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 3vw, 24px);
      margin-top: 16px;
      margin-bottom: 0;
      min-height: 20px;
    }

    .single-dot {
      border-radius: 50%;
      flex-shrink: 0;
      animation: pop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .single-dot.ring {
      background: transparent !important;
      border-width: 3px;
      border-style: solid;
    }

    .input-wrap {
      width: 100%; max-width: 480px;
      border: 3px solid #333;
      border-radius: 16px;
      padding: 10px 24px;
      background: #111;
      transition: border-color 0.2s;
    }
    .input-wrap.bad { border-color: #e63946; animation: shake 0.3s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-10px); }
      75%      { transform: translateX(10px); }
    }

    #ans {
      width: 100%; background: transparent; border: none; outline: none;
      font-family: Helvetica, Arial, sans-serif;
      font-size: clamp(44px, 10vw, 88px);
      font-weight: 800; letter-spacing: -2px;
      color: var(--text); text-align: center;
      -moz-appearance: textfield;
      text-size-adjust: none;
      -webkit-text-size-adjust: none;
    }
    #ans::-webkit-inner-spin-button,
    #ans::-webkit-outer-spin-button { -webkit-appearance: none; }
    #ans::placeholder { color: var(--dim); }

    .flash {
      position: fixed; inset: 0;
      background: rgba(0, 161, 44, 0.13);
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s; z-index: 5;
    }
    .flash.show { opacity: 1; }

    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.97);
      z-index: 99; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; text-align: center;
    }
    .overlay.show { display: flex; }
    .ov-title { font-size: clamp(72px, 14vw, 128px); font-weight: 800; letter-spacing: -5px; color: var(--coral); }
    .ov-sub   { font-size: 18px; color: var(--muted); }
    .ov-time  { font-family: Helvetica, Arial, sans-serif; font-size: 48px; color: var(--coral); margin: 8px 0 24px; }
    .ov-btn   {
      font-family: Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 700;
      padding: 14px 40px; border-radius: 999px;
      border: 2px solid var(--coral); background: transparent; color: var(--coral);
      cursor: pointer; transition: all 0.2s;
    }
    .ov-btn:hover { background: var(--coral); color: white; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">✦ Claude</div>
  <div class="stats">
    <span><b id="sDone">0</b>/100</span>
    <span>streak <b id="sStreak">0</b></span>
    <span id="sTime">0:00</span>
  </div>
  <div class="btns">
    <button class="topbtn" id="randBtn" onclick="toggleRandom()">🔀</button>
    <button class="topbtn" onclick="resetGame()">↺</button>
  </div>
</div>

<div class="screen">
  <div class="sq-label" id="sqLabel"><span class="base">1</span><sup>2</sup></div>
  <div class="digit-groups" id="dotGroups"></div>
  <div class="input-wrap" id="inputWrap">
    <input id="ans" type="number" placeholder="…" autocomplete="off">
  </div>
  <div class="single-dots" id="singleDots"></div>
</div>

<div class="flash" id="flash"></div>

<div class="overlay" id="overlay">
  <div class="ov-title">DONE!</div>
  <div class="ov-sub">All 100 squares</div>
  <div class="ov-time" id="ovTime">0:00</div>
  <button class="ov-btn" onclick="resetGame()">Play Again</button>
</div>

<script>
const DC = {
  0: '#ffffff',
  1: '#e63946',
  2: '#ff6200',
  3: '#e6c800',
  4: '#00a12c',
  5: '#0066ff',
  6: '#7700dd',
  7: '#7a3b00',
  8: '#ff3fa6',
  9: '#38c7ff',
};

/* ──────────────────────────────────────────
   Tangent overlap for diagonally-offset rows.
   For circles offset by half a diameter
   horizontally to be tangent, the row centers
   must be sqrt(3)/2 of a diameter apart.
   Overlap = 1 - sqrt(3)/2 ≈ 0.134
────────────────────────────────────────── */
const TANGENT_OVERLAP = 1 - Math.sqrt(3) / 2;

function buildGroup(d, dotSize) {
  const color   = DC[d] ?? '#888';
  const isZero  = d === 0;
  const count   = isZero ? 1 : d;

  const wrap = document.createElement('div');
  wrap.className = 'dg';

  /* Each entry = number of dots in that row.
     'split' = special middle row of 8 (dots at positions 1 and 3 of a 3-col layout). */
  let arrangement;
  if (count === 1) arrangement = [1];
  else if (count === 2) arrangement = [2];
  else if (count === 3) arrangement = [1, 2];
  else if (count === 4) arrangement = [2, 2];
  else if (count === 5) arrangement = [2, 3];
  else if (count === 6) arrangement = [1, 2, 3];
  else if (count === 7) arrangement = [2, 3, 2];
  else if (count === 8) arrangement = [3, 'split', 3];
  else arrangement = [3, 3, 3];

  wrap.style.display       = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.alignItems    = 'center';
  wrap.style.gap           = '0px';

  /* effective column count for alignment comparison
     (split row sits in 3-col grid, so treat as 3) */
  const effective = arrangement.map(s => s === 'split' ? 3 : s);

  arrangement.forEach((rowSpec, rowIdx) => {
    const row = document.createElement('div');
    row.style.display        = 'flex';
    row.style.flexDirection  = 'row';
    row.style.alignItems     = 'center';
    row.style.justifyContent = 'center';
    row.style.gap            = '0px';

    if (rowSpec === 'split') {
      const mkDot = () => {
        const dt = document.createElement('div');
        dt.className = 'dot' + (isZero ? ' ring' : '');
        dt.style.width      = dotSize + 'px';
        dt.style.height     = dotSize + 'px';
        dt.style.background = color;
        dt.style.flexShrink = '0';
        if (isZero) dt.style.borderColor = color;
        return dt;
      };
      const spacer = document.createElement('div');
      spacer.style.width      = dotSize + 'px';
      spacer.style.flexShrink = '0';
      row.appendChild(mkDot());
      row.appendChild(spacer);
      row.appendChild(mkDot());
    } else {
      for (let i = 0; i < rowSpec; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (isZero ? ' ring' : '');
        dot.style.width      = dotSize + 'px';
        dot.style.height     = dotSize + 'px';
        dot.style.background = color;
        dot.style.flexShrink = '0';
        if (isZero) dot.style.borderColor = color;
        row.appendChild(dot);
      }
    }

    /* Pull this row up so dots make tangent contact diagonally
       whenever the row is offset from the previous row. */
    if (rowIdx > 0) {
      const offset = effective[rowIdx] !== effective[rowIdx - 1];
      if (offset) {
        row.style.marginTop = (-TANGENT_OVERLAP * dotSize) + 'px';
      }
    }

    wrap.appendChild(row);
  });

  return wrap;
}

function renderSingleDots(typedStr) {
  const container = document.getElementById('singleDots');
  container.innerHTML = '';
  const digits = typedStr.replace(/[^0-9]/g, '');
  if (!digits) return;

  const size = Math.min(
    window.innerHeight * 0.06,
    (window.innerWidth * 0.85) / (digits.length * 1.5),
    56
  );

  digits.split('').forEach(ch => {
    const d = parseInt(ch);
    const color = DC[d] ?? '#888';
    const isZero = d === 0;
    const dot = document.createElement('div');
    dot.className = 'single-dot' + (isZero ? ' ring' : '');
    dot.style.width       = size + 'px';
    dot.style.height      = size + 'px';
    dot.style.background  = color;
    dot.style.flexShrink  = '0';
    if (isZero) dot.style.borderColor = color;
    container.appendChild(dot);
  });
}

function renderDots(typedStr) {
  const container = document.getElementById('dotGroups');
  container.innerHTML = '';
  const digits = typedStr.replace(/[^0-9]/g, '');
  if (!digits) return;

  const len = digits.length;

  const groupGap   = Math.min(16, window.innerWidth * 0.02);
  const availW     = Math.min(window.innerWidth * 0.85, 660);
  const perGroupW  = (availW - groupGap * (len - 1)) / len;
  const dotSize    = Math.max(
    Math.min(perGroupW / 3, window.innerHeight * 0.09, 68),
    10
  );

  digits.split('').forEach(ch => {
    const d = parseInt(ch);
    const grp = buildGroup(d, dotSize);
    container.appendChild(grp);
  });
}

const ALL = Array.from({length: 100}, (_, i) => (i + 1) * (i + 1));

let queue     = [...ALL];
let done      = 0;
let streak    = 0;
let startT    = null;
let timerID   = null;
let isRandom  = false;
let advancing = false;

function currentSq() { return queue[0] ?? null; }

function renderLabel() {
  const sq = currentSq();
  if (!sq) return;
  const base = Math.round(Math.sqrt(sq));
  document.getElementById('sqLabel').innerHTML = `<span class="base">${base}</span><sup>2</sup>`;
}

const inp = document.getElementById('ans');

inp.addEventListener('input', () => {
  if (advancing) return;
  const raw = inp.value.replace(/[^0-9]/g, '');
  renderDots(raw);
  renderSingleDots(raw);
  const v = parseInt(raw);
  if (!isNaN(v) && v > 0) checkLive(v);
});

function checkLive(v) {
  const sq = currentSq();
  if (!sq || advancing) return;
  if (!startT && v > 0) {
    startT = Date.now();
    timerID = setInterval(tickTimer, 500);
  }
  if (v === sq) { correct(); return; }

  const sqStr  = String(sq);
  const typStr = String(v);

  let matchLen = 0;
  for (let i = 0; i < typStr.length && i < sqStr.length; i++) {
    if (typStr[i] === sqStr[i]) matchLen++;
    else break;
  }

  if (matchLen < typStr.length) {
    const correctPrefix = sqStr.slice(0, matchLen);
    inp.value = correctPrefix || '';
    renderDots(correctPrefix);
    renderSingleDots(correctPrefix);
  }
}

function correct() {
  advancing = true;
  streak++;
  done++;
  queue.shift();
  if (isRandom && queue.length > 0) shuffle(queue);

  const fl = document.getElementById('flash');
  fl.classList.add('show');
  setTimeout(() => fl.classList.remove('show'), 300);

  updateStats();

  if (queue.length === 0) {
    clearInterval(timerID);
    setTimeout(celebrate, 1200);
    advancing = false;
    return;
  }

  setTimeout(() => {
    inp.value = '';
    renderDots('');
    renderSingleDots('');
    renderLabel();
    inp.focus();
    advancing = false;
  }, 800);
}

function updateStats() {
  document.getElementById('sDone').textContent   = done;
  document.getElementById('sStreak').textContent = streak;
}

function tickTimer() {
  if (!startT) return;
  const s = Math.floor((Date.now() - startT) / 1000);
  document.getElementById('sTime').textContent =
    Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function toggleRandom() {
  isRandom = !isRandom;
  document.getElementById('randBtn').classList.toggle('on', isRandom);
  if (isRandom) shuffle(queue);
  else queue.sort((a, b) => a - b);
  renderLabel();
  inp.focus();
}

function resetGame() {
  clearInterval(timerID);
  queue = [...ALL]; done = 0; streak = 0;
  startT = null; isRandom = false; advancing = false;
  document.getElementById('randBtn').classList.remove('on');
  document.getElementById('sTime').textContent = '0:00';
  document.getElementById('overlay').classList.remove('show');
  inp.value = '';
  renderDots('');
  renderSingleDots('');
  updateStats();
  renderLabel();
  inp.focus();
}

function celebrate() {
  const s = startT ? Math.floor((Date.now() - startT) / 1000) : 0;
  document.getElementById('ovTime').textContent =
    Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  document.getElementById('overlay').classList.add('show');
}

renderLabel();
updateStats();
inp.focus();
</script>
</body>
</html>
