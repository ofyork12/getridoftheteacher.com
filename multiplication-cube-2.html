<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ColorMyMath · 3D Cubes</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;overflow:hidden;font-family:Georgia,'Times New Roman',serif;touch-action:none}
  #ui{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 16px 10px}
  #title{color:#fff;font-size:clamp(18px,4vw,28px);font-weight:bold;text-shadow:0 2px 8px #000}
  #eq{color:#ffd700;font-size:clamp(22px,6vw,42px);font-weight:bold;letter-spacing:2px;text-shadow:0 2px 12px #000a}
  #pad{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:420px}
  .num{width:44px;height:44px;border:none;border-radius:10px;font:bold 22px Georgia;
       color:#fff;background:#2a2a2a;cursor:pointer;box-shadow:0 2px 6px #0006;transition:transform .08s}
  .num:active{transform:scale(.92)}
  .num.on{box-shadow:0 0 0 3px #fff, 0 3px 10px #000a}
  #hint{color:#777;font-size:12px;padding-bottom:2px}
  canvas{display:block}
</style>
</head><body>
<div id="ui">
  <div id="title">ColorMyMath 3D — Cubes</div>
  <div id="eq">3 × 3 × 3 = 27</div>
  <div id="pad"></div>
  <div id="hint">tap a number · drag to spin · pinch to zoom</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js"></script>
<script>
// ── Canonical ColorMyMath colors (1 red … 9 sky blue) ──
const COLOR={1:'#ed1c24',2:'#f7941d',3:'#FFF200',4:'#22b14c',5:'#0d3df5',
             6:'#7030a0',7:'#803004',8:'#f070aa',9:'#00bff3'};
const hex2three=h=>new THREE.Color(h);

// ── Scene ──
const scene=new THREE.Scene();
scene.background=new THREE.Color('#111');
const cam=new THREE.PerspectiveCamera(45,1,0.1,1000);
cam.position.set(0,0,28);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff,0.55));
const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(10,18,20); sun.castShadow=true; scene.add(sun);
const fill=new THREE.DirectionalLight(0x8899ff,0.4);
fill.position.set(-10,-8,-10); scene.add(fill);

// ── Cube of touching spheres ──
const group=new THREE.Group(); scene.add(group);
let N=3;

// Spheres TOUCH tangentially: centers one diameter apart (radius 0.5, step 1.0).
const R=0.5, STEP=2*R;

function buildCube(n){
  while(group.children.length) group.remove(group.children[0]);
  N=n;
  const col=hex2three(COLOR[n]||'#ffffff');
  const geo=new THREE.SphereGeometry(R,20,16);
  const mat=new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:0.12,shininess:70});
  const o=(n-1)*STEP/2;                       // center the cube on origin
  for(let xi=0;xi<n;xi++) for(let yi=0;yi<n;yi++) for(let zi=0;zi<n;zi++){
    const m=new THREE.Mesh(geo,mat);
    m.position.set(xi*STEP-o, yi*STEP-o, zi*STEP-o);
    m.castShadow=true;
    group.add(m);
  }
  updateEq();
  fitCamera(n);
}

function updateEq(){
  document.getElementById('eq').textContent=`${N} × ${N} × ${N} = ${N*N*N}`;
}

let targetLen=12;
function fitCamera(n){ targetLen=Math.max(4, n*STEP*2.6); }

// ── Number pad 1–9 ──
const pad=document.getElementById('pad');
const btns=[];
for(let i=1;i<=9;i++){
  const b=document.createElement('button');
  b.className='num'; b.textContent=i; b.style.background=COLOR[i];
  b.style.color = (i===3) ? '#000' : '#fff';   // yellow needs a dark numeral
  b.addEventListener('click',()=>{select(i);});
  pad.appendChild(b); btns.push(b);
}
function select(i){
  btns.forEach((b,idx)=>b.classList.toggle('on', idx+1===i));
  buildCube(i);
}

// ── Orbit: mouse + touch ──
let rotX=-0.4, rotY=0.6, dist=1;
let lastX=0,lastY=0,lastD=0,dragging=false;
const el=renderer.domElement;
el.addEventListener('pointerdown',e=>{dragging=true;autoSpin=false;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('pointerup',()=>dragging=false);
window.addEventListener('pointermove',e=>{
  if(!dragging) return;
  rotY+=(e.clientX-lastX)*0.012; rotX+=(e.clientY-lastY)*0.012;
  lastX=e.clientX; lastY=e.clientY;
});
el.addEventListener('touchstart',e=>{if(e.touches.length===2){lastD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}},{passive:true});
el.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    dist*=lastD/d; dist=Math.max(0.4,Math.min(3,dist)); lastD=d;
  }
},{passive:true});
el.addEventListener('wheel',e=>{dist*=1+e.deltaY*0.001; dist=Math.max(0.4,Math.min(3,dist));},{passive:true});

// ── Auto-spin when idle ──
let autoSpin=true;

// ── Resize ──
function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  cam.aspect=w/h; cam.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

// ── Animate ──
function animate(){
  requestAnimationFrame(animate);
  if(autoSpin) rotY+=0.006;
  group.rotation.x=rotX; group.rotation.y=rotY;
  cam.position.setLength(cam.position.length()*0.9 + targetLen*dist*0.1);
  cam.lookAt(0,0,0);
  renderer.render(scene,cam);
}
select(3);
animate();
</script></body></html>
