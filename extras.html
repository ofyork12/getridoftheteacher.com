<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>More / Extras</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 40px 20px 80px;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: clamp(28px, 5vw, 42px);
      margin: 0 0 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .sub {
      text-align: center;
      color: #aaa;
      margin: 0 0 40px;
      font-size: 16px;
    }

    /* Top "back to home" link, matches main nav style */
    .top-nav {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }
    .top-nav a {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 999px;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .top-nav a:hover {
      background: #fff;
      color: #000;
    }

    /* Big button grid for the orphaned pages */
    .extras-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .extra-button {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 22px 26px;
      font-size: 18px;
      font-weight: bold;
      background: transparent;
      color: #fff;
      border: 3px solid #fff;
      border-radius: 16px;
      text-decoration: none;
      transition: all 0.3s ease;
      min-height: 100px;
    }
    .extra-button:hover {
      background: #fff;
      color: #000;
      transform: translateY(-2px);
    }
    .extra-button .filename {
      font-size: 13px;
      font-weight: normal;
      opacity: 0.7;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      word-break: break-all;
    }
    .extra-button:hover .filename {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-nav">
      <a href="index.html">← Back to Home</a>
    </div>

    <h1>More / Extras</h1>
    <p class="sub">Bonus pages and works in progress.</p>

    <div class="extras-grid">

      <a href="claudesquaresgame.html" class="extra-button">
        Claude Squares Game
        <span class="filename">claudesquaresgame.html</span>
      </a>

      <a href="index-multilang.html" class="extra-button">
        Multilingual Home
        <span class="filename">index-multilang.html</span>
      </a>

      <a href="squares reference.html" class="extra-button">
        Squares Reference
        <span class="filename">squares reference.html</span>
      </a>

      <a href="SquaresCubegame.html" class="extra-button">
        Squares Cube Game
        <span class="filename">SquaresCubegame.html</span>
      </a>

      <a href="v8l.html" class="extra-button">
        V8L
        <span class="filename">v8l.html</span>
      </a>

      <a href="wtv.html" class="extra-button">
        WTV
        <span class="filename">wtv.html</span>
      </a>

    </div>
  </div>
</body>
</html>
