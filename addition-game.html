<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Addition 1 to 5 — Game — ColorMyMath</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: #333;
    font-family: 'Nunito', Arial, sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .stage {
    position: relative;
    width: min(100vw, 56.25vh);
    aspect-ratio: 9 / 16;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .title {
    /* Pushed down below the new scoreboard at top: 1.2%. */
    position: absolute; top: 5.5%; left: 0; right: 0;
    text-align: center; font-size: 1.6vh; font-weight: 700;
    color: #333; letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 10;
  }
  .title .sub {
    display: block;
    font-size: 1.4vh; font-weight: 500;
    color: #666; letter-spacing: 0.06em;
    margin-top: 0.3vh;
  }

  /* Paint tray: vertical column on the LEFT side of the stage, big
     square paint chips stacked top-to-bottom.  White (0) is on top,
     red (1) directly below it.  Slots tagged `disabled` are hidden so
     this same tray will grow back to 10 colours when we re-enable
     the others -- just toggle `disabled` off.  The slot size below
     (width: 22%) is tuned for the current 2-colour set; when more
     colours come back we'll shrink the chips so they all fit. */
  .paint-tray {
    /* The progressive-tap count-up doesn't need a palette: dots respond
       to direct taps and the count's colour is chosen by the count itself. */
    display: none;
  }
  .paint-slot {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--c);
    border: 2.5px solid #000;
    border-radius: 22%;
    cursor: pointer;
    padding: 0;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.18);
  }
  .paint-slot:hover { transform: scale(1.04); }
  .paint-slot.active {
    transform: scale(1.12);
    box-shadow: 0 0 0 3px #000, 0 6px 14px rgba(0,0,0,0.4),
                inset 0 2px 4px rgba(0,0,0,0.18);
  }
  /* "disabled" hides a paint slot without losing its grid placement --
     used while we're only enabling red + white.  Remove the class on a
     slot to bring its colour back into the tray. */
  .paint-slot.disabled { display: none; }

  /* Running equation across the top -- offset to the right so the
     left-side tray doesn't collide with long equations. */
  /* Big centre count -- the same number the voice says, displayed huge above
     the dots so the child can see and read it as they count up. */
  .equation {
    position: absolute; top: 13%; left: 4%; right: 4%;
    text-align: center;
    font-size: clamp(64px, 12vh, 140px);
    font-weight: 900;
    color: #000;
    padding: 0;
    line-height: 1;
    min-height: 12vh;
    pointer-events: none;
  }
  .equation .num {
    display: inline-block;
    transform-origin: center center;
  }
  /* Small running equation line below the big centre number: "1 + 1 = 2",
     "1 + 2 + 2 = 5", etc.  Sits just under the huge count so the child
     can read the addition that built that count. */
  .equation-line {
    position: absolute; top: 26%; left: 4%; right: 4%;
    text-align: center;
    font-size: clamp(20px, 3.4vh, 40px);
    font-weight: 700;
    color: #000;
    pointer-events: none;
    line-height: 1.1;
    min-height: 3vh;
  }

  /* Triangle play-area back at top: 22%, height: 60% to match the
     partition autoplay videos.  The big-triangle geometry below
     (DOT_R=22, viewBox 210x220) is already sized for this. */
  .play-area {
    position: absolute; top: 22%; left: 0; right: 0; height: 60%;
  }
  /* "Perfect!" celebration banner -- pops in when sum hits 5
     (the addition game's goal), snaps back out on CLEAR. */
  .perfect-banner {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #00a12c;
    color: #fff;
    padding: 2vh 5vh;
    border-radius: 14px;
    font-size: 4.5vh; font-weight: 900;
    letter-spacing: 0.12em;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
    border: 4px solid #000;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.4s ease;
    white-space: nowrap;
  }
  .perfect-banner.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  .play-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    overflow: visible;
  }

  /* "Restart" pill -- bottom-left corner of the stage, below the
     number line and to the left of the brand text.  Sized big enough
     for an adult finger; clearly off the dots and the number column. */
  .reset-btn {
    position: absolute;
    bottom: 1.2%; left: 2%;
    padding: 0.6vh 1.5vh;
    border: 2px solid #000;
    border-radius: 999px;
    background: #fff;
    color: #000;
    font: 800 1.4vh 'Nunito', Arial, sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    z-index: 30;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .reset-btn:hover { background: #f4f4f4; }
  .reset-btn:active { background: #e8e8e8; }

  /* Number line shifted up so the strip sits right below the big
     triangle (the user wanted it closer).  Was bottom: 4.5%; now
     bottom: 8% puts the number-line top at ~stage 78% -- the
     triangle outline base is at stage 76.5%, so only a thin gap
     remains between them. */
  .number-line-wrap {
    position: absolute;
    bottom: 8%; left: 1%; right: 1%;
    height: 14%;
    z-index: 5;
    pointer-events: none;
  }
  .number-line {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.5%;
    height: 100%;
  }
  .nl-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4vh;
    min-width: 0;
    height: 100%;
  }
  .nl-quantity {
    width: 100%;
    height: 70%;
    position: relative;
  }
  .nl-quantity svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  .nl-label {
    height: 30%;
  }
  .nl-label svg {
    height: 100%; width: auto;
  }

  .brand {
    position: absolute; bottom: 1%; left: 0; right: 0;
    text-align: center; font-size: 2.2vh; font-weight: 600;
    color: #888; letter-spacing: 0.25em;
    pointer-events: none;
  }
  .brand-sig {
    position: absolute;
    right: 6%;
    top: 50%;
    transform: translateY(-50%);
    height: 1.8vh;
    width: auto;
    color: #000;
  }

  /* === Magic-42 game scoreboard (Score | Perfect | Screen) ===
     Same look as counting-to-10-game.html: each number rendered as
     a tiny dot-group in the ColorMyMath digit palette.  Score
     persists across partition games via localStorage so the child
     keeps going when they jump from partition 1 to partition 2. */
  .scorebox-left {
    position: absolute; top: 1.2%; left: 2.5%;
    z-index: 6; pointer-events: none;
  }
  .scorebox-center {
    position: absolute; top: 1.2%; left: 50%; transform: translateX(-50%);
    z-index: 6; pointer-events: none;
  }
  .scorebox-right {
    position: absolute; top: 1.2%; right: 2.5%;
    z-index: 6; pointer-events: none;
  }
  .scorebox-left   .score-row { justify-content: flex-start; }
  .scorebox-center .score-row { justify-content: center;     }
  .scorebox-right  .score-row { justify-content: flex-end;   }
  .score-row { display: flex; align-items: center; gap: 0.6em; }
  .score-label {
    font-size: 1.9vh; font-weight: 700; color: #555;
    letter-spacing: 0.04em;
  }
  .score-value {
    display: inline-flex; align-items: flex-end;
    gap: 0.5vh; min-height: 2.2vh;
  }
  .score-digit-group {
    display: inline-flex; flex-direction: column;
    align-items: center; gap: 0;
  }
  .score-digit-row {
    display: flex; align-items: center; justify-content: center; gap: 0;
  }
  .score-dot {
    width: 0.9vh; height: 0.9vh;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .score-dot.ring {
    background: transparent !important;
    border: 1.5px solid;
  }
  .score-dot.spacer { visibility: hidden; }
  .score-value.bw .score-dot { background: #000 !important; }
  .score-value.bw .score-dot.ring {
    background: transparent !important;
    border-color: #000 !important;
  }
  /* Soft "wait" emphasis on the next dot to tap -- a gentle breathing
     stroke borrowed verbatim from counting-to-10-game.html so every game
     feels the same.  Stroke gently grows and brightens over 3.6s. */
  @keyframes dotGlowBlack {
    0%, 100% { stroke-width: 1.0; stroke-opacity: 0.55; }
    50%      { stroke-width: 2.6; stroke-opacity: 1.0;  }
  }
  .wait-dot { stroke: #000; animation: dotGlowBlack 3.6s ease-in-out infinite; }
  /* Round 2 pair "ghost-fade" -- vestigial; pair phases now use the soft
     wait-dot stroke + a tiny pulsing orange dot INSIDE each pair circle
     (see .inner-hint below).  Kept for safety so any leftover .pair-ghost
     classes still render quietly. */
  @keyframes pairGhost {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.90; }
  }
  .pair-ghost { animation: pairGhost 1.4s ease-in-out infinite; }
  /* Inner orange "tap me" dot -- a small filled circle centred inside each
     dot slot.  When a slot is part of a pair phase, its inner hint pulses
     bigger/smaller continuously so the kid sees which two dots go together.
     Lives in #innerHintGroup, hidden by default; .show enables the pulse. */
  @keyframes innerHintPulse {
    0%, 100% { transform: scale(0.65); opacity: 0.85; }
    50%      { transform: scale(1.25); opacity: 1.0;  }
  }
  .inner-hint {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
    pointer-events: none;
  }
  .inner-hint.show {
    opacity: 1;
    animation: innerHintPulse 1.1s ease-in-out infinite;
  }
  /* Final-reveal emphasis: a brief bigger/brighter pulse on each dot
     group as its addend is voiced.  Dots keep their partition colour
     throughout -- the pulse just highlights "this group, right now". */
  @keyframes revealPulse {
    0%   { transform: scale(1.0);  filter: brightness(1.0); }
    50%  { transform: scale(0.94); filter: brightness(1.15); }
    100% { transform: scale(1.0);  filter: brightness(1.0); }
  }
  /* transform-box and transform-origin are set INLINE per pulse so each
     dot in the group scales around the GROUP's centroid in viewBox
     coords -- the whole group shrinks toward the same point and stays
     tangent.  See _pulseSlots in the script below. */
  .reveal-pulse {
    animation: revealPulse 750ms ease-in-out;
  }
  /* End-of-game controls: a "Replay" button + a big "Next" arrow that
     advances to the next lesson page.  Hidden by default; appear after
     Round 6's review wraps up.  Positioned over the centre of the play
     area so the kid can't miss them. */
  .end-controls {
    position: fixed;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%) scale(0.7);
    display: flex;
    flex-direction: column;
    gap: clamp(18px, 4vw, 32px);
    align-items: stretch;
    width: 92vw;
    max-width: 420px;
    z-index: 9999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .end-controls.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: auto;
  }
  .end-controls .replay-btn,
  .end-controls .next-btn {
    font-family: Nunito, Arial, sans-serif;
    font-weight: 900;
    text-align: center;
    border: 5px solid #fff;
    border-radius: 999px;
    padding: clamp(16px, 4vw, 26px) clamp(28px, 7vw, 48px);
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    box-shadow: 0 6px 22px rgba(0,0,0,0.45);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .end-controls .replay-btn {
    background: #0066ff;
    font-size: clamp(28px, 7vw, 48px);
    letter-spacing: 0.05em;
  }
  .end-controls .next-btn {
    background: #00a12c;
    font-size: clamp(20px, 5vw, 32px);
    letter-spacing: 0.05em;
    line-height: 1.1;
    padding: clamp(16px, 4vw, 24px) clamp(20px, 5vw, 36px);
  }
</style>
<script src="audio-library.js"></script>
<script src="praise-audio.js?v=2026-06-02trim"></script>
</head>
<body>

<div class="stage" id="stage">

  <div class="perfect-banner" id="perfectBanner">PERFECT!</div>

  <!-- End-of-game controls: shown when Round 6's review finishes.
       Replay restarts at Round 1.  The big arrow opens the next lesson
       in the top-level window (we're inside an iframe). -->
  <div class="end-controls" id="endControls">
    <button class="replay-btn" id="replayBtn">↻  Replay</button>
    <a class="next-btn" id="nextLessonLink" href="counting-to-10.html?autostart=1" target="_top" rel="noopener">Play Next Game  →</a>
  </div>

  <div class="scorebox-left" id="scorebox-left">
    <div class="score-row">
      <span class="score-label">Score</span>
      <span class="score-value" id="scoreValue"></span>
    </div>
  </div>
  <div class="scorebox-center" id="scorebox-center">
    <div class="score-row">
      <span class="score-label">Perfect</span>
      <span class="score-value" id="perfectValue"></span>
    </div>
  </div>
  <div class="scorebox-right" id="scorebox-right">
    <div class="score-row">
      <span class="score-label">Screen</span>
      <span class="score-value" id="screenValue"></span>
    </div>
  </div>

  <div class="title">Addition<span class="sub">Adding 1 to 5 — tap to build up to 5</span></div>

  <!-- Paint tray.  Layout:
         Row 1: 0(white)  2(orange) 4(green)  6(purple) 8(pink)
         Row 2: 1(red)    3(yellow) 5(blue)   7(brown)  9(cyan)
       So white sits in the top-left and red sits directly below it. -->
  <div class="paint-tray" id="paintTray">
    <button class="paint-slot" data-color="#ffffff" data-value="0" style="--c:#ffffff; grid-column:1; grid-row:1;" aria-label="white (0)"></button>
    <button class="paint-slot disabled" data-color="#ff6200" data-value="2" style="--c:#ff6200;" aria-label="orange (2)"></button>
    <button class="paint-slot disabled" data-color="#00a12c" data-value="4" style="--c:#00a12c;" aria-label="green (4)"></button>
    <button class="paint-slot disabled" data-color="#7700dd" data-value="6" style="--c:#7700dd;" aria-label="purple (6)"></button>
    <button class="paint-slot disabled" data-color="#ff3fa6" data-value="8" style="--c:#ff3fa6;" aria-label="pink (8)"></button>

    <button class="paint-slot" data-color="#e63946" data-value="1" style="--c:#e63946; grid-column:1; grid-row:2;" aria-label="red (1)"></button>
    <button class="paint-slot disabled" data-color="#e6c800" data-value="3" style="--c:#e6c800;" aria-label="yellow (3)"></button>
    <button class="paint-slot disabled" data-color="#0066ff" data-value="5" style="--c:#0066ff;" aria-label="blue (5)"></button>
    <button class="paint-slot disabled" data-color="#7a3b00" data-value="7" style="--c:#7a3b00;" aria-label="brown (7)"></button>
    <button class="paint-slot disabled" data-color="#38c7ff" data-value="9" style="--c:#38c7ff;" aria-label="cyan (9)"></button>
  </div>

  <div class="equation" id="eq"></div>
  <div class="equation-line" id="eqLine"></div>

  <div class="play-area">
    <svg class="play-svg" id="playSvg" viewBox="0 0 210 220" preserveAspectRatio="xMidYMid meet">
      <g id="bgGroup"></g>
      <g id="dotGroup"></g>
      <!-- One tiny orange "tap me" dot per slot, sitting inside the white
           dot circle.  Hidden by default; the JS adds .show to the two
           pair-slot hints during a pair phase so they pulse together. -->
      <g id="innerHintGroup"></g>
      <!-- Per-slot number labels used by the Round 1 count-up reveal
           ("one, two, three, four, five" walkthrough at the end). -->
      <g id="numLabelGroup"></g>
    </svg>
  </div>

  <!-- Number line: colour-coded quantity SVG on top, black digit below. -->
  <div class="number-line-wrap">
    <div class="number-line">
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty1"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">1</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty2"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">2</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty3"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">3</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty4"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">4</text></svg></div></div>
      <div class="nl-cell"><div class="nl-quantity"><svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMax meet" id="nlQty5"></svg></div><div class="nl-label"><svg viewBox="0 0 30 40" preserveAspectRatio="xMidYMid meet"><text x="15" y="32" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="700" font-size="34" fill="#000">5</text></svg></div></div>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn">RESTART</button>

  <div class="brand">✦ ColorMyMath ✦<svg class="brand-sig" viewBox="0 0 72 40" preserveAspectRatio="xMidYMid meet" aria-hidden="true"><g stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="square" stroke-linejoin="miter"><line x1="14" y1="3" x2="14" y2="22"/><polyline points="30,3 30,22 42,22 42,36"/><polyline points="54,3 54,22 64,22"/></g></svg></div>
</div>

<script>
  // === Embedded audio for the game (rebuilt by
  // Downloads/render-video/build_audio_and_no_persist.js -- do not

    // starts from a clean slate.
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost', 'reveal-pulse');
      el.setAttribute('fill', '#ffffff');
      el.style.opacity = '1';
      el.style.pointerEvents = 'none';
      el.style.cursor = 'default';
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    innerHints.forEach(h => h.classList.remove('show'));
    if (eqEl) eqEl.innerHTML = '<span class="num">' + dots.length + '</span>';
    if (eqLineEl) eqLineEl.textContent = '';

    // Replay the kid's EXACT tap order so the count-up review traces
    // their steps as confirmation: dot they tapped first gets label
    // "1", the next "2", and so on.  Fall back to reading order if for
    // some reason tapOrder is short.
    const fallback = [2, 1, 0, 4, 3];
    const walkOrder = tapOrder.slice();
    for (const s of fallback) if (walkOrder.indexOf(s) < 0) walkOrder.push(s);
    walkOrder.length = dots.length;
    const items = [];
    for (let k = 0; k < walkOrder.length; k++) {
      const slot  = walkOrder[k];
      const count = k + 1;
      const color = COUNT_COLORS[count];
      const isFinal = (k === walkOrder.length - 1);
      items.push({
        key: String(count),
        gap: 600,
        onStart: () => {
          numLabels[slot].textContent = String(count);
          numLabels[slot].setAttribute('opacity', '1');
          for (let j = 0; j <= k; j++) {
            const ds = walkOrder[j];
            dots[ds].el.setAttribute('fill', color);
          }
          // On the final beat ("five"), pulse ALL five dots together so
          // the emphasis on the answer feels like one shared gesture.
          // Otherwise pulse just the current dot.
          _pulseSlots(isFinal ? walkOrder.slice() : [slot], 800);
          if (eqEl) eqEl.innerHTML = '<span class="num">' + count + '</span>';
        }
      });
    }

    _startReviewChain(items, 0, onDone);
  }

  // Rounds 2-6 end-of-round REVIEW.  Resets the dots, then walks through
  // the canonical partition ("two plus two plus one equals five" etc.)
  // with number labels 1..5 added in left-to-right top-to-bottom order
  // and each addend's slots filling in the addend's count colour.  The
  // final "five" flips every dot to blue with a shared pulse.
  function _playPartitionReview(addends, total, onDone) {
    cancelIdleTimers();
    stopHopping();
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost', 'reveal-pulse');
      el.setAttribute('fill', '#ffffff');
      el.style.opacity = '1';
      el.style.pointerEvents = 'none';
      el.style.cursor = 'default';
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    innerHints.forEach(h => h.classList.remove('show'));
    if (eqEl)     eqEl.innerHTML = '<span class="num">' + total + '</span>';
    if (eqLineEl) eqLineEl.textContent = '';

    // Trace the kid's EXACT steps.  Walk each group's dots in the order
    // they were added to the group -- which puts the slot the kid
    // actually TAPPED first (handleDotTap unshifts the tap if it wasn't
    // already in the group, and _pickGroup returns it as element 0).
    // So a pair built by tapping bottom-centre reviews as "centre then
    // partner", not "partner then centre" -- the dot the finger touched
    // always gets the lower number.
    const walkOrder = [];
    for (const g of tappedGroups) walkOrder.push(...g);
    const fallback = [2, 1, 0, 4, 3];
    for (const s of fallback) if (walkOrder.indexOf(s) < 0) walkOrder.push(s);
    walkOrder.length = dots.length;
    const items = [];
    let labelIdx = 0;
    let textSoFar = '';
    for (let k = 0; k < addends.length; k++) {
      const groupSize  = addends[k];
      const groupColor = COUNT_COLORS[groupSize];
      const isFirst    = (k === 0);
      const slots      = walkOrder.slice(labelIdx, labelIdx + groupSize);
      const startLabel = labelIdx + 1;
      textSoFar = textSoFar ? (textSoFar + ' + ' + groupSize) : String(groupSize);
      const eqSnapshot = textSoFar;
      const visualStart = () => {
        for (let j = 0; j < slots.length; j++) {
          const s = slots[j];
          dots[s].el.setAttribute('fill', groupColor);
          numLabels[s].textContent = String(startLabel + j);
          numLabels[s].setAttribute('opacity', '1');
        }
        _pulseSlots(slots, 800);
        if (eqLineEl) eqLineEl.textContent = eqSnapshot;
      };
      if (!isFirst && groupSize === 1) {
        // "plus one" as a single fluid clip.
        items.push({ key: 'plus_one', gap: 600, onStart: visualStart });
      } else {
        if (!isFirst) items.push({ key: 'plus' });
        items.push({
          key: String(groupSize),
          gap: 600,
          onStart: visualStart
        });
      }
      labelIdx += groupSize;
    }
    // Short gap after "equals" so the word doesn't sit alone in silence
    // before "five" -- matches the snappier feel of the final-tap reveal.
    // Fused "equals five" clip -- one clean utterance instead of two
    // glued clips.  Dots turn blue + pulse as the clip begins so the
    // visual lands during the "equals" word and "five" punctuates it.
    items.push({
      key: 'equals_five',
      onStart: () => {
        const blue = COUNT_COLORS[total];
        for (let i = 0; i < dots.length; i++) {
          dots[i].el.setAttribute('fill', blue);
        }
        _pulseSlots([0, 1, 2, 3, 4], 800);
        if (eqLineEl) eqLineEl.textContent = addends.join(' + ') + ' = ' + total;
      }
    });

    _startReviewChain(items, 0, onDone);
  }

  function _playFinalReveal(newAddend, total, onDone) {
    cancelIdleTimers();
    stopHopping();
    if (_partitionViewTimer) { clearTimeout(_partitionViewTimer); _partitionViewTimer = null; }
    _partitionViewActive = false;
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost', 'reveal-pulse');
      el.style.pointerEvents = 'none';
      el.style.cursor = 'default';
    }
    innerHints.forEach(h => h.classList.remove('show'));
    // Round 7 is special -- the partition is 0 + 5 = 5, so the kid should
    // see and hear "zero" with the dots back to WHITE first, then "plus
    // five" lights the dots blue, then "equals five" emphasises them.
    // Every other round leaves the dots in whatever partition colour the
    // gameplay already painted them.
    if (round === 7) {
      for (let i = 0; i < dots.length; i++) {
        dots[i].el.setAttribute('fill', '#ffffff');
      }
      if (eqEl) eqEl.innerHTML = '<span class="num">0</span>';
    } else {
      if (eqEl) eqEl.innerHTML = '<span class="num">' + total + '</span>';
    }

    const groups    = _slotsForAddendList();
    const lastSlots = groups[groups.length - 1] || [];
    const addends   = _computeAddends();
    // "plus 1" runs together as one clip so there's no awkward gap.
    // R7's 0 + 5 = 5 uses the fused 'plus_five' clip; R6's +1 uses
    // 'plus_one'.  Everything else chains 'plus' + the digit.
    const addPlus = (val, onStart) => {
      if (val === 1) return [{ key: 'plus_one',  gap: 600, onStart }];
      if (val === 5) return [{ key: 'plus_five', gap: 600, onStart }];
      return [{ key: 'plus' }, { key: String(val), gap: 600, onStart }];
    };

    const items = [];
    // Round 7's partition is "0 + 5 = 5" -- prefix the chain with the
    // "zero" clip so the voice walks the kid through the whole equation.
    // The dots stay WHITE through the "zero" beat (set above) and only
    // turn blue when "plus five" plays so the visual matches the audio.
    if (round === 7) {
      items.push({
        key: '0',
        onStart: () => {
          if (eqEl) eqEl.innerHTML = '<span class="num">0</span>';
          // Pulse the all-white "you are at zero" state.
          _pulseSlots([0, 1, 2, 3, 4], 800);
        }
      });
    }
    items.push(
      ...addPlus(newAddend, () => {
        // For R7, "plus five" is the moment the dots turn blue and the big
        // count jumps from 0 to 5.  Other rounds just pulse the last group.
        if (round === 7) {
          const blue = COUNT_COLORS[total];
          for (let i = 0; i < dots.length; i++) {
            dots[i].el.setAttribute('fill', blue);
          }
          if (eqEl) eqEl.innerHTML = '<span class="num">' + total + '</span>';
        }
        _pulseSlots(lastSlots, 800);
        if (eqLineEl) eqLineEl.textContent = (round === 7 ? '0 + ' : '') + addends.join(' + ');
      }),
      {
        key: 'equals_five',
        onStart: () => {
          const blue = COUNT_COLORS[total];
          for (let i = 0; i < dots.length; i++) {
            dots[i].el.setAttribute('fill', blue);
          }
          _pulseSlots([0, 1, 2, 3, 4], 800);
          if (eqLineEl) {
            const prefix = (round === 7) ? '0 + ' : '';
            eqLineEl.textContent = prefix + addends.join(' + ') + ' = ' + total;
          }
        }
      }
    );

    if (window.AudioLib) {
      AudioLib.playChain(items, { gap: 600, onDone: () => { if (onDone) onDone(); } });
    } else if (onDone) {
      onDone();
    }
  }

  // Default anchor + group for the upcoming tap when the kid is idle.
  // Used by both the idle hint and the auto-fill timer so the canonical
  // group appears at the same slots either way.
  function _defaultGroupForIdle() {
    if (round === 1) return null;
    const sizes = PARTITION_GROUPS[round] || [];
    const groupIdx = tappedGroups.length;
    if (groupIdx >= sizes.length) return null;
    const size = sizes[groupIdx];
    let anchor;
    if (groupIdx === 0) {
      // Canonical anchor for the round's FIRST (biggest) group.
      if (round === 2)                           anchor = 1;   // pair from bottom-left
      else if (round === 3)                      anchor = 0;   // R3 pair from bottom (slot 0 -> [0,1])
      else if (round === 4 || round === 5)       anchor = 2;   // triangle from TOP-LEFT
                                                                // (top-left=1, bot-left=2, bot-centre=3)
      else if (round === 6)                      anchor = 1;   // quad from bottom-left
      else                                        anchor = 0;
    } else {
      // Subsequent group: walk in a round-specific reading order so the
      // auto-fill visits the dots in the order the user wants to see them
      // light up.  R2 (2+1+1+1): after the bottom-left pair, the next solo
      // is top-left, then top-right, then bottom-right -- so the four
      // taps land on slots [1, 2, 4, 3] in order.  R3 second pair: anchor
      // on slot 0 so the canonical good-shape 4-group fills (pair-completing
      // logic in _pickGroup takes it from there).  Other rounds fall back
      // to "first uncoloured" since they were already correct.
      let order;
      // R2 (2+1+1+1): after the bottom-row pair fills [1, 0], the three
      // solos walk left-to-right -- bottom-right (3), then top-left (2),
      // then top-right (4) -- so the dots light up in true reading order.
      if (round === 2)                                       order = [1, 0, 3, 2, 4];
      else if (round === 3 && groupIdx === 1)                order = [0, 2, 4, 1, 3];
      else                                                    order = [0, 1, 2, 3, 4];
      anchor = 0;
      for (const s of order) {
        if (!colored.has(s)) { anchor = s; break; }
      }
    }
    return { slots: _pickGroup(anchor, size), color: COUNT_COLORS[size], anchor };
  }

  // Light up the canonical group slots with small coloured "hint" dots
  // inside the white circles -- e.g. 3 small yellow dots for the "3"
  // group, 4 small green dots for the "4" group.  Pulses to attract
  // the eye.  Hidden when cancelIdleTimers fires.
  function _showGroupHint(slots, color) {
    innerHints.forEach((h, i) => {
      if (slots.includes(i)) {
        h.setAttribute('fill', color);
        h.classList.remove('show');
        void h.offsetWidth;
        h.classList.add('show');
      } else {
        h.classList.remove('show');
      }
    });
  }

  function startIdleTimers() {
    // _stopIdleTimerCallbacks (not cancelIdleTimers) -- keep the inner-
    // hint dots and pair-ghost visuals intact across pause-resume cycles
    // so the kid sees the same picture they paused on, not a flash to
    // blank before the 3s emphasis timer re-fires.
    _stopIdleTimerCallbacks();
    // Don't arm auto-fill / emphasis timers until the user has tapped the
    // Play gate.  This was the bug behind "I loaded the page and both
    // games started playing on their own": refreshDots() runs at page
    // load, fires startIdleTimers(), and 10s later the idle-fill timer
    // simulates a dot tap even though the kid never tapped Play.  The
    // play/pause gate at the bottom of the script flips
    // window.__gamePlaying to true on the first Play tap, and back to
    // false on any pause.
    if (!window.__gamePlaying) return;
    if (colored.size >= dots.length) return;
    const nextDots = _getNextDots();
    if (nextDots.length === 0) return;
    // Phase 1 (emphasis hint).  Always wait EMPHASIS_DELAY_MS (3s) before
    // showing any hint so the kid has a quiet beat to look at the dots
    // before the screen starts trying to pull their eye to one of them.
    //   * R1: pick the next slot in R1_TAP_ORDER that isn't coloured yet,
    //     give it the wait-dot stroke + a pulsing red inner-hint dot.
    //   * Rounds 2-6: wait-dot stroke on every dot in the next group +
    //     partition-coloured hint dots inside each.
    _emphasisTimer = setTimeout(() => {
      _emphasisTimer = null;
      if (round === 1) {
        const nextR1 = R1_TAP_ORDER.find(s => !colored.has(s));
        if (nextR1 != null) {
          const el = dots[nextR1] && dots[nextR1].el;
          if (el) el.classList.add('wait-dot');
          _showGroupHint([nextR1], COUNT_COLORS[1]);   // red hint
        }
      } else {
        nextDots.forEach(idx => {
          const el = dots[idx] && dots[idx].el;
          if (el) el.classList.add('wait-dot');
        });
        const g = _defaultGroupForIdle();
        if (g) _showGroupHint(g.slots, g.color);
      }
    }, EMPHASIS_DELAY_MS);
    // Phase 2: after IDLE_FILL_MS with no real tap, simulate one so the
    // narrated demo walks through the round on its own.  Gated by the
    // Play overlay (window.__gamePlaying) at the top of this function,
    // so it never fires before the kid taps Play -- and re-checks at
    // the moment of firing in case Pause was hit during the countdown.
    _fillTimer = setTimeout(() => {
      _fillTimer = null;
      if (!window.__gamePlaying) return;
      if (round === 1) {
        // Auto-fill follows the same order as the red hint above so the
        // demo lines up with what the kid was being nudged to tap.
        const target = R1_TAP_ORDER.find(s => !colored.has(s));
        if (target != null) handleDotTap(target);
      } else {
        const g = _defaultGroupForIdle();
        if (g) handleDotTap(g.anchor);
      }
    }, IDLE_FILL_MS);
  }

  function refreshDots() {
    stopHopping();
    count = colored.size;
    const groupColour = COUNT_COLORS[count];
    const nextDots = _getNextDots();
    const nextSet = new Set(nextDots);
    for (let i = 0; i < dots.length; i++) {
      const el = dots[i].el;
      el.classList.remove('wait-dot', 'pair-ghost');
      if (colored.has(i)) {
        // Coloured dot.  Round 1: count colour (every tap changes the
        // whole group's colour).  Rounds 2-6: dot stays in its PARTITION
        // colour for the entire round so the kid sees the breakdown
        // build up -- pair = orange, triple = yellow, quad = green,
        // solo = red.  Only the final reveal flips them all to blue.
        let fillColour = groupColour;
        if (round >= 2) {
          const pc = _partitionColorForSlot(i);
          if (pc) fillColour = pc;
        }
        el.setAttribute('fill', fillColour);
        el.style.opacity = '1';
        el.style.pointerEvents = 'auto';
        el.style.cursor = 'pointer';
        dots[i].color = fillColour;
        dots[i].value = 1;
      } else {
        // Empty dot -- ALWAYS visible white.  In Round 1 every uncoloured
        // dot is tappable (the kid can pick any spot to count up at).
        // Rounds 2-6 only let the kid tap dots in the next canonical
        // group, so the partition picture stays intact.
        el.setAttribute('fill', '#ffffff');
        el.style.opacity = '1';
        const tappable = (round === 1) || nextSet.has(i);
        el.style.pointerEvents = tappable ? 'auto' : 'none';
        el.style.cursor      = tappable ? 'pointer' : 'default';
        dots[i].color = '#ffffff';
        dots[i].value = 0;
      }
    }
    updateEquation();
    startIdleTimers();
  }

  // When Round 1 reaches Perfect, show the banner, then after a beat clear
  // the dots and switch to Round 2.  Round 2 reaches Perfect and stays.
  // Move to the next round: clear state, hide banner + labels, refresh.
  function _advanceRound(nextRound) {
    hidePerfectBanner();
    colored.clear();
    tapOrder.length = 0;
    tappedGroups.length = 0;
    _hasTappedThisRound = false;
    _hideEndControls();
    round = nextRound;
    for (let i = 0; i < numLabels.length; i++) {
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    refreshDots();
    // Round 7 (0 + 5 = 5) intro: voice "zero" right as the blank dots
    // appear so the kid hears the starting number alongside the big "0".
    if (nextRound === 7) {
      _pgTimeout(() => { _playKey('0'); }, 350);
    }
  }

  // Pause-guard timer registry.  Every setTimeout that drives the game
  // loop -- Perfect celebration, review-walk start, round advance,
  // praise audio delay -- goes through _pgTimeout so a single
  // _pgClearAll() at pause time cancels every pending step.  Without
  // this, tapping Pause while a 3-second BEFORE_REVIEW_MS timer was
  // pending would leave the reveal walk firing 3 seconds later and
  // the game would carry on as if nothing had happened.
  const _pgTimers = new Set();
  function _pgTimeout(fn, ms) {
    const id = setTimeout(() => {
      _pgTimers.delete(id);
      try { fn(); } catch (e) {}
    }, ms);
    _pgTimers.add(id);
    return id;
  }
  function _pgClearAll() {
    for (const id of _pgTimers) {
      try { clearTimeout(id); } catch (e) {}
    }
    _pgTimers.clear();
  }

  function onPerfectReached() {
    showPerfectBanner();
    const BEFORE_REVIEW_MS = 3000;
    const AFTER_REVIEW_MS  = 1500;
    if (round === 1) {
      // Round 1: pause for praise voice, then count-up REVIEW (1..5),
      // then advance to Round 2.
      _pgTimeout(() => {
        hidePerfectBanner();
        _playRound1Reveal(() => {
          _pgTimeout(() => { _advanceRound(2); }, AFTER_REVIEW_MS);
        });
      }, BEFORE_REVIEW_MS);
      return;
    }
    // Rounds 2-6: pause for praise voice, then run the PARTITION REVIEW
    // (e.g. "two plus two plus one equals five" with number labels 1-5
    // in LTR-TTB order).  Then advance to the next round, or just hold
    // on the final blue + labelled state for Round 6.
    // Round 7 (0 + 5 = 5) is the last partition: no separate walkthrough
    // review (the reveal already voices the whole equation), just pop
    // the Replay + Next-lesson end controls.
    if (round === 7) {
      _pgTimeout(_showEndControls, BEFORE_REVIEW_MS);
      return;
    }
    const nextRound = (round < 7) ? round + 1 : null;
    _pgTimeout(() => {
      hidePerfectBanner();
      _playPartitionReview(_computeAddends(), dots.length, () => {
        if (nextRound != null) {
          _pgTimeout(() => { _advanceRound(nextRound); }, AFTER_REVIEW_MS);
        } else {
          // Fallback in case Round 7 ever lands here.
          _pgTimeout(_showEndControls, AFTER_REVIEW_MS);
        }
      });
    }, BEFORE_REVIEW_MS);
  }

  function _showEndControls() {
    const ec = document.getElementById('endControls');
    if (ec) ec.classList.add('show');
  }
  function _hideEndControls() {
    const ec = document.getElementById('endControls');
    if (ec) ec.classList.remove('show');
  }

  function _replayFromStart() {
    _hideEndControls();
    hidePerfectBanner();
    colored.clear();
    tapOrder.length = 0;
    tappedGroups.length = 0;
    _hasTappedThisRound = false;
    round = 1;
    for (let i = 0; i < numLabels.length; i++) {
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    refreshDots();
  }
  const replayBtn = document.getElementById('replayBtn');
  if (replayBtn) replayBtn.addEventListener('click', _replayFromStart);

  // Per-slot debounce: a touch misfire usually produces TWO click
  // events for the SAME slot in quick succession (touchend + the
  // browser-synthesised click).  Block only same-slot repeats inside
  // a 320ms window.  Different-slot taps are never blocked, so the
  // kid can still tap fast between distinct dots.
  let _lastTapAt = 0;
  let _lastTapSlot = -1;
  function handleDotTap(i) {
    const now = Date.now();
    if (i === _lastTapSlot && (now - _lastTapAt) < 320) return;
    _lastTapAt = now;
    _lastTapSlot = i;
    if (!colored.has(i)) {
      cancelIdleTimers();
      _cancelNarration();
      _hasTappedThisRound = true;

      if (round === 1) {
        // Round 1: each tap fills exactly the tapped dot.
        colored.add(i);
        tapOrder.push(i);
        refreshDots();
        const newCount = colored.size;
        if (newCount === dots.length) {
          // Reach 5 -> say "five".  Pulse ALL five dots together so the
          // emphasis on the final count is a single shared gesture (the
          // earlier code only pulsed the just-tapped dot).
          _playKey(String(newCount));
          _pulseSlots([0, 1, 2, 3, 4], 800);
          onPerfectReached();
        } else {
          _playKey(String(newCount));
          // Pulse only the just-tapped dot for the running count.
          _pulseSlots([i], 800);
        }
        if (typeof window.bumpScoreForPaint === 'function') window.bumpScoreForPaint();
        return;
      }

      // Rounds 2-6: one tap fills the next group.  The group is anchored
      // at the kid's tapped slot -- if it's a pair/triple/quad, the
      // system picks tangent partners around the tap.  Solos fill just
      // the tapped slot.
      const sizes = PARTITION_GROUPS[round] || [];
      const groupIdx = tappedGroups.length;
      if (groupIdx >= sizes.length) return;
      const groupSize = sizes[groupIdx];
      const group = _pickGroup(i, groupSize);
      // Safety: the kid's tapped slot must always be one of the slots
      // that fills -- EXCEPT for R3's second pair, where _pickGroup
      // forces the canonical [0, 4] / [0, 2] / [2, 4] shape so the
      // bottom-right (or top-left) stays white through "two plus two".
      // For that case we WANT the kid's tap to be absorbed without
      // adding a third slot to the group.
      const skipUnshift = (round === 3 && groupIdx === 1);
      if (!skipUnshift && group.indexOf(i) < 0) group.unshift(i);
      tappedGroups.push(group);
      group.forEach(s => colored.add(s));
      refreshDots();
      // Pulse the WHOLE group together as instant feedback -- if the kid
      // picked a 2, both dots flash together; a 3, all three flash; etc.
      // The kid sees the whole partition group light up at once.
      _pulseSlots(group, 800);

      const newCount = colored.size;
      const isFinal  = (newCount === dots.length);

      if (isFinal) {
        _playFinalReveal(groupSize, newCount, onPerfectReached);
      } else if (groupIdx === 0) {
        _playKey(String(groupSize));
      } else if (groupSize === 1) {
        // "plus one" as a single clip -- no gap between "plus" and "one".
        _playKey('plus_one');
      } else {
        _playChain(['plus', String(groupSize)]);
      }
      if (typeof window.bumpScoreForPaint === 'function') window.bumpScoreForPaint();
    } else if (round === 1 && colored.has(i)) {
      // Round 1 only: tap a coloured dot to untap it and count back down.
      // Rounds 2-6 lock in the partition once the kid taps a dot.
      colored.delete(i);
      const tIdx = tapOrder.indexOf(i);
      if (tIdx >= 0) tapOrder.splice(tIdx, 1);
      hidePerfectBanner();
      refreshDots();
      _cancelNarration();
      const n = colored.size;
      if (n > 0) {
        _playKey(String(n));
      } else if ("speechSynthesis" in window) {
        try { window.speechSynthesis.cancel(); } catch (e) {}
        const u = new SpeechSynthesisUtterance("zero");
        u.rate = 0.95;
        window.speechSynthesis.speak(u);
      }
      if (typeof window.bumpScoreForErase === 'function') window.bumpScoreForErase();
    }
  }
  // Bind the click handler defensively: stamp the slot index on the
  // SVG element itself and read it back from the event target.  This
  // avoids any closure-capture issue and means the handler always
  // dispatches to the EXACT dot the kid touched.
  for (let i = 0; i < dots.length; i++) {
    dots[i].el.dataset.slot = String(i);
    dots[i].el.addEventListener('click', (e) => {
      const tgt = e.currentTarget || e.target;
      const idx = parseInt(tgt && tgt.dataset && tgt.dataset.slot, 10);
      if (!Number.isNaN(idx)) handleDotTap(idx);
    });
  }
  refreshDots();                  // initial state: all 5 dots visible

  // Big centre count -- the same number the voice says, shown huge above
  // the dots so the child can read it as they count up.  Always shows the
  // current count, including 0 (so "0" is visible after the child counts
  // all the way back down).  Plus the small running-equation line below.
  function updateEquation() {
    // At the very start of each partition (no taps yet), show the TARGET
    // (5) as the big number so the kid sees what they're building toward.
    if (count === 0 && !_hasTappedThisRound) {
      // Intro state -- the kid hasn't tapped a dot yet, so the big number
      // shows ZERO (the starting count, what they're building UP from).
      // Previously every round except R7 showed the target 5, which
      // looked wrong because the kid had counted nothing.
      eqEl.innerHTML = '<span class="num">0</span>';
      if (eqLineEl) eqLineEl.textContent = '';
      return;
    }
    eqEl.innerHTML = '<span class="num">' + count + '</span>';
    if (!eqLineEl) return;
    // Derive the addends from the CURRENT dot groups (Round 1: one per
    // dot; Round 2: pair 0+1 then solos; Round 3: pairs 0+1 and 3+4 then
    // solo 2).  Equation line ALWAYS matches what's painted.
    const addendsNow = _computeAddends(colored);
    // Round 7's partition is "0 + 5 = 5" -- prepend "0 + " so the kid
    // sees the equation that's about to be voiced.
    const r7prefix = (round === 7) ? '0 + ' : '';
    if (addendsNow.length === 0 || count === 0) {
      eqLineEl.textContent = '';
    } else if (addendsNow.length === 1) {
      eqLineEl.textContent = r7prefix + String(addendsNow[0]);
    } else if (count === dots.length) {
      // Round complete -- show "= N" alongside the full partition.
      eqLineEl.textContent = r7prefix + addendsNow.join(' + ') + ' = ' + count;
    } else {
      // Still building -- addends only, no "=" yet (matches the audio,
      // which doesn't say "equals" until the final tap).
      eqLineEl.textContent = r7prefix + addendsNow.join(' + ');
    }
  }

  // --- Reset button --------------------------------------------------
  document.getElementById('resetBtn').addEventListener('click', () => {
    hidePerfectBanner();
    colored.clear();
    tapOrder.length = 0;
    tappedGroups.length = 0;
    _hasTappedThisRound = false;            // show target "5" again on reset
    _hideEndControls();
    round = 1;
    for (let i = 0; i < numLabels.length; i++) {
      numLabels[i].setAttribute('opacity', '0');
      numLabels[i].textContent = '';
    }
    refreshDots();
    // Drop any active paint too (the palette is hidden, but be safe).
    document.querySelectorAll('.paint-slot.active').forEach(s => s.classList.remove('active'));
    activePaint = null;
    activeValue = 0;
  });

  // --- Pause when the page isn't visible ------------------------------
  // AudioLib already stops sound + suspends its context on visibilitychange,
  // but THIS game also has idle timers (5s emphasis, 10s auto-fill) and a
  // hopping animation that would keep running.  Cut everything when hidden
  // so nothing fires while the kid is looking at another app.
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      _cancelNarration();        // belt + suspenders with AudioLib
      cancelIdleTimers();
      stopHopping();
    }
  });
  window.addEventListener('pagehide', () => {
    _cancelNarration();
    cancelIdleTimers();
    stopHopping();
  });
  // Some Android browsers fire 'blur' instead of 'visibilitychange'
  // when the screen locks.  Catch that path too.
  window.addEventListener('blur', () => {
    _cancelNarration();
    cancelIdleTimers();
    stopHopping();
  });
  document.addEventListener('freeze', () => {
    _cancelNarration();
    cancelIdleTimers();
    stopHopping();
  });

  // --- Number-line cells (coloured quantity above black digit) -------
  // Layouts mirror the counting-to-10-game.html number line: each
  // cell shows the dot-grouping for that digit in its ColorMyMath
  // colour, on top of the plain black digit label.  Cell #10 also
  // gets a black equilateral triangle wrapped around its 4-3-2-1
  // cluster (the same triangle motif used in every lesson).
  const NL_R = 10;
  const NL_CX = 50;
  const NL_YBOT = 92;
  const NL_D = 2 * NL_R;
  const NL_TRI_H = NL_D * Math.sqrt(3) / 2;
  const NUMBER_LINE_LAYOUTS = {
    1:  { color: '#e63946', centers: [{x: NL_CX, y: NL_YBOT}] },
    2:  { color: '#ff6200', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT}
          ] },
    3:  { color: '#e6c800', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX,        y: NL_YBOT - NL_TRI_H}
          ] },
    4:  { color: '#00a12c', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_D}, {x: NL_CX + NL_R, y: NL_YBOT - NL_D}
          ] },
    5:  { color: '#0066ff', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - NL_TRI_H}
          ] },
    6:  { color: '#7700dd', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_R, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX,        y: NL_YBOT - 2 * NL_TRI_H}
          ] },
    7:  { color: '#7a3b00', centers: [
            {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_TRI_H}, {x: NL_CX, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_D, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX - NL_R, y: NL_YBOT - 2 * NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - 2 * NL_TRI_H}
          ] },
    8:  { color: '#ff3fa6', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_D},                                           {x: NL_CX + NL_D, y: NL_YBOT - NL_D},
            {x: NL_CX - NL_D, y: NL_YBOT - 2 * NL_D}, {x: NL_CX, y: NL_YBOT - 2 * NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - 2 * NL_D}
          ] },
    9:  { color: '#38c7ff', centers: [
            {x: NL_CX - NL_D, y: NL_YBOT}, {x: NL_CX, y: NL_YBOT}, {x: NL_CX + NL_D, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_D}, {x: NL_CX, y: NL_YBOT - NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - NL_D},
            {x: NL_CX - NL_D, y: NL_YBOT - 2 * NL_D}, {x: NL_CX, y: NL_YBOT - 2 * NL_D}, {x: NL_CX + NL_D, y: NL_YBOT - 2 * NL_D}
          ] },
    10: { color: '#e63946', centers: [
            {x: NL_CX - 3*NL_R, y: NL_YBOT}, {x: NL_CX - NL_R, y: NL_YBOT}, {x: NL_CX + NL_R, y: NL_YBOT}, {x: NL_CX + 3*NL_R, y: NL_YBOT},
            {x: NL_CX - NL_D, y: NL_YBOT - NL_TRI_H}, {x: NL_CX, y: NL_YBOT - NL_TRI_H}, {x: NL_CX + NL_D, y: NL_YBOT - NL_TRI_H},
            {x: NL_CX - NL_R, y: NL_YBOT - 2 * NL_TRI_H}, {x: NL_CX + NL_R, y: NL_YBOT - 2 * NL_TRI_H},
            {x: NL_CX,        y: NL_YBOT - 3 * NL_TRI_H}
          ] }
  };
  for (let n = 1; n <= 10; n++) {
    const svg = document.getElementById('nlQty' + n);
    if (!svg) continue;
    const { color, centers } = NUMBER_LINE_LAYOUTS[n];
    // For 10, draw the canonical 10-triangle outline before the dots.
    if (n === 10) {
      const halfW = 3 * NL_R + NL_R * Math.sqrt(3);
      const baseY = NL_YBOT + NL_R;
      const topY  = baseY - halfW * Math.sqrt(3);
      const tri = document.createElementNS(SVG_NS, 'polygon');
      tri.setAttribute('points',
        (NL_CX - halfW) + ',' + baseY + ' ' +
        (NL_CX + halfW) + ',' + baseY + ' ' +
        NL_CX + ',' + topY);
      tri.setAttribute('fill', 'none');
      tri.setAttribute('stroke', '#000');
      tri.setAttribute('stroke-width', '1.6');
      tri.setAttribute('stroke-linejoin', 'round');
      svg.appendChild(tri);
    }
    for (const p of centers) {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', p.x);
      c.setAttribute('cy', p.y);
      c.setAttribute('r', NL_R);
      c.setAttribute('fill', color);
      c.setAttribute('stroke', '#000');
      c.setAttribute('stroke-width', '1.4');
      svg.appendChild(c);
    }
  }

  // === Magic-42 game scoreboard ============================================
  // Score:   every successful paint stroke (any colour).
  // Perfect: every successful stroke that wasn't immediately erased.
  // Screen:  taps that didn't paint anything (background, spent chips,
  //          already-painted dot taps without an active brush, etc.).
  // Persisted across the partition game pages via localStorage so the
  // child carries their score from partition 1 -> 2 -> ...
  const SCORE_STORAGE_KEY = 'colormymath.addition.scoreboard';
  let scoreCount = 0;
  let screenCount = 0;
  let perfectCount = 0;
  const scoreValueEl   = document.getElementById('scoreValue');
  const screenValueEl  = document.getElementById('screenValue');
  const perfectValueEl = document.getElementById('perfectValue');

  function loadScoreboard() {
    // No persistence -- per user request, every page load starts fresh
    // at Score 0 / Perfect 0 / Screen 0.  Purge any leftover storage
    // from older builds so it can't sneak back in.
    try { sessionStorage.removeItem(SCORE_STORAGE_KEY); } catch (e) {}
    try { localStorage.removeItem(SCORE_STORAGE_KEY);   } catch (e) {}
  }
  function saveScoreboard() {
    // No-op: see loadScoreboard above for why persistence is off.
  }

  // Digital ColorMyMath number rendering -- each digit becomes a small
  // dot-group in its palette colour (0 = ring).
  const DIGIT_COLORS = {
    0: '#ffffff', 1: '#e63946', 2: '#ff6200', 3: '#e6c800', 4: '#00a12c',
    5: '#0066ff', 6: '#7700dd', 7: '#7a3b00', 8: '#ff3fa6', 9: '#38c7ff',
  };
  const DIGIT_ARRANGEMENT = {
    0: [1], 1: [1], 2: [2], 3: [1, 2], 4: [2, 2], 5: [2, 3],
    6: [1, 2, 3], 7: [2, 3, 2], 8: [3, 'split', 3], 9: [3, 3, 3],
  };
  function renderDigitalNumber(container, num) {
    container.innerHTML = '';
    const str = String(num);
    for (const ch of str) {
      const d = parseInt(ch, 10);
      if (isNaN(d)) continue;
      const isZero = d === 0;
      const color = DIGIT_COLORS[d];
      const group = document.createElement('span');
      group.className = 'score-digit-group';
      for (const rowSpec of DIGIT_ARRANGEMENT[d]) {
        const row = document.createElement('span');
        row.className = 'score-digit-row';
        if (rowSpec === 'split') {
          const a = document.createElement('span');
          a.className = 'score-dot';
          a.style.background = color;
          const sp = document.createElement('span');
          sp.className = 'score-dot spacer';
          const b = document.createElement('span');
          b.className = 'score-dot';
          b.style.background = color;
          row.appendChild(a); row.appendChild(sp); row.appendChild(b);
        } else {
          for (let i = 0; i < rowSpec; i++) {
            const dot = document.createElement('span');
            dot.className = 'score-dot' + (isZero ? ' ring' : '');
            dot.style.background = color;
            if (isZero) {
              dot.style.borderColor = '#000';
              dot.style.borderWidth = '1.5px';
            }
            row.appendChild(dot);
          }
        }
        group.appendChild(row);
      }
      container.appendChild(group);
    }
  }
  function renderScoreboard() {
    if (scoreValueEl)   renderDigitalNumber(scoreValueEl,   scoreCount);
    if (screenValueEl)  { screenValueEl.classList.add('bw'); renderDigitalNumber(screenValueEl,  screenCount); }
    if (perfectValueEl) renderDigitalNumber(perfectValueEl, perfectCount);
  }
  // Score hooks invoked from paintDot.
  window.bumpScoreForPaint = function() {
    scoreCount++;
    perfectCount++;
    renderScoreboard();
    saveScoreboard();
  };
  window.bumpScoreForErase = function() {
    // Erasing doesn't count toward Score or Perfect -- it undoes work.
    // We just save so the persisted board stays consistent.
    saveScoreboard();
  };
  // Capture-phase screen-tap listener: anything that lands on the stage
  // background (not a dot, not a paint chip, not the CLEAR pill, not the
  // scoreboard itself) counts as a "screen" miss.
  document.addEventListener('click', (ev) => {
    const t = ev.target;
    if (!t) return;
    if (t.closest('.paint-slot')) return;
    if (t.closest('.reset-btn')) return;
    if (t.closest('.scorebox-left, .scorebox-center, .scorebox-right')) return;
    if (t.closest('.number-line-wrap')) return;
    // SVG <circle> dots inside #dotGroup count as dot taps (handled
    // by paintDot), not screen misses.
    if (t.tagName === 'circle' && t.parentNode && t.parentNode.id === 'dotGroup') return;
    screenCount++;
    renderScoreboard();
    saveScoreboard();
  }, true);

  loadScoreboard();
  renderScoreboard();

  // === "Perfect!" banner ===================================================
  function showPerfectBanner() {
    const b = document.getElementById('perfectBanner');
    if (b) {
      b.textContent = 'PERFECT!';     // reset in case free-play swapped it
      b.classList.add('show');
    }
    // Delay the praise audio so it doesn't overlap whatever clip just
    // finished the round.  Pick a RANDOM praise clip from the pool
    // (great answer / fantastic / well done / etc.) so the kid hears
    // a fresh variant each round.  Falls back to the plain "perfect"
    // clip if the praise pool isn't loaded yet.
    _pgTimeout(() => {
      try {
        if (typeof window.playRandomPraise === 'function') {
          window.playRandomPraise();
        } else if (window.AudioLib) {
          AudioLib.play('perfect');
        }
      } catch (e) {}
    }, 700);
  }
  function hidePerfectBanner() {
    const b = document.getElementById('perfectBanner');
    if (b) b.classList.remove('show');
  }
  window.showPerfectBanner = showPerfectBanner;
  window.hidePerfectBanner = hidePerfectBanner;

  // ===================================================================
  // PLAY / PAUSE GATE   (both interactive and ?auto=1 modes)
  // -------------------------------------------------------------------
  // Every iframe -- the kid's interactive one AND the auto-play demo --
  // starts paused with a big centred "Play" overlay.  Two iframes
  // embedded on the same lesson page were stepping on each other's
  // audio, so we just refuse to make ANY sound until the user explicitly
  // taps "Play".
  //
  // After the gate opens, a small Pause button sits in the top-right
  // corner (off the dots and numbers).  Click it to pause -- audio
  // cuts immediately and dot taps are ignored.  Click it again to
  // resume.
  // ===================================================================
  const AUTOPLAY_TIMING = {
    initialDelayMs: 1500,          // pause before the very first tap
    tapGapMs:        1600,         // gap between dots within a round
    // Pause AFTER the last tap of each round (lets Perfect + the
    // partition review play out before the next round starts).
    afterRoundMs: [
      /* R1 */ 7000,
      /* R2 */ 6500,
      /* R3 */ 5500,
      /* R4 */ 5500,
      /* R5 */ 4800,
      /* R6 */ 4500,
      /* R7 */ 4500,
    ],
    // Slot order the computer taps for each round.  Matches the
    // PARTITION_GROUPS sizes: R1=1+1+1+1+1, R2=2+1+1+1, R3=2+2+1,
    // R4=3+1+1, R5=3+2, R6=4+1, R7=0+5=5.
    tapSequence: [
      /* R1 */ [2, 1, 0, 4, 3],
      /* R2 */ [1, 0, 3, 4],
      /* R3 */ [1, 4, 0],
      /* R4 */ [0, 3, 4],
      /* R5 */ [0, 4],
      /* R6 */ [1, 3],
      /* R7 */ [0],
    ],
    // After the final reveal, hold this long then restart the loop.
    // 0 (or falsey) = play once and stop on the end screen.
    loopAfterEndMs: 6000,
  };

  const _isAutoplay = /[?&]auto=1\b/.test(window.location.search);

  // ----- Play / Pause state ---------------------------------------------
  // `_playing` is the single source of truth.  Both iframes start paused
  // so the page never makes a sound until the user explicitly taps Play.
  let _playing = false;
  let _autoplayStopped = false;

  // ----- Two separate gate elements (initial overlay + resume button) --
  // Splitting them avoids the bug the user kept hitting: morphing one
  // element between "full overlay" and "small badge" sometimes left
  // touchstart/click events going to the wrong target.  Now each role
  // is its own DOM node with its own dedicated click handler.

  // Initial full-screen "Tap to Play" overlay -- shown once at page load,
  // dismissed forever on first click.  Centred over the whole iframe.
  const _bigOverlay = document.createElement('div');
  _bigOverlay.id = 'bigPlayOverlay';
  _bigOverlay.style.cssText = [
    'position: fixed', 'inset: 0', 'z-index: 99999',
    'display: flex', 'align-items: center', 'justify-content: center',
    'background: rgba(0, 0, 0, 0.62)',
    'color: #fff', 'font-family: Arial, sans-serif',
    'cursor: pointer', 'user-select: none',
    '-webkit-tap-highlight-color: transparent',
    'touch-action: manipulation',
  ].join('; ');
  _bigOverlay.innerHTML =
    '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;pointer-events:none">' +
      '<div style="width:clamp(120px,30vw,180px);height:clamp(120px,30vw,180px);' +
                  'border:6px solid #fff;border-radius:50%;display:flex;' +
                  'align-items:center;justify-content:center;background:rgba(0,0,0,0.45)">' +
        '<div style="margin-left:14px;width:0;height:0;' +
                    'border-style:solid;border-width:34px 0 34px 54px;' +
                    'border-color:transparent transparent transparent #fff"></div>' +
      '</div>' +
      '<div style="font-weight:900;font-size:clamp(20px,5vw,28px);letter-spacing:2px;' +
                  'text-transform:uppercase">Tap to Play</div>' +
    '</div>';
  document.body.appendChild(_bigOverlay);

  // Resume button -- a real <button> parked at the TOP-LEFT inside .stage
  // (which has position: relative, so absolute positioning works
  // predictably).  Sits just below the scoreboard, well off the big
  // count number that lives in the upper-centre.
  const _resumeBtn = document.createElement('button');
  _resumeBtn.type = 'button';
  _resumeBtn.id = 'resumeBtn';
  _resumeBtn.style.cssText = [
    'position: absolute',
    'top: 6%',
    'left: 4%',
    'right: auto', 'bottom: auto',
    'z-index: 99999',
    'padding: 10px 16px', 'border-radius: 999px',
    'background: rgba(0, 0, 0, 0.85)',
    'border: 3px solid #fff',
    'color: #fff', 'font-family: Arial, sans-serif',
    'font-weight: 900', 'font-size: 14px', 'letter-spacing: 1px',
    'text-transform: uppercase', 'cursor: pointer',
    'display: none',
    'align-items: center', 'gap: 8px',
    '-webkit-tap-highlight-color: transparent',
    'touch-action: manipulation',
    'margin: 0',
  ].join('; ');
  _resumeBtn.innerHTML =
    '<span style="display:inline-block;width:0;height:0;' +
                 'border-style:solid;border-width:7px 0 7px 11px;' +
                 'border-color:transparent transparent transparent #fff;' +
                 'pointer-events:none"></span>' +
    '<span style="pointer-events:none">Resume</span>';
  // Append inside .stage so absolute positioning is relative to the game
  // area, not the iframe viewport.  Falls back to body if .stage hasn't
  // rendered yet (the script runs at end-of-body, so it should exist).
  const _stageEl = document.querySelector('.stage');
  (_stageEl || document.body).appendChild(_resumeBtn);

  // _lastPlayAt is used by the document click router below to ignore
  // the stray follow-up click that iOS synthesises right after a tap
  // dismisses the overlay (which would otherwise land on the body as a
  // "tap empty space -> pause" event and undo the play instantly).
  // Real button taps are NEVER debounced, so pause/resume always fire.
  let _lastPlayAt = 0;
  function _setPlaying(on) {
    _playing = !!on;
    window.__gamePlaying = _playing;
    if (_playing) _lastPlayAt = Date.now();
    if (_playing) {
      _bigOverlay.style.display = 'none';
      _resumeBtn.style.display  = 'none';
      // Resume from review walk: if a review was mid-play when pause hit,
      // pick up at the SAME beat the chain was on -- not the top.  The
      // wrapper inside _startReviewChain tracks currentBeat, so we just
      // re-run the chain starting at that index.  The slot fills and
      // number labels for already-played beats stay on screen (their
      // onStart already ran), so the visual is continuous.
      try {
        if (_pendingReview) {
          const r = _pendingReview;
          const beat = r.getBeat();
          const items = r.originalItems;
          const onDone = r.onDone;
          _pendingReview = null;
          hidePerfectBanner();
          _startReviewChain(items, beat, onDone);
          return;
        }
      } catch (e) {}
      // Stuck-transition recovery without a saved review (Perfect-banner
      // window before the review even started, or the wait-to-advance
      // after the review's onDone fired).
      try {
        if (colored.size >= dots.length) {
          hidePerfectBanner();
          if (round < 7) {
            _advanceRound(round + 1);
          } else {
            _showEndControls();
          }
        }
      } catch (e) {}
      // Force a refresh so any pointer-events / wait-dot / hint state
      // that got stuck during the pause is reset.
      try { refreshDots(); } catch (e) {}
      try { startIdleTimers(); } catch (e) {}
    } else {
      if (window.AudioLib && AudioLib.stopAll) {
        try { AudioLib.stopAll(); } catch (e) {}
      }
      // _stopIdleTimerCallbacks (NOT cancelIdleTimers) so the inner-hint
      // dots and pair-ghost rings stay frozen exactly where the kid
      // paused -- they should see the same picture on resume.
      try { _stopIdleTimerCallbacks(); } catch (e) {}
      try { stopHopping(); }            catch (e) {}
      // Cancel every pending game-flow timer (Perfect celebration wait,
      // review-walk wait, round advance, praise audio delay).  Without
      // this, those would keep firing after the user paused and the
      // game would silently roll forward in the background.
      try { _pgClearAll(); } catch (e) {}
      _bigOverlay.style.display = 'none';
      _resumeBtn.style.display  = 'flex';
    }
  }
  // Initial state: paused, big overlay visible.
  window.__gamePlaying = false;

  // Dedicated click handlers on each gate element.  Plain `click` works
  // reliably here because they're real interactive elements (a <div>
  // with cursor:pointer and a <button>) -- no capture-phase routing
  // interference, no need for pointerdown shims.
  _bigOverlay.addEventListener('click', (e) => {
    e.stopPropagation(); e.preventDefault();
    _setPlaying(true);
  });
  _resumeBtn.addEventListener('click', (e) => {
    e.stopPropagation(); e.preventDefault();
    _setPlaying(true);
  });

  // ----- Document-level click router (capture phase) -------------------
  // Handles clicks OUTSIDE the dedicated overlay + resume button:
  //   * Tap on a dot / paint slot / replay or next button -> pass through
  //     to the existing handler when playing; swallow when paused.
  //   * Tap on empty space (anywhere not interactive) -> toggle pause.
  // The overlay and resume button have their own listeners and call
  // _setPlaying directly, so they don't need to be routed here.
  function _isInteractiveTarget(target) {
    if (!target || !target.closest) return false;
    return !!(
      target.closest('#dotGroup circle')   ||
      target.closest('.paint-slot')        ||
      target.closest('.end-controls')      ||
      target.closest('#replayBtn')         ||
      target.closest('a.next-btn')         ||
      target.closest('.reset-btn')         ||   // RESTART button
      target.closest('.scorebox-left, .scorebox-center, .scorebox-right') ||
      target.closest('.number-line-wrap')
    );
  }
  document.addEventListener('click', (e) => {
    // Gate elements have their own handlers; ignore them here.
    if (_bigOverlay.contains(e.target)) return;
    if (_resumeBtn.contains(e.target))  return;
    const isInteractive = _isInteractiveTarget(e.target);
    if (_playing) {
      if (isInteractive) return;
      // Ignore the synthesised follow-up click on the body that fires
      // right after the play overlay dismisses on touch -- otherwise it
      // would immediately pause the game.  500ms covers iOS's worst
      // case touch->click delay.
      if (Date.now() - _lastPlayAt < 500) return;
      e.stopPropagation(); e.preventDefault();
      _setPlaying(false);
    } else {
      // Paused.  Dots/paints are off-limits; empty taps resume.
      e.stopPropagation(); e.preventDefault();
      if (!isInteractive) _setPlaying(true);
    }
  }, true);

  // ----- Auto-play loop (only when ?auto=1) -----------------------------
  function _autoplayTap(slot) {
    const el = document.querySelector('#dotGroup circle[data-slot="' + slot + '"]');
    if (!el) return false;
    const rect = el.getBoundingClientRect();
    el.dispatchEvent(new MouseEvent('click', {
      bubbles: true, cancelable: true,
      clientX: rect.left + rect.width / 2,
      clientY: rect.top  + rect.height / 2,
      button: 0,
    }));
    return true;
  }

  async function _autoplayWaitForDots() {
    for (let i = 0; i < 200; i++) {
      if (document.querySelectorAll('#dotGroup circle[data-slot]').length >= 5) return true;
      await new Promise(r => setTimeout(r, 50));
    }
    return false;
  }

  // Pause-aware sleep: while _playing is false, the elapsed-time
  // accounting freezes, so a pause-then-resume picks up where the
  // round left off (no skipped beats, no double-fast catchup).
  function _autoplaySleep(ms) {
    return new Promise(resolve => {
      let remaining = ms;
      let lastTick = Date.now();
      const tick = () => {
        if (_autoplayStopped) { resolve(); return; }
        const now = Date.now();
        if (_playing) remaining -= (now - lastTick);
        lastTick = now;
        if (remaining <= 0) { resolve(); return; }
        setTimeout(tick, Math.min(200, remaining + 10));
      };
      setTimeout(tick, Math.min(200, ms));
    });
  }

  async function _autoplayRunOnce() {
    const T = AUTOPLAY_TIMING;
    await _autoplaySleep(T.initialDelayMs);
    for (let r = 0; r < T.tapSequence.length; r++) {
      const slots = T.tapSequence[r];
      for (let i = 0; i < slots.length; i++) {
        if (_autoplayStopped) return;
        // Don't dispatch a tap while paused.
        while (!_playing && !_autoplayStopped) {
          await new Promise(r => setTimeout(r, 100));
        }
        if (_autoplayStopped) return;
        _autoplayTap(slots[i]);
        const isLast = (i === slots.length - 1);
        await _autoplaySleep(isLast ? (T.afterRoundMs[r] || 5000) : T.tapGapMs);
      }
    }
  }

  async function _autoplayMain() {
    if (!_isAutoplay) return;
    if (!await _autoplayWaitForDots()) return;
    // Wait for the first user click on the big overlay.
    while (!_playing && !_autoplayStopped) {
      await new Promise(r => setTimeout(r, 100));
    }
    while (!_autoplayStopped) {
      await _autoplayRunOnce();
      const after = AUTOPLAY_TIMING.loopAfterEndMs;
      if (!after) return;
      await _autoplaySleep(after);
      const replay = document.getElementById('replayBtn');
      if (replay) {
        replay.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
      } else {
        return;
      }
      await _autoplaySleep(400);
    }
  }
  _autoplayMain();
</script>

</body>
</html>
