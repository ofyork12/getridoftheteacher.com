<script>
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const dotGroup = document.getElementById('dotGroup');
  const rampPath = document.getElementById('rampPath');
  const eqA = document.getElementById('eqA');
  const eqOp = document.getElementById('eqOp');
  const eqB = document.getElementById('eqB');
  const eqEq = document.getElementById('eqEq');
  const eqC = document.getElementById('eqC');

  const COLORS = {
    red: '#FF0000', orange: '#FF8C00', yellow: '#F4FF07',
    green: '#00C800', blue: '#1D50FE'
  };

  const DOT_R = 14;
  const FLOOR_Y = 180;
  const DOT_REST_Y = FLOOR_Y - DOT_R - 1.25;

  const BEND_X = 30;
  const BEND_Y = FLOOR_Y;
  const RAMP_TOP_X = -55;
  const RAMP_TOP_Y = 130;

  const CENTER_X = 100;
  const r = DOT_R;
  const d = 2 * r;
  const triH = d * Math.sqrt(3) / 2;

  // Final-5 cluster positions (centered)
  const BL = { x: CENTER_X - d, y: DOT_REST_Y };
  const BC = { x: CENTER_X,     y: DOT_REST_Y };
  const BR = { x: CENTER_X + d, y: DOT_REST_Y };
  const TL = { x: CENTER_X - r, y: DOT_REST_Y - triH };
  const TR = { x: CENTER_X + r, y: DOT_REST_Y - triH };
  const TRI_TOP = { x: (BC.x + BR.x) / 2, y: BC.y - triH };
  const BC_TOP = { x: BC.x, y: BC.y - d };
  const BR_TOP = { x: BR.x, y: BR.y - d };

  // Stairs config — 2 steps total, all same size like real stairs
  // 2 platforms (top + step2) + floor = 3 levels with 2 equal drops
  const STAIR_STEP_DX = 30;
  // Riser height: equal spacing from top step → step 2 → floor
  const STAIR_TOP_Y = 122;  // top platform y
  const STAIR_STEP_DY = (FLOOR_Y - STAIR_TOP_Y) / 2;  // = 29 — uniform drop to step 2, then to floor
  // Last step ends here (leaves clear floor between stairs and cluster)
  const LAST_STAIR_X = -5;

  function getStairCorners() {
    // 2 steps total. Top step + step 2 + drop to floor.
    const stair2X = LAST_STAIR_X;
    const stair1X = LAST_STAIR_X - STAIR_STEP_DX;  // top step's right edge
    const y0 = STAIR_TOP_Y;
    return [
      { x: -180, y: y0 },                              // off-screen far left, top step continues
      { x: stair1X, y: y0 },                           // edge of top step
      { x: stair1X, y: y0 + STAIR_STEP_DY },           // drop down
      { x: stair2X, y: y0 + STAIR_STEP_DY },           // step 2 platform
      { x: stair2X, y: FLOOR_Y },                      // drop to floor
      { x: 310, y: FLOOR_Y }                           // off-screen right floor
    ];
  }

  function pathFromCorners(corners) {
    return 'M ' + corners.map(c => `${c.x},${c.y}`).join(' L ');
  }

  function stairLandings() {
    // Where the dot's CENTER sits when at the edge of each platform (about to bounce off)
    const stair2X = LAST_STAIR_X;
    const stair1X = LAST_STAIR_X - STAIR_STEP_DX;
    const y0 = STAIR_TOP_Y;
    return [
      { x: stair1X - DOT_R, y: y0 - DOT_R - 1.25 },                    // edge of top step
      { x: stair2X - DOT_R, y: y0 + STAIR_STEP_DY - DOT_R - 1.25 }     // edge of step 2
    ];
  }

  let dotsById = {};

  function makeDot(cx, cy, colorName) {
    const c = document.createElementNS(SVG_NS, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', DOT_R);
    c.setAttribute('fill', COLORS[colorName]);
    c.setAttribute('stroke', '#000'); c.setAttribute('stroke-width', '2');
    return c;
  }

  function clearDots() { dotGroup.innerHTML = ''; dotsById = {}; }

  function addDot(id, cx, cy, colorName) {
    const el = makeDot(cx, cy, colorName);
    dotGroup.appendChild(el);
    dotsById[id] = { el, cx, cy };
    return dotsById[id];
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function setInitialLine() {
    rampPath.setAttribute('d', `M -100,${FLOOR_Y} L 310,${FLOOR_Y}`);
  }

  function animateRampUp(durationMs = 900) {
    return new Promise(resolve => {
      const startY = FLOOR_Y, endY = RAMP_TOP_Y;
      const startTime = performance.now();
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = 1 - Math.pow(1 - t, 3);
        const y = startY + (endY - startY) * e;
        const rampDx = BEND_X - RAMP_TOP_X;
        const rampDy = BEND_Y - y;
        const extendX = RAMP_TOP_X - 80;
        const extendY = y - 80 * (rampDy / rampDx);
        rampPath.setAttribute('d', `M ${extendX},${extendY} L ${RAMP_TOP_X},${y} L ${BEND_X},${BEND_Y} L 310,${BEND_Y}`);
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  // Morph ramp <-> stairs by interpolating between point sets
  function morphPath(fromCorners, toCorners, durationMs) {
    return new Promise(resolve => {
      const startTime = performance.now();
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = 1 - Math.pow(1 - t, 2);
        const interp = fromCorners.map((s, i) => ({
          x: s.x + (toCorners[i].x - s.x) * e,
          y: s.y + (toCorners[i].y - s.y) * e
        }));
        rampPath.setAttribute('d', pathFromCorners(interp));
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  function rampCornersAsEightPoints() {
    // Map the ramp shape into 8 points matching stair corner indices.
    // Points 0-5: collapse the staircase shape onto the ramp diagonal line.
    // Points 6-7: keep the floor segment EXACTLY where it is (so morph doesn't move floor).
    // Stair point 6 is at (stair2X, FLOOR_Y) — where last step meets floor.
    // For the ramp, the equivalent point is (BEND_X, FLOOR_Y) — where ramp meets floor.
    const rY = RAMP_TOP_Y;
    const rampDx = BEND_X - RAMP_TOP_X;
    const rampDy = BEND_Y - rY;
    const extendX = RAMP_TOP_X - 80;
    const extendY = rY - 80 * (rampDy / rampDx);
    function lerpAlongRamp(progress) {
      return {
        x: extendX + progress * (BEND_X - extendX),
        y: extendY + progress * (BEND_Y - extendY)
      };
    }
    return [
      lerpAlongRamp(0),       // 0: off-screen top of ramp
      lerpAlongRamp(0.20),    // 1: along ramp (matches stair "edge of top platform")
      lerpAlongRamp(0.35),    // 2: along ramp (matches stair "drop down 1")
      lerpAlongRamp(0.50),    // 3: along ramp (matches stair "step 1 platform")
      lerpAlongRamp(0.65),    // 4: along ramp (matches stair "drop 2")
      lerpAlongRamp(0.80),    // 5: along ramp (matches stair "step 2 platform")
      { x: 95, y: FLOOR_Y },  // 6: matches stair LAST_STAIR_X (so floor stays anchored during morph)
      { x: 310, y: FLOOR_Y }      // 7: off-screen right floor (matches stair end)
    ];
  }

  function morphToStairs(durationMs = 700) {
    return morphPath(rampCornersAsEightPoints(), getStairCorners(), durationMs);
  }
  function morphToRamp(durationMs = 700) {
    return morphPath(getStairCorners(), rampCornersAsEightPoints(), durationMs);
  }

  function smoothRampToFloorPoints(numSamples = 60) {
    const pts = [];
    // Extend the ramp BACKWARD off-screen so dots have visible roll-in distance.
    // We extrapolate the ramp line further up-left by 70 units beyond RAMP_TOP_X.
    const rdx_unit = (BEND_X - RAMP_TOP_X);
    const rdy_unit = (BEND_Y - RAMP_TOP_Y);
    const rLen_full = Math.hypot(rdx_unit, rdy_unit);
    const extension = 70; // units beyond the visible ramp top
    const ux = rdx_unit / rLen_full;
    const uy = rdy_unit / rLen_full;
    const rx1 = RAMP_TOP_X - ux * extension;
    const ry1 = RAMP_TOP_Y - uy * extension;
    const rx2 = BEND_X, ry2 = BEND_Y;
    const rdx = rx2 - rx1, rdy = ry2 - ry1;
    const rLen = Math.hypot(rdx, rdy);
    let pnx = -rdy / rLen, pny = rdx / rLen;
    if (pny > 0) { pnx = -pnx; pny = -pny; }
    const blend = 22;
    const rampPortionEnd = rLen - blend;
    const rampSamples = Math.floor(numSamples * 0.45);
    for (let i = 0; i <= rampSamples; i++) {
      const tDist = (i / rampSamples) * rampPortionEnd;
      const tFrac = tDist / rLen;
      pts.push({
        x: rx1 + rdx * tFrac + pnx * DOT_R,
        y: ry1 + rdy * tFrac + pny * DOT_R
      });
    }
    const tStart = rampPortionEnd / rLen;
    const cStartX = rx1 + rdx * tStart + pnx * DOT_R;
    const cStartY = ry1 + rdy * tStart + pny * DOT_R;
    const cEndX = BEND_X + blend;
    const cEndY = DOT_REST_Y;
    const s = (cEndY - cStartY) * rLen / rdy;
    const ctrlX = cStartX + s * (rdx / rLen);
    const ctrlY = cEndY;
    const curveSamples = Math.floor(numSamples * 0.25);
    for (let i = 1; i <= curveSamples; i++) {
      const t = i / curveSamples;
      const x = (1 - t) * (1 - t) * cStartX + 2 * (1 - t) * t * ctrlX + t * t * cEndX;
      const y = (1 - t) * (1 - t) * cStartY + 2 * (1 - t) * t * ctrlY + t * t * cEndY;
      pts.push({ x, y });
    }
    return pts;
  }

  function animateRollAlong(circle, points, durationMs, easeFn, angleRef) {
    return new Promise(resolve => {
      const segs = []; let total = 0;
      for (let i = 1; i < points.length; i++) {
        const dx = points[i].x - points[i-1].x;
        const dy = points[i].y - points[i-1].y;
        const len = Math.hypot(dx, dy);
        segs.push({ from: points[i-1], to: points[i], len });
        total += len;
      }
      const ease = easeFn || ((t) => t);
      const startTime = performance.now();
      const avgDx = points[points.length-1].x - points[0].x;
      const rotSign = (avgDx < 0) ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        let traveled = e * total;
        let cx = points[points.length-1].x;
        let cy = points[points.length-1].y;
        for (const sg of segs) {
          if (traveled <= sg.len) {
            const frac = traveled / sg.len;
            cx = sg.from.x + (sg.to.x - sg.from.x) * frac;
            cy = sg.from.y + (sg.to.y - sg.from.y) * frac;
            break;
          } else { traveled -= sg.len; }
        }
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const rotations = (e * total) / (2 * Math.PI * DOT_R);
        const angle = startAngle + rotations * 360 * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          const lcx = points[points.length-1].x, lcy = points[points.length-1].y;
          circle.setAttribute('transform', `rotate(${angle}, ${lcx}, ${lcy})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  function animateRollMove(circle, x1, y1, x2, y2, durationMs, easeFn, angleRef) {
    return new Promise(resolve => {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const totalRotation = (dist / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const ease = easeFn || ((t) => t);
      const startTime = performance.now();
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const cx = x1 + (x2 - x1) * e;
        const cy = y1 + (y2 - y1) * e;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * e * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          circle.setAttribute('transform', `rotate(${angle}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  function animateBounceArc(circle, x1, y1, x2, y2, peakLift, durationMs, angleRef) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const totalRotation = (dist / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const cx = x1 + (x2 - x1) * t;
        const arch = -4 * peakLift * (t * t - t);
        const cyBase = y1 + (y2 - y1) * t;
        const cy = cyBase - arch;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          circle.setAttribute('transform', `rotate(${angle}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Tip off: dot rotates AND falls in arc when an edge tips out from under it
  function animateTipOff(circle, x1, y1, x2, y2, durationMs = 700) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dx = x2 - x1, dy = y2 - y1;
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360 * 1.5;
      const rotSign = dx < 0 ? -1 : 1;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        // x: ease-out (tips quickly, settles)
        const ex = 1 - Math.pow(1 - t, 1.7);
        // y: gravity acceleration
        const ey = t * t;
        const cx = x1 + dx * ex;
        const cy = y1 + dy * ey;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = totalRotation * ex * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          circle.setAttribute('transform', `rotate(${totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Simple position move (no rotation), used for falling/sliding short distances
  function animateMove(circle, fromX, fromY, toX, toY, durationMs, easeFn) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const ease = easeFn || ((t) => 1 - Math.pow(1 - t, 2));
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        circle.setAttribute('cx', fromX + (toX - fromX) * e);
        circle.setAttribute('cy', fromY + (toY - fromY) * e);
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  function recolorAll(circles, colorName) {
    const fill = COLORS[colorName];
    circles.forEach(c => c.setAttribute('fill', fill));
  }

  // Play an audio element by id. Resets to start so it can be replayed.
  // NOTE: The audio elements (audio_one, audio_1plus1, ...) inherited from
  // the addition file remain in the markup but are NOT triggered in this
  // subtraction file. To add narration, drop in 'audio_5minus1' etc.
  // and call playAudio('audio_5minus1') from the relevant step.
  function playAudio(id) {
    const a = document.getElementById(id);
    if (a) {
      try {
        a.pause();
        a.currentTime = 0;
        a.muted = false;
        a.volume = 1.0;
        const p = a.play();
        if (p && p.catch) p.catch((err) => console.log('Audio play failed:', id, err));
      } catch (e) {
        console.log('Audio error:', id, e);
      }
    } else {
      console.log('Audio element not found:', id);
    }
  }

  function popPart(part) {
    part.classList.remove('pop'); void part.offsetWidth; part.classList.add('pop');
  }

  function setEquation(a, op, b, c) {
    eqA.textContent = a; eqOp.textContent = op; eqB.textContent = b;
    eqEq.textContent = (a === '' && b === '') ? '' : '='; eqC.textContent = c;
  }

  function highlightCell(n) {
    document.querySelectorAll('.num-cell').forEach(c => c.classList.remove('active'));
    if (n >= 1 && n <= 5) document.getElementById('cell' + n).classList.add('active');
  }

  function buildNumberLine() {
    const qtyR = 11;
    const cx = 50, yBot = 88;
    const dQ = 2 * qtyR;
    const triH2 = dQ * Math.sqrt(3) / 2;
    const layouts = {
      1: { color: 'red',    centers: [{x: cx, y: yBot}] },
      2: { color: 'orange', centers: [{x: cx - qtyR, y: yBot}, {x: cx + qtyR, y: yBot}] },
      3: { color: 'yellow', centers: [
            {x: cx - qtyR, y: yBot}, {x: cx + qtyR, y: yBot},
            {x: cx, y: yBot - triH2}
          ] },
      4: { color: 'green',  centers: [
            {x: cx - qtyR, y: yBot}, {x: cx + qtyR, y: yBot},
            {x: cx - qtyR, y: yBot - dQ}, {x: cx + qtyR, y: yBot - dQ}
          ] },
      5: { color: 'blue',   centers: [
            {x: cx - dQ, y: yBot}, {x: cx, y: yBot}, {x: cx + dQ, y: yBot},
            {x: cx - qtyR, y: yBot - triH2}, {x: cx + qtyR, y: yBot - triH2}
          ] }
    };
    for (let n = 1; n <= 5; n++) {
      const svg = document.getElementById('qty' + n);
      svg.innerHTML = '';
      const { color, centers } = layouts[n];
      centers.forEach(p => {
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
        c.setAttribute('r', qtyR);
        c.setAttribute('fill', COLORS[color]);
        c.setAttribute('stroke', '#000'); c.setAttribute('stroke-width', '2');
        svg.appendChild(c);
      });
    }
  }

  // ===== SUBTRACTION-specific helper: roll a dot OFF the cluster, leftward
  // and UP the stairs, exiting off-screen. This is the reverse of rollNewDotIn.
  async function rollDotOutUpStairs(dot) {
    const landings = stairLandings();
    const angleRef = dot.angleRef || { value: 0 };

    // 1) If the dot is up on the cluster (above the floor), drop it down
    //    and onto the floor tangent-left of where it was.
    if (dot.cy < DOT_REST_Y - 1) {
      const floorX = dot.cx;  // drop straight down for simplicity
      await animateBallistic(dot.el, dot.cx, dot.cy, floorX, DOT_REST_Y, 380, angleRef);
      dot.cx = floorX; dot.cy = DOT_REST_Y;
    }

    // 2) Bounce on floor leftward toward step 2 of the staircase.
    //    Two small floor hops to mirror the rollNewDotIn entrance.
    const floorBounce1X = (dot.cx + landings[1].x) / 2;
    await animateBallistic(dot.el, dot.cx, DOT_REST_Y, floorBounce1X, DOT_REST_Y, 320, angleRef, 7);
    dot.cx = floorBounce1X;

    const floorBounce2X = (floorBounce1X + landings[1].x) / 2;
    await animateBallistic(dot.el, floorBounce1X, DOT_REST_Y, floorBounce2X, DOT_REST_Y, 300, angleRef, 14);
    dot.cx = floorBounce2X;

    // 3) Bounce up onto step 2 of the staircase
    await animateBallistic(dot.el, floorBounce2X, DOT_REST_Y, landings[1].x, landings[1].y, 480, angleRef);
    dot.cx = landings[1].x; dot.cy = landings[1].y;

    // 4) Bounce up onto top step
    await animateBallistic(dot.el, landings[1].x, landings[1].y, landings[0].x, landings[0].y, 460, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    // 5) Roll across top step off-screen left
    const offX = -160;
    const offY = STAIR_TOP_Y - DOT_R - 1.25;
    await animateRollMove(dot.el, landings[0].x, landings[0].y, offX, offY, 1100, (t) => t, angleRef);

    // 6) Remove the SVG element from the DOM
    if (dot.el && dot.el.parentNode) dot.el.parentNode.removeChild(dot.el);
  }

  // Smoothly move a dot from its current spot to a new (x,y), rolling along the way.
  function moveDotTo(dot, newX, newY, durationMs = 500) {
    const angleRef = dot.angleRef || { value: 0 };
    return animateBallistic(dot.el, dot.cx, dot.cy, newX, newY, durationMs, angleRef, 8)
      .then(() => { dot.cx = newX; dot.cy = newY; dot.angleRef = angleRef; });
  }

  // Roll new dot in along ramp + floor
  // Roll dot in across top step from off-screen, bounce down each step, land on floor at targetX
  async function rollNewDotIn(id, targetX) {
    const landings = stairLandings();
    // Start FAR off-screen left so the dot rolls in across the top step
    const startX = -160;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, 'red');
    await sleep(150);
    const angleRef = { value: 0 };

    // 1) Roll across top step from off-screen to its right edge
    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    // 2) Arc 1: top step → step 2
    await animateBallistic(dot.el, landings[0].x, landings[0].y,
                            landings[1].x, landings[1].y, 460, angleRef);
    dot.cx = landings[1].x; dot.cy = landings[1].y;

    // 3) Arc 2: step 2 → first floor bounce (lands well before targetX)
    const firstBounceX = (landings[1].x + targetX) / 2;
    await animateBallistic(dot.el, landings[1].x, landings[1].y,
                            firstBounceX, DOT_REST_Y, 540, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    // 4) Floor bounce 1: medium hop forward
    const secondBounceX = (firstBounceX + targetX) / 2;
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y,
                            secondBounceX, DOT_REST_Y, 380, angleRef, 14);
    dot.cx = secondBounceX; dot.cy = DOT_REST_Y;

    // 5) Floor bounce 2: small hop, settles at target
    await animateBallistic(dot.el, secondBounceX, DOT_REST_Y,
                            targetX, DOT_REST_Y, 280, angleRef, 7);
    dot.cx = targetX; dot.cy = DOT_REST_Y;

    dot.angleRef = angleRef;
    return dot;
  }

  // BOUNCE down stairs to a final floor X
  // Physics-natural ballistic arc: dot leaves position (x1,y1) with horizontal velocity vx
  // and initial upward velocity vy0 (negative = up). Lands at (x2,y2). Path follows
  // y = y1 + vy0*t + 0.5*g*t^2 with t in [0, totalT]. We set g and find vy0 to land at (x2,y2).
  // Returns a Promise that resolves when animation completes.
  function animateBallistic(circle, x1, y1, x2, y2, totalMs, angleRef, peakOverride) {
    return new Promise(resolve => {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const dropAmount = Math.max(0, y2 - y1);
      const peakLift = (peakOverride !== undefined) ? peakOverride : Math.max(12, dist * 0.18 + dropAmount * 0.3);

      const startTime = performance.now();
      const totalRotation = (Math.abs(x2 - x1) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;

      function step(now) {
        const t = Math.min(1, (now - startTime) / totalMs);
        const cx = x1 + (x2 - x1) * t;
        const linearY = y1 + (y2 - y1) * t;
        const arch = 4 * peakLift * (t - t * t);
        const cy = linearY - arch;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          circle.setAttribute('transform', `rotate(${startAngle + totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Bounce down stairs with NATURAL physics: each step is a single ballistic arc.
  // Roll across top platform, then 4 ballistic arcs (off step1, off step2, off step3 to floor,
  // floor bounce to tangent-left of cluster), then final big arc up onto cluster.
  // Total: 1 roll + 5 arcs.
  async function bounceDownStairsToTop(id, finalLandX, finalLandY, clusterLeftX) {
    const landings = stairLandings();
    const floorLandX = clusterLeftX - 2 * DOT_R;

    const startX = -150;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, 'red');
    await sleep(150);
    const angleRef = { value: 0 };

    // Roll across top step (off-screen → edge of top step)
    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    // Arc 1: off top step → land on step 2
    await animateBallistic(dot.el, landings[0].x, landings[0].y,
                            landings[1].x, landings[1].y, 460, angleRef);
    dot.cx = landings[1].x; dot.cy = landings[1].y;

    // Arc 2: off step 2 → lands on the floor TANGENT-LEFT of cluster (no overlap)
    await animateBallistic(dot.el, landings[1].x, landings[1].y,
                            floorLandX, DOT_REST_Y, 540, angleRef);
    dot.cx = floorLandX; dot.cy = DOT_REST_Y;

    // Arc 3: BIG launch up onto cluster top — more horizontal now since we have momentum
    const peakLift = Math.max(40, Math.abs(DOT_REST_Y - finalLandY) + 22);
    await animateBallistic(dot.el, floorLandX, DOT_REST_Y,
                            finalLandX, finalLandY, 650, angleRef, peakLift);
    dot.cx = finalLandX; dot.cy = finalLandY;
    dot.angleRef = angleRef;
    return dot;
  }

  const SECONDS_PER_STEP = 4.5;
  const MS = SECONDS_PER_STEP * 1000;

  // ===== SUBTRACTION STEPS =====
  // Initial setup: place 5 blue dots in cluster formation, show "5"
  async function step1Intro() {
    setEquation('', '', '', '');
    highlightCell(0);
    await sleep(300);

    // Place 5 dots in cluster formation, all blue
    addDot('d1', BL.x, BL.y, 'blue');     // bottom-left
    addDot('d2', BC.x, BC.y, 'blue');     // bottom-center
    addDot('d3', BR.x, BR.y, 'blue');     // bottom-right
    addDot('d4', TL.x, TL.y, 'blue');     // top-left
    addDot('d5', TR.x, TR.y, 'blue');     // top-right

    // Reveal "5" on the equation line
    eqA.textContent = '5'; popPart(eqA);
    highlightCell(5);
    await sleep(1500);  // hold "5" for a moment before subtraction starts
  }

  // STEP: 5 - 1 = 4
  // Remove BC. Top dots TL, TR drop down into the 2x2 square's upper row.
  async function step5minus1() {
    setEquation('5', '−', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(5);

    const d1 = dotsById['d1']; // BL
    const d2 = dotsById['d2']; // BC — leaves
    const d3 = dotsById['d3']; // BR
    const d4 = dotsById['d4']; // TL
    const d5 = dotsById['d5']; // TR

    // Send the bottom-center dot off (rolls leftward, bounces up the stairs)
    await rollDotOutUpStairs(d2);
    delete dotsById['d2'];

    await sleep(150);

    // Remaining 4 dots reorganize into a 2x2 square.
    // BL and BR stay; TL and TR drop down to (BL.x, REST-d) and (BR.x, REST-d).
    const sqTopLeft  = { x: BL.x, y: DOT_REST_Y - 2 * DOT_R };
    const sqTopRight = { x: BR.x, y: DOT_REST_Y - 2 * DOT_R };
    await Promise.all([
      moveDotTo(d4, sqTopLeft.x,  sqTopLeft.y,  450),
      moveDotTo(d5, sqTopRight.x, sqTopRight.y, 450)
    ]);

    recolorAll([d1.el, d3.el, d4.el, d5.el], 'green');
    eqC.textContent = '4'; popPart(eqC);
    highlightCell(4);

    // rollOut(~2660) + sleep(150) + reorganize(450) ≈ 3260ms
    await sleep(Math.max(300, MS - 3300));
  }

  // STEP: 4 - 1 = 3
  // Remove top-right of square. Remaining 3 reshape into a triangle (tangent bottom + apex).
  async function step4minus1() {
    setEquation('4', '−', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(4);

    const d1 = dotsById['d1']; // BL bottom
    const d3 = dotsById['d3']; // BR bottom
    const d4 = dotsById['d4']; // square top-left
    const d5 = dotsById['d5']; // square top-right — leaves

    // d5 (top-right of square) leaves up the stairs
    await rollDotOutUpStairs(d5);
    delete dotsById['d5'];

    await sleep(150);

    // Remaining 3 form a triangle: bottom dots tangent (centered), apex above.
    const r = DOT_R;
    const triLeft  = { x: CENTER_X - r, y: DOT_REST_Y };
    const triRight = { x: CENTER_X + r, y: DOT_REST_Y };
    const triApex  = { x: CENTER_X,     y: DOT_REST_Y - triH };

    await Promise.all([
      moveDotTo(d1, triLeft.x,  triLeft.y,  450),
      moveDotTo(d3, triRight.x, triRight.y, 450),
      moveDotTo(d4, triApex.x,  triApex.y,  450)
    ]);

    recolorAll([d1.el, d3.el, d4.el], 'yellow');
    eqC.textContent = '3'; popPart(eqC);
    highlightCell(3);

    // dropDown(~380) + rollOut(~2660) + sleep(150) + reorganize(450) ≈ 3640ms
    await sleep(Math.max(300, MS - 3700));
  }

  // STEP: 3 - 1 = 2
  // Remove the apex. Remaining 2 stay side-by-side (already tangent).
  async function step3minus1() {
    setEquation('3', '−', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(3);

    const d1 = dotsById['d1']; // bottom-left
    const d3 = dotsById['d3']; // bottom-right
    const d4 = dotsById['d4']; // apex — leaves

    // The apex dot leaves up the stairs
    await rollDotOutUpStairs(d4);
    delete dotsById['d4'];

    await sleep(150);

    // The two bottom dots are already in their final spot. Just recolor.
    recolorAll([d1.el, d3.el], 'orange');
    eqC.textContent = '2'; popPart(eqC);
    highlightCell(2);

    // dropDown(~380) + rollOut(~2660) + sleep(150) ≈ 3190ms
    await sleep(Math.max(300, MS - 3300));
  }

  // STEP: 2 - 1 = 1
  // Remove right dot. Remaining 1 slides to the center.
  async function step2minus1() {
    setEquation('2', '−', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(2);

    const d1 = dotsById['d1']; // bottom-left
    const d3 = dotsById['d3']; // bottom-right — leaves

    // The right dot leaves up the stairs
    await rollDotOutUpStairs(d3);
    delete dotsById['d3'];

    await sleep(150);

    // The single remaining dot slides to BC (center of number line)
    await moveDotTo(d1, BC.x, BC.y, 450);

    recolorAll([d1.el], 'red');
    eqC.textContent = '1'; popPart(eqC);
    highlightCell(1);

    // rollOut(~2660) + sleep(150) + slide(450) ≈ 3260ms
    await sleep(Math.max(300, MS - 3300));
  }

  let playing = false;

  function setInitialStairs() {
    rampPath.setAttribute('d', pathFromCorners(getStairCorners()));
  }

  async function play() {
    if (playing) return;
    playing = true;
    try {
      buildNumberLine();
      clearDots();
      setEquation('', '', '', '');
      highlightCell(0);
      setInitialStairs();
      await sleep(500);
      await step1Intro();   // Show "5", place 5 blue cluster dots
      await step5minus1();  // 5 - 1 = 4  → 2x2 green square
      await step4minus1();  // 4 - 1 = 3  → yellow triangle
      await step3minus1();  // 3 - 1 = 2  → orange pair
      await step2minus1();  // 2 - 1 = 1  → red single
    } catch (err) {
      console.error('ERROR:', err);
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);background:red;color:white;padding:20px;z-index:9999;max-width:90%;';
      errDiv.textContent = 'ERROR: ' + err.message;
      document.body.appendChild(errDiv);
    }
    playing = false;
  }

  function restart() { location.reload(); }

  // Unlock audio on first user interaction (silent priming for ALL audio elements except 'one')
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    // Silent prime the OTHER audio elements (so they're allowed to play later)
    // Don't touch audio_one — we'll play it normally for full volume
    ['audio_1plus1', 'audio_2plus1', 'audio_3plus1', 'audio_4plus1'].forEach(id => {
      const a = document.getElementById(id);
      if (a) {
        a.muted = true;
        const p = a.play();
        if (p && p.then) {
          p.then(() => {
            a.pause();
            a.currentTime = 0;
            a.muted = false;
          }).catch(() => { a.muted = false; });
        }
      }
    });
  }
  document.addEventListener('click', unlockAudio, { once: false });
  document.addEventListener('touchstart', unlockAudio, { once: false });
  document.addEventListener('keydown', unlockAudio, { once: false });

  window.addEventListener('load', () => {
    buildNumberLine();
    setInitialStairs();
    const startBtn = document.createElement('button');
    startBtn.textContent = '▶ Start with sound';
    startBtn.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 40px;font-size:24px;background:#fcbf49;border:none;border-radius:12px;font-family:Nunito,sans-serif;font-weight:700;cursor:pointer;box-shadow:0 6px 0 #c89432;z-index:1000;';
    startBtn.onclick = () => {
      startBtn.remove();
      // Prime ALL audios silently so they can play later when triggered by code
      ['audio_one', 'audio_1plus1', 'audio_2plus1', 'audio_3plus1', 'audio_4plus1'].forEach(id => {
        const a = document.getElementById(id);
        if (a) {
          a.muted = true;
          a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; }).catch(() => { a.muted = false; });
        }
      });
      // Start animation
      setTimeout(play, 100);
    };
    document.body.appendChild(startBtn);
  });
</script>

</body>
</html>
