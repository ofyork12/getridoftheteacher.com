<!DOCTYPE html>
<html lang="en">
<head>
<script src="mute-button.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Partitions of 5 — Funnel — ColorMyMath</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    margin: 0; padding: 0;
    background: #333;
    font-family: 'Nunito', Arial, sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .stage {
    position: relative;
    width: min(100vw, 56.25vh);
    aspect-ratio: 9 / 16;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    cursor: pointer;
    user-select: none;
  }

  .title {
    position: absolute; top: 3vh; left: 0; right: 0;
    text-align: center;
    font-size: 2.3vh; font-weight: 800;
    color: #222; letter-spacing: 0.04em;
    pointer-events: none; z-index: 8;
  }
  .title .sub {
    display: block;
    font-size: 1.5vh; font-weight: 600;
    color: #777; letter-spacing: 0.02em;
    margin-top: 0.4vh;
  }

  /* Funnel artwork fills the stage; it maps 1:1 to the 9/16 box so the
     viewBox coords line up with the fractional dot positions in JS. */
  .funnel { position: absolute; inset: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; }

  /* The dots (parts falling in, and the blue 5 coming out) live here. */
  .dots { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
  .dot {
    position: absolute;
    border-radius: 50%;
    border: 2px solid #000;
    box-sizing: border-box;
    transition: transform 0.8s cubic-bezier(.45,.05,.55,.95),
                background-color 0.6s ease, opacity 0.5s ease;
    will-change: transform, opacity;
  }
  .dot.ring { background: transparent !important; border: 3px solid #9aa0a6; }
  @keyframes pop {
    0%   { transform: scale(0.1); opacity: 0; }
    65%  { transform: scale(1.18); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .dot.pop { animation: pop 0.45s ease both; }

  /* Bottom bar: equation, progress pips, NEXT. */
  .bottombar {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    padding-bottom: 2.4vh;
    z-index: 10;
  }
  .equation {
    font-size: 5vh; font-weight: 800; letter-spacing: 0.02em;
    pointer-events: none;
    display: flex; align-items: baseline; gap: 1.1vh;
    margin-bottom: 1.4vh; min-height: 6vh;
  }
  .equation .total.hidden { visibility: hidden; }
  .progress { display: flex; gap: 1.1vh; margin-bottom: 1.6vh; pointer-events: none; }
  .pip { width: 1.4vh; height: 1.4vh; border-radius: 50%; background: #ddd;
         transition: background .2s ease, transform .2s ease; }
  .pip.on { background: #0066ff; transform: scale(1.25); }
  .next-btn {
    background: #0066ff; color: #fff; border: none; border-radius: 999px;
    font-family: inherit; font-weight: 800; font-size: 2.4vh; letter-spacing: 0.05em;
    padding: 1.5vh 4vh; cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,102,255,0.4); touch-action: manipulation;
  }
  @keyframes nextPulse {
    0%,100% { box-shadow: 0 6px 16px rgba(0,102,255,0.4); transform: scale(1); }
    50%     { box-shadow: 0 0 0 10px rgba(255,212,0,0.55), 0 6px 16px rgba(0,102,255,0.4);
              transform: scale(1.07); }
  }
  .next-btn.nudge { animation: nextPulse 1.2s ease-in-out infinite; }

  .overlay {
    position: absolute; inset: 0; background: rgba(255,255,255,0.94);
    display: flex; align-items: center; justify-content: center; z-index: 60;
  }
  .overlay.hidden { display: none; }
  .play-btn {
    background: #0066ff; color: #fff; border: none; border-radius: 999px;
    font-family: inherit; font-weight: 800; font-size: 3.2vh; letter-spacing: 0.08em;
    padding: 2vh 5vh; cursor: pointer; box-shadow: 0 10px 28px rgba(0,102,255,0.45);
  }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="title">Partitions of 5<span class="sub">The parts fall in and make 5</span></div>

    <!-- Funnel. viewBox is 90x160 = 9:16, so coords map to stage fractions. -->
    <svg class="funnel" viewBox="0 0 90 160" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
      <polygon points="10.8,54.4 79.2,54.4 50.4,80 50.4,89.6 39.6,89.6 39.6,80"
               fill="#eef2f7" stroke="#9aa0a6" stroke-width="1.6" stroke-linejoin="round"/>
      <!-- rim highlight -->
      <line x1="10.8" y1="54.4" x2="79.2" y2="54.4" stroke="#c7d0db" stroke-width="2.4" stroke-linecap="round"/>
    </svg>

    <div class="dots" id="dots"></div>

    <div class="bottombar">
      <div class="equation" id="equation"></div>
      <div class="progress" id="progress"></div>
      <button class="next-btn" id="nextBtn" type="button">NEXT&nbsp;▶</button>
    </div>

    <div class="overlay" id="overlay">
      <button class="play-btn" id="playBtn" type="button">PLAY</button>
    </div>
  </div>

<script>
(function () {
  'use strict';

  // ---- Canonical ColorMyMath number colours (1-5) ----------------------
  var COLOR = { 1: '#e63946', 2: '#ff6200', 3: '#e6c800', 4: '#00a12c', 5: '#0066ff' };
  var ZERO_STROKE = '#9aa0a6';

  // ---- Canonical number-line dot SHAPES, in "dot-diameter" units --------
  // dy negative = up. Each cluster's bottom row sits on the center y.
  var CLUSTERS = {
    1: [ [0, 0] ],
    2: [ [-0.5, 0], [0.5, 0] ],
    3: [ [-0.5, 0], [0.5, 0], [0, -0.87] ],
    4: [ [-0.5, 0], [0.5, 0], [-0.5, -1], [0.5, -1] ],
    5: [ [-1, 0], [0, 0], [1, 0], [-0.5, -0.87], [0.5, -0.87] ]
  };

  // ---- The partitions of 5 ---------------------------------------------
  var PARTITIONS = [ [0,5], [1,4], [2,3], [3,2], [4,1], [5,0] ];

  // ---- DOM --------------------------------------------------------------
  var stage   = document.getElementById('stage');
  var dotsLay = document.getElementById('dots');
  var equation= document.getElementById('equation');
  var progress= document.getElementById('progress');
  var nextBtn = document.getElementById('nextBtn');
  var overlay = document.getElementById('overlay');
  var playBtn = document.getElementById('playBtn');

  var pips = [];
  PARTITIONS.forEach(function () {
    var p = document.createElement('div'); p.className = 'pip';
    progress.appendChild(p); pips.push(p);
  });

  // ---- Geometry (recomputed each step so resizes stay correct) ---------
  function geom() {
    var W = stage.clientWidth, H = stage.clientHeight;
    var dotD = 0.055 * H;
    return {
      W: W, H: H, dotD: dotD, unit: dotD,
      left:   { x: 0.30 * W, y: 0.20 * H },
      right:  { x: 0.70 * W, y: 0.20 * H },
      throat: { x: 0.50 * W, y: 0.50 * H },
      result: { x: 0.50 * W, y: 0.68 * H }
    };
  }

  function makeDot(g, cx, cy, color, isZero) {
    var d = document.createElement('div');
    d.className = 'dot' + (isZero ? ' ring' : '');
    d.style.width = g.dotD + 'px';
    d.style.height = g.dotD + 'px';
    d.style.left = (cx - g.dotD / 2) + 'px';
    d.style.top  = (cy - g.dotD / 2) + 'px';
    if (!isZero) d.style.background = color;
    dotsLay.appendChild(d);
    return d;
  }

  // Build a cluster of `value` dots centred at `center`. Returns the dot
  // elements together with their screen positions (for the fall).
  function buildCluster(g, value, center) {
    var out = [];
    if (value === 0) {
      var ring = makeDot(g, center.x, center.y, null, true);
      out.push({ el: ring, x: center.x, y: center.y, zero: true });
      return out;
    }
    var color = COLOR[value] || '#0066ff';
    CLUSTERS[value].forEach(function (off) {
      var cx = center.x + off[0] * g.unit;
      var cy = center.y + off[1] * g.unit;
      out.push({ el: makeDot(g, cx, cy, color, false), x: cx, y: cy, zero: false });
    });
    return out;
  }

  // The 5 result slots (blue pyramid) in screen coords.
  function resultSlots(g) {
    return CLUSTERS[5].map(function (off) {
      return { x: g.result.x + off[0] * g.unit, y: g.result.y + off[1] * g.unit };
    });
  }

  // ---- Idle: hint then auto-advance ------------------------------------
  var IDLE_HINT_MS = 3500, AUTO_MS = 5200;
  var hintTimer = null, autoTimer = null;
  function clearTimers() {
    if (hintTimer) { clearTimeout(hintTimer); hintTimer = null; }
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
    nextBtn.classList.remove('nudge');
  }
  function armTimers() {
    clearTimers();
    hintTimer = setTimeout(function () { nextBtn.classList.add('nudge'); }, IDLE_HINT_MS);
    autoTimer = setTimeout(advance, AUTO_MS);
  }

  // ---- Equation ---------------------------------------------------------
  function term(n) {
    var s = document.createElement('span');
    s.textContent = String(n);
    s.style.color = (n === 0) ? ZERO_STROKE : (COLOR[n] || '#333');
    return s;
  }
  function glyph(t, color) {
    var s = document.createElement('span');
    s.textContent = t; s.style.color = color || '#333';
    return s;
  }
  function setEquation(a, b, showTotal) {
    equation.innerHTML = '';
    equation.appendChild(term(a));
    equation.appendChild(glyph('+'));
    equation.appendChild(term(b));
    equation.appendChild(glyph('='));
    var tot = glyph('5', COLOR[5]);
    tot.className = 'total' + (showTotal ? '' : ' hidden');
    equation.appendChild(tot);
  }

  // ---- The funnel animation for one partition --------------------------
  var step = 0, started = false, gen = 0;

  function showStep(i, animate) {
    var myGen = ++gen;
    clearTimers();
    dotsLay.innerHTML = '';

    var pair = PARTITIONS[i];
    var a = pair[0], b = pair[1];
    pips.forEach(function (p, idx) { p.classList.toggle('on', idx === i); });

    var g = geom();
    var leftDots  = buildCluster(g, a, g.left);
    var rightDots = buildCluster(g, b, g.right);
    var all = leftDots.concat(rightDots);
    // Exactly 5 coloured dots in every partition (a + b = 5). These are
    // the SAME dots that will travel down and become the blue 5 — nothing
    // is deleted, so nothing visually "disappears" (only the empty 0-ring
    // fades, because it is nothing).
    var colored = all.filter(function (d) { return !d.zero; });
    var rings   = all.filter(function (d) { return d.zero; });

    setEquation(a, b, false);

    if (!animate) {
      // Static preview (behind PLAY): parts sit above the funnel.
      return;
    }

    // 1) The parts FALL and bunch together inside the funnel throat,
    //    staying visible.  The empty ring (a 0-part) fades — it's nothing.
    setTimeout(function () {
      if (myGen !== gen) return;
      colored.forEach(function (d, k) {
        d.el.style.transitionDelay = (k * 0.05) + 's';
        d.el.style.transform =
          'translate(' + (g.throat.x - d.x) + 'px,' + (g.throat.y - d.y) + 'px) scale(0.62)';
      });
      rings.forEach(function (d) {
        d.el.style.transform =
          'translate(' + (g.throat.x - d.x) + 'px,' + (g.throat.y - d.y) + 'px) scale(0.45)';
        d.el.style.opacity = '0';
      });
    }, 700);

    // 2) The bunched dots POUR OUT of the spout, spread into the canonical
    //    5-pyramid, and turn blue — they ARE the 5.
    setTimeout(function () {
      if (myGen !== gen) return;
      var slots = resultSlots(g);
      colored.forEach(function (d, k) {
        var s = slots[k];
        d.el.style.transitionDelay = (k * 0.06) + 's';
        d.el.style.transform = 'translate(' + (s.x - d.x) + 'px,' + (s.y - d.y) + 'px)';
        d.el.style.background = COLOR[5];
      });
      setEquation(a, b, true);
      armTimers();
    }, 1500);
  }

  function advance() {
    step = (step + 1) % PARTITIONS.length;
    showStep(step, true);
  }

  // ---- Input ------------------------------------------------------------
  function handleTap(e) {
    if (!started) return;
    if (e) e.preventDefault();
    advance();
  }
  nextBtn.addEventListener('click', function (e) { e.stopPropagation(); handleTap(e); });
  stage.addEventListener('click', function (e) {
    if (e.target === nextBtn || e.target === playBtn) return;
    handleTap(e);
  });

  function start() {
    overlay.classList.add('hidden');
    started = true; step = 0;
    showStep(step, true);
  }
  playBtn.addEventListener('click', function (e) { e.stopPropagation(); start(); });

  // Static preview behind the PLAY overlay.
  showStep(0, false);
})();
</script>
</body>
</html>
