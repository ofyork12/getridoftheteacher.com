<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0d1b2e">
<title>About Time — ColorMyMath Clock</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="About Time">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-192.png">
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0b1422; color:#eaf1fb; height:100%;}
  #c{position:fixed; inset:0; width:100%; height:100%; display:block; touch-action:none;}
  .exit{position:fixed; top:calc(10px + env(safe-area-inset-top)); left:12px; z-index:5;
    color:#9bb0cc; text-decoration:none; font-size:14px; font-weight:600; border:1px solid #2b466e;
    padding:7px 12px; border-radius:999px; background:rgba(13,27,46,.55);}
  .exit:hover{background:#15294a; color:#fff;}
  .knobs{position:fixed; left:0; right:0; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:5;
    display:none; align-items:center; justify-content:center; gap:14px;}
  .knobs.show{display:flex;}
  .knob{border:none; background:none; padding:0; cursor:pointer; transition:transform .06s;}
  .knob:active{transform:scale(.9);}
  .knob img{height:46px; width:auto; display:block; border-radius:10px; box-shadow:0 4px 14px rgba(0,0,0,.4);}
  .knob.active img{outline:3px solid #f0b32a; outline-offset:1px;}
  .tip{position:fixed; left:0; right:0; top:calc(12px + env(safe-area-inset-top)); z-index:4; text-align:center;
    font-size:12px; color:#6f86a8; pointer-events:none;}
</style>
</head>
<body>
  <a class="exit" href="../games.html">← Games</a>
  <div class="tip">Tap to drop the time · tilt to tumble · press &amp; hold for buttons</div>
  <canvas id="c"></canvas>
  <div class="knobs">
    <button class="knob" id="btnFreeze" title="Freeze / let it move"><img src="gfx/device_frozen_time.png" alt="Freeze"></button>
    <button class="knob" id="btnSlow"  title="Lighter / less bouncy"><img src="gfx/device_frozen_time_slow.png" alt="Slower"></button>
    <button class="knob" id="btnReset" title="Reset"><img src="gfx/device_frozen_reset.png" alt="Reset"></button>
    <button class="knob" id="btnFast"  title="Heavier / more bouncy"><img src="gfx/device_frozen_time_fast.png" alt="Faster"></button>
  </div>

<script src="planck.min.js"></script>
<script>
"use strict";
(function(){
  const pl=planck, Vec2=pl.Vec2;
  const WORLD_W=640, WORLD_H=360, PM=32;            // world units (px) and pixels-per-metre (matches AndEngine)
  const m=(v)=>v/PM;                                 // world-px -> metres

  // ----- assets (the original gfx) -----
  const ONES=[null,'a_red','a_orange','a_yellow','a_green','a_blue','a_purple','a_brown','a_pink','a_skyblue'];
  const TENS=['ten_red','ten_orange','ten_yellow','ten_green','ten_blue'];   // 1st..5th ten
  function hourImg(h){ const W=['','a_group_one','a_group_two','a_group_three','a_group_four','a_five_house','a_group_six','a_group_seven','a_group_eight','a_group_nine','a_group_ten','a_group_eleven','a_group_twelve']; return W[h]; }
  // original spawn coordinates (top-left in 640x360 world)
  const npx9=[530,563,596,530,563,596,530,563,596], npy9=[196,196,196,163,163,163,130,130,130];   // ones grid (right)
  const npx10=[296,408,296,408,352], npy10=[164,164,71,71,-22];                                    // ten-triangles (middle)
  const HOURX=8, HOURY=70;                                                                          // hour group (left)

  const IMG={};
  function load(name){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(i); i.src='gfx/'+name+'.png'; IMG[name]=i; }); }
  const needed=new Set(['a_five_house']);
  for(let n=1;n<=9;n++) needed.add(ONES[n]);
  TENS.forEach(t=>needed.add(t));
  for(let h=1;h<=12;h++) needed.add(hourImg(h));

  // ----- physics -----
  let pDensity=4.0, pElasticity=1.0, pFriction=0.0;
  const world=pl.World(Vec2(0, 3.0));                // gravity DOWN (y increases downward)
  const statics=world.createBody();                  // one static body holds all the walls
  function box(cx,cy,w,h){ statics.createFixture(pl.Box(m(w/2),m(h/2),Vec2(m(cx+w/2),m(cy+h/2)),0),{density:1,friction:0,restitution:1}); }
  // walls + the two middle obstacles, exactly as the original
  box(0,357,640,3); box(0,0,640,3); box(0,0,3,360); box(637,0,3,360);
  box(250,140,20,20); box(250,220,20,20);

  // colon dots in the middle are SOLID obstacles too — dots bounce off them
  function pin(cx,cy,r){ statics.createFixture(pl.Circle(m(r), Vec2(m(cx),m(cy))), {density:1,friction:0,restitution:1}); }
  pin(232,150,13); pin(232,210,13);

  let sprites=[];   // {body, img, size, group}
  function clearGroup(g){ for(let i=sprites.length-1;i>=0;i--){ if(sprites[i].group===g){ world.destroyBody(sprites[i].body); sprites.splice(i,1); } } }
  function addSprite(name, x, y, size, shape, group){
    const img=IMG[name]; if(!img) return;
    const fd={density:pDensity, friction:pFriction, restitution:pElasticity};
    const b=world.createDynamicBody(Vec2(m(x+size/2), m(y+size/2)));
    if(shape==='triangle'){            // real triangle body (apex up, base down) so it bounces as a triangle
      const hw=m(size*0.5), hh=m(size*0.5);
      b.createFixture(pl.Polygon([Vec2(-hw,hh), Vec2(hw,hh), Vec2(0,-hh)]), fd);
    } else {                            // full-size circle so nothing visually overlaps
      b.createFixture(pl.Circle(m(size*0.5)), fd);
    }
    b.setAngularVelocity((Math.random()-0.5)*1.5);
    sprites.push({body:b, img, size, group});
  }

  // ----- build the time as quantities; each group updates on its own (no full reset / repeat) -----
  let simMs=Date.now(), lastH=-1, lastTens=-1, lastOnes=-1, frozen=false;
  function curT(){ const d=new Date(simMs); let h=d.getHours()%12; if(h===0) h=12; return {h, tens:Math.floor(d.getMinutes()/10), ones:d.getMinutes()%10}; }
  function spawnHour(h){ addSprite(hourImg(h), HOURX, HOURY, h>=5?150:110, 'circle', 'hour'); }
  // tens: N ten-triangles, ALL coloured by the tens VALUE (10 red,20 orange,30 yellow,40 green,50 blue)
  function spawnTens(tens){ const name=TENS[Math.max(0,tens-1)]; for(let i=0;i<tens;i++) addSprite(name, npx10[i], npy10[i], 104, 'triangle', 'tens'); }
  // ones: that many single dots, coloured by the ones digit
  function spawnOnes(ones){ for(let i=0;i<ones && i<9;i++) addSprite(ONES[ones], npx9[i], npy9[i], 30, 'circle', 'ones'); }
  function respawnAll(){ const t=curT(); clearGroup('hour'); clearGroup('tens'); clearGroup('ones'); spawnHour(t.h); spawnTens(t.tens); spawnOnes(t.ones); lastH=t.h; lastTens=t.tens; lastOnes=t.ones; }
  // only re-drop the part that actually changed — the rest keeps tumbling
  function checkTime(){ const t=curT();
    if(t.h!==lastH){ clearGroup('hour'); spawnHour(t.h); lastH=t.h; }
    if(t.tens!==lastTens){ clearGroup('tens'); spawnTens(t.tens); lastTens=t.tens; }
    if(t.ones!==lastOnes){ clearGroup('ones'); spawnOnes(t.ones); lastOnes=t.ones; }
  }

  // ----- render -----
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  let CW=0,CH=0,DPR=Math.min(2,window.devicePixelRatio||1), fit=1, offx=0, offy=0;
  function resize(){
    CW=window.innerWidth; CH=window.innerHeight;
    canvas.width=CW*DPR; canvas.height=CH*DPR; canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    fit=Math.min(CW/WORLD_W, CH/WORLD_H);
    offx=(CW-WORLD_W*fit)/2; offy=(CH-WORLD_H*fit)/2;
  }
  window.addEventListener('resize', resize);

  let lastT=performance.now();
  function frame(t){
    const dt=Math.min(0.05,(t-lastT)/1000); lastT=t;
    simMs += dt*1000;
    checkTime();
    if(!frozen) world.step(1/60, 8, 3);   // frozen = static clock, no physics

    ctx.clearRect(0,0,CW,CH);
    // play-field backdrop (the 640x360 wallpaper area)
    ctx.save(); ctx.translate(offx,offy); ctx.scale(fit,fit);
    ctx.fillStyle='#0d1b2e'; ctx.fillRect(0,0,WORLD_W,WORLD_H);
    for(const s of sprites){
      const p=s.body.getPosition(), a=s.body.getAngle();
      const x=p.x*PM, y=p.y*PM;
      const iw=s.img.naturalWidth||s.size, ih=s.img.naturalHeight||s.size;
      const scale=s.size/Math.max(iw,ih), dw=iw*scale, dh=ih*scale;
      ctx.save(); ctx.translate(x,y); ctx.rotate(a);
      ctx.drawImage(s.img, -dw/2, -dh/2, dw, dh);
      ctx.restore();
    }
    // static colon between the hour (left) and the minutes — like a digital clock
    ctx.fillStyle='#e6eefb';
    ctx.beginPath(); ctx.arc(232,150,11,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(232,210,11,0,7); ctx.fill();
    ctx.restore();
    requestAnimationFrame(frame);
  }

  // ----- interaction -----
  // tap = drop the time; press & hold = show the controls (and ask for motion access)
  const knobs=document.querySelector('.knobs');
  let pressTimer=null, longPressed=false, hideTimer=null;
  function showKnobs(){ knobs.classList.add('show'); clearTimeout(hideTimer); hideTimer=setTimeout(()=>knobs.classList.remove('show'), 6000); }
  canvas.addEventListener('pointerdown', ()=>{ longPressed=false; clearTimeout(pressTimer); pressTimer=setTimeout(()=>{ longPressed=true; showKnobs(); enableMotion(); }, 500); });
  canvas.addEventListener('pointerup', ()=>{ clearTimeout(pressTimer); enableMotion(); if(!longPressed && !frozen){ simMs=Date.now(); respawnAll(); } });
  canvas.addEventListener('pointercancel', ()=>{ clearTimeout(pressTimer); });

  // accelerometer: the dots fall the way the phone is actually tilted (real device gravity)
  function onMotion(e){ const a=e.accelerationIncludingGravity; if(!a||a.x==null) return; world.setGravity(Vec2(-a.x, a.y)); }
  let motionOn=false;
  function enableMotion(){
    if(motionOn) return; motionOn=true;
    if(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function'){
      DeviceMotionEvent.requestPermission().then(s=>{ if(s==='granted') window.addEventListener('devicemotion', onMotion); }).catch(()=>{ motionOn=false; });
    } else {
      window.addEventListener('devicemotion', onMotion);
    }
  }
  document.getElementById('btnReset').addEventListener('click', ()=>{ pDensity=4; pElasticity=1; pFriction=0; world.setGravity(Vec2(0,3)); simMs=Date.now(); respawnAll(); });
  document.getElementById('btnSlow').addEventListener('click', ()=>{ pDensity=Math.max(0.25,pDensity-0.75); pElasticity=Math.max(0,pElasticity-0.05); respawnAll(); });
  document.getElementById('btnFast').addEventListener('click', ()=>{ pDensity+=4; pElasticity+=0.06; respawnAll(); });
  document.getElementById('btnFreeze').addEventListener('click', ()=>{
    frozen=!frozen;
    document.getElementById('btnFreeze').classList.toggle('active', frozen);
    if(frozen){ simMs=Date.now(); respawnAll(); }   // snap the numbers to their clean positions and hold
    showKnobs();
  });

  // ----- go -----
  Promise.all([...needed].map(load)).then(()=>{ resize(); respawnAll(); requestAnimationFrame(frame); });

  if('serviceWorker' in navigator){
    let refreshing=false; const had=!!navigator.serviceWorker.controller;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(refreshing||!had) return; refreshing=true; location.reload(); });
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
})();
</script>
</body>
</html>
