<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Squares & Cubes — ColorMyMath</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #000; color: #fff;
      font-family: Arial, sans-serif; padding: 40px 20px 80px;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap { max-width: 1000px; margin: 0 auto; }
    .top-nav { display: flex; justify-content: center; margin-bottom: 24px; }
    .top-nav a {
      padding: 12px 24px; font-size: 16px; font-weight: bold;
      background: transparent; color: #fff; border: 2px solid #fff;
      border-radius: 999px; text-decoration: none; transition: all 0.3s ease;
    }
    .top-nav a:hover { background: #fff; color: #000; }
    h1 {
      text-align: center; font-size: clamp(28px, 5vw, 42px);
      margin: 0 0 8px; letter-spacing: 2px; text-transform: uppercase;
    }
    .sub { text-align: center; color: #aaa; margin: 0 0 36px; font-size: 16px; }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 26px 22px; background: rgba(255,255,255,0.03);
      border: 3px solid #fff; border-radius: 18px; text-decoration: none;
      color: #fff; transition: all 0.25s ease; min-height: 220px; justify-content: center;
    }
    .card:hover { background: #fff; color: #000; transform: translateY(-3px); }
    .card h2 { margin: 0; font-size: 22px; text-align: center; letter-spacing: 1px; }
    .card p { margin: 0; font-size: 14px; text-align: center; opacity: 0.8; line-height: 1.45; }
    .card:hover p { opacity: 1; }

    /* ── flat 2-D square of dots (Squares card icon) ── */
    .sq-stage{display:grid;grid-template-columns:repeat(3,22px);grid-auto-rows:22px;gap:2px}
    .sq-stage span{border-radius:50%;border:2px solid rgba(0,0,0,0.35)}

    /* ── 3-D spinning cube (Cubes card icon) ── */
    .cube-stage{width:90px;height:90px;perspective:220px;flex-shrink:0}
    .cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;
          animation:spin3d 5s linear infinite}
    @keyframes spin3d{from{transform:rotateX(-22deg) rotateY(0deg)} to{transform:rotateX(-22deg) rotateY(360deg)}}
    .face{position:absolute;width:90px;height:90px;border:3px solid rgba(0,0,0,0.35);
          display:flex;align-items:center;justify-content:center;
          font-size:28px;font-weight:bold;color:rgba(0,0,0,0.55);
          font-family:Georgia;border-radius:4px}
    .f-front {background:#44C8F5;transform:translateZ(45px)}
    .f-back  {background:#ED1C24;transform:rotateY(180deg) translateZ(45px)}
    .f-right {background:#5BD11E;transform:rotateY( 90deg) translateZ(45px)}
    .f-left  {background:#F7941D;transform:rotateY(-90deg) translateZ(45px)}
    .f-top   {background:#FFF200;transform:rotateX( 90deg) translateZ(45px)}
    .f-bot   {background:#C724B1;transform:rotateX(-90deg) translateZ(45px)}
    .card:hover .face{border-color:rgba(0,0,0,0.5)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-nav"><a href="index.html">← Back to Home</a> <a href="shop.html" style="margin-left:12px;">🛍️ Shop</a></div>
    <h1>Squares &amp; Cubes</h1>
    <p class="sub">A number as a flat square, or as a cube you can spin.</p>

    <div class="grid">
      <a href="squares-2d.html" class="card">
        <div class="sq-stage">
          <span style="background:#22b14c"></span><span style="background:#22b14c"></span><span style="background:#22b14c"></span>
          <span style="background:#22b14c"></span><span style="background:#22b14c"></span><span style="background:#22b14c"></span>
          <span style="background:#22b14c"></span><span style="background:#22b14c"></span><span style="background:#22b14c"></span>
        </div>
        <h2>Squares</h2>
        <p>See a number as a flat square — 3 × 3 = 9.</p>
      </a>

      <a href="multiplication-cube-2.html" class="card">
        <div class="cube-stage">
          <div class="cube">
            <div class="face f-front">4</div>
            <div class="face f-back">4</div>
            <div class="face f-right">4</div>
            <div class="face f-left">4</div>
            <div class="face f-top">×</div>
            <div class="face f-bot">64</div>
          </div>
        </div>
        <h2>Cubes</h2>
        <p>See a number as a real cube you can spin — 4 × 4 × 4 = 64.</p>
      </a>
    </div>
  </div>
</body>
</html>
