  const BEND_X = 30;
  const BEND_Y = FLOOR_Y;
  const RAMP_TOP_X = -55;
  const RAMP_TOP_Y = 130;

  const CENTER_X = 155;
  const r = DOT_R;
  const d = 2 * r;
  const triH = d * Math.sqrt(3) / 2;

  // Final-5 cluster positions (centered)
  const BL = { x: CENTER_X - d, y: DOT_REST_Y };
  const BC = { x: CENTER_X,     y: DOT_REST_Y };
  const BR = { x: CENTER_X + d, y: DOT_REST_Y };
  const TL = { x: CENTER_X - r, y: DOT_REST_Y - triH };
  const TR = { x: CENTER_X + r, y: DOT_REST_Y - triH };
  const TRI_TOP = { x: (BC.x + BR.x) / 2, y: BC.y - triH };
  const BC_TOP = { x: BC.x, y: BC.y - d };
  const BR_TOP = { x: BR.x, y: BR.y - d };

  // Stairs config — 1 step total. The top platform is short; the dot rolls across
  // it, teeters at the corner, then falls off and bounces on the floor.
  const STAIR_TOP_Y = 80;        // top platform y (one step, raised high)
  // Right edge of the top platform (and x-position of the vertical riser).
  // Moved further left so dots can bounce on the floor between the riser and the
  // cluster, and so dot5's floor path doesn't get within DOT_R of the riser.
  const LAST_STAIR_X = -75;

  function getStairCorners() {
    const stairX = LAST_STAIR_X;
    const y0 = STAIR_TOP_Y;
    return [
      { x: -180, y: y0 },          // off-screen far left, top step continues
      { x: stairX, y: y0 },        // edge of the step (where dot bounces off)
      { x: stairX, y: FLOOR_Y },   // riser drops to floor
      { x: 380, y: FLOOR_Y }       // off-screen right floor
    ];
  }

  function pathFromCorners(corners) {
    return 'M ' + corners.map(c => `${c.x},${c.y}`).join(' L ');
  }

  function stairLandings() {
    // Center of the dot at the moment it teeters on the corner of the platform,
    // about to fall off. Center is directly above the corner — this is the
    // physically correct departure point: with the center above the pivot, the
    // dot is balanced on the corner; gravity then takes over.
    return [
      { x: LAST_STAIR_X, y: STAIR_TOP_Y - DOT_R - 1.25 }
    ];
  }

  let dotsById = {};

  function makeDot(cx, cy, colorName) {
    const c = document.createElementNS(SVG_NS, 'circle');
    c.setAttribute('cx', cx); c.setAttribute('cy', cy); c.setAttribute('r', DOT_R);
    c.setAttribute('fill', COLORS[colorName]);
    c.setAttribute('stroke', '#000'); c.setAttribute('stroke-width', '2');
    return c;
  }

  function clearDots() { dotGroup.innerHTML = ''; dotsById = {}; }

  function addDot(id, cx, cy, colorName) {
    const el = makeDot(cx, cy, colorName);
    dotGroup.appendChild(el);
    dotsById[id] = { el, cx, cy };
    return dotsById[id];
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function setInitialLine() {
    rampPath.setAttribute('d', `M -100,${FLOOR_Y} L 310,${FLOOR_Y}`);
  }

  function animateRampUp(durationMs = 900) {
    return new Promise(resolve => {
      const startY = FLOOR_Y, endY = RAMP_TOP_Y;
      const startTime = performance.now();
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = 1 - Math.pow(1 - t, 3);
        const y = startY + (endY - startY) * e;
        const rampDx = BEND_X - RAMP_TOP_X;
        const rampDy = BEND_Y - y;
        const extendX = RAMP_TOP_X - 80;
        const extendY = y - 80 * (rampDy / rampDx);
        rampPath.setAttribute('d', `M ${extendX},${extendY} L ${RAMP_TOP_X},${y} L ${BEND_X},${BEND_Y} L 310,${BEND_Y}`);
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  // Morph ramp <-> stairs by interpolating between point sets
  function morphPath(fromCorners, toCorners, durationMs) {
    return new Promise(resolve => {
      const startTime = performance.now();
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = 1 - Math.pow(1 - t, 2);
        const interp = fromCorners.map((s, i) => ({
          x: s.x + (toCorners[i].x - s.x) * e,
          y: s.y + (toCorners[i].y - s.y) * e
        }));
        rampPath.setAttribute('d', pathFromCorners(interp));
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  function rampCornersAsEightPoints() {
    // Map the ramp shape into 8 points matching stair corner indices.
    // Points 0-5: collapse the staircase shape onto the ramp diagonal line.
    // Points 6-7: keep the floor segment EXACTLY where it is (so morph doesn't move floor).
    // Stair point 6 is at (stair2X, FLOOR_Y) — where last step meets floor.
    // For the ramp, the equivalent point is (BEND_X, FLOOR_Y) — where ramp meets floor.
    const rY = RAMP_TOP_Y;
    const rampDx = BEND_X - RAMP_TOP_X;
    const rampDy = BEND_Y - rY;
    const extendX = RAMP_TOP_X - 80;
    const extendY = rY - 80 * (rampDy / rampDx);
    function lerpAlongRamp(progress) {
      return {
        x: extendX + progress * (BEND_X - extendX),
        y: extendY + progress * (BEND_Y - extendY)
      };
    }
    return [
      lerpAlongRamp(0),       // 0: off-screen top of ramp
      lerpAlongRamp(0.20),    // 1: along ramp (matches stair "edge of top platform")
      lerpAlongRamp(0.35),    // 2: along ramp (matches stair "drop down 1")
      lerpAlongRamp(0.50),    // 3: along ramp (matches stair "step 1 platform")
      lerpAlongRamp(0.65),    // 4: along ramp (matches stair "drop 2")
      lerpAlongRamp(0.80),    // 5: along ramp (matches stair "step 2 platform")
      { x: LAST_STAIR_X, y: FLOOR_Y },  // 6: matches stair LAST_STAIR_X (so floor stays anchored during morph)
      { x: 310, y: FLOOR_Y }      // 7: off-screen right floor (matches stair end)
    ];
  }

  function morphToStairs(durationMs = 700) {
    return morphPath(rampCornersAsEightPoints(), getStairCorners(), durationMs);
  }
  function morphToRamp(durationMs = 700) {
    return morphPath(getStairCorners(), rampCornersAsEightPoints(), durationMs);
  }

  function smoothRampToFloorPoints(numSamples = 60) {
    const pts = [];
    // Extend the ramp BACKWARD off-screen so dots have visible roll-in distance.
    // We extrapolate the ramp line further up-left by 70 units beyond RAMP_TOP_X.
    const rdx_unit = (BEND_X - RAMP_TOP_X);
    const rdy_unit = (BEND_Y - RAMP_TOP_Y);
    const rLen_full = Math.hypot(rdx_unit, rdy_unit);
    const extension = 70; // units beyond the visible ramp top
    const ux = rdx_unit / rLen_full;
    const uy = rdy_unit / rLen_full;
    const rx1 = RAMP_TOP_X - ux * extension;
    const ry1 = RAMP_TOP_Y - uy * extension;
    const rx2 = BEND_X, ry2 = BEND_Y;
    const rdx = rx2 - rx1, rdy = ry2 - ry1;
    const rLen = Math.hypot(rdx, rdy);
    let pnx = -rdy / rLen, pny = rdx / rLen;
    if (pny > 0) { pnx = -pnx; pny = -pny; }
    const blend = 22;
    const rampPortionEnd = rLen - blend;
    const rampSamples = Math.floor(numSamples * 0.45);
    for (let i = 0; i <= rampSamples; i++) {
      const tDist = (i / rampSamples) * rampPortionEnd;
      const tFrac = tDist / rLen;
      pts.push({
        x: rx1 + rdx * tFrac + pnx * DOT_R,
        y: ry1 + rdy * tFrac + pny * DOT_R
      });
    }
    const tStart = rampPortionEnd / rLen;
    const cStartX = rx1 + rdx * tStart + pnx * DOT_R;
    const cStartY = ry1 + rdy * tStart + pny * DOT_R;
    const cEndX = BEND_X + blend;
    const cEndY = DOT_REST_Y;
    const s = (cEndY - cStartY) * rLen / rdy;
    const ctrlX = cStartX + s * (rdx / rLen);
    const ctrlY = cEndY;
    const curveSamples = Math.floor(numSamples * 0.25);
    for (let i = 1; i <= curveSamples; i++) {
      const t = i / curveSamples;
      const x = (1 - t) * (1 - t) * cStartX + 2 * (1 - t) * t * ctrlX + t * t * cEndX;
      const y = (1 - t) * (1 - t) * cStartY + 2 * (1 - t) * t * ctrlY + t * t * cEndY;
      pts.push({ x, y });
    }
    return pts;
  }

  function animateRollAlong(circle, points, durationMs, easeFn, angleRef) {
    return new Promise(resolve => {
      const segs = []; let total = 0;
      for (let i = 1; i < points.length; i++) {
        const dx = points[i].x - points[i-1].x;
        const dy = points[i].y - points[i-1].y;
        const len = Math.hypot(dx, dy);
        segs.push({ from: points[i-1], to: points[i], len });
        total += len;
      }
      const ease = easeFn || ((t) => t);
      const startTime = performance.now();
      const avgDx = points[points.length-1].x - points[0].x;
      const rotSign = (avgDx < 0) ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        let traveled = e * total;
        let cx = points[points.length-1].x;
        let cy = points[points.length-1].y;
        for (const sg of segs) {
          if (traveled <= sg.len) {
            const frac = traveled / sg.len;
            cx = sg.from.x + (sg.to.x - sg.from.x) * frac;
            cy = sg.from.y + (sg.to.y - sg.from.y) * frac;
            break;
          } else { traveled -= sg.len; }
        }
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const rotations = (e * total) / (2 * Math.PI * DOT_R);
        const angle = startAngle + rotations * 360 * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          const lcx = points[points.length-1].x, lcy = points[points.length-1].y;
          circle.setAttribute('transform', `rotate(${angle}, ${lcx}, ${lcy})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  function animateRollMove(circle, x1, y1, x2, y2, durationMs, easeFn, angleRef) {
    return new Promise(resolve => {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const totalRotation = (dist / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const ease = easeFn || ((t) => t);
      const startTime = performance.now();
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const cx = x1 + (x2 - x1) * e;
        const cy = y1 + (y2 - y1) * e;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * e * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          circle.setAttribute('transform', `rotate(${angle}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  function animateBounceArc(circle, x1, y1, x2, y2, peakLift, durationMs, angleRef) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const totalRotation = (dist / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const cx = x1 + (x2 - x1) * t;
        const arch = -4 * peakLift * (t * t - t);
        const cyBase = y1 + (y2 - y1) * t;
        const cy = cyBase - arch;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          circle.setAttribute('transform', `rotate(${angle}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Fall off an edge with realistic physics: horizontal velocity carries the dot
  // forward (linear x, like rolling momentum), while gravity pulls it down (y = t^2).
  // No upward hop — the dot leaves the edge tangentially and just falls.
  // Used for rolling off the stair edge so the dot doesn't visually "jump up" first.
  function animateFallOff(circle, x1, y1, x2, y2, durationMs, angleRef) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dx = x2 - x1, dy = y2 - y1;
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = dx < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        // Linear x: horizontal momentum from rolling is constant (no drag).
        const cx = x1 + dx * t;
        // Quadratic y: gravity accelerates the dot downward from rest (vertically).
        const cy = y1 + dy * (t * t);
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          circle.setAttribute('transform', `rotate(${startAngle + totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Roll dot along the curved surface of a "pivot" dot.
  // dot's center traces an arc of radius 2*DOT_R around (pivotCx, pivotCy)
  // from startAngle to endAngle (radians; angle measured from positive x-axis).
  // Self-rotation is realistic rolling-without-slipping: as dot revolves around pivot,
  // it also spins by the SAME arc length over its own circumference (so spin rotation
  // through the same angle, but the apparent visual roll picks up an extra 2x because
  // the contact point also moves around the dot — this gives the cog-wheel feel).
  function animateRollAroundPivot(circle, pivotCx, pivotCy, startAngle, endAngle, durationMs, easeFn, angleRef) {
    return new Promise(resolve => {
      const radius = 2 * DOT_R;
      const startTime = performance.now();
      const ease = easeFn || ((t) => t);
      const startSpinAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      // Arc length: radius * |delta|. Spin rotations relative to ground = arcLength / (2π·DOT_R).
      // For rolling around a same-size pivot, the dot makes 2 full self-rotations per full revolution.
      // (Coin rotation paradox: rolling coin makes 2 rotations around an equal coin.)
      const deltaAngle = endAngle - startAngle;
      const totalSpinDeg = (deltaAngle * 2) * (180 / Math.PI);  // 2x: revolution + rotation
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const a = startAngle + deltaAngle * e;
        const cx = pivotCx + radius * Math.cos(a);
        const cy = pivotCy + radius * Math.sin(a);
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const spin = startSpinAngle + totalSpinDeg * e;
        circle.setAttribute('transform', `rotate(${spin}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startSpinAngle + totalSpinDeg) % 360;
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Tip off: dot rotates AND falls in arc when an edge tips out from under it
  function animateTipOff(circle, x1, y1, x2, y2, durationMs = 700) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dx = x2 - x1, dy = y2 - y1;
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360 * 1.5;
      const rotSign = dx < 0 ? -1 : 1;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        // x: ease-out (tips quickly, settles)
        const ex = 1 - Math.pow(1 - t, 1.7);
        // y: gravity acceleration
        const ey = t * t;
        const cx = x1 + dx * ex;
        const cy = y1 + dy * ey;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = totalRotation * ex * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          circle.setAttribute('transform', `rotate(${totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Simple position move (no rotation), used for falling/sliding short distances
  function animateMove(circle, fromX, fromY, toX, toY, durationMs, easeFn) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const ease = easeFn || ((t) => 1 - Math.pow(1 - t, 2));
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        circle.setAttribute('cx', fromX + (toX - fromX) * e);
        circle.setAttribute('cy', fromY + (toY - fromY) * e);
        if (t < 1) requestAnimationFrame(step); else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  function recolorAll(circles, colorName) {
    const fill = COLORS[colorName];
    circles.forEach(c => c.setAttribute('fill', fill));
  }

  // Play an audio element by id. Resets to start so it can be replayed.
  function playAudio(id) {
    const a = document.getElementById(id);
    if (a) {
      try {
        a.pause();
        a.currentTime = 0;
        a.muted = false;
        a.volume = 1.0;
        const p = a.play();
        if (p && p.catch) p.catch((err) => console.log('Audio play failed:', id, err));
      } catch (e) {
        console.log('Audio error:', id, e);
      }
    } else {
      console.log('Audio element not found:', id);
    }
  }

  function popPart(part) {
    part.classList.remove('pop'); void part.offsetWidth; part.classList.add('pop');
  }

  function setEquation(a, op, b, c) {
    eqA.textContent = a; eqOp.textContent = op; eqB.textContent = b;
    eqEq.textContent = (a === '' && b === '') ? '' : '='; eqC.textContent = c;
  }

  function highlightCell(n) {
    document.querySelectorAll('.num-cell').forEach(c => c.classList.remove('active'));
    if (n >= 1 && n <= 5) document.getElementById('cell' + n).classList.add('active');
  }

  // Layouts for the number-line quantity dots. Each cell's SVG is 100x100.
  // qtyR sized so 3 tangent dots span most of the cell width.
  const QTY_R = 15;
  const QTY_CX = 50;
  const QTY_Y_BOT = 85;
  const QTY_D = 2 * QTY_R;
  const QTY_TRI_H = QTY_D * Math.sqrt(3) / 2;
  const NUMBER_LINE_LAYOUTS = {
    1: { color: 'red',    centers: [{x: QTY_CX, y: QTY_Y_BOT}] },
    2: { color: 'orange', centers: [{x: QTY_CX - QTY_R, y: QTY_Y_BOT}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT}] },
    3: { color: 'yellow', centers: [
          {x: QTY_CX - QTY_R, y: QTY_Y_BOT}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT},
          {x: QTY_CX, y: QTY_Y_BOT - QTY_TRI_H}
        ] },
    4: { color: 'green',  centers: [
          {x: QTY_CX - QTY_R, y: QTY_Y_BOT}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT},
          {x: QTY_CX - QTY_R, y: QTY_Y_BOT - QTY_D}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT - QTY_D}
        ] },
    5: { color: 'blue',   centers: [
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT}, {x: QTY_CX, y: QTY_Y_BOT}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT},
          {x: QTY_CX - QTY_R, y: QTY_Y_BOT - QTY_TRI_H}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT - QTY_TRI_H}
        ] }
  };

  // Initialize the number line: clear all quantity cells (numerals stay visible).
  function buildNumberLine() {
    for (let n = 1; n <= 5; n++) {
      const svg = document.getElementById('qty' + n);
      svg.innerHTML = '';
    }
  }

  // Populate cell `n` with its N colored dots, with a pop-in animation.
  // Called at the end of each addition step so the number line builds up over time.
  function populateNumberLineCell(n) {
    const svg = document.getElementById('qty' + n);
    if (!svg) return;
    svg.innerHTML = '';
    const { color, centers } = NUMBER_LINE_LAYOUTS[n];
    centers.forEach((p, i) => {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
      c.setAttribute('r', QTY_R);
      c.setAttribute('fill', COLORS[color]);
      c.setAttribute('stroke', '#000'); c.setAttribute('stroke-width', '2');
      // Pop-in: start scaled to 0, animate to full size with a slight overshoot.
      c.style.transformOrigin = `${p.x}px ${p.y}px`;
      c.style.transformBox = 'fill-box';
      c.style.transform = 'scale(0)';
      c.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)';
      svg.appendChild(c);
      // Stagger each dot's pop slightly for a satisfying cascade
      setTimeout(() => { c.style.transform = 'scale(1)'; }, 30 + i * 70);
    });
  }

  // Roll new dot in along ramp + floor
  // Roll dot in across top step from off-screen, bounce down each step, land on floor at targetX
  async function rollNewDotIn(id, targetX) {
    const landings = stairLandings();
    // Start FAR off-screen left so the dot rolls in across the top step
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, 'red');
    await sleep(150);
    const angleRef = { value: 0 };

    // 1) Roll across top step at constant velocity (linear). No slowing down at
    //    the edge — the dot just rolls off naturally, like dot 4 does.
    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    // 2) Fall off the edge — gravity drop with horizontal momentum. Always use
    //    the minimum riser-clear distance so the fall horizontal velocity stays
    //    constant across all dots (consistent "comes off the step" feel —
    //    same smooth tip-off whether the dot lands close or far).
    const minFallDx = 85;
    const firstBounceX = landings[0].x + minFallDx;
    await animateFallOff(dot.el, landings[0].x, landings[0].y,
                          firstBounceX, DOT_REST_Y, 600, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    // 3) First floor bounce — tall, energetic.
    // 4) Second floor bounce — shorter (energy loss reduces height & duration).
    //
    // Bounce 1 takes 360ms, bounce 2 takes 240ms (ratio 1.5:1 — physics-correct
    // for an inelastic ball). To keep horizontal velocity CONSTANT across both
    // bounces (no speed-up before the dot stops), the distances must match the
    // duration ratio: bounce 1 covers 60% of the remaining distance, bounce 2
    // covers 40%. v_h = same in both segments.
    const totalRemaining = targetX - firstBounceX;
    const secondBounceX = firstBounceX + totalRemaining * 0.6;
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y,
                            secondBounceX, DOT_REST_Y, 360, angleRef, 40);
    dot.cx = secondBounceX; dot.cy = DOT_REST_Y;

    await animateBallistic(dot.el, secondBounceX, DOT_REST_Y,
                            targetX, DOT_REST_Y, 240, angleRef, 18);
    dot.cx = targetX; dot.cy = DOT_REST_Y;

    dot.angleRef = angleRef;
    return dot;
  }

  // BOUNCE down stairs to a final floor X
  // Physics-natural ballistic arc: dot leaves position (x1,y1) with horizontal velocity vx
  // and initial upward velocity vy0 (negative = up). Lands at (x2,y2). Path follows
  // y = y1 + vy0*t + 0.5*g*t^2 with t in [0, totalT]. We set g and find vy0 to land at (x2,y2).
  // Returns a Promise that resolves when animation completes.
  function animateBallistic(circle, x1, y1, x2, y2, totalMs, angleRef, peakOverride) {
    return new Promise(resolve => {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const dropAmount = Math.max(0, y2 - y1);
      const peakLift = (peakOverride !== undefined) ? peakOverride : Math.max(12, dist * 0.18 + dropAmount * 0.3);

      const startTime = performance.now();
      const totalRotation = (Math.abs(x2 - x1) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;

      function step(now) {
        const t = Math.min(1, (now - startTime) / totalMs);
        const cx = x1 + (x2 - x1) * t;
        const linearY = y1 + (y2 - y1) * t;
        const arch = 4 * peakLift * (t - t * t);
        const cy = linearY - arch;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          circle.setAttribute('transform', `rotate(${startAngle + totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Bounce down stairs with NATURAL physics: roll across the top step, fall off the
  // edge to the floor (no upward hop, riser-clear), do one floor bounce, then arc
  // UP onto the cluster apex. The floor bounce gives the visible "bouncing" feel
  // before the dot lands on its final spot.
  // Total: 1 roll + 1 fall + 1 floor bounce + 1 arc up.
  async function bounceDownStairsToTop(id, finalLandX, finalLandY, clusterLeftX) {
    const landings = stairLandings();
    // Tangent-left of the cluster on the floor — where the dot launches its final arc up.
    const launchX = clusterLeftX - 2 * DOT_R;
    // First floor landing: far enough right of the stair edge to clear the riser
    // (see rollNewDotIn for the geometric reasoning).
    const minFallDx = 85;
    const firstBounceX = Math.max(landings[0].x + minFallDx, (landings[0].x + launchX) / 2);

    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, 'red');
    await sleep(150);
    const angleRef = { value: 0 };

    // Roll across top step at constant velocity (linear) — same as dot 4.
    // No slowing or pausing before the edge.
    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    // Fall off the edge to the floor (gravity drop, no upward hop).
    await animateFallOff(dot.el, landings[0].x, landings[0].y,
                          firstBounceX, DOT_REST_Y, 500, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    // ONE physics bounce off the floor that carries the dot directly to the apex.
    // Bigger elasticity: peak sits ~15 px above the natural drop distance, so the
    // arc has a clear tall-bounce shape with a steep descent (no "floating /
    // boosting" feel — the ball naturally has the height it needs from the start).
    const peakLift = Math.max(50, Math.abs(DOT_REST_Y - finalLandY) + 15);
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y,
                            finalLandX, finalLandY, 900, angleRef, peakLift);
    dot.cx = finalLandX; dot.cy = finalLandY;
    dot.angleRef = angleRef;
    return dot;
  }

  const SECONDS_PER_STEP = 4.5;
  const MS = SECONDS_PER_STEP * 1000;

  // STEP 1: dot1 rolls in to BC, plays "one" audio
  async function step1Intro() {
    setEquation('', '', '', '');
    highlightCell(0);
    await rollNewDotIn('d1', BC.x);
    // Dot has landed and stopped — NOW say "one"
    playAudio('audio_one');
    eqA.textContent = '1'; popPart(eqA);
    highlightCell(1);
    populateNumberLineCell(1);
    // rollNewDotIn ≈ 2320ms; trimmed audio 290ms; pad to keep ~MS pacing.
    await sleep(MS - 2320 - 200);
  }

  // STEP 2: dot2 rolls in tangent to dot1, SMALL nudge of both
  async function step2() {
    setEquation('1', '+', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(1);
    // Audio is 3.225s long; "two" word lands at ~2.4s mid-point.
    // Color change at: rollNewDotIn (2320) + nudge (350) = 2670ms.
    // Delay audio so spoken "two" lands on color change: 2670 - 2400 = 270ms delay
    setTimeout(() => playAudio('audio_1plus1'), 270);

    const contactX = BC.x - 2 * DOT_R;
    const dot2 = await rollNewDotIn('d2', contactX);
    const dot1 = dotsById['d1'];

    // Small nudge: just 4 units each
    const NUDGE = 4;
    await Promise.all([
      animateRollMove(dot1.el, BC.x, BC.y, BC.x + NUDGE, BC.y, 350, (t) => 1 - Math.pow(1 - t, 2), { value: 0 }),
      animateRollMove(dot2.el, contactX, DOT_REST_Y, contactX + NUDGE, DOT_REST_Y, 350, (t) => 1 - Math.pow(1 - t, 2), dot2.angleRef)
    ]);
    dot1.cx = BC.x + NUDGE; dot2.cx = contactX + NUDGE;

    recolorAll([dot1.el, dot2.el], 'orange');
    eqC.textContent = '2'; popPart(eqC);
    highlightCell(2);
    populateNumberLineCell(2);

    await sleep(MS - (2320 + 350 + 200));
  }

  // STEP 3: stairs! Dot3 rolls across the top step, falls off, bounces once on
  // the floor, then arcs up onto the apex of the triangle cluster.
  async function step3() {
    setEquation('2', '+', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(2);
    // Audio is 3.125s long; "three" word lands at ~2.3s mid-point.
    // Color change at: 150 + 1100 + 500 + 900 = 2650ms.
    // Delay audio so spoken "three" coincides with color change: 2650 - 2300 = 350ms.
    setTimeout(() => playAudio('audio_2plus1'), 350);

    const dot1 = dotsById['d1'];
    const dot2 = dotsById['d2'];

    // Apex: midpoint between the two existing bottom dots, lifted by triH
    const apexX = (dot1.cx + dot2.cx) / 2;
    const apexY = DOT_REST_Y - triH;

    // Cluster's leftmost bottom dot X (so the bounce launches tangent-left of it)
    const clusterLeftX = Math.min(dot1.cx, dot2.cx);

    // Dot3 rolls across the step, falls off, bounces on floor, then arcs up to apex.
    const dot3 = await bounceDownStairsToTop('d3', apexX, apexY, clusterLeftX);

    recolorAll([dot1.el, dot2.el, dot3.el], 'yellow');
    eqC.textContent = '3'; popPart(eqC);
    highlightCell(3);
    populateNumberLineCell(3);

    // Total: 150 + 1100 + 560 + 380 + 600 = 2790
    await sleep(MS - (2790 + 200));
  }

  // STEP 4: stairs stay. Dot4 rolls across the top step, falls off the edge to
  // the floor (no upward hop, riser-clear), bounces once on the floor, then arcs
  // up onto sqTopLeft (its final 2x2 position). As dot4 lands, dot3 rolls along
  // the curved surface of the bottom-right dot up and over to sqTopRight.
  async function step4() {
    setEquation('3', '+', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(3);
    // Audio "3 plus 1 equals 4" is 3.4s long; "four" word midpoint ~2.3s.
    // Color change at: 150 + 1100 + 500 + 750 = 2500ms (faster physics path).
    // Delay audio: 2500 - 2300 = 200ms
    setTimeout(() => playAudio('audio_3plus1'), 200);

    const dot1 = dotsById['d1'];
    const dot2 = dotsById['d2'];
    const dot3 = dotsById['d3']; // apex of triangle (at TRI_TOP)

    const leftCx = Math.min(dot1.cx, dot2.cx);
    const rightCx = Math.max(dot1.cx, dot2.cx);

    // Final 2x2 square positions
    const sqTopLeft = { x: leftCx, y: DOT_REST_Y - d };
    const sqTopRight = { x: rightCx, y: DOT_REST_Y - d };

    // Floor launch point — tangent-left of the cluster, where dot4 starts its arc up.
    const launchX = leftCx - 2 * DOT_R;

    // Dot4 starts off-screen on the top step.
    const landings = stairLandings();
    // First floor landing: clears the riser (see rollNewDotIn for the geometry).
    const minFallDx = 85;
    const firstBounceX = Math.max(landings[0].x + minFallDx, (landings[0].x + launchX) / 2);

    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot4 = addDot('d4', startX, startY, 'red');
    await sleep(150);
    const angleRef = { value: 0 };

    // Roll across top step (off-screen → directly above the corner)
    await animateRollMove(dot4.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot4.cx = landings[0].x; dot4.cy = landings[0].y;

    // Fall off the edge to the floor (gravity drop, no upward hop, riser-clear)
    await animateFallOff(dot4.el, landings[0].x, landings[0].y,
                          firstBounceX, DOT_REST_Y, 500, angleRef);
    dot4.cx = firstBounceX; dot4.cy = DOT_REST_Y;

    // ONE physics bounce off the floor that carries dot4 directly to sqTopLeft.
    // Peak ~half a dot above the destination — bouncy but not exaggerated.
    const peakLift = Math.max(40, Math.abs(DOT_REST_Y - sqTopLeft.y));
    const dot4Total = 750;
    const dot4FinalArc = animateBallistic(dot4.el, firstBounceX, DOT_REST_Y, sqTopLeft.x, sqTopLeft.y, dot4Total, angleRef, peakLift);

    // Identify which bottom dot is on the right (dot3 will roll along its surface)
    const bottomRightDot = (dot1.cx > dot2.cx) ? dot1 : dot2;

    // dot3 stays at the apex until dot4 is essentially right on top of it (~85%
    // through dot4's arc), then gets KNOCKED aside fast. Like a real collision:
    // contact, then sudden reaction.
    await sleep(640);
    const dot3SpinRef = { value: 0 };
    const dot3Roll = animateRollAroundPivot(
      dot3.el,
      bottomRightDot.cx, bottomRightDot.cy,
      -2 * Math.PI / 3, -Math.PI / 2,
      110,
      (t) => 1 - Math.pow(1 - t, 2),  // ease-out: jolted by impulse, then friction
      dot3SpinRef
    );

    await Promise.all([dot4FinalArc, dot3Roll]);
    dot4.cx = sqTopLeft.x; dot4.cy = sqTopLeft.y;
    dot3.cx = sqTopRight.x; dot3.cy = sqTopRight.y;

    recolorAll([dot1.el, dot2.el, dot3.el, dot4.el], 'green');
    eqC.textContent = '4'; popPart(eqC);
    highlightCell(4);
    populateNumberLineCell(4);

    // Total: 150 + 1100 + 560 + 380 + 600 + 450 = 3240
    await sleep(MS - (3240 + 200));
  }

  // STEP 5: dot5 rolls in across stairs, bumps bottom row, top dots tip off edges
  async function step5() {
    setEquation('4', '+', '1', '?');
    popPart(eqA); popPart(eqOp); popPart(eqB); popPart(eqEq); eqC.textContent = '?';
    highlightCell(4);
    // Audio "4 plus 1 equals 5" is 3.35s long; "five" word midpoint ~2.2s.
    // Color change at: rollNewDotIn (2450) + parallel block (550, max of 300 and 550) = 3000ms.
    // Delay audio: 3000 - 2200 = 800ms
    setTimeout(() => playAudio('audio_4plus1'), 800);

    const dot1 = dotsById['d1'];
    const dot2 = dotsById['d2'];
    const dot3 = dotsById['d3']; // square top-right
    const dot4 = dotsById['d4']; // square top-left

    const leftCx = Math.min(dot1.cx, dot2.cx);
    const rightCx = Math.max(dot1.cx, dot2.cx);

    // Dot5 rolls in along ramp, lands tangent-LEFT of cluster
    const dot5LandX = leftCx - 2 * DOT_R;
    const dot5 = await rollNewDotIn('d5', dot5LandX);

    // CONTACT: bottom row rolls slightly right, top dots tip off the edges
    const NUDGE = 6;
    const newDot5X = dot5LandX + NUDGE;
    const newLeftCx = leftCx + NUDGE;
    const newRightCx = rightCx + NUDGE;

    // Top dots fall sideways-down off the corners into cradles between new bottom positions
    const newTL = { x: (newDot5X + newLeftCx) / 2, y: DOT_REST_Y - triH };
    const newTR = { x: (newLeftCx + newRightCx) / 2, y: DOT_REST_Y - triH };

    // Identify which top dot is on the left and which is on the right
    const topLeftDot = (dot4.cx < dot3.cx) ? dot4 : dot3;
    const topRightDot = (dot4.cx < dot3.cx) ? dot3 : dot4;

    // The moment dot5 contacts the bottom row, EVERYTHING starts moving at the
    // same time: the bottom 2 dots get nudged right (becoming a row of 3 with
    // dot5), and the top 2 dots simultaneously fall into the cradles between
    // them. Same instant, no asynchronous delay.
    await Promise.all([
      animateRollMove(dot5.el, dot5LandX, DOT_REST_Y, newDot5X, DOT_REST_Y, 300, (t) => 1 - Math.pow(1 - t, 2), dot5.angleRef),
      animateRollMove(dot1.el, dot1.cx, dot1.cy, dot1.cx + NUDGE, dot1.cy, 300, (t) => 1 - Math.pow(1 - t, 2), { value: 0 }),
      animateRollMove(dot2.el, dot2.cx, dot2.cy, dot2.cx + NUDGE, dot2.cy, 300, (t) => 1 - Math.pow(1 - t, 2), { value: 0 }),
      animateTipOff(topLeftDot.el, topLeftDot.cx, topLeftDot.cy, newTL.x, newTL.y, 550),
      animateTipOff(topRightDot.el, topRightDot.cx, topRightDot.cy, newTR.x, newTR.y, 550)
    ]);

    // Update tracked positions
    dot5.cx = newDot5X;
    dot1.cx = dot1.cx + NUDGE;
    dot2.cx = dot2.cx + NUDGE;
    topLeftDot.cx = newTL.x; topLeftDot.cy = newTL.y;
    topRightDot.cx = newTR.x; topRightDot.cy = newTR.y;

    recolorAll([dot1.el, dot2.el, dot3.el, dot4.el, dot5.el], 'blue');
    eqC.textContent = '5'; popPart(eqC);
    highlightCell(5);
    populateNumberLineCell(5);

    // Total: 2450 (rollNewDotIn) + 550 (parallel impact + top fall) = 3000
    await sleep(MS - (3000 + 200));
  }

  let playing = false;

  function setInitialStairs() {
    rampPath.setAttribute('d', pathFromCorners(getStairCorners()));
  }

  async function play() {
    if (playing) return;
    playing = true;
    try {
      buildNumberLine();
      clearDots();
      setEquation('', '', '', '');
      highlightCell(0);
      setInitialStairs();
      await sleep(500);
      await step1Intro();
      await step2();
      await step3();
      await step4();
      await step5();
    } catch (err) {
      console.error('ERROR:', err);
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);background:red;color:white;padding:20px;z-index:9999;max-width:90%;';
      errDiv.textContent = 'ERROR: ' + err.message;
      document.body.appendChild(errDiv);
    }
    playing = false;
  }

  function restart() { location.reload(); }

  // Unlock audio on first user interaction (silent priming for ALL audio elements except 'one')
  let audioUnlocked = false;
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    // Silent prime the OTHER audio elements (so they're allowed to play later)
    // Don't touch audio_one — we'll play it normally for full volume
    ['audio_1plus1', 'audio_2plus1', 'audio_3plus1', 'audio_4plus1'].forEach(id => {
      const a = document.getElementById(id);
      if (a) {
        a.muted = true;
        const p = a.play();
        if (p && p.then) {
          p.then(() => {
            a.pause();
            a.currentTime = 0;
            a.muted = false;
          }).catch(() => { a.muted = false; });
        }
      }
    });
  }
  document.addEventListener('click', unlockAudio, { once: false });
  document.addEventListener('touchstart', unlockAudio, { once: false });
  document.addEventListener('keydown', unlockAudio, { once: false });

  window.addEventListener('load', () => {
    buildNumberLine();
    setInitialStairs();
    // Auto-play on first user click anywhere (lets the page work standalone in
    // a browser; the render script triggers play() directly via evaluate()).
    const startOnClick = () => {
      document.removeEventListener('click', startOnClick);
      ['audio_one', 'audio_1plus1', 'audio_2plus1', 'audio_3plus1', 'audio_4plus1'].forEach(id => {
        const a = document.getElementById(id);
        if (a) {
          a.muted = true;
          a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; }).catch(() => { a.muted = false; });
        }
      });
      setTimeout(play, 100);
    };
    document.addEventListener('click', startOnClick);
  });
</script>
