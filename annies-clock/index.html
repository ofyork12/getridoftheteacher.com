<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Quantitative Clock — ColorMyMath</title>
<style>
  html,body{margin:0;height:100%;background:#222;overflow:hidden;font-family:Georgia,'Times New Roman',serif;touch-action:manipulation}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{height:100%;max-width:100%;background:#fff;display:block;box-shadow:0 0 40px #000a}
</style></head>
<body><div id="wrap"><canvas id="c" width="1080" height="1920"></canvas></div>
<script>
const COLOR={1:'#FF7FD4',2:'#0F8A2E',3:'#ED1C24',4:'#44C8F5',5:'#5BD11E',6:'#2E3192',7:'#F7941D',8:'#FFF200',9:'#C724B1',
 0:'#FF7FD4'};
const SQ3=Math.sqrt(3);
// ONES = dot pip-pattern for the ones digit (canonical ColorMyMath renderer)
const ONES={1:[[0,0]],2:[[-1,0],[1,0]],3:[[-1,0],[1,0],[0,-SQ3]],
 4:[[-1,0],[1,0],[-1,-2],[1,-2]],
 5:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3]],
 6:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3],[0,-2*SQ3]],
 7:[[0,-SQ3],[-1,0],[1,0],[-2,-SQ3],[2,-SQ3],[-1,-2*SQ3],[1,-2*SQ3]],
 8:[[-2,0],[0,0],[2,0],[-2,-2],[2,-2],[-2,-4],[0,-4],[2,-4]],
 9:[[-2,0],[0,0],[2,0],[-2,-2],[0,-2],[2,-2],[-2,-4],[0,-4],[2,-4]]};
// TENS = the ten-triangles arranged in the SHAPE of the tens digit (so 50 stacks like a 5, 90 like a 9)
const TENS={1:[[0,0]],2:[[-.5,0],[.5,0]],3:[[-.5,0],[.5,0],[0,-1]],
 4:[[-.5,0],[.5,0],[-.5,-1],[.5,-1]],5:[[-1,0],[0,0],[1,0],[-.5,-1],[.5,-1]],
 6:[[-1,0],[0,0],[1,0],[-.5,-1],[.5,-1],[0,-2]],
 7:[[-.5,0],[.5,0],[-1,-1],[0,-1],[1,-1],[-.5,-2],[.5,-2]],
 8:[[-1,0],[0,0],[1,0],[-1,-1],[1,-1],[-1,-2],[0,-2],[1,-2]],
 9:[[-1,0],[0,0],[1,0],[-1,-1],[0,-1],[1,-1],[-1,-2],[0,-2],[1,-2]]};
const ctx=document.getElementById('c').getContext('2d');
const sig=new Image(); sig.src='signature.png';

function dot(x,y,r,c){ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle=c;ctx.fill();ctx.lineWidth=Math.max(1,r*.08);ctx.strokeStyle='#161616';ctx.stroke();}
// a small triangle-of-ten with outline (for tens), centre x=cx, bottom on baseY
function ten(cx,baseY,r,c){const RH=SQ3*r,topY=baseY-3*RH,H=4.732*r;
  ctx.beginPath();ctx.moveTo(cx,topY-2*r);ctx.lineTo(cx-H,baseY+r);ctx.lineTo(cx+H,baseY+r);ctx.closePath();
  ctx.lineWidth=Math.max(1.5,r*.12);ctx.strokeStyle='#161616';ctx.stroke();
  for(let row=1;row<=4;row++){const y=baseY-(4-row)*RH,x0=cx-(row-1)*r;for(let j=0;j<row;j++)dot(x0+j*2*r,y,r,c);}}

// build the figure in local coords (baseline y=0, grows up into -y): tens shaped like the
// tens digit, then ones; returns the draw ops + bounding box {a,b,d,e}
function figParts(num,r){
  const t=Math.floor(num/10), o=num%10;
  const RH=SQ3*r, TEN_W=9.4641*r, TEN_H=(3*SQ3+3)*r, H=4.7320508*r;
  const tris=[], dots=[]; let x=0;
  if(t){ const cells=TENS[t]; const minx=Math.min(...cells.map(c=>c[0]));
    const cx0=x+(0-minx)*TEN_W+TEN_W/2;
    for(const[gx,gy]of cells) tris.push([cx0+gx*TEN_W, gy*TEN_H, COLOR[t]]);
    const maxx=Math.max(...cells.map(c=>c[0])); x=cx0+maxx*TEN_W+TEN_W/2; }
  if(o){ const cells=ONES[o]; const minx=Math.min(...cells.map(c=>c[0]));
    const cx0=x+(0-minx+0.62)*r; for(const[gx,gy]of cells) dots.push([cx0+gx*r, gy*r, COLOR[o]]); }
  if(num===0) dots.push([0,0,'#fff']);
  let a=1e9,b=-1e9,d=1e9,e=-1e9;
  for(const[tx,tby]of tris){ a=Math.min(a,tx-H);b=Math.max(b,tx+H);d=Math.min(d,tby-3*RH-2*r);e=Math.max(e,tby+r); }
  for(const[dx,dy]of dots){ a=Math.min(a,dx-r);b=Math.max(b,dx+r);d=Math.min(d,dy-r);e=Math.max(e,dy+r); }
  return {a,b,d,e,tris,dots};
}
// draw the number figure centred exactly on (cx,cy), dot radius r
function figure(num,cx,cy,r){
  const p=figParts(num,r), ox=cx-(p.a+p.b)/2, oy=cy-(p.d+p.e)/2;
  for(const[tx,tby,c]of p.tris) ten(tx+ox, tby+oy, r, c);
  for(const[dx,dy,c]of p.dots) dot(dx+ox, dy+oy, r, c);
}
// figure width/height in px for a given dot radius r
function figSize(num,r){ const p=figParts(num,r); return {w:p.b-p.a, h:p.e-p.d}; }
// draw centred, shrinking r until it fits maxW x maxH (capped at capR)
function figFit(num,cx,cy,maxW,maxH,capR){
  let r=capR; while(r>4){ const s=figSize(num,r); if(s.w<=maxW && s.h<=maxH) break; r-=1; }
  figure(num,cx,cy,r);
}

function hand(cx,cy,angle,len,wide,color){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  ctx.beginPath();ctx.moveTo(0,wide);ctx.lineTo(0,-len);ctx.lineWidth=wide;ctx.lineCap='round';ctx.strokeStyle=color;ctx.stroke();
  ctx.restore();
}

function draw(){
  const W=1080,H=1920; ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  // header
  ctx.fillStyle='#111';ctx.textAlign='center';ctx.font='bold 76px Georgia';ctx.fillText("Annie's Clock",540,116);
  ctx.fillStyle='#888';ctx.font='italic 32px Georgia';ctx.fillText('count the dots to tell the time',540,162);
  if(sig.complete&&sig.naturalWidth) ctx.drawImage(sig,470,1820,140,74);

  const now=new Date();
  const h=now.getHours(), m=now.getMinutes(), s=now.getSeconds();
  const h12=((h%12)===0?12:(h%12));

  // ---- analog clock face ----
  const cx=540, cy=720, R=440;
  ctx.beginPath();ctx.arc(cx,cy,R,0,7);ctx.lineWidth=8;ctx.strokeStyle='#222';ctx.stroke();
  // hour positions: show each hour 1..12 as a dot-figure
  for(let n=1;n<=12;n++){
    const a=(n/12)*2*Math.PI - Math.PI/2;     // 12 at top
    const px=cx+Math.cos(a)*(R-86), py=cy+Math.sin(a)*(R-86);
    figFit(n,px,py,150,150,13);
  }
  // hands
  const ha=((h12%12)+m/60)/12*2*Math.PI;
  const ma=(m+s/60)/60*2*Math.PI;
  const sa=s/60*2*Math.PI;
  hand(cx,cy,ha,R*0.5,16,'#111');
  hand(cx,cy,ma,R*0.72,10,'#111');
  hand(cx,cy,sa,R*0.8,4,'#ED1C24');
  ctx.beginPath();ctx.arc(cx,cy,16,0,7);ctx.fillStyle='#111';ctx.fill();

  // ---- quantitative readout: HOUR  :  MINUTES ----
  ctx.fillStyle='#111';ctx.font='bold 40px Georgia';ctx.textAlign='center';
  ctx.fillText('hour',330,1280); ctx.fillText('minutes',760,1280);
  figFit(h12,330,1460,300,260,46);
  ctx.fillStyle='#111';ctx.font='bold 120px Georgia';ctx.fillText(':',545,1490);
  figFit(m,770,1460,360,260,40);
  // digital time small
  ctx.fillStyle='#444';ctx.font='40px Georgia';
  ctx.fillText(h12+':'+String(m).padStart(2,'0'),540,1700);
}
draw(); setInterval(draw,1000); sig.onload=draw;
</script></body></html>
