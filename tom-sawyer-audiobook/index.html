<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16243f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tom Sawyer">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>The Adventures of Tom Sawyer — Audiobook</title>
<style>
  :root{
    --navy:#16243f; --navy2:#0f1a2e; --gold:#d8b25a; --gold-soft:#e7cf95;
    --ink:#ede6d3; --muted:#9fb0c8; --red:#e0524a; --line:rgba(216,178,90,.25);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:radial-gradient(120% 100% at 50% 0%, #1d3157 0%, var(--navy) 45%, var(--navy2) 100%);
    color:var(--ink);
    display:flex; flex-direction:column; min-height:100%;
    padding-top:env(safe-area-inset-top);
  }
  /* ---------- Splash ---------- */
  #splash{
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:radial-gradient(120% 100% at 50% 0%, #1d3157 0%, var(--navy) 60%, var(--navy2) 100%);
    transition:opacity .6s ease; text-align:center; padding:24px;
  }
  #splash.hide{opacity:0; pointer-events:none;}
  #splash img{width:210px; max-width:62vw; border-radius:6px;
    box-shadow:0 18px 50px rgba(0,0,0,.55); border:1px solid var(--line);}
  #splash .tap{color:var(--gold-soft); font-size:15px; letter-spacing:.12em;
    text-transform:uppercase; opacity:.85; animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

  /* ---------- Header ---------- */
  header{padding:18px 20px 8px; text-align:center; border-bottom:1px solid var(--line);}
  header h1{margin:0; font-size:21px; color:var(--gold); letter-spacing:.04em;
    text-shadow:0 1px 0 rgba(0,0,0,.4);}
  header .by{margin:3px 0 0; font-size:13px; color:var(--muted); font-style:italic;}
  #quote{margin:12px auto 2px; max-width:560px; font-size:14px; font-style:italic;
    color:var(--gold-soft); min-height:34px; line-height:1.4; padding:0 6px;}

  /* ---------- Chapter list ---------- */
  main{flex:1; overflow-y:auto; padding:10px 14px 190px; -webkit-overflow-scrolling:touch;}
  .chapters{max-width:620px; margin:0 auto; display:flex; flex-direction:column; gap:8px;}
  .chap{
    display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    border:1px solid var(--line); color:var(--ink);
    border-radius:12px; padding:14px 16px; font-family:inherit; font-size:16px;
    cursor:pointer; transition:transform .08s, border-color .2s, background .2s;
  }
  .chap:active{transform:scale(.985);}
  .chap .nbox{
    flex:0 0 42px; height:42px; border-radius:9px; display:flex; align-items:center;
    justify-content:center; font-size:15px; font-weight:bold;
    background:rgba(216,178,90,.13); color:var(--gold); border:1px solid var(--line);
  }
  .chap .ctitle{flex:1;}
  .chap .play-ic{flex:0 0 auto; color:var(--muted); font-size:18px;}
  .chap.active{border-color:var(--gold); background:rgba(216,178,90,.12);}
  .chap.active .ctitle{color:var(--gold-soft);}
  .chap.active .nbox{background:var(--gold); color:var(--navy2);}
  .chap.active .play-ic{color:var(--gold);}

  /* ---------- Player bar ---------- */
  #player{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:linear-gradient(180deg, rgba(15,26,46,.92), rgba(15,26,46,.99));
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-top:1px solid var(--line); padding:12px 16px;
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 30px rgba(0,0,0,.4);
  }
  #player .wrap{max-width:620px; margin:0 auto;}
  #nowPlaying{font-size:14px; color:var(--gold-soft); text-align:center;
    margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  #nowPlaying.err{color:var(--red); cursor:pointer; text-decoration:underline; white-space:normal;}
  .seekrow{display:flex; align-items:center; gap:10px;}
  .seekrow time{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:42px;}
  .seekrow time:last-child{text-align:right;}
  input[type=range]{
    -webkit-appearance:none; appearance:none; flex:1; height:5px; border-radius:5px;
    background:rgba(255,255,255,.18); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; appearance:none;
    width:17px; height:17px; border-radius:50%; background:var(--gold);
    border:2px solid #fff3; box-shadow:0 2px 6px rgba(0,0,0,.5); cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:17px; height:17px; border-radius:50%;
    background:var(--gold); border:2px solid #fff3; cursor:pointer;}
  .controls{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:12px;}
  .ctrl{
    background:rgba(255,255,255,.06); border:1px solid var(--line); color:var(--ink);
    border-radius:11px; padding:9px 12px; font-family:inherit; font-size:13px;
    cursor:pointer; min-width:60px; transition:background .15s, transform .08s;
  }
  .ctrl:active{transform:scale(.93); background:rgba(216,178,90,.18);}
  .ctrl small{display:block; font-size:10px; color:var(--muted); letter-spacing:.05em;}
  #btnPlay{
    background:var(--gold); color:var(--navy2); border:none; font-weight:bold;
    width:64px; height:64px; border-radius:50%; font-size:26px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(216,178,90,.4); transition:transform .08s;
  }
  #btnPlay:active{transform:scale(.92);}
  #spinner{display:none; width:22px; height:22px; border:3px solid rgba(22,36,63,.3);
    border-top-color:var(--navy2); border-radius:50%; animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #player.loading #spinner{display:block;}
  #player.loading #playGlyph{display:none;}

  footer{text-align:center; font-size:11px; color:var(--muted); padding:14px 16px 4px; opacity:.8;}
  footer a{color:var(--gold-soft);}

  /* ---------- Resume banner ---------- */
  #resumeBar{max-width:620px; margin:0 auto 14px; display:none;}
  #resumeBar.show{display:block;}
  #resumeBtn{
    width:100%; display:flex; align-items:center; gap:12px; cursor:pointer;
    background:linear-gradient(180deg, rgba(216,178,90,.20), rgba(216,178,90,.10));
    border:1px solid var(--gold); color:var(--gold-soft);
    border-radius:12px; padding:13px 16px; font-family:inherit; font-size:15px; text-align:left;
  }
  #resumeBtn .big{font-size:22px;}
  #resumeBtn b{color:var(--gold);}
  #resumeBtn small{display:block; color:var(--muted); font-size:12px; margin-top:2px;}

  /* ---------- Downloads toolbar ---------- */
  #dlbar{max-width:620px; margin:0 auto 16px; border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; background:rgba(255,255,255,.03);}
  #dlbar .row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .dlbtn{
    background:rgba(216,178,90,.13); border:1px solid var(--line); color:var(--gold-soft);
    border-radius:9px; padding:9px 13px; font-family:inherit; font-size:13px; cursor:pointer;
  }
  .dlbtn:active{transform:scale(.96);}
  .dlbtn.ghost{background:transparent; color:var(--muted);}
  #storeInfo{font-size:12px; color:var(--muted); margin-left:auto;}
  .toggle{display:flex; align-items:center; gap:10px; margin-top:11px;
    font-size:13px; color:var(--ink); cursor:pointer;}
  .toggle input{display:none;}
  .toggle .sw{flex:0 0 auto; width:42px; height:24px; border-radius:999px;
    background:rgba(255,255,255,.18); position:relative; transition:background .2s;}
  .toggle .sw::after{content:""; position:absolute; top:2px; left:2px; width:20px; height:20px;
    border-radius:50%; background:#fff; transition:transform .2s;}
  .toggle input:checked + .sw{background:var(--gold);}
  .toggle input:checked + .sw::after{transform:translateX(18px);}
  .toggle .lbl small{display:block; color:var(--muted); font-size:11px; line-height:1.3;}
  #dlAllProg{height:5px; border-radius:5px; background:rgba(255,255,255,.15);
    margin-top:10px; overflow:hidden; display:none;}
  #dlAllProg.show{display:block;}
  #dlAllProg i{display:block; height:100%; width:0; background:var(--gold); transition:width .2s;}

  /* ---------- Per-chapter download button ---------- */
  .chap .dl{
    flex:0 0 auto; width:38px; height:38px; border-radius:9px; border:1px solid var(--line);
    background:rgba(255,255,255,.04); color:var(--muted); font-size:17px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .chap .dl.saved{color:#6fcf7f; border-color:rgba(111,207,127,.5); background:rgba(111,207,127,.10);}
  .chap .dl.busy{color:var(--gold);}
  .chap .dl .ring{position:absolute; font-size:9px; bottom:-1px; right:-1px;}

  /* ---------- Extra player buttons (Read Along + Speed) ---------- */
  .xrow{display:flex; gap:10px; justify-content:center; margin-top:11px;}
  .xbtn{
    background:rgba(255,255,255,.06); border:1px solid var(--line); color:var(--gold-soft);
    border-radius:11px; padding:8px 14px; font-family:inherit; font-size:13px; cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .xbtn:active{transform:scale(.95);}
  #btnSpeed{min-width:74px; justify-content:center; font-variant-numeric:tabular-nums;}

  /* ---------- Read-Along reader ---------- */
  #reader{
    position:fixed; left:0; right:0; top:0; z-index:40; display:none; flex-direction:column;
    background:linear-gradient(180deg,#1b2c4d,#13203a);
    /* leave room for the player bar at the bottom */
    bottom:166px; padding-top:env(safe-area-inset-top);
  }
  #reader.show{display:flex;}
  #reader .rhead{
    display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--line);
  }
  #reader .rhead .rtitle{flex:1; text-align:center; color:var(--gold); font-size:17px; font-weight:bold;}
  #reader .rnav{
    background:rgba(216,178,90,.13); border:1px solid var(--line); color:var(--gold-soft);
    width:40px; height:40px; border-radius:10px; font-size:18px; cursor:pointer; flex:0 0 auto;
  }
  #reader .rnav:active{transform:scale(.92);}
  #readerText{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:18px 20px 28px; font-size:19px; line-height:1.7; color:var(--ink);
    max-width:720px; margin:0 auto; width:100%;
  }
  #readerText p{margin:0 0 16px;}
  #readerText .w{border-radius:4px; padding:0 1px; cursor:pointer; transition:background .12s,color .12s;}
  #readerText .w.on{background:var(--gold); color:var(--navy2);}
  #readerHint{text-align:center; color:var(--muted); font-size:12px; font-style:italic;
    padding:6px 16px 0;}
</style>
</head>
<body>

  <div id="splash" onclick="dismissSplash()">
    <img src="cover.png" alt="The Adventures of Tom Sawyer">
    <div class="tap">Tap to begin</div>
  </div>

  <header>
    <h1>The Adventures of Tom Sawyer</h1>
    <p class="by">by Mark Twain &middot; read by LibriVox volunteers</p>
    <div id="quote"></div>
  </header>

  <main>
    <div id="resumeBar">
      <button id="resumeBtn" onclick="resumeLast()">
        <span class="big">&#9654;</span>
        <span><b id="resumeLabel">Resume</b><small id="resumeWhere"></small></span>
      </button>
    </div>

    <div id="dlbar">
      <div class="row">
        <button class="dlbtn" id="btnDlAll" onclick="downloadAll()">&#11015; Download whole book</button>
        <button class="dlbtn ghost" id="btnClear" onclick="deleteAll()">Clear downloads</button>
        <span id="storeInfo"></span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="saveSpace" onchange="onSaveSpaceToggle()">
        <span class="sw"></span>
        <span class="lbl">Save space mode
          <small>Auto-download the chapter you're listening to and delete the others as you go.</small>
        </span>
      </label>
      <div id="dlAllProg"><i></i></div>
    </div>

    <div class="chapters" id="chapterList"></div>
    <footer>
      Audio: public-domain LibriVox recording via archive.org.<br>
      Read the text free at <a href="https://www.gutenberg.org/ebooks/74" target="_blank" rel="noopener">Project Gutenberg</a>.
    </footer>
  </main>

  <div id="reader">
    <div class="rhead">
      <button class="rnav" onclick="readerPrev()" title="Previous chapter">&#8249;</button>
      <div class="rtitle" id="readerTitle">Read Along</div>
      <button class="rnav" onclick="readerNext()" title="Next chapter">&#8250;</button>
      <button class="rnav" onclick="closeReader()" title="Close">&#10005;</button>
    </div>
    <div id="readerText"></div>
    <div id="readerHint">Tap any word to jump the narrator there.</div>
  </div>

  <div id="player">
    <div class="wrap">
      <div id="nowPlaying">Choose a chapter to begin</div>
      <div class="seekrow">
        <time id="curTime">0:00</time>
        <input type="range" id="seek" min="0" max="100" value="0" step="1">
        <time id="totTime">0:00</time>
      </div>
      <div class="controls">
        <button class="ctrl" onclick="skip(-120)">&#8722;2<small>MIN</small></button>
        <button class="ctrl" onclick="skip(-10)">&#8722;10<small>SEC</small></button>
        <button id="btnPlay" onclick="togglePlay()"><span id="playGlyph">&#9654;</span><span id="spinner"></span></button>
        <button class="ctrl" onclick="skip(10)">+10<small>SEC</small></button>
        <button class="ctrl" onclick="skip(120)">+2<small>MIN</small></button>
      </div>
      <div class="xrow">
        <button class="xbtn" id="btnReader" onclick="toggleReader()">&#128214; Read Along</button>
        <button class="xbtn" id="btnSpeed" onclick="cycleSpeed()">Speed 1&times;</button>
      </div>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>

<script>
// ---- Audio source + chapter map (faithful to the original 2014 app) ----
const BASE = "https://archive.org/download/tom_sawyer_librivox/";
const FILES = {
  A:"TSawyer_01-02_twain_64kb.mp3",   B:"TSawyer_03-04_twain_64kb.mp3",
  C:"TSawyer_05-06_twain_64kb.mp3",   D:"TSawyer_07-08_twain_64kb.mp3",
  E:"TSawyer_09-10_twain_64kb.mp3",   F:"TSawyer_11-12_twain_64kb.mp3",
  G:"TSawyer_13-14-15_twain_64kb.mp3",H:"TSawyer_16-17_twain_64kb.mp3",
  I:"TSawyer_18-19-20_twain_64kb.mp3",J:"TSawyer_21-22-23_twain_64kb.mp3",
  K:"TSawyer_24-25_twain_64kb.mp3",   L:"TSawyer_26_twain_64kb.mp3",
  M:"TSawyer_27-28_twain_64kb.mp3",   N:"TSawyer_29_twain_64kb.mp3",
  O:"TSawyer_30_twain_64kb.mp3",      P:"TSawyer_31-32_twain_64kb.mp3",
  Q:"TSawyer_33-34-35_twain_64kb.mp3"
};
// {label, file, entry(ms into that file)}  — entry points from the original app
const CHAPTERS = [
  {label:"Dedication & Preface", file:"A", entry:11000},
  {label:"Chapter 1",  file:"A", entry:85500},
  {label:"Chapter 2",  file:"A", entry:894000},
  {label:"Chapter 3",  file:"B", entry:13500},
  {label:"Chapter 4",  file:"B", entry:784000},
  {label:"Chapter 5",  file:"C", entry:13100},
  {label:"Chapter 6",  file:"C", entry:687000},
  {label:"Chapter 7",  file:"D", entry:14500},
  {label:"Chapter 8",  file:"D", entry:657000},
  {label:"Chapter 9",  file:"E", entry:14200},
  {label:"Chapter 10", file:"E", entry:733000},
  {label:"Chapter 11", file:"F", entry:13500},
  {label:"Chapter 12", file:"F", entry:535000},
  {label:"Chapter 13", file:"G", entry:14400},
  {label:"Chapter 14", file:"G", entry:851500},
  {label:"Chapter 15", file:"G", entry:1565000},
  {label:"Chapter 16", file:"H", entry:14400},
  {label:"Chapter 17", file:"H", entry:1081900},
  {label:"Chapter 18", file:"I", entry:14100},
  {label:"Chapter 19", file:"I", entry:957000},
  {label:"Chapter 20", file:"I", entry:1198000},
  {label:"Chapter 21", file:"J", entry:13200},
  {label:"Chapter 22", file:"J", entry:850000},
  {label:"Chapter 23", file:"J", entry:1206000},
  {label:"Chapter 24", file:"K", entry:14500},
  {label:"Chapter 25", file:"K", entry:169000},
  {label:"Chapter 26", file:"L", entry:13200},
  {label:"Chapter 27", file:"M", entry:14300},
  {label:"Chapter 28", file:"M", entry:339500},
  {label:"Chapter 29", file:"N", entry:13000},
  {label:"Chapter 30", file:"O", entry:13600},
  {label:"Chapter 31", file:"P", entry:13500},
  {label:"Chapter 32", file:"P", entry:1052000},
  {label:"Chapter 33", file:"Q", entry:14100},
  {label:"Chapter 34", file:"Q", entry:1096000},
  {label:"Chapter 35", file:"Q", entry:1385000}
];

const QUOTES = [
  "I can live for two months on a good compliment. — Mark Twain",
  "Go to Heaven for the climate, Hell for the company. — Mark Twain",
  "Get your facts first, then you can distort them as you please. — Mark Twain",
  "If you tell the truth, you don't have to remember anything. — Mark Twain",
  "Kindness is the language which the deaf can hear and the blind can see. — Mark Twain",
  "Good friends, good books and a sleepy conscience: this is the ideal life. — Mark Twain",
  "To succeed in life, you need two things: ignorance and confidence. — Mark Twain",
  "A person who won't read has no advantage over one who can't read. — Mark Twain",
  "Courage is resistance to fear, mastery of fear, not absence of fear. — Mark Twain",
  "The secret of getting ahead is getting started. — Mark Twain",
  "My mother had a great deal of trouble with me, but I think she enjoyed it. — Mark Twain",
  "Do the right thing. It will gratify some people and astonish the rest. — Mark Twain",
  "The best way to cheer yourself up is to try to cheer somebody else up. — Mark Twain"
];

const audio   = document.getElementById('audio');
const player  = document.getElementById('player');
const seek    = document.getElementById('seek');
const curTime = document.getElementById('curTime');
const totTime = document.getElementById('totTime');
const nowPlaying = document.getElementById('nowPlaying');
const playGlyph  = document.getElementById('playGlyph');
let currentIndex = -1;
let seeking = false;

// Build chapter list
const list = document.getElementById('chapterList');
CHAPTERS.forEach((c, i) => {
  const row = document.createElement('div');
  row.className = 'chap';
  row.dataset.idx = i;
  row.dataset.file = c.file;
  row.innerHTML = `<span class="nbox">${i===0?'★':i}</span>`
              + `<span class="ctitle">${c.label}</span>`
              + `<button class="dl" title="Save this chapter to your device">&#11015;</button>`;
  row.addEventListener('click', e => { if(e.target.closest('.dl')) return; playChapter(i); });
  row.querySelector('.dl').addEventListener('click', e => { e.stopPropagation(); toggleDownload(c.file); });
  list.appendChild(row);
});

// Random quote, refreshed every 12s
function newQuote(){ document.getElementById('quote').textContent =
  QUOTES[Math.floor(Math.random()*QUOTES.length)]; }
newQuote(); setInterval(newQuote, 12000);

function fmt(sec){
  if(!isFinite(sec)||sec<0) sec=0;
  const m=Math.floor(sec/60), s=Math.floor(sec%60);
  return m+':'+String(s).padStart(2,'0');
}

function playChapter(i, resumeTime){
  const c = CHAPTERS[i];
  const sameFile = currentIndex>=0 && CHAPTERS[currentIndex].file===c.file;
  currentIndex = i;
  highlight(i);
  clearError();
  hideResume();
  nowPlaying.textContent = c.label;

  // Where to start: a saved resume time, or this chapter's entry point.
  const target = (resumeTime != null ? resumeTime : c.entry/1000);
  const seekTo = () => { try{ audio.currentTime = target; }catch(e){} };

  if(sameFile && audio.readyState>0){
    seekTo();
    audio.play().catch(()=>{});
  } else {
    player.classList.add('loading');
    audio.src = srcFor(c.file);   // offline copy if downloaded, else stream
    audio.load();
    // iOS/Safari: play() MUST run inside the tap that triggered this, or the
    // browser blocks audio. So start it now; jump to the chapter once metadata loads.
    audio.play().catch(()=>{});
    audio.addEventListener('loadedmetadata', function once(){
      audio.removeEventListener('loadedmetadata', once);
      seekTo();
      audio.play().catch(()=>{});
    }, {once:true});
  }
  if(saveSpaceOn) manageSpace(c.file);   // auto-download current, delete the rest
  if(readerEl().classList.contains('show')) renderReader();
}

// Play source: a downloaded blob (works offline) if we have it, otherwise stream.
function srcFor(file){ return (downloaded[file] && downloaded[file].url) || (BASE + FILES[file]); }

function clearError(){ nowPlaying.classList.remove('err'); }
function showError(){
  player.classList.remove('loading');
  nowPlaying.classList.add('err');
  nowPlaying.textContent = '⚠ Couldn’t load audio — tap here to try again';
}
// Tap the status line to retry the current chapter
nowPlaying.addEventListener('click', ()=>{ if(nowPlaying.classList.contains('err') && currentIndex>=0) playChapter(currentIndex); });

function highlight(i){
  document.querySelectorAll('.chap').forEach((el,idx)=>
    el.classList.toggle('active', idx===i));
}

function togglePlay(){
  if(currentIndex<0){ playChapter(0); return; }
  if(audio.paused) audio.play(); else audio.pause();
}

function skip(sec){
  if(currentIndex<0) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration||1e9, audio.currentTime+sec));
}

// ---- audio events ----
audio.addEventListener('playing', ()=>{ player.classList.remove('loading'); playGlyph.innerHTML='&#10074;&#10074;'; });
audio.addEventListener('pause',   ()=>{ playGlyph.innerHTML='&#9654;'; });
audio.addEventListener('waiting', ()=>{ player.classList.add('loading'); });
audio.addEventListener('canplay', ()=>{ player.classList.remove('loading'); });
audio.addEventListener('error',   ()=>{
  // Ignore spurious/abort errors (e.g. when switching chapters); only flag real failures.
  const code = audio.error && audio.error.code;
  if(!audio.src || code === 1) return;        // 1 = MEDIA_ERR_ABORTED
  showError();
});
audio.addEventListener('loadedmetadata', ()=>{ seek.max = Math.floor(audio.duration||100); totTime.textContent = fmt(audio.duration); });
audio.addEventListener('timeupdate', ()=>{
  if(seeking) return;
  seek.value = Math.floor(audio.currentTime);
  curTime.textContent = fmt(audio.currentTime);
  if(audio.duration) totTime.textContent = fmt(audio.duration);
});

// ---- seek bar ----
seek.addEventListener('input', ()=>{ seeking=true; curTime.textContent = fmt(seek.value); });
seek.addEventListener('change',()=>{ audio.currentTime = +seek.value; seeking=false; });

// ---- Media Session (lock-screen controls on phones) ----
if('mediaSession' in navigator){
  navigator.mediaSession.setActionHandler('play',  ()=>audio.play());
  navigator.mediaSession.setActionHandler('pause', ()=>audio.pause());
  navigator.mediaSession.setActionHandler('seekbackward', ()=>skip(-10));
  navigator.mediaSession.setActionHandler('seekforward',  ()=>skip(10));
}
audio.addEventListener('playing', ()=>{
  if('mediaSession' in navigator){
    navigator.mediaSession.metadata = new MediaMetadata({
      title: CHAPTERS[currentIndex]?.label || 'Tom Sawyer',
      artist: 'Mark Twain', album: 'The Adventures of Tom Sawyer',
      artwork:[{src:'cover.png', sizes:'240x300', type:'image/png'}]
    });
  }
});

/* =====================================================================
   BOOKMARK — remember where you stopped (survives closing the app or a
   dropped connection). Stored in localStorage as {index, file, time}.
   ===================================================================== */
const POS_KEY = 'tomsawyer.pos';
let lastSave = 0;
function savePos(){
  if(currentIndex < 0 || !isFinite(audio.currentTime)) return;
  try{ localStorage.setItem(POS_KEY, JSON.stringify({
    index: currentIndex, file: CHAPTERS[currentIndex].file,
    time: audio.currentTime, label: CHAPTERS[currentIndex].label
  })); }catch(e){}
}
function loadPos(){ try{ return JSON.parse(localStorage.getItem(POS_KEY)); }catch(e){ return null; } }

// Save often enough to be safe, but not every frame.
audio.addEventListener('timeupdate', ()=>{ const t=Date.now(); if(t-lastSave>4000){ lastSave=t; savePos(); } });
audio.addEventListener('pause', savePos);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) savePos(); });
window.addEventListener('pagehide', savePos);

function showResume(p){
  document.getElementById('resumeLabel').textContent = 'Resume ' + p.label;
  document.getElementById('resumeWhere').textContent = 'You stopped at ' + fmt(p.time);
  document.getElementById('resumeBar').classList.add('show');
}
function hideResume(){ document.getElementById('resumeBar').classList.remove('show'); }
function resumeLast(){ const p = loadPos(); if(p) playChapter(p.index, p.time); }

/* =====================================================================
   DOWNLOADS — store whole MP3 tracks (each holds 2–3 chapters) in
   IndexedDB so they play offline. Object URLs are made once up front so
   playback can start synchronously inside the tap (needed on iPhone).
   ===================================================================== */
const downloaded = {};       // file -> { url, size }
const downloading = {};      // file -> true while in progress
let saveSpaceOn = localStorage.getItem('tomsawyer.savespace') === '1';

let _dbPromise = null;
function idb(){
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((res, rej)=>{
    let settled = false;
    const done = (fn, v) => { if(!settled){ settled = true; fn(v); } };
    const r = indexedDB.open('tomsawyer-audio', 1);
    r.onupgradeneeded = ()=> r.result.createObjectStore('files');
    r.onsuccess = ()=> done(res, r.result);
    r.onerror   = ()=> done(rej, r.error);
    r.onblocked = ()=> done(rej, new Error('idb blocked'));
    setTimeout(()=> done(rej, new Error('idb timeout')), 2500);  // never hang the app
  }).catch(e => { _dbPromise = null; throw e; });   // allow a later retry
  return _dbPromise;
}
function idbDo(mode, fn){
  return idb().then(db => new Promise((res, rej)=>{
    const tx = db.transaction('files', mode);
    const req = fn(tx.objectStore('files'));
    req.onsuccess = ()=> res(req.result);   // undefined when no record (correct)
    req.onerror   = ()=> rej(req.error);
  }));
}
const idbGet  = k => idbDo('readonly',  st => st.get(k));
const idbPut  = (k,v) => idbDo('readwrite', st => st.put(v, k));
const idbDel  = k => idbDo('readwrite', st => st.delete(k));
const idbKeys = () => idbDo('readonly',  st => st.getAllKeys());

async function loadDownloads(){
  let keys = [];
  try{ keys = await idbKeys(); }catch(e){ return; }
  for(const file of keys){
    try{
      const blob = await idbGet(file);
      if(blob){ downloaded[file] = { url: URL.createObjectURL(blob), size: blob.size }; }
    }catch(e){}
  }
  refreshAllDlUI();
}

function uniqueFiles(){ return Array.from(new Set(CHAPTERS.map(c=>c.file))); }
function mb(bytes){ return (bytes/1048576).toFixed(bytes < 10485760 ? 1 : 0) + ' MB'; }

async function download(file){
  if(downloaded[file] || downloading[file]) return;
  downloading[file] = true;
  setDlState(file, 'busy');
  if(navigator.storage && navigator.storage.persist) { try{ navigator.storage.persist(); }catch(e){} }
  try{
    const resp = await fetch(BASE + FILES[file]);
    if(!resp.ok) throw new Error('http '+resp.status);
    const total = +resp.headers.get('content-length') || 0;
    const reader = resp.body.getReader();
    const chunks = []; let got = 0;
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      chunks.push(value); got += value.length;
      if(total) setDlState(file, 'busy', Math.round(got/total*100));
    }
    const blob = new Blob(chunks, {type:'audio/mpeg'});
    await idbPut(file, blob);
    downloaded[file] = { url: URL.createObjectURL(blob), size: blob.size };
  }catch(e){
    setDlState(file, 'idle');
    nowPlaying.classList.add('err');
    nowPlaying.textContent = '⚠ Download failed — check your connection and try again';
  }finally{
    downloading[file] = false;
    refreshAllDlUI(); updateStoreInfo();
  }
}

async function removeFile(file){
  try{ await idbDel(file); }catch(e){}
  if(downloaded[file]){ URL.revokeObjectURL(downloaded[file].url); delete downloaded[file]; }
  refreshAllDlUI(); updateStoreInfo();
}

function toggleDownload(file){
  if(downloading[file]) return;
  if(downloaded[file]) removeFile(file); else download(file);
}

async function downloadAll(){
  const files = uniqueFiles().filter(f=>!downloaded[f]);
  const bar = document.getElementById('dlAllProg');
  bar.classList.add('show');
  for(let i=0;i<files.length;i++){
    await download(files[i]);
    bar.querySelector('i').style.width = Math.round((i+1)/files.length*100) + '%';
  }
  setTimeout(()=>{ bar.classList.remove('show'); bar.querySelector('i').style.width='0'; }, 800);
}

async function deleteAll(){
  for(const f of Object.keys(downloaded)) await removeFile(f);
}

// "Save space": keep ONLY the file you're listening to.
async function manageSpace(currentFile){
  if(!downloaded[currentFile] && !downloading[currentFile]) download(currentFile);
  for(const f of Object.keys(downloaded)){ if(f !== currentFile) removeFile(f); }
}
function onSaveSpaceToggle(){
  saveSpaceOn = document.getElementById('saveSpace').checked;
  localStorage.setItem('tomsawyer.savespace', saveSpaceOn ? '1' : '0');
  document.getElementById('btnDlAll').style.display = saveSpaceOn ? 'none' : '';
  if(saveSpaceOn && currentIndex>=0) manageSpace(CHAPTERS[currentIndex].file);
}

/* ---- Download UI helpers ---- */
function rowsForFile(file){ return list.querySelectorAll('.chap[data-file="'+file+'"] .dl'); }
function setDlState(file, state, pct){
  rowsForFile(file).forEach(btn=>{
    btn.classList.remove('saved','busy');
    if(state==='saved'){ btn.classList.add('saved'); btn.innerHTML='&#10003;'; btn.title='Saved — tap to delete'; }
    else if(state==='busy'){ btn.classList.add('busy'); btn.innerHTML = (pct!=null? '<span class="ring">'+pct+'%</span>&#8230;' : '&#8230;'); btn.title='Downloading…'; }
    else { btn.innerHTML='&#11015;'; btn.title='Save this chapter to your device'; }
  });
}
function refreshAllDlUI(){
  uniqueFiles().forEach(f=> setDlState(f, downloaded[f] ? 'saved' : (downloading[f] ? 'busy' : 'idle')) );
}
function updateStoreInfo(){
  const total = Object.values(downloaded).reduce((s,d)=>s+d.size, 0);
  const n = Object.keys(downloaded).length;
  document.getElementById('storeInfo').textContent = n ? ('Saved on device: ' + mb(total)) : '';
  document.getElementById('btnClear').style.display = n ? '' : 'none';
}

/* ---- Startup ---- */
(async function init(){
  document.getElementById('saveSpace').checked = saveSpaceOn;
  document.getElementById('btnDlAll').style.display = saveSpaceOn ? 'none' : '';
  applyRate();
  await loadDownloads();
  loadText();              // load Gutenberg text (cached for offline)
  updateStoreInfo();
  const p = loadPos();
  if(p && CHAPTERS[p.index]){ highlight(p.index); showResume(p); }
})();

/* =====================================================================
   PLAYBACK SPEED
   ===================================================================== */
const RATES = [0.75, 1, 1.25, 1.5, 2];
let rate = parseFloat(localStorage.getItem('tomsawyer.rate')) || 1;
function applyRate(){
  try{ audio.playbackRate = rate; }catch(e){}
  document.getElementById('btnSpeed').innerHTML = 'Speed ' + rate + '&times;';
}
function cycleSpeed(){
  rate = RATES[(RATES.indexOf(rate) + 1) % RATES.length];
  localStorage.setItem('tomsawyer.rate', rate);
  applyRate();
}
audio.addEventListener('play', applyRate);   // some browsers reset rate on new src

/* =====================================================================
   READ ALONG — Project Gutenberg text (#74), shown per chapter, with a
   follow-along highlight. Text is cached in IndexedDB so it works offline
   once it has been loaded a single time.
   ===================================================================== */
let TEXT = null;
async function loadText(){
  try{ const cached = await idbGet('__text__'); if(cached){ TEXT = cached; return; } }catch(e){}
  try{
    const res = await fetch('text.json');
    if(res.ok){ TEXT = await res.json(); try{ await idbPut('__text__', TEXT); }catch(e){} }
  }catch(e){}
}

let readerWords = [], readerFrac = [], readerChapter = -1, lastWord = -1;
const readerEl = () => document.getElementById('reader');
function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Rough syllable count — a better predictor of speaking time than letter count.
function syllables(w){
  w = w.toLowerCase().replace(/[^a-z]/g, '');
  if(!w) return 1;
  w = w.replace(/e\b/g, '');               // drop common silent trailing e
  const m = w.match(/[aeiouy]+/g);
  return Math.max(1, m ? m.length : 1);
}
// Extra time the reader spends pausing after punctuation.
function tailPause(tok){
  if(/[.!?…][)"'”’\]]*$/.test(tok)) return 6;   // end of sentence
  if(/[,;:][)"'”’\]]*$/.test(tok)) return 2.5;  // clause pause
  if(/[—–-]$/.test(tok)) return 2;              // dash
  return 0;
}

function toggleReader(){ readerEl().classList.contains('show') ? closeReader() : openReader(); }
function openReader(){
  if(currentIndex < 0){ currentIndex = 0; highlight(0); }
  readerEl().classList.add('show');
  readerEl().style.bottom = document.getElementById('player').offsetHeight + 'px';
  renderReader();
}
function closeReader(){ readerEl().classList.remove('show'); }
function readerPrev(){ if(currentIndex > 0) playChapter(currentIndex - 1); }
function readerNext(){ if(currentIndex < CHAPTERS.length - 1) playChapter(currentIndex + 1); }

function renderReader(){
  if(!readerEl().classList.contains('show')) return;
  const i = currentIndex < 0 ? 0 : currentIndex;
  readerChapter = i; lastWord = -1;
  document.getElementById('readerTitle').textContent = CHAPTERS[i].label;
  const cont = document.getElementById('readerText');
  const txt = TEXT && TEXT[i];
  if(!txt){
    cont.innerHTML = '<p style="color:var(--muted)">The text hasn’t loaded yet. Connect to the internet once and reopen — after that it works offline.</p>';
    readerWords = []; readerFrac = []; return;
  }
  const weights = [];
  let html = '', wi = 0;
  const paras = txt.split(/\n\n+/);
  for(const para of paras){
    const words = para.split(/\s+/).filter(Boolean);
    if(!words.length) continue;
    html += '<p>';
    for(let j=0;j<words.length;j++){
      const tok = words[j];
      const shown = tok.replace(/_/g, '');   // Gutenberg uses _word_ for italics
      html += '<span class="w" data-i="'+wi+'">' + escapeHtml(shown) + '</span> ';
      // Estimated speaking time: syllables + pauses at punctuation / paragraph ends.
      let weight = 0.5 + syllables(shown) + tailPause(tok);
      if(j === words.length-1) weight += 5;   // pause at end of paragraph
      weights.push(weight); wi++;
    }
    html += '</p>';
  }
  cont.innerHTML = html;
  readerWords = Array.from(cont.querySelectorAll('.w'));
  const total = weights.reduce((a,b)=>a+b, 0) || 1;
  readerFrac = new Array(weights.length); let acc = 0;
  for(let k=0;k<weights.length;k++){ readerFrac[k] = acc/total; acc += weights[k]; }
  readerWords.forEach((el,k) => el.addEventListener('click', () => jumpToWord(k)));
  cont.scrollTop = 0;
}

// Audio time span [start,end] (seconds) for a chapter inside its shared MP3.
function chapterSpan(i){
  const start = CHAPTERS[i].entry/1000;
  const sameNext = CHAPTERS[i+1] && CHAPTERS[i+1].file === CHAPTERS[i].file;
  let end = sameNext ? CHAPTERS[i+1].entry/1000
          : (isFinite(audio.duration) && audio.duration > start ? audio.duration
             : start + (readerWords.length ? readerWords.length*0.4 : 600));
  if(!(end > start)) end = start + 600;
  return [start, end];
}

// The span actually used for the words: trims the spoken "Chapter N…"
// announcement at the start and a little silence at the end.
function effectiveSpan(i){
  const [s,e] = chapterSpan(i);
  const dur = e - s;
  const lead = i === 0 ? Math.min(2, dur*0.04) : Math.min(7, Math.max(2.5, dur*0.013));
  const tail = Math.min(2, dur*0.01);
  const a = s + lead, b = Math.max(a + 1, e - tail);
  return [a, b];
}

function setWord(k){
  if(k === lastWord) return;
  if(readerWords[lastWord]) readerWords[lastWord].classList.remove('on');
  if(readerWords[k]){ readerWords[k].classList.add('on'); autoScroll(readerWords[k]); }
  lastWord = k;
}
function autoScroll(el){
  const cont = document.getElementById('readerText');
  const top = el.offsetTop, h = cont.clientHeight, st = cont.scrollTop;
  if(top < st + h*0.2 || top > st + h*0.7) cont.scrollTop = top - h*0.4;
}
function jumpToWord(k){
  if(readerChapter !== currentIndex || audio.readyState === 0){ playChapter(readerChapter); }
  const [s,e] = effectiveSpan(readerChapter);
  const t = s + (readerFrac[k] || 0)*(e - s);
  const go = () => { try{ audio.currentTime = t; }catch(_){} audio.play().catch(()=>{}); };
  if(audio.readyState > 0) go();
  else audio.addEventListener('loadedmetadata', function o(){ audio.removeEventListener('loadedmetadata', o); go(); }, {once:true});
  setWord(k);
}

// Follow-along highlight as the narrator reads.
audio.addEventListener('timeupdate', () => {
  if(!readerEl().classList.contains('show') || !readerWords.length) return;
  if(readerChapter !== currentIndex || seeking) return;
  const [s,e] = effectiveSpan(currentIndex);
  let f = (audio.currentTime - s)/(e - s);
  if(!isFinite(f)) return;
  f = Math.max(0, Math.min(0.9999, f));
  let lo = 0, hi = readerFrac.length - 1, ans = 0;
  while(lo <= hi){ const mid = (lo+hi)>>1; if(readerFrac[mid] <= f){ ans = mid; lo = mid+1; } else hi = mid-1; }
  setWord(ans);
});

function dismissSplash(){ document.getElementById('splash').classList.add('hide'); }
setTimeout(dismissSplash, 2600);

// NOTE: No service worker. On iPhone, an installed web app with a service worker
// has a WebKit bug that blocks audio loaded from another site (archive.org).
// The app still installs to the home screen via the manifest + Apple meta tags.
// Clean up any service worker a previous version registered, so old installs self-heal.
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations()
    .then(rs => rs.forEach(r => r.unregister())).catch(()=>{});
}
if(window.caches && caches.keys){
  caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{});
}
</script>
</body>
