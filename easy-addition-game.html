<!DOCTYPE html>
<html lang="en">
<head>
<script src="mute-button.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Easy Addition — Game</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    background: linear-gradient(160deg, #fff7ec 0%, #ffeede 45%, #ffe3f0 100%);
    color: #1c2333;
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  #app { position: absolute; inset: 0; display: flex; flex-direction: column; }

  /* ---------- generic screens ---------- */
  .screen { position: absolute; inset: 0; display: none; flex-direction: column;
            padding: 16px clamp(12px, 4vw, 28px) 18px; }
  .screen.active { display: flex; }

  h1 { text-align: center; margin: 6px 0 2px; font-size: clamp(26px, 7.5vw, 40px);
       letter-spacing: 1px; color: #c2410c; text-shadow: 0 2px 0 #ffd9b3; }
  .tagline { text-align: center; margin: 0 0 14px; color: #7c6a55; font-weight: 600;
             font-size: clamp(13px, 3.6vw, 16px); }

  /* ---------- sound toggle ---------- */
  .sound-row { display: flex; justify-content: center; margin: 0 auto 16px; }
  .sound-btn { border: 0; cursor: pointer; padding: 11px 22px; border-radius: 999px;
               font-weight: 800; font-size: clamp(13px, 3.6vw, 15px);
               background: #fff; color: #8a7a66; box-shadow: 0 4px 14px rgba(0,0,0,.08); }
  .sound-btn.on { background: #f97316; color: #fff; box-shadow: 0 3px 8px rgba(249,115,22,.4); }

  /* ---------- deck menu ---------- */
  .decks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
           overflow-y: auto; padding: 4px 2px 8px; align-content: start; }
  .deck { border: 0; cursor: pointer; border-radius: 20px; padding: 16px 12px 14px;
          color: #fff; text-align: center; box-shadow: 0 6px 0 rgba(0,0,0,.12);
          transition: transform .08s; }
  .deck:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.12); }
  .deck .emoji { font-size: clamp(30px, 9vw, 42px); display: block; line-height: 1; }
  .deck .dname { display: block; font-weight: 800; font-size: clamp(15px, 4.4vw, 18px); margin-top: 8px; }
  .deck .dsub  { display: block; font-weight: 600; font-size: clamp(11px, 3vw, 12px); opacity: .92; margin-top: 2px; }
  .deck.full { grid-column: 1 / -1; }
  .c-add1   { background: linear-gradient(150deg,#fb923c,#ea580c); }
  .c-dbl    { background: linear-gradient(150deg,#f472b6,#db2777); }
  .c-buddy  { background: linear-gradient(150deg,#38bdf8,#0284c7); }
  .c-add234 { background: linear-gradient(150deg,#a78bfa,#7c3aed); }
  .c-shuf   { background: linear-gradient(150deg,#34d399,#059669); }
  .c-check  { background: linear-gradient(150deg,#facc15,#d97706); }

  /* ---------- play header ---------- */
  .play-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .icon-btn { border: 0; background: #fff; color: #c2410c; width: 42px; height: 42px;
              border-radius: 14px; font-size: 20px; cursor: pointer; font-weight: 900;
              box-shadow: 0 3px 8px rgba(0,0,0,.1); flex: none; }
  .deck-title { font-weight: 800; font-size: clamp(14px,4vw,17px); flex: 1; text-align: center;
                color: #5b4a37; }
  .stars-count { font-weight: 800; color: #d97706; font-size: clamp(14px,4vw,17px); flex: none;
                 min-width: 50px; text-align: right; }
  .progress { height: 10px; background: #ffe3c4; border-radius: 999px; overflow: hidden; margin-bottom: 4px; }
  .progress > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg,#fb923c,#f43f8e);
                  border-radius: 999px; transition: width .3s; }

  /* ---------- the math card ---------- */
  .card-area { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }
  .mathcard { background: #fff; border-radius: 26px; box-shadow: 0 12px 30px rgba(0,0,0,.13);
              width: min(86%, 360px); aspect-ratio: 4 / 3; max-height: 100%;
              display: flex; align-items: center; justify-content: center; position: relative; }
  .sum {
    font-family: Georgia, "Times New Roman", serif; color: #111;
    display: grid; grid-template-columns: auto auto;
    column-gap: 14px; row-gap: 2px; align-items: baseline;
    font-size: clamp(54px, 19vw, 96px); line-height: 1.02; font-weight: 500;
  }
  .sum .op   { text-align: left; }
  .sum .num  { text-align: right; min-width: 1.2em; }
  .sum .rule { grid-column: 1 / -1; height: 4px; background: #111; border-radius: 2px;
               margin: 6px 0 4px; }
  .sum .ans  { grid-column: 1 / -1; text-align: right; }
  .sum .blank { display: inline-block; min-width: 0.9em; border-bottom: 4px solid #111;
                text-align: center; color: #16a34a; }
  .sum .reveal { color: #16a34a; }
  .hidden-ans { visibility: hidden; }

  /* feedback flash on card */
  .mathcard.good { animation: pop .4s ease; box-shadow: 0 0 0 6px #34d399, 0 12px 30px rgba(0,0,0,.13); }
  .mathcard.bad  { animation: shake .4s ease; box-shadow: 0 0 0 6px #f87171, 0 12px 30px rgba(0,0,0,.13); }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 75%{transform:translateX(9px)} }

  .prompt { text-align: center; font-weight: 800; color: #8a7a66; min-height: 22px;
            margin: 2px 0 6px; font-size: clamp(13px,3.8vw,16px); }

  /* ---------- number pad ---------- */
  .pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding-top: 4px; }
  .pad button { border: 0; cursor: pointer; padding: 14px 0; border-radius: 16px;
                font-size: clamp(20px, 6vw, 26px); font-weight: 800; color: #c2410c;
                background: #fff; box-shadow: 0 4px 0 #f0c9a6; }
  .pad button:active { transform: translateY(3px); box-shadow: 0 1px 0 #f0c9a6; }
  .pad button.zero { grid-column: span 2; }

  /* ---------- end screen ---------- */
  .end { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
         text-align: center; gap: 6px; }
  .end .big-emoji { font-size: clamp(60px,20vw,96px); }
  .end h2 { margin: 4px 0; color: #c2410c; font-size: clamp(24px,7vw,34px); }
  .end .score { font-size: clamp(18px,5vw,22px); font-weight: 800; color: #5b4a37; }
  .end .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; justify-content: center; }
  .big-btn { border: 0; cursor: pointer; padding: 16px; border-radius: 18px; font-weight: 800;
             font-size: clamp(16px,4.6vw,19px); color: #fff; box-shadow: 0 5px 0 rgba(0,0,0,.14); }
  .big-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.14); }
  .btn-show { background: linear-gradient(150deg,#fb923c,#ea580c); }
  .btn-yes  { background: linear-gradient(150deg,#34d399,#059669); }

  /* confetti */
  #confetti { position: absolute; inset: 0; pointer-events: none; }

  /* flashing star */
  .starflash { position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%);
               font-size: clamp(54px,16vw,90px); opacity: 0; pointer-events: none;
               filter: drop-shadow(0 0 14px rgba(255,210,80,.9)); }
  .starflash.show { animation: starflash .85s ease; }
  @keyframes starflash {
    0%   { opacity:0; transform: translate(-50%,-50%) scale(.4) rotate(-20deg); }
    20%  { opacity:1; transform: translate(-50%,-50%) scale(1.25) rotate(0deg); }
    40%  { opacity:.25; }
    60%  { opacity:1; transform: translate(-50%,-50%) scale(1.05); }
    100% { opacity:0; transform: translate(-50%,-50%) scale(1.15); }
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="confetti"></canvas>

  <!-- ===== MENU ===== -->
  <section id="menu" class="screen active">
    <h1>Easy Addition</h1>
    <p class="tagline">Pick a set, then play!</p>
    <div class="sound-row">
      <button id="soundToggle" class="sound-btn">🔇 Sound off</button>
    </div>
    <div class="decks" id="deckList"></div>
  </section>

  <!-- ===== PLAY ===== -->
  <section id="play" class="screen">
    <div class="play-head">
      <button class="icon-btn" id="backBtn" title="Back">‹</button>
      <div class="deck-title" id="deckTitle">—</div>
      <button class="icon-btn" id="soundBtn" title="Sound">🔇</button>
      <div class="stars-count" id="starCount">⭐0</div>
    </div>
    <div class="progress"><i id="progBar"></i></div>

    <div class="card-area">
      <div class="mathcard" id="mathcard">
        <div class="sum" id="sumBox"></div>
      </div>
    </div>

    <div class="prompt" id="prompt"></div>

    <div class="pad" id="pad"></div>
  </section>

  <!-- ===== END ===== -->
  <section id="end" class="screen">
    <div class="end">
      <div class="big-emoji" id="endEmoji">🎉</div>
      <h2 id="endTitle">Great job!</h2>
      <div class="score" id="endScore"></div>
      <div class="row">
        <button class="big-btn btn-show" id="againBtn" style="padding:14px 22px">Play again 🔁</button>
        <button class="big-btn btn-yes"  id="menuBtn"  style="padding:14px 22px">More sets ➜</button>
      </div>
    </div>
  </section>

  <div class="starflash" id="starFlash">⭐</div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- DATA ----------------
   * type "sum"   : top + bottom, answer = top+bottom
   * type "buddy" : top + ___ = 10, answer = 10 - top  (make-ten partners)
   * Source: Hughes "Easy Addition" flash-card sets. Answers computed (correct).
   */
  function sum(a,b){ return {a:a, b:b, type:'sum'}; }
  function buddy(a){ return {a:a, type:'buddy'}; }

  var SETS = {
    add1:   { name:'Adding 1',  emoji:'➕', cls:'c-add1',
              cards:[sum(1,1),sum(2,1),sum(3,1),sum(4,1),sum(5,1),sum(6,1),sum(7,1),sum(8,1),sum(9,1)] },
    doubles:{ name:'Doubles',   emoji:'👯', cls:'c-dbl',
              cards:[sum(1,1),sum(2,2),sum(3,3),sum(4,4),sum(5,5)] },
    make10: { name:'Make 10 Buddies', emoji:'🤝', cls:'c-buddy',
              cards:[buddy(1),buddy(2),buddy(3),buddy(4),buddy(5),buddy(6),buddy(7),buddy(8),buddy(9)] },
    add234: { name:'Adding 2, 3, 4', emoji:'🧮', cls:'c-add234',
              cards:[sum(3,2),sum(4,2),sum(5,2),sum(6,2),sum(7,2),sum(4,3),sum(5,3),sum(6,3),sum(5,4)] }
  };
  function pool(){
    return SETS.add1.cards.concat(SETS.doubles.cards, SETS.make10.cards, SETS.add234.cards);
  }

  var DECK_ORDER = [
    {key:'add1',    sub:'1+1 … 9+1'},
    {key:'doubles', sub:'2+2 … 5+5'},
    {key:'make10',  sub:'1+__=10'},
    {key:'add234',  sub:'3+2, 4+3 …'},
    {key:'shuffle', sub:'all sets mixed', name:'Mixed Shuffle', emoji:'🔀', cls:'c-shuf', full:false},
    {key:'check',   sub:'the big test!',  name:'Challenge Check', emoji:'🏆', cls:'c-check', full:true}
  ];

  function answerOf(c){ return c.type==='buddy' ? (10 - c.a) : (c.a + c.b); }

  /* ---------------- STATE ---------------- */
  var deck = [];
  var idx = 0;
  var stars = 0;
  var gotRight = 0, total = 0;
  var currentDeckKey = '';
  var locked = false;

  var soundOn = false;
  try { soundOn = (localStorage.getItem('ezadd_sound') === '1'); } catch(e){}

  /* ---------------- AUDIO (off by default, Android-safe) ---------------- */
  var actx = null;
  function audio(){
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(actx && actx.state==='suspended'){ actx.resume(); }
    return actx;
  }
  function tone(freq, start, dur, type, vol){
    if(!soundOn) return;
    var a = audio(); if(!a) return;
    var t = a.currentTime + start;
    var o = a.createOscillator(), g = a.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol||0.25, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t+dur+0.02);
  }
  function sndRight(){ tone(660,0,0.14,'triangle',.3); tone(880,0.10,0.18,'triangle',.3); tone(1320,0.22,0.25,'sine',.25); }
  function sndWrong(){ tone(200,0,0.22,'sine',.25); }
  function sndWin(){ [523,659,784,1046,1318].forEach(function(f,i){ tone(f, i*0.12, 0.3,'triangle',.28); }); }

  /* ---------------- helpers ---------------- */
  function $(id){ return document.getElementById(id); }
  function show(screenId){
    ['menu','play','end'].forEach(function(s){ $(s).classList.toggle('active', s===screenId); });
  }
  function shuffle(arr){
    arr = arr.slice();
    for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=arr[i];arr[i]=arr[j];arr[j]=t; }
    return arr;
  }

  /* ---------------- sound toggle ---------------- */
  function updateSoundUI(){
    var t = $('soundToggle');
    t.textContent = soundOn ? '🔊 Sound on' : '🔇 Sound off';
    t.classList.toggle('on', soundOn);
    $('soundBtn').textContent = soundOn ? '🔊' : '🔇';
  }
  function setSound(on){
    soundOn = on;
    try { localStorage.setItem('ezadd_sound', on ? '1':'0'); } catch(e){}
    updateSoundUI();
    if(on) audio();
  }

  /* ---------------- MENU build ---------------- */
  function buildMenu(){
    var list = $('deckList'); list.innerHTML='';
    DECK_ORDER.forEach(function(d){
      var meta = SETS[d.key] || d;
      var name = d.name || meta.name;
      var emoji = d.emoji || meta.emoji;
      var cls = d.cls || meta.cls;
      var btn = document.createElement('button');
      btn.className = 'deck '+cls+(d.full?' full':'');
      btn.innerHTML = '<span class="emoji">'+emoji+'</span>'+
                      '<span class="dname">'+name+'</span>'+
                      '<span class="dsub">'+d.sub+'</span>';
      btn.addEventListener('click', function(){ if(soundOn) audio(); startDeck(d.key); });
      list.appendChild(btn);
    });
  }

  /* ---------------- start a deck ---------------- */
  function buildDeck(key){
    if(key==='shuffle' || key==='check') return shuffle(pool());
    return shuffle(SETS[key].cards);
  }
  function startDeck(key){
    currentDeckKey = key;
    deck = buildDeck(key);
    idx = 0; stars = 0; gotRight = 0; total = deck.length;
    var meta = SETS[key];
    var dorder = DECK_ORDER.filter(function(d){return d.key===key;})[0];
    $('deckTitle').textContent = (meta ? meta.name : dorder.name);
    show('play');
    renderCard();
  }

  /* ---------------- render the math card ---------------- */
  function cardHTML(c, showAns){
    var ans = answerOf(c);
    if(c.type==='buddy'){
      var blank = showAns
        ? '<span class="reveal">'+ans+'</span>'
        : '<span class="blank">&nbsp;</span>';
      return ''+
        '<span class="op"></span><span class="num">'+c.a+'</span>'+
        '<span class="op">+</span><span class="num">'+blank+'</span>'+
        '<span class="rule"></span>'+
        '<span class="ans">10</span>';
    }
    var ansSpan = showAns
      ? '<span class="ans reveal">'+ans+'</span>'
      : '<span class="ans hidden-ans">'+ans+'</span>';
    return ''+
      '<span class="op"></span><span class="num">'+c.a+'</span>'+
      '<span class="op">+</span><span class="num">'+c.b+'</span>'+
      '<span class="rule"></span>'+
      ansSpan;
  }

  function renderCard(){
    if(idx >= deck.length){ return finish(); }
    locked = false;
    var c = deck[idx];
    $('sumBox').innerHTML = cardHTML(c, false);
    $('mathcard').className = 'mathcard';
    $('progBar').style.width = (idx/deck.length*100)+'%';
    $('starCount').textContent = '⭐'+stars;
    $('prompt').textContent = (c.type==='buddy') ? 'What is the missing buddy?' : 'What is the answer?';
    buildPad();
  }

  /* ---------------- number pad ---------------- */
  function buildPad(){
    var pad = $('pad'); pad.innerHTML='';
    for(var n=0;n<=10;n++){
      (function(n){
        var b=document.createElement('button');
        if(n===0) b.className='zero';
        b.textContent=n;
        b.addEventListener('click', function(){ answer(n, b); });
        pad.appendChild(b);
      })(n);
    }
  }

  function answer(n, btn){
    if(locked) return;
    var c = deck[idx];
    var correct = answerOf(c);
    if(n===correct){
      locked = true;
      gotRight++; stars++;
      $('starCount').textContent='⭐'+stars;
      $('sumBox').innerHTML = cardHTML(c, true);
      $('mathcard').className='mathcard good';
      sndRight();
      starFlash();
      confettiBurst();
      setTimeout(function(){ idx++; renderCard(); }, 1000);
    } else {
      sndWrong();
      var mc=$('mathcard'); mc.className='mathcard'; void mc.offsetWidth; mc.className='mathcard bad';
      $('prompt').textContent = 'Almost! Try again 💪';
      if(btn){ btn.style.opacity=.35; btn.disabled=true; }
    }
  }

  /* ---------------- flashing star ---------------- */
  function starFlash(){
    var s=$('starFlash'); s.classList.remove('show'); void s.offsetWidth; s.classList.add('show');
  }

  /* ---------------- finish ---------------- */
  function finish(){
    $('progBar').style.width='100%';
    show('end');
    var perfect = (gotRight===total);
    $('endEmoji').textContent = perfect ? '🏆' : '🎉';
    $('endTitle').textContent = perfect ? 'Perfect!' : 'Great job!';
    $('endScore').textContent = 'You got '+gotRight+' out of '+total+'  •  ⭐'+stars;
    sndWin();
    if(perfect) confettiBurst(true);
  }

  /* ---------------- confetti ---------------- */
  var cv=$('confetti'), cx=cv.getContext('2d'), parts=[], raf=null;
  function sizeCanvas(){ cv.width=cv.clientWidth; cv.height=cv.clientHeight; }
  window.addEventListener('resize', sizeCanvas);
  function confettiBurst(big){
    sizeCanvas();
    var n = big?120:36, cols=['#f97316','#f43f8e','#0284c7','#16a34a','#facc15','#a78bfa'];
    for(var i=0;i<n;i++){
      parts.push({ x: cv.width*(0.3+0.4*Math.random()), y: cv.height*0.35,
        vx:(Math.random()-0.5)*7, vy:-(4+Math.random()*7),
        g:0.22+Math.random()*0.12, s:5+Math.random()*6,
        c:cols[(Math.random()*cols.length)|0], a:1, rot:Math.random()*6 });
    }
    if(!raf) raf=requestAnimationFrame(tick);
  }
  function tick(){
    cx.clearRect(0,0,cv.width,cv.height);
    for(var i=parts.length-1;i>=0;i--){
      var p=parts[i]; p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.a-=0.012; p.rot+=0.2;
      if(p.a<=0 || p.y>cv.height+20){ parts.splice(i,1); continue; }
      cx.globalAlpha=Math.max(0,p.a); cx.fillStyle=p.c;
      cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
      cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); cx.restore();
    }
    cx.globalAlpha=1;
    if(parts.length){ raf=requestAnimationFrame(tick); } else { raf=null; cx.clearRect(0,0,cv.width,cv.height); }
  }

  /* ---------------- wire up ---------------- */
  $('soundToggle').addEventListener('click', function(){ setSound(!soundOn); });
  $('soundBtn').addEventListener('click', function(){ setSound(!soundOn); });
  $('backBtn').addEventListener('click', function(){ show('menu'); });
  $('againBtn').addEventListener('click', function(){ startDeck(currentDeckKey); });
  $('menuBtn').addEventListener('click', function(){ show('menu'); });

  updateSoundUI();
  buildMenu();
  sizeCanvas();
})();
</script>
</body>
</html>
