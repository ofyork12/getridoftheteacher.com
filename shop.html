<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>ColorMyMath Shop — Find Your Shirt</title>
  <meta name="description" content="Find your ColorMyMath shirt — pick a birthday or special date, or your favorite number, and we'll take you straight to it in the shop.">
  <link rel="canonical" href="https://getridoftheteacher.com/shop.html">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #000; color: #fff;
      font-family: Arial, sans-serif; padding: 48px 20px 70px;
      -webkit-tap-highlight-color: transparent;
      display: flex; flex-direction: column;
    }
    .wrap { width: 100%; max-width: 720px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }
    .brand { text-align: center; font-size: clamp(34px, 7vw, 60px); margin: 0 0 4px; letter-spacing: 3px; text-transform: uppercase; font-weight: 800; }
    .tagline { text-align: center; color: #aaa; font-size: clamp(13px, 2.2vw, 17px); margin: 0 0 40px; letter-spacing: 1px; }
    .card {
      border: 4px solid #fff; border-radius: 22px; padding: 26px 24px; margin: 0 0 22px;
      background: rgba(255,255,255,0.03);
    }
    .card h2 { margin: 0 0 4px; font-size: clamp(20px, 3.4vw, 26px); text-transform: uppercase; letter-spacing: 1.5px; }
    .card .sub { margin: 0 0 18px; color: #bbb; font-size: 14px; }
    .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .fg { flex: 1 1 130px; display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    select, input {
      width: 100%; padding: 12px 12px; font-size: 17px; border-radius: 12px;
      border: 2px solid #555; background: #111; color: #fff;
    }
    select:focus, input:focus { outline: none; border-color: #fff; }
    .go {
      flex: 1 1 100%; margin-top: 6px; padding: 14px; font-size: 17px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.5px; border: none; border-radius: 12px;
      background: #fff; color: #000; cursor: pointer; transition: transform 0.15s ease;
    }
    .go:hover, .go:focus-visible { transform: translateY(-2px); outline: none; }
    .browse { display: block; text-align: center; margin: 6px 0 0; color: #fff; text-decoration: none; font-size: 15px; }
    .browse:hover { text-decoration: underline; }
    .footer-note { text-align: center; margin-top: auto; padding-top: 46px; color: #666; font-size: 13px; letter-spacing: 0.5px; }
    .footer-note a { color: #888; text-decoration: underline; margin: 0 10px; }
    .footer-note a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="brand">Shop</h1>
    <p class="tagline">Pick a date or a number — we'll take you right to it</p>

    <!-- DATE -->
    <div class="card">
      <h2>🎂 A birthday or special date</h2>
      <p class="sub">Every day of the year has its own colorful shirt.</p>
      <div class="row">
        <div class="fg">
          <label for="month">Month</label>
          <select id="month">
            <option value="January">January</option><option value="February">February</option>
            <option value="March">March</option><option value="April">April</option>
            <option value="May">May</option><option value="June">June</option>
            <option value="July">July</option><option value="August">August</option>
            <option value="September">September</option><option value="October">October</option>
            <option value="November">November</option><option value="December">December</option>
          </select>
        </div>
        <div class="fg">
          <label for="day">Day</label>
          <select id="day"></select>
        </div>
        <button class="go" id="goDate">Find my date shirt →</button>
      </div>
    </div>

    <!-- NUMBER -->
    <div class="card">
      <h2>🔢 A favorite number</h2>
      <p class="sub">Pick a number between 1 and 100 — shown as that many colored dots.</p>
      <div class="row">
        <div class="fg">
          <label for="num">Number (1–100)</label>
          <input id="num" type="number" min="1" max="100" step="1" placeholder="e.g. 7">
        </div>
        <button class="go" id="goNum">Find my number tee →</button>
      </div>
    </div>

    <a class="browse" href="https://colormymath.com" target="_blank" rel="noopener">…or browse the whole shop →</a>

    <div class="footer-note">
      <a href="index.html">← Back to the games</a>
    </div>
  </div>

  <script>
    var STORE = 'https://colormymath.com';
    // Fill day options
    var daySel = document.getElementById('day');
    for (var d = 1; d <= 31; d++) {
      var o = document.createElement('option'); o.value = d; o.textContent = d; daySel.appendChild(o);
    }
    function go(url){ window.open(url, '_blank', 'noopener'); }
    document.getElementById('goDate').addEventListener('click', function(){
      var m = document.getElementById('month').value, d = document.getElementById('day').value;
      go(STORE + '/search?q=' + encodeURIComponent(m + ' ' + d));
    });
    document.getElementById('goNum').addEventListener('click', function(){
      var n = parseInt(document.getElementById('num').value, 10);
      if (n >= 1 && n <= 100) {
        // land on the number tees, scrolled to the search for that number
        go(STORE + '/search?q=' + encodeURIComponent('number ' + n) + '&type=product');
      } else {
        go(STORE + '/collections/classroom-number-tees');
      }
    });
    // Enter key on number field
    document.getElementById('num').addEventListener('keydown', function(e){ if (e.key === 'Enter') document.getElementById('goNum').click(); });
  </script>
</body>
</html>
