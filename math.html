<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Math — ColorMyMath</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 32px 20px 80px;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap { max-width: 700px; margin: 0 auto; }
    h1 {
      text-align: center;
      font-size: clamp(28px, 6vw, 44px);
      margin: 0 0 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .sub {
      text-align: center;
      color: #aaa;
      margin: 0 0 28px;
      font-size: 16px;
    }
    .top-nav {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .top-nav a {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 999px;
      text-decoration: none;
    }

    /* Hero number line */
    .hero-numline {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: clamp(2px, 0.8vw, 8px);
      align-items: end;
      margin: 0 auto 36px;
    }
    .nl-cell {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
    }
    .nl-cell svg { width: 100%; height: auto; max-height: clamp(80px, 15vw, 150px); }
    .nl-cell .nl-digit {
      font-weight: 800;
      font-size: clamp(14px, 2.4vw, 22px); color: #fff;
      line-height: 1;
    }

    /* ===== Big 3-button nav ===== */
    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .big-nav-btn {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 22px 24px;
      border-radius: 22px;
      border: 3px solid var(--bc, #fff);
      text-decoration: none;
      color: #fff;
      background: rgba(0,0,0,0.45);
      position: relative;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      min-height: 100px;
    }
    .big-nav-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: var(--bc, #fff);
      opacity: 0.10;
      border-radius: 19px;
      pointer-events: none;
    }
    .big-nav-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 0 4px var(--bc);
    }
    /* Number circle on the left */
    .btn-num {
      width: clamp(60px, 12vw, 80px);
      height: clamp(60px, 12vw, 80px);
      border-radius: 50%;
      background: var(--bc, #fff);
      color: #000;
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
      position: relative; z-index: 1;
    }
    .btn-info {
      position: relative; z-index: 1;
    }
    .btn-title {
      font-size: clamp(22px, 4.5vw, 30px);
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1.1;
      color: var(--bc, #fff);
    }
    .btn-sub {
      font-size: clamp(13px, 2.2vw, 15px);
      color: rgba(255,255,255,0.65);
      margin-top: 5px;
      letter-spacing: 0.5px;
    }
    /* Arrow hint */
    .btn-arrow {
      margin-left: auto;
      font-size: 28px;
      opacity: 0.45;
      position: relative; z-index: 1;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-nav">
      <a href="index.html">← Back to Home</a>
    </div>

    <h1>Math</h1>
    <p class="sub">Pick where to start.</p>

    <div class="hero-numline" id="heroNumLine" aria-hidden="true"></div>

    <div class="btn-stack">
      <a href="math-five.html" class="big-nav-btn" style="--bc:#e63946;">
        <div class="btn-num">1</div>
        <div class="btn-info">
          <div class="btn-title">Five and Under</div>
          <div class="btn-sub">Numbers 1 – 5 · Start here</div>
        </div>
        <div class="btn-arrow">›</div>
      </a>

      <a href="math-ten.html" class="big-nav-btn" style="--bc:#ff6200;">
        <div class="btn-num">2</div>
        <div class="btn-info">
          <div class="btn-title">Ten and Under</div>
          <div class="btn-sub">Numbers 1 – 10 · Counting, adding, subtracting</div>
        </div>
        <div class="btn-arrow">›</div>
      </a>

      <a href="math-puzzles.html" class="big-nav-btn" style="--bc:#e6c800;">
        <div class="btn-num">3</div>
        <div class="btn-info">
          <div class="btn-title">Puzzles &amp; Games</div>
          <div class="btn-sub">Sudoku, squares, and clocks</div>
        </div>
        <div class="btn-arrow">›</div>
      </a>
    </div>
  </div>

<script>
(function(){
  var NUM_COLOR = {
    1:'#e63946', 2:'#ff6200', 3:'#e6c800', 4:'#00a12c', 5:'#0066ff',
    6:'#7700dd', 7:'#7a3b00', 8:'#ff3fa6', 9:'#38c7ff', 10:'#e63946'
  };
  var R = 8, D = 16, H = D * Math.sqrt(3) / 2, CX = 50, YB = 92;
  var SHAPES = {
    1:  [[CX,YB]],
    2:  [[CX-R,YB],[CX+R,YB]],
    3:  [[CX-R,YB],[CX+R,YB],[CX,YB-H]],
    4:  [[CX-R,YB],[CX+R,YB],[CX-R,YB-D],[CX+R,YB-D]],
    5:  [[CX-D,YB],[CX,YB],[CX+D,YB],[CX-R,YB-H],[CX+R,YB-H]],
    6:  [[CX-D,YB],[CX,YB],[CX+D,YB],[CX-R,YB-H],[CX+R,YB-H],[CX,YB-2*H]],
    7:  [[CX-R,YB],[CX+R,YB],[CX-D,YB-H],[CX,YB-H],[CX+D,YB-H],[CX-R,YB-2*H],[CX+R,YB-2*H]],
    8:  [[CX-D,YB],[CX,YB],[CX+D,YB],[CX-D,YB-D],[CX+D,YB-D],[CX-D,YB-2*D],[CX,YB-2*D],[CX+D,YB-2*D]],
    9:  [[CX-D,YB],[CX,YB],[CX+D,YB],[CX-D,YB-D],[CX,YB-D],[CX+D,YB-D],[CX-D,YB-2*D],[CX,YB-2*D],[CX+D,YB-2*D]],
    10: [[CX-3*R,YB],[CX-R,YB],[CX+R,YB],[CX+3*R,YB],[CX-D,YB-H],[CX,YB-H],[CX+D,YB-H],[CX-R,YB-2*H],[CX+R,YB-2*H],[CX,YB-3*H]]
  };
  var SVG_NS = 'http://www.w3.org/2000/svg';
  var root = document.getElementById('heroNumLine');
  if (!root) return;
  var defs = '<defs><radialGradient id="ballHi" cx="32%" cy="28%" r="55%"><stop offset="0%" stop-color="#fff" stop-opacity="0.85"/><stop offset="55%" stop-color="#fff" stop-opacity="0"/></radialGradient></defs>';
  function darken(hex) {
    var n = parseInt(hex.slice(1),16), r=(n>>16)&255, g=(n>>8)&255, b=n&255;
    var m = function(v){ return Math.round(v*0.6).toString(16).padStart(2,'0'); };
    return '#'+m(r)+m(g)+m(b);
  }
  function buildCell(n) {
    var color = NUM_COLOR[n], dark = darken(color);
    var vb = '15 38 70 66';
    var svg = '<svg viewBox="'+vb+'" preserveAspectRatio="xMidYMax meet">'+defs;
    if (n === 10) {
      var halfW = 3*R + R*Math.sqrt(3);
      var baseY = YB+R, topY = baseY - halfW*Math.sqrt(3);
      svg += '<polygon points="'+(CX-halfW)+','+baseY+' '+(CX+halfW)+','+baseY+' '+CX+','+topY+'" fill="none" stroke="#fff" stroke-width="2.8" stroke-opacity="0.75"/>';
    }
    for (var i = 0; i < SHAPES[n].length; i++) {
      var cx = SHAPES[n][i][0], cy = SHAPES[n][i][1];
      svg += '<ellipse cx="'+cx+'" cy="'+(cy+R-0.5)+'" rx="'+(R*0.78)+'" ry="'+(R*0.22)+'" fill="#000" opacity="0.32"/>';
      svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="'+color+'"/>';
      svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="url(#ballHi)"/>';
      svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+dark+'" stroke-width="0.9" stroke-opacity="0.95"/>';
    }
    svg += '</svg>';
    var cell = document.createElement('div');
    cell.className = 'nl-cell';
    cell.innerHTML = svg + '<div class="nl-digit">'+n+'</div>';
    return cell;
  }
  for (var n = 1; n <= 10; n++) root.appendChild(buildCell(n));
})();
</script>
</body>
</html>
