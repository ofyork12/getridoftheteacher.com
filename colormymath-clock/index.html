<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ColorMyMath Clock</title>
<style>
  html,body{margin:0;height:100%;background:#222;overflow:hidden;font-family:Georgia,'Times New Roman',serif;touch-action:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{max-width:100%;max-height:100%;width:auto;height:auto;background:#fff;display:block;box-shadow:0 0 40px #000a}
  #bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:14px}
  .btn{padding:0 22px;height:60px;border-radius:30px;border:none;background:#0009;color:#fff;font-size:20px;font-family:Georgia;cursor:pointer}
  .btn:active{background:#000d}
</style></head>
<body><div id="wrap"><canvas id="c" width="1080" height="1920"></canvas></div>
<div id="bar"><button class="btn" id="shake">🤚 Shake</button><button class="btn" id="tilt">📱 Tilt on</button></div>
<script>
// canonical ColorMyMath number-line colors: each quantity 1-9 has its own fixed color
const COLOR={1:'#fa0404',2:'#faa018',3:'#f0f000',4:'#04fa04',5:'#0404fa',6:'#a32cc4',7:'#803004',8:'#f070aa',9:'#2e9bf0'};
// color a dot by the number it helps form: each ten-group takes the color of WHICH ten it is
// (1st ten = color of 1 = red, 2nd = orange ...); the leftover ones take the ones-digit color.
function numColor(n,i){ const tens=Math.floor(n/10);
  if(i < tens*10) return COLOR[Math.floor(i/10)+1] || COLOR[9];
  return COLOR[n%10] || COLOR[1]; }
const DOT=27;                      // every dot is the same size
const cv0=document.getElementById('c');
const ctx=cv0.getContext('2d');
const sig=new Image(); sig.src='signature.png';

// ---- responsive layout: portrait (phones) stacks the jars, landscape (laptops) puts them side by side ----
let W=1080,H=1920;                 // internal drawing resolution (set by layout())
let HOUR={x0:150,y0:350,x1:930,y1:560};   // two chambers (jars)
let MIN ={x0:90,y0:720,x1:990,y1:1340};
let UI={titleX:540,titleY:120,subY:166,timeX:540,timeY:710,sig:[900,1800,150,80]};
function layout(){
  const portrait = (window.innerWidth/window.innerHeight) < 1.0;
  if(portrait){
    W=1080;H=1920;
    HOUR={x0:150,y0:350,x1:930,y1:560};
    MIN ={x0:90,y0:720,x1:990,y1:1340};
    UI={titleX:540,titleY:120,subY:166,timeX:540,timeY:710,sig:[900,1800,150,80]};
  }else{
    W=1920;H=1080;                 // wide layout for laptops/desktops
    HOUR={x0:160,y0:710,x1:640,y1:920};   // hours jar — left, floor aligned with minutes
    MIN ={x0:760,y0:300,x1:1800,y1:920};  // minutes jar — right, taller for up to 59
    UI={titleX:960,titleY:90,subY:138,timeX:960,timeY:235,sig:[1740,985,150,80]};
  }
  cv0.width=W; cv0.height=H;
}
layout();
let dots=[];                       // {x,y,vx,vy,r,c,jar,tx,ty,settled}
let gx=0, gy=0.55;                 // gravity (tilt changes it)
let tiltOn=false;
let lastMin=-1, lastHour=-1;

// ---- ColorMyMath number shapes: the dots fall into these slots ----
const R=DOT, SQ3=Math.sqrt(3);
// ones-digit offsets (R-units; bottom row y=0, up = negative, centred at x=0). 5 = three on the bottom, two on top.
const ONES={0:[],1:[[0,0]],2:[[-1,0],[1,0]],3:[[-1,0],[1,0],[0,-SQ3]],
 4:[[-1,0],[1,0],[-1,-2],[1,-2]],
 5:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3]],
 6:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3],[0,-2*SQ3]],
 7:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3],[-2,-2*SQ3],[0,-2*SQ3]],
 8:[[-2,0],[0,0],[2,0],[-2,-2],[2,-2],[-2,-4],[0,-4],[2,-4]],
 9:[[-2,0],[0,0],[2,0],[-2,-2],[0,-2],[2,-2],[-2,-4],[0,-4],[2,-4]]};
// a ten-group = triangle of 10 (rows 4,3,2,1 from the floor up), centred, bottom y=0
const TEN=(function(){const p=[];let y=0;for(const c of [4,3,2,1]){const x0=-(c-1);for(let i=0;i<c;i++)p.push([x0+2*i,y]);y-=SQ3;}return p;})();
// how whole ten-groups are arranged (cells), bottom-aligned (5 tens = pyramid of triangles)
const TENS={0:[],1:[[0,0]],2:[[-.5,0],[.5,0]],3:[[-.5,0],[.5,0],[0,-1]],4:[[-.5,0],[.5,0],[-.5,-1],[.5,-1]],5:[[-1,0],[0,0],[1,0],[-.5,-1],[.5,-1]]};
const TEN_W=9.4641, TEN_H=3*SQ3+3;
// target slots for the ColorMyMath figure of n, sitting on chamber J's floor (in order: tens then ones)
function figureTargets(n,J){
  const tens=Math.floor(n/10), ones=n%10, t=[]; const cells=TENS[tens]||[];
  for(const c of cells){ const cx=c[0]*TEN_W, cy=c[1]*TEN_H; for(const [dx,dy] of TEN) t.push([cx+dx,cy+dy]); }
  const onesOff = cells.length ? Math.max(...cells.map(c=>c[0]))*TEN_W+6 : 0;
  for(const [dx,dy] of (ONES[ones]||[])) t.push([onesOff+dx,dy]);
  if(!t.length) return [];
  const xs=t.map(p=>p[0]), cxOff=(Math.min(...xs)+Math.max(...xs))/2, baseX=(J.x0+J.x1)/2, baseY=J.y1-R;
  return t.map(p=>({tx:baseX+(p[0]-cxOff)*R, ty:baseY+p[1]*R}));
}
function spawn(jar,c,side){ const J=jar==='h'?HOUR:MIN;
  // drop from near the top of the chamber, left or right side
  const x = side ? J.x1-DOT*2-Math.random()*60 : J.x0+DOT*2+Math.random()*60;
  const y = J.y0 + DOT + Math.random()*30;
  const vx = side ? -(Math.random()*3+1) : (Math.random()*3+1);
  return {x, y, vx, vy:0, r:DOT, c:c, jar:jar, tx:0, ty:0, settled:false}; }
function assignTargets(jar,count){ const J=jar==='h'?HOUR:MIN, T=figureTargets(count,J);
  let k=0; for(const d of dots){ if(d.jar===jar){ if(T[k]){d.tx=T[k].tx; d.ty=T[k].ty;} d.c=numColor(count,k); k++; } } }
function build(h,m){
  dots=[];
  const h12=((h%12)===0?12:(h%12));
  for(let i=0;i<h12;i++) dots.push(spawn('h',null,i%2));
  for(let i=0;i<m;i++)   dots.push(spawn('m',null,i%2));
  assignTargets('h',h12); assignTargets('m',m);
  lastHour=h12; lastMin=m;
}
const BOUNCE=0.38, FRICTION=0.78, SETTLE_PULL=0.018, SETTLE_DIST=18;
function chamberFloorY(J,x){
  // valley floor: ramps from sides down to flat shelf in centre
  const cx=(J.x0+J.x1)/2, shelf=Math.min(230,(J.x1-J.x0)*0.32);
  const sideY=J.y1-Math.min(120,(J.y1-J.y0)*0.42);
  if(x < cx-shelf) return sideY + (J.y1-sideY)*((x-(J.x0))/(cx-shelf-J.x0));
  if(x > cx+shelf) return sideY + (J.y1-sideY)*((J.x1-x)/(J.x1-(cx+shelf)));
  return J.y1;
}
function step(){
  for(const d of dots){
    const J=d.jar==='h'?HOUR:MIN;
    const speed=Math.hypot(d.vx,d.vy);
    const nearTarget=Math.hypot(d.tx-d.x,d.ty-d.y)<SETTLE_DIST*3;
    // gravity — less when close to target so dots float gently in
    const gravScale = nearTarget ? 0.25 : 1.0;
    d.vy += gy * gravScale;
    d.vx += gx;
    // gentle pull toward target slot when close enough
    if(nearTarget){
      d.vx += (d.tx-d.x)*SETTLE_PULL;
      d.vy += (d.ty-d.y)*SETTLE_PULL;
    }
    d.vx *= 0.985; d.vy *= 0.985;   // air friction
    d.x += d.vx; d.y += d.vy;
    // wall bounce
    if(d.x < J.x0+d.r){ d.x=J.x0+d.r; d.vx=Math.abs(d.vx)*BOUNCE; d.vy*=FRICTION; }
    if(d.x > J.x1-d.r){ d.x=J.x1-d.r; d.vx=-Math.abs(d.vx)*BOUNCE; d.vy*=FRICTION; }
    // ceiling
    if(d.y < J.y0+d.r){ d.y=J.y0+d.r; d.vy=Math.abs(d.vy)*BOUNCE; }
    // valley floor collision
    const fy=chamberFloorY(J,d.x);
    if(d.y > fy-d.r){ d.y=fy-d.r; d.vy=-Math.abs(d.vy)*BOUNCE; d.vx*=FRICTION; }
  }
  // dot-dot collisions with velocity exchange (Box2D style)
  for(let it=0;it<6;it++){
    for(let i=0;i<dots.length;i++) for(let j=i+1;j<dots.length;j++){
      const a=dots[i],b=dots[j]; if(a.jar!==b.jar) continue;
      let dx=b.x-a.x, dy=b.y-a.y, dd=Math.hypot(dx,dy), mn=a.r+b.r;
      if(dd>0 && dd<mn){
        const ov=(mn-dd)/2, nx=dx/dd, ny=dy/dd;
        a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
        // velocity exchange along collision normal
        const dvx=b.vx-a.vx, dvy=b.vy-a.vy, dot2=dvx*nx+dvy*ny;
        if(dot2<0){ const imp=dot2*0.9;
          a.vx+=imp*nx; a.vy+=imp*ny; b.vx-=imp*nx; b.vy-=imp*ny; }
      }
    }
  }
}
function dot(d){ ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,7);ctx.fillStyle=d.c;ctx.fill();ctx.lineWidth=2;ctx.strokeStyle='#161616';ctx.stroke(); }
function jarBox(J,label){
  // container with a DIPPING floor: ramps down from both sides to a flat shelf in the middle,
  // so dots roll in from the sides and settle in the centre to make the ColorMyMath number.
  const wall='#c8a86a', edge='#9c7a3a', wt=12;
  const cx=(J.x0+J.x1)/2, shelf=Math.min(230,(J.x1-J.x0)*0.32), sideY=J.y1-Math.min(120,(J.y1-J.y0)*0.42);
  ctx.fillStyle=wall;
  ctx.fillRect(J.x0-wt, J.y0, wt, (J.y1-J.y0)+wt+4);       // left wall
  ctx.fillRect(J.x1,    J.y0, wt, (J.y1-J.y0)+wt+4);       // right wall
  ctx.beginPath();                                          // valley floor
  ctx.moveTo(J.x0-wt, sideY);
  ctx.lineTo(cx-shelf, J.y1);
  ctx.lineTo(cx+shelf, J.y1);
  ctx.lineTo(J.x1+wt, sideY);
  ctx.lineTo(J.x1+wt, J.y1+wt+6);
  ctx.lineTo(J.x0-wt, J.y1+wt+6);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=edge;ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(J.x0-wt,sideY); ctx.lineTo(cx-shelf,J.y1); ctx.lineTo(cx+shelf,J.y1); ctx.lineTo(J.x1+wt,sideY); ctx.stroke();
  ctx.fillStyle='#888';ctx.font='italic 30px Georgia';ctx.textAlign='left';ctx.fillText(label,J.x0+6,J.y0-12); }

function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#111';ctx.textAlign='center';ctx.font='bold 74px Georgia';ctx.fillText('ColorMyMath Clock',UI.titleX,UI.titleY);
  ctx.fillStyle='#888';ctx.font='italic 30px Georgia';ctx.fillText('count the dots · shake them and watch them fall back into place',UI.titleX,UI.subY);
  jarBox(HOUR,'hours'); jarBox(MIN,'minutes');
  for(const d of dots) dot(d);
  const now=new Date(), h12=((now.getHours()%12)===0?12:now.getHours()%12);
  ctx.fillStyle='#333';ctx.font='bold 70px Georgia';ctx.textAlign='center';
  ctx.fillText(h12+' : '+String(now.getMinutes()).padStart(2,'0'),UI.timeX,UI.timeY);
  if(sig.complete&&sig.naturalWidth) ctx.drawImage(sig,UI.sig[0],UI.sig[1],UI.sig[2],UI.sig[3]);
}
function loop(){ step(); draw(); requestAnimationFrame(loop); }

// keep in sync with the real time
function tick(){ const n=new Date(), h=n.getHours(), m=n.getMinutes();
  const h12=((h%12)===0?12:h%12);
  if(h12!==lastHour || m<lastMin){ build(h,m); return; }       // new hour or wrap: rebuild
  if(m!==lastMin){
    for(let i=lastMin;i<m;i++) dots.push(spawn('m',null,i%2));  // new minute dots roll in from a side
    assignTargets('m',m);                                       // re-form the whole minute figure
    lastMin=m;
  }
}
build(new Date().getHours(), new Date().getMinutes());
loop(); setInterval(tick,1000);

// re-fit when the window resizes or a phone rotates (portrait <-> landscape)
let lastPortrait = (window.innerWidth/window.innerHeight) < 1.0;
function refit(){
  const nowPortrait = (window.innerWidth/window.innerHeight) < 1.0;
  if(nowPortrait===lastPortrait) return;   // only rebuild when orientation actually flips
  lastPortrait=nowPortrait;
  layout();
  build(new Date().getHours(), new Date().getMinutes());
}
window.addEventListener('resize', refit);
window.addEventListener('orientationchange', refit);

// interaction
document.getElementById('shake').onclick=()=>{ for(const d of dots){ d.vx+=(Math.random()-.5)*50; d.vy-=(Math.random()*18+12); d.settled=false; } };
const G=0.55;
function applyOrientation(e){
  const b=(e.beta||90)*Math.PI/180, g=(e.gamma||0)*Math.PI/180;
  // full 360° gravity: tilt phone any direction and dots follow
  gx = G * Math.sin(g);
  gy = G * Math.sin(b);                       // upright=down, upside-down=negative(up)
  document.getElementById('tilt').textContent='📱 Tilting';
}
document.getElementById('tilt').onclick=async ()=>{
  if(typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
    try{ const p=await DeviceOrientationEvent.requestPermission(); if(p!=='granted') return; }catch(e){ return; }
  }
  tiltOn=true;
  window.addEventListener('deviceorientation', applyOrientation);
};
// Android: no permission needed — auto-start on first orientation event
window.addEventListener('deviceorientation', e=>{
  if(tiltOn||!e.beta) return;
  tiltOn=true; applyOrientation(e);
  window.addEventListener('deviceorientation', applyOrientation);
}, {once:true});
// desktop: drag to stir
let drag=false;
const cv=document.getElementById('c');
function toCanvas(ev){ const r=cv.getBoundingClientRect(); return {x:(ev.clientX-r.left)/r.width*W, y:(ev.clientY-r.top)/r.height*H}; }
cv.addEventListener('pointerdown',()=>drag=true);
window.addEventListener('pointerup',()=>drag=false);
cv.addEventListener('pointermove',ev=>{ if(!drag)return; const p=toCanvas(ev);
  for(const d of dots){ const dx=d.x-p.x,dy=d.y-p.y,dd=Math.hypot(dx,dy); if(dd<140){ d.vx+=dx/dd*8; d.vy+=dy/dd*8; } } });
</script></body></html>
