<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>ColorMyMath Clock</title>
<style>
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden; background:#eef1f6;}
  body{font-family:Georgia,'Times New Roman',serif; touch-action:none;}
  #c{position:fixed; inset:0; width:100%; height:100%; display:block;}
  .exit{position:fixed; top:calc(10px + env(safe-area-inset-top)); left:12px; z-index:5;
    color:#5a6675; text-decoration:none; font:600 14px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    border:1px solid #c5cdd9; padding:7px 12px; border-radius:999px; background:rgba(255,255,255,.8);}
  .bar{position:fixed; left:0; right:0; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:5;
    display:flex; align-items:center; justify-content:center; gap:12px;}
  .btn{border:none; background:#2b3550; color:#fff; font:600 16px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:13px 20px; border-radius:999px; box-shadow:0 4px 14px rgba(0,0,0,.25); cursor:pointer;}
  .btn:active{transform:scale(.94);}
  .btn.on{background:#f0b32a; color:#222;}
  .tip{position:fixed; left:0; right:0; top:calc(12px + env(safe-area-inset-top)); z-index:4; text-align:center;
    font:italic 13px/1.3 Georgia; color:#8a93a3; pointer-events:none;}
</style>
</head>
<body>
  <a class="exit" href="../games.html">← Games</a>
  <div class="tip">The time as ColorMyMath number-groups — they fall and bounce. Tap to drop · Shake · Tilt.</div>
  <canvas id="c"></canvas>
  <div class="bar">
    <button class="btn" id="shake">🤚 Shake</button>
    <button class="btn" id="tilt">📱 Tilt on</button>
  </div>
<script src="planck.min.js"></script>
<script>
"use strict";
(function(){
  const pl=planck, Vec2=pl.Vec2;
  const PM=32, m=(v)=>v/PM;
  const WORLD_W=640, WORLD_H=360;
  const R=13;                                   // dot radius (world px)

  // canonical ColorMyMath colours: each quantity 1-9 has its own fixed colour
  const COLOR={1:'#fa0404',2:'#faa018',3:'#f0f000',4:'#04fa04',5:'#0404fa',6:'#a32cc4',7:'#803004',8:'#f070aa',9:'#2e9bf0'};

  // ---- ColorMyMath dot shapes (offsets in R-units; bottom row y=0, up is negative) ----
  const SQ3=Math.sqrt(3);
  const ONES={1:[[0,0]],2:[[-1,0],[1,0]],3:[[-1,0],[1,0],[0,-SQ3]],
    4:[[-1,0],[1,0],[-1,-2],[1,-2]],
    5:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3]],            // 5: three on the bottom, two on top
    6:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3],[0,-2*SQ3]],
    7:[[-2,0],[0,0],[2,0],[-1,-SQ3],[1,-SQ3],[-2,-2*SQ3],[0,-2*SQ3]],
    8:[[-2,0],[0,0],[2,0],[-2,-2],[2,-2],[-2,-4],[0,-4],[2,-4]],
    9:[[-2,0],[0,0],[2,0],[-2,-2],[0,-2],[2,-2],[-2,-4],[0,-4],[2,-4]]};
  // a ten-group = triangle of 10 (rows of 4,3,2,1 from the floor up), centred
  const TEN=(function(){const p=[];let y=0;for(const c of [4,3,2,1]){const x0=-(c-1);for(let i=0;i<c;i++)p.push([x0+2*i,y]);y-=SQ3;}return p;})();

  // ----- physics -----
  let pDensity=3.0, pElasticity=0.55, SLOWMO=0.8;
  const world=pl.World(Vec2(0, 6.0));            // gravity DOWN
  const statics=world.createBody();
  function box(cx,cy,w,h){ statics.createFixture(pl.Box(m(w/2),m(h/2),Vec2(m(cx+w/2),m(cy+h/2)),0),{restitution:0.4}); }
  box(0,WORLD_H-3,WORLD_W,3); box(0,0,WORLD_W,3); box(0,0,3,WORLD_H); box(WORLD_W-3,0,3,WORLD_H);   // walls
  // the two colon squares in the middle are SOLID — the number-groups bounce off them
  const COLON=[[214,150],[214,210]], COLON_HALF=13;
  for(const c of COLON) box(c[0]-COLON_HALF, c[1]-COLON_HALF, COLON_HALF*2, COLON_HALF*2);

  // a "group" is ONE rigid body made of several coloured dots → it stays together and bounces as a unit
  let groups=[];   // {body, dots:[{ox,oy,color}], tag}
  function clearTag(tag){ for(let i=groups.length-1;i>=0;i--){ if(groups[i].tag===tag){ world.destroyBody(groups[i].body); groups.splice(i,1); } } }
  function makeGroup(dotsRU, cx, cy, tag){
    const b=world.createDynamicBody(Vec2(m(cx), m(cy)));
    const drawn=[];
    for(const d of dotsRU){
      const ox=d.dx*R, oy=d.dy*R;
      b.createFixture(pl.Circle(Vec2(m(ox), m(oy)), m(R)), {density:pDensity, friction:0.2, restitution:pElasticity});
      drawn.push({ox, oy, color:d.color});
    }
    b.setAngularVelocity((Math.random()-0.5)*2);
    groups.push({body:b, dots:drawn, tag});
  }

  // ----- the time as quantities -----
  let simMs=Date.now(), lastH=-1, lastMin=-1;
  function curT(){ const d=new Date(simMs); let h=d.getHours()%12; if(h===0) h=12; return {h, m:d.getMinutes()}; }
  function spawnHour(h){
    const dots=[];
    if(h<=9){ for(const o of ONES[h]) dots.push({dx:o[0],dy:o[1],color:COLOR[h]}); }
    else { for(const o of TEN) dots.push({dx:o[0],dy:o[1],color:COLOR[1]});          // the ten (red)
           const ones=h-10; if(ones) for(const o of ONES[ones]) dots.push({dx:o[0]+8,dy:o[1],color:COLOR[ones]}); }
    makeGroup(dots, 110, 60, 'hour');
  }
  function spawnMinutes(min){
    const tens=Math.floor(min/10), ones=min%10;
    for(let i=0;i<tens;i++){                                                          // each ten = its own bouncing triangle
      const c=COLOR[i+1]||COLOR[9];
      makeGroup(TEN.map(o=>({dx:o[0],dy:o[1],color:c})), 300+i*58, 36+(i%2)*34, 'min');
    }
    if(ones){ const c=COLOR[ones]; makeGroup(ONES[ones].map(o=>({dx:o[0],dy:o[1],color:c})), 580, 60, 'min'); }
  }
  function respawnAll(){ const t=curT(); clearTag('hour'); clearTag('min'); spawnHour(t.h); spawnMinutes(t.m); lastH=t.h; lastMin=t.m; }
  function checkTime(){ const t=curT();
    if(t.h!==lastH){ clearTag('hour'); spawnHour(t.h); lastH=t.h; }
    if(t.m!==lastMin){ clearTag('min'); spawnMinutes(t.m); lastMin=t.m; }
  }

  // ----- render -----
  const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  let CW=0,CH=0,DPR=Math.min(2,window.devicePixelRatio||1), fit=1, offx=0, offy=0;
  function resize(){
    CW=window.innerWidth; CH=window.innerHeight;
    canvas.width=CW*DPR; canvas.height=CH*DPR; canvas.style.width=CW+'px'; canvas.style.height=CH+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    fit=Math.min(CW/WORLD_W, CH/WORLD_H);
    offx=(CW-WORLD_W*fit)/2; offy=(CH-WORLD_H*fit)/2;
  }
  window.addEventListener('resize', resize);

  let lastT=performance.now();
  function frame(t){
    const dt=Math.min(0.05,(t-lastT)/1000); lastT=t;
    simMs += dt*1000;
    checkTime();
    world.step(SLOWMO/60, 8, 3);

    ctx.clearRect(0,0,CW,CH);
    ctx.save(); ctx.translate(offx,offy); ctx.scale(fit,fit);
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,WORLD_W,WORLD_H);              // white play-field
    // colon squares
    ctx.fillStyle='#333a48';
    for(const c of COLON){ ctx.fillRect(c[0]-11, c[1]-11, 22, 22); }
    // the number-groups (each a rigid cluster of coloured dots)
    for(const g of groups){
      const p=g.body.getPosition(), a=g.body.getAngle(), ca=Math.cos(a), sa=Math.sin(a);
      const bx=p.x*PM, by=p.y*PM;
      for(const d of g.dots){
        const x=bx + d.ox*ca - d.oy*sa, y=by + d.ox*sa + d.oy*ca;
        ctx.beginPath(); ctx.arc(x,y,R,0,7); ctx.fillStyle=d.color; ctx.fill();
        ctx.lineWidth=2; ctx.strokeStyle='#161616'; ctx.stroke();
      }
    }
    // small digital read-out so you can check the time at a glance
    const now=new Date(), h12=((now.getHours()%12)===0?12:now.getHours()%12);
    ctx.fillStyle='#b9c2d0'; ctx.textAlign='center'; ctx.font='bold 30px Georgia';
    ctx.fillText(h12+' : '+String(now.getMinutes()).padStart(2,'0'), 320, 40);
    ctx.restore();
    requestAnimationFrame(frame);
  }

  // ----- interaction -----
  const cv=canvas;
  cv.addEventListener('pointerup', ()=>{ simMs=Date.now(); respawnAll(); });          // tap = drop the time fresh

  document.getElementById('shake').onclick=()=>{
    for(const g of groups){ g.body.setLinearVelocity(Vec2((Math.random()-0.5)*9, -(Math.random()*7+5))); g.body.setAngularVelocity((Math.random()-0.5)*8); }
  };

  // tilt: tilt the phone and the groups roll that way (left tilt -> they go left)
  function onMotion(e){ const a=e.accelerationIncludingGravity; if(!a||a.x==null) return; world.setGravity(Vec2(-a.x, a.y)); }
  let motionOn=false;
  const needsPerm=(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function');
  function enableMotion(){
    if(motionOn) return;
    if(needsPerm){ DeviceMotionEvent.requestPermission().then(s=>{ if(s==='granted'){ motionOn=true; window.addEventListener('devicemotion', onMotion); document.getElementById('tilt').classList.add('on'); document.getElementById('tilt').textContent='📱 Tilting'; } }).catch(()=>{}); }
    else { motionOn=true; window.addEventListener('devicemotion', onMotion); document.getElementById('tilt').classList.add('on'); document.getElementById('tilt').textContent='📱 Tilting'; }
  }
  document.getElementById('tilt').onclick=enableMotion;
  if(!needsPerm){ window.addEventListener('devicemotion', onMotion); motionOn=true; }   // Android/desktop: just works

  // ----- go -----
  resize(); respawnAll(); requestAnimationFrame(frame);
})();
</script>
</body>
</html>
