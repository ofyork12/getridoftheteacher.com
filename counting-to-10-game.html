<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ColorMyMath — Counting to 10</title>
<!-- ============================================================
     Counting 1 → 10. One dot enters per step; existing dots
     rearrange smoothly to match each number's PDF formation.
     Colors per the wall-size PDF reference:
       1 red, 2 orange, 3 yellow, 4 green, 5 blue,
       6 magenta, 7 brown, 8 pink, 9 cyan, 10 red
============================================================ -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #333;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .stage {
    position: relative;
    width: min(100vw, 56.25vh);
    aspect-ratio: 9 / 16;
    background: #ffffff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .equation {
    position: absolute; top: 6%; left: 50%;
    transform: translateX(-50%);        /* center on the .equation's left value */
    font-weight: 700; font-size: 11vh; color: #000;
    white-space: nowrap;
    transition: left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .eq-part { display: inline-block; min-width: 1.2ch; text-align: center; }
  .eq-part.pop { animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .play-area { position: absolute; top: 18%; left: 0; right: 0; height: 46%; }
  .play-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
  .number-line-wrap { position: absolute; bottom: 29%; left: 0; right: 0; padding: 0 2%; }
  .number-line { display: flex; justify-content: space-between; align-items: flex-end; gap: 1.2%; }
  .num-cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.6vh; min-width: 0; }
  /* Cell 10 is wider so the two-character "10" digit can be rendered at a
     visibly bigger size than the single-digit cells. The extra width pushes
     cells 1-9 leftward, making room on the right for the wider "10" SVG. */
  #cell10 { flex: 1.5; }
  .num-quantity { width: 100%; height: 10vh; position: relative; }
  .num-quantity svg { width: 100%; height: 100%; overflow: visible; }
  .num-label {
    width: 100%; height: 6.5vh;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s ease;
  }
  .num-label svg { height: 100%; width: auto; }
  .num-cell.active .num-label { transform: scale(1.25) translateY(-2px); }
  .brand {
    position: absolute; top: 1.5%; left: 0; right: 0;
    text-align: center; font-size: 2.2vh; font-weight: 600;
    color: #888; letter-spacing: 0.25em;
  }
  /* Wait states for the white dot. Pulses the stroke width "bold / not bold"
     in three escalating phases: black glow (0-10s), black/red flash (10-20s),
     solid red urgent pulse (20s+). The kid taps anywhere to advance. */
  @keyframes dotGlowBlack {
    0%, 100% { stroke-width: 0.8; }
    50%      { stroke-width: 3.2; }
  }
  @keyframes dotGlowFlash {
    0%   { stroke: #000;    stroke-width: 0.8; }
    50%  { stroke: #d92525; stroke-width: 3.2; }
    100% { stroke: #000;    stroke-width: 0.8; }
  }
  @keyframes dotGlowRed {
    0%, 100% { stroke-width: 2.2; }
    50%      { stroke-width: 2.8; }
  }
  .wait-dot         { stroke: #000;    animation: dotGlowBlack 1.4s ease-in-out infinite; }
  .wait-dot-warn    {                  animation: dotGlowFlash 0.95s ease-in-out infinite; }
  .wait-dot-urgent  { stroke: #d92525; animation: dotGlowRed   0.7s  ease-in-out infinite; }
</style>
</head>

  const audioCache = {};

  function playNumber(n) {
    const a = audioCache[n];

        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = angle % 360;
          circle.setAttribute('transform', `rotate(${angle}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  function animateFallOff(circle, x1, y1, x2, y2, durationMs, angleRef) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dx = x2 - x1, dy = y2 - y1;
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = dx < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const cx = x1 + dx * t;
        const cy = y1 + dy * (t * t);
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          circle.setAttribute('transform', `rotate(${startAngle + totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  function animateBallistic(circle, x1, y1, x2, y2, totalMs, angleRef, peakOverride) {
    return new Promise(resolve => {
      const dist = Math.hypot(x2 - x1, y2 - y1);
      const dropAmount = Math.max(0, y2 - y1);
      const peakLift = (peakOverride !== undefined) ? peakOverride : Math.max(12, dist * 0.18 + dropAmount * 0.3);
      const startTime = performance.now();
      const totalRotation = (Math.abs(x2 - x1) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / totalMs);
        const cx = x1 + (x2 - x1) * t;
        const linearY = y1 + (y2 - y1) * t;
        const arch = 4 * peakLift * (t - t * t);
        const cy = linearY - arch;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * t * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          circle.setAttribute('transform', `rotate(${startAngle + totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Roll along the curved surface of a pivot (another dot). Used in step 4
  // where dot3 (apex) is knocked aside by dot4 and rolls down/around the
  // bottom-right dot to land at top-right of the square.
  function animateRollAroundPivot(circle, pivotCx, pivotCy, startAngle, endAngle, durationMs, easeFn, angleRef) {
    return new Promise(resolve => {
      const radius = 2 * DOT_R;
      const startTime = performance.now();
      const ease = easeFn || ((t) => t);
      const startSpinAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      const deltaAngle = endAngle - startAngle;
      // 2 self-rotations per revolution (coin rotation paradox).
      const totalSpinDeg = (deltaAngle * 2) * (180 / Math.PI);
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const a = startAngle + deltaAngle * e;
        const cx = pivotCx + radius * Math.cos(a);
        const cy = pivotCy + radius * Math.sin(a);
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const spin = startSpinAngle + totalSpinDeg * e;
        circle.setAttribute('transform', `rotate(${spin}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startSpinAngle + totalSpinDeg) % 360;
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Tip off: dot rotates AND falls in arc when an edge tips out from under it.
  // Used in step 5 where the top dots of the square tip off the corners into
  // the valleys between bottom dots.
  function animateTipOff(circle, x1, y1, x2, y2, durationMs) {
    durationMs = durationMs || 700;
    return new Promise(resolve => {
      const startTime = performance.now();
      const dx = x2 - x1, dy = y2 - y1;
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360 * 1.5;
      const rotSign = dx < 0 ? -1 : 1;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        // x: ease-out (tips quickly, settles).
        const ex = 1 - Math.pow(1 - t, 1.7);
        // y: gravity acceleration.
        const ey = t * t;
        const cx = x1 + dx * ex;
        const cy = y1 + dy * ey;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = totalRotation * ex * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          circle.setAttribute('transform', `rotate(${totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Smooth glide for rearrangement (existing dots moving to new positions).
  // Uses an arc lift if the dot needs to go up so it looks like a hop.
  function animateGlide(dot, toX, toY, durationMs, peakLift) {
    return new Promise(resolve => {
      const x1 = dot.cx, y1 = dot.cy;
      const dx = toX - x1, dy = toY - y1;
      const dist = Math.hypot(dx, dy);
      const lift = (peakLift !== undefined) ? peakLift
                 : (dy < -2 ? Math.max(15, -dy * 0.4) : Math.max(8, dist * 0.12));
      const startTime = performance.now();
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = dx < 0 ? -1 : (dx > 0 ? 1 : 0);
      const startAngle = dot.angleRef.value || 0;
      const ease = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const cx = x1 + dx * e;
        const linearY = y1 + dy * e;
        const arch = 4 * lift * (e - e * e);
        const cy = linearY - arch;
        dot.el.setAttribute('cx', cx); dot.el.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * e * rotSign;
        dot.el.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          dot.angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          dot.el.setAttribute('transform', `rotate(${dot.angleRef.value}, ${toX}, ${toY})`);
          dot.cx = toX; dot.cy = toY;
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Quadratic Bezier from (x1,y1) through control point (ctrlX,ctrlY) to
  // (x2,y2), operating on a circle element (not a `dot` state object).
  // Mirrors animateBallistic's signature. Used for d6's arc-and-land on
  // the apex: with ctrlX = x2 and ctrlY well above the path, the tangent
  // at t=1 is purely vertical, so the dot descends straight down onto
  // its landing point — no horizontal velocity at touchdown, no abrupt
  // direction change. Rotation is approximated by chord length × t.
  function animateBezierArc(circle, x1, y1, x2, y2, ctrlX, ctrlY, durationMs, angleRef) {
    return new Promise(resolve => {
      // Approximate arc length for rotation: chord-by-chord.
      let arcLen = 0;
      let prev = {x: x1, y: y1};
      const samples = 40;
      for (let i = 1; i <= samples; i++) {
        const tt = i / samples;
        const omt = 1 - tt;
        const px = omt*omt*x1 + 2*omt*tt*ctrlX + tt*tt*x2;
        const py = omt*omt*y1 + 2*omt*tt*ctrlY + tt*tt*y2;
        arcLen += Math.hypot(px - prev.x, py - prev.y);
        prev = {x: px, y: py};
      }
      const totalRotation = (arcLen / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (x2 - x1) < 0 ? -1 : 1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      const startTime = performance.now();
      // Ease: start with horizontal momentum (slow up the arc), then ease
      // out as the dot reaches the apex column (matches natural gravity feel).
      const ease = (t) => 1 - Math.pow(1 - t, 1.5);
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const omt = 1 - e;
        const cx = omt*omt*x1 + 2*omt*e*ctrlX + e*e*x2;
        const cy = omt*omt*y1 + 2*omt*e*ctrlY + e*e*y2;
        circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * e * rotSign;
        circle.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          if (angleRef) angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          circle.setAttribute('transform', `rotate(${startAngle + totalRotation * rotSign}, ${x2}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Straight vertical drop with gravity acceleration (no horizontal motion,
  // no rotation). Used for the final descent onto the #6 apex, where the dot
  // must stay at a fixed x to keep equidistant from the two mid dots below.
  function animateVerticalDrop(circle, x, y1, y2, durationMs, angleRef) {
    return new Promise(resolve => {
      const startTime = performance.now();
      const dy = y2 - y1;
      const startAngle = (angleRef && typeof angleRef.value === 'number') ? angleRef.value : 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const cy = y1 + dy * (t * t);            // gravity (t²) easing
        circle.setAttribute('cx', x); circle.setAttribute('cy', cy);
        // Preserve existing rotation (dot is spinning from previous arc).
        circle.setAttribute('transform', `rotate(${startAngle}, ${x}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          circle.setAttribute('transform', `rotate(${startAngle}, ${x}, ${y2})`);
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Like animateGlide but accepts a custom ease function. Use this when you
  // want the displaced dots to feel SHOVED (sharp impulse ease) rather than
  // gently sliding (the default smooth in-out).
  function animateGlideEased(dot, toX, toY, durationMs, peakLift, easeFn) {
    return new Promise(resolve => {
      const x1 = dot.cx, y1 = dot.cy;
      const dx = toX - x1, dy = toY - y1;
      const dist = Math.hypot(dx, dy);
      const lift = (peakLift !== undefined) ? peakLift
                 : (dy < -2 ? Math.max(15, -dy * 0.4) : Math.max(8, dist * 0.12));
      const startTime = performance.now();
      const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = dx < 0 ? -1 : (dx > 0 ? 1 : 0);
      const startAngle = dot.angleRef.value || 0;
      const ease = easeFn || ((t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const cx = x1 + dx * e;
        const linearY = y1 + dy * e;
        const arch = 4 * lift * (e - e * e);
        const cy = linearY - arch;
        dot.el.setAttribute('cx', cx); dot.el.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * e * rotSign;
        dot.el.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          dot.angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          dot.el.setAttribute('transform', `rotate(${dot.angleRef.value}, ${toX}, ${toY})`);
          dot.cx = toX; dot.cy = toY;
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Quadratic Bezier path with explicit control point. Used for swap moves
  // where two dots need to pass each other on opposite sides of a midpoint.
  // ctrlX, ctrlY define the bulge of the path (the dot bulges through there
  // at t=0.5).
  function animateArc(dot, toX, toY, ctrlX, ctrlY, durationMs) {
    return new Promise(resolve => {
      const x1 = dot.cx, y1 = dot.cy;
      const startTime = performance.now();
      const ease = (t) => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      // Rough rotation: based on chord length (start → end).
      const chord = Math.hypot(toX - x1, toY - y1);
      const totalRotation = (chord / (2 * Math.PI * DOT_R)) * 360;
      const rotSign = (toX - x1) < 0 ? -1 : (toX - x1 > 0 ? 1 : 0);
      const startAngle = dot.angleRef.value || 0;
      function step(now) {
        const t = Math.min(1, (now - startTime) / durationMs);
        const e = ease(t);
        const cx = (1 - e) * (1 - e) * x1 + 2 * (1 - e) * e * ctrlX + e * e * toX;
        const cy = (1 - e) * (1 - e) * y1 + 2 * (1 - e) * e * ctrlY + e * e * toY;
        dot.el.setAttribute('cx', cx); dot.el.setAttribute('cy', cy);
        const angle = startAngle + totalRotation * e * rotSign;
        dot.el.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
        if (t < 1) requestAnimationFrame(step);
        else {
          dot.angleRef.value = (startAngle + totalRotation * rotSign) % 360;
          dot.el.setAttribute('transform', `rotate(${dot.angleRef.value}, ${toX}, ${toY})`);
          dot.cx = toX; dot.cy = toY;
          resolve();
        }
      }
      requestAnimationFrame(step);
    });
  }

  // Rolls a fresh dot across the top step, falls off, bounces twice on floor,
  // ends at targetX on the floor.
  // GAME MODE: dot enters white with an outline; after it lands, wait for a
  // tap, then recolor to its real color before returning.
  async function rollNewDotIn(id, targetX, colorName) {
    const landings = stairLandings();
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, colorName);
    const origFill = dot.el.getAttribute('fill');
    dot.el.setAttribute('fill', '#ffffff');
    dot.el.setAttribute('stroke', '#000');
    dot.el.setAttribute('stroke-width', '1.2');
    await sleep(150);
    const angleRef = dot.angleRef;

    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    const minFallDx = 85;
    const firstBounceX = landings[0].x + minFallDx;
    await animateFallOff(dot.el, landings[0].x, landings[0].y, firstBounceX, DOT_REST_Y, 600, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    const totalRemaining = targetX - firstBounceX;
    const secondBounceX = firstBounceX + totalRemaining * 0.6;
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y, secondBounceX, DOT_REST_Y, 360, angleRef, 40);
    dot.cx = secondBounceX; dot.cy = DOT_REST_Y;

    await animateBallistic(dot.el, secondBounceX, DOT_REST_Y, targetX, DOT_REST_Y, 240, angleRef, 18);
    dot.cx = targetX; dot.cy = DOT_REST_Y;

    const autoFilled = await waitForFirstTap(dot);
    if (!autoFilled) {
      // Kid tapped — restore the dot to its real color, no border.
      dot.el.setAttribute('fill', origFill);
      dot.el.removeAttribute('stroke');
      dot.el.removeAttribute('stroke-width');
    }
    // If autoFilled, waitForFirstTap leaves the dot red with a black border.

    return dot;
  }

  function recolorAll(circles, colorName) {
    const fill = COLORS[colorName];
    circles.forEach(c => c.setAttribute('fill', fill));
  }

  function popNum() {
    eqNum.classList.remove('pop'); void eqNum.offsetWidth; eqNum.classList.add('pop');
  }

  // Once the digit position is "locked" (after step 6 lands), all later
  // setNum/setNumAtX calls use this fixed viewBox x instead of the moving
  // cluster centroid. Set to null to use centroid (the default for steps 1–5).
  let lockedDigitX = null;

  // Compute the centroid x of all current dots in viewBox coords, then map
  // that to a stage left-% so the equation digit sits directly above the
  // visual center of the cluster. ViewBox is "-100 0 360 200", so viewBox x
  // maps to stage % via (vbx - vbMinX) / vbWidth × 100.
  function clusterScreenLeftPct() {
    if (lockedDigitX !== null) {
      const vbMinX = -100, vbWidth = 360;
      return (lockedDigitX - vbMinX) / vbWidth * 100;
    }
    const dots = Object.values(dotsById);
    if (dots.length === 0) return 50;            // fallback: stage center
    let sumX = 0;
    for (const dt of dots) sumX += dt.cx;
    const centroidX = sumX / dots.length;
    const vbMinX = -100, vbWidth = 360;
    return (centroidX - vbMinX) / vbWidth * 100;
  }

  function setNum(n) {
    eqNum.textContent = String(n);
    // Position the equation horizontally over the cluster's centroid (only
    // when there's actually a number to show — blank string skips repositioning).
    if (n !== '' && n !== undefined && n !== null) {
      const eqEl = document.querySelector('.equation');
      if (eqEl) eqEl.style.left = clusterScreenLeftPct().toFixed(2) + '%';
      playNumber(n);
    }
    popNum();
  }

  function highlightCell(n) {
    document.querySelectorAll('.num-cell').forEach(c => c.classList.remove('active'));
    if (n >= 1 && n <= 10) {
      const cell = document.getElementById('cell' + n);
      if (cell) cell.classList.add('active');
    }
  }

  // ─── NUMBER-LINE QUANTITY LAYOUTS (small, in each cell) ──────
  // Each cell SVG is 100x100. Layouts mirror the main-stage formations.

  const QTY_CX = 50;
  const QTY_Y_BOT = 92;

  const QTY_TRI_H = QTY_D * Math.sqrt(3) / 2;

          {x: QTY_CX - QTY_R, y: QTY_Y_BOT - QTY_TRI_H}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT - QTY_TRI_H}
        ] },
    6: { color: 'magenta', centers: [
          // triangle: 3 bottom, 2 middle, 1 top
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT}, {x: QTY_CX, y: QTY_Y_BOT}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT},
          {x: QTY_CX - QTY_R, y: QTY_Y_BOT - QTY_TRI_H}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT - QTY_TRI_H},

          {x: QTY_CX - QTY_R, y: QTY_Y_BOT - 2 * QTY_TRI_H}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT - 2 * QTY_TRI_H}

          {x: QTY_CX - QTY_D, y: QTY_Y_BOT - QTY_D},                                   {x: QTY_CX + QTY_D, y: QTY_Y_BOT - QTY_D},
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT - 2 * QTY_D}, {x: QTY_CX, y: QTY_Y_BOT - 2 * QTY_D}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT - 2 * QTY_D}
        ] },
    9: { color: 'cyan', centers: [
          // 3x3 full grid
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT}, {x: QTY_CX, y: QTY_Y_BOT}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT},
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT - QTY_D}, {x: QTY_CX, y: QTY_Y_BOT - QTY_D}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT - QTY_D},
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT - 2 * QTY_D}, {x: QTY_CX, y: QTY_Y_BOT - 2 * QTY_D}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT - 2 * QTY_D}
        ] },

          {x: QTY_CX - 3 * QTY_R, y: QTY_Y_BOT}, {x: QTY_CX - QTY_R, y: QTY_Y_BOT}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT}, {x: QTY_CX + 3 * QTY_R, y: QTY_Y_BOT},
          {x: QTY_CX - QTY_D, y: QTY_Y_BOT - QTY_TRI_H}, {x: QTY_CX, y: QTY_Y_BOT - QTY_TRI_H}, {x: QTY_CX + QTY_D, y: QTY_Y_BOT - QTY_TRI_H},
          {x: QTY_CX - QTY_R, y: QTY_Y_BOT - 2 * QTY_TRI_H}, {x: QTY_CX + QTY_R, y: QTY_Y_BOT - 2 * QTY_TRI_H},
          {x: QTY_CX, y: QTY_Y_BOT - 3 * QTY_TRI_H}
        ] }
  };

  function buildNumberLine() {
    for (let n = 1; n <= 10; n++) {
      const svg = document.getElementById('qty' + n);
      if (svg) svg.innerHTML = '';
    }
  }

  function populateNumberLineCell(n) {
    const svg = document.getElementById('qty' + n);
    if (!svg) return;
    svg.innerHTML = '';
    const { color, centers } = NUMBER_LINE_LAYOUTS[n];

    // For #10, draw the same equilateral triangle outline that wraps the
    // 4-3-2-1 cluster at the end of the main animation. Same tangent-offset
    // math, scaled to the small cell SVG. Drawn BEFORE the dots so the dots
    // sit on top of the outline.
    if (n === 10) {
      const cx = QTY_CX;
      const baseY = QTY_Y_BOT + QTY_R;            // tangent to bottom of bottom row
      const halfWidth = 3 * QTY_R + QTY_R * Math.sqrt(3);
      const blX = cx - halfWidth;
      const brX = cx + halfWidth;
      const topY = baseY - halfWidth * Math.sqrt(3);
      const tri = document.createElementNS(SVG_NS, 'polygon');
      tri.setAttribute('points', `${blX},${baseY} ${brX},${baseY} ${cx},${topY}`);
      tri.setAttribute('fill', 'none');
      tri.setAttribute('stroke', '#000');
      tri.setAttribute('stroke-width', '1.8');
      tri.setAttribute('stroke-linejoin', 'round');
      tri.style.opacity = '0';
      tri.style.transition = 'opacity 0.5s ease-in 0.25s';   // fade in after dots
      svg.appendChild(tri);
      requestAnimationFrame(() => { tri.style.opacity = '1'; });
    }

    centers.forEach((p, i) => {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', p.x); c.setAttribute('cy', p.y);
      c.setAttribute('r', QTY_R);
      c.setAttribute('fill', COLORS[color]);
      c.setAttribute('stroke', '#000'); c.setAttribute('stroke-width', '1.5');
      c.style.transformOrigin = `${p.x}px ${p.y}px`;
      c.style.transformBox = 'fill-box';
      c.style.transform = 'scale(0)';
      c.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)';
      svg.appendChild(c);
      setTimeout(() => { c.style.transform = 'scale(1)'; }, 30 + i * 55);
    });
  }

  // ─── MAIN-STAGE TARGET POSITIONS FOR EACH NUMBER ─────────────
  // Each set is the cluster of N dots, centered around CENTER_X, resting on the floor.

  function positionsFor(n) {
    switch (n) {
      case 1: {
        return [{ x: CENTER_X, y: DOT_REST_Y }];
      }
      case 2: {
        return [
          { x: CENTER_X - r, y: DOT_REST_Y },
          { x: CENTER_X + r, y: DOT_REST_Y }
        ];
      }
      case 3: {
        return [
          { x: CENTER_X - r, y: DOT_REST_Y },
          { x: CENTER_X + r, y: DOT_REST_Y },
          { x: CENTER_X, y: DOT_REST_Y - triH }
        ];
      }
      case 4: {
        // 2x2 square
        return [
          { x: CENTER_X - r, y: DOT_REST_Y },
          { x: CENTER_X + r, y: DOT_REST_Y },
          { x: CENTER_X - r, y: DOT_REST_Y - d },
          { x: CENTER_X + r, y: DOT_REST_Y - d }
        ];
      }
      case 5: {
        // 3 bottom + 2 on top
        return [
          { x: CENTER_X - d, y: DOT_REST_Y },
          { x: CENTER_X,     y: DOT_REST_Y },
          { x: CENTER_X + d, y: DOT_REST_Y },
          { x: CENTER_X - r, y: DOT_REST_Y - triH },
          { x: CENTER_X + r, y: DOT_REST_Y - triH }
        ];
      }
      case 6: {
        // triangle: 3 bottom, 2 middle, 1 apex
        return [
          { x: CENTER_X - d, y: DOT_REST_Y },
          { x: CENTER_X,     y: DOT_REST_Y },
          { x: CENTER_X + d, y: DOT_REST_Y },
          { x: CENTER_X - r, y: DOT_REST_Y - triH },
          { x: CENTER_X + r, y: DOT_REST_Y - triH },
          { x: CENTER_X,     y: DOT_REST_Y - 2 * triH }
        ];
      }
      case 7: {
        // flower: 2 bottom, 3 middle (centered), 2 top
        return [
          { x: CENTER_X - r, y: DOT_REST_Y },
          { x: CENTER_X + r, y: DOT_REST_Y },
          { x: CENTER_X - d, y: DOT_REST_Y - triH },
          { x: CENTER_X,     y: DOT_REST_Y - triH },
          { x: CENTER_X + d, y: DOT_REST_Y - triH },
          { x: CENTER_X - r, y: DOT_REST_Y - 2 * triH },
          { x: CENTER_X + r, y: DOT_REST_Y - 2 * triH }
        ];
      }
      case 8: {
        // 3x3 grid with empty center
        return [
          { x: CENTER_X - d, y: DOT_REST_Y },
          { x: CENTER_X,     y: DOT_REST_Y },
          { x: CENTER_X + d, y: DOT_REST_Y },
          { x: CENTER_X - d, y: DOT_REST_Y - d },
          { x: CENTER_X + d, y: DOT_REST_Y - d },
          { x: CENTER_X - d, y: DOT_REST_Y - 2 * d },
          { x: CENTER_X,     y: DOT_REST_Y - 2 * d },
          { x: CENTER_X + d, y: DOT_REST_Y - 2 * d }
        ];
      }
      case 9: {
        // 3x3 full grid
        return [
          { x: CENTER_X - d, y: DOT_REST_Y },
          { x: CENTER_X,     y: DOT_REST_Y },
          { x: CENTER_X + d, y: DOT_REST_Y },
          { x: CENTER_X - d, y: DOT_REST_Y - d },
          { x: CENTER_X,     y: DOT_REST_Y - d },
          { x: CENTER_X + d, y: DOT_REST_Y - d },
          { x: CENTER_X - d, y: DOT_REST_Y - 2 * d },
          { x: CENTER_X,     y: DOT_REST_Y - 2 * d },
          { x: CENTER_X + d, y: DOT_REST_Y - 2 * d }
        ];
      }
      case 10: {
        // triangle: 4 bottom, 3, 2, 1
        return [
          { x: CENTER_X - 3 * r, y: DOT_REST_Y },
          { x: CENTER_X - r,     y: DOT_REST_Y },
          { x: CENTER_X + r,     y: DOT_REST_Y },
          { x: CENTER_X + 3 * r, y: DOT_REST_Y },
          { x: CENTER_X - d, y: DOT_REST_Y - triH },
          { x: CENTER_X,     y: DOT_REST_Y - triH },
          { x: CENTER_X + d, y: DOT_REST_Y - triH },
          { x: CENTER_X - r, y: DOT_REST_Y - 2 * triH },
          { x: CENTER_X + r, y: DOT_REST_Y - 2 * triH },
          { x: CENTER_X,     y: DOT_REST_Y - 3 * triH }
        ];
      }
    }
  }

  // Match existing dots to new target positions using a greedy nearest-neighbor
  // assignment so each dot travels as short a path as possible.
  function assignToTargets(existingDots, targets) {
    const assignments = new Array(existingDots.length).fill(null);
    const targetUsed = new Array(targets.length).fill(false);

    // Build list of (dotIdx, targetIdx, distance) and sort ascending.
    const pairs = [];
    for (let i = 0; i < existingDots.length; i++) {
      for (let j = 0; j < targets.length; j++) {
        const dx = existingDots[i].cx - targets[j].x;
        const dy = existingDots[i].cy - targets[j].y;
        pairs.push({ i, j, dist: Math.hypot(dx, dy) });
      }
    }
    pairs.sort((a, b) => a.dist - b.dist);

    for (const p of pairs) {
      if (assignments[p.i] === null && !targetUsed[p.j]) {
        assignments[p.i] = p.j;
        targetUsed[p.j] = true;
      }
    }
    return { assignments, freeTargets: targets.map((t, j) => targetUsed[j] ? null : { idx: j, pos: t }).filter(Boolean) };
  }

  // ─── PER-STEP CHOREOGRAPHY ───────────────────────────────────

  const SECONDS_PER_STEP = 5.5;
  const MS = SECONDS_PER_STEP * 1000;

  // Step 1: first dot rolls in. "1" appears as it lands.
  async function step1() {
    highlightCell(0);
    await rollNewDotIn('d1', CENTER_X, 'red');
    setNum(1);
    highlightCell(1);
    populateNumberLineCell(1);
    await sleep(MS - 2110);
  }

  // Roll new dot in from the LEFT, stopping at stopX on the floor.
  // GAME MODE: white roll-in, tap to recolor, then return.
  async function rollDotInToStopX(id, stopX, colorName) {
    const landings = stairLandings();
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, colorName);
    const origFill = dot.el.getAttribute('fill');
    dot.el.setAttribute('fill', '#ffffff');
    dot.el.setAttribute('stroke', '#000');
    dot.el.setAttribute('stroke-width', '1.2');
    await sleep(150);
    const angleRef = dot.angleRef;

    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    const minFallDx = 85;
    const firstBounceX = Math.min(landings[0].x + minFallDx, stopX - 4);
    await animateFallOff(dot.el, landings[0].x, landings[0].y, firstBounceX, DOT_REST_Y, 600, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    const totalRemaining = stopX - firstBounceX;
    const secondBounceX = firstBounceX + totalRemaining * 0.6;
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y, secondBounceX, DOT_REST_Y, 360, angleRef, 40);
    dot.cx = secondBounceX; dot.cy = DOT_REST_Y;

    await animateBallistic(dot.el, secondBounceX, DOT_REST_Y, stopX, DOT_REST_Y, 240, angleRef, 18);
    dot.cx = stopX; dot.cy = DOT_REST_Y;

    await waitForTapOnDot(dot);
    dot.el.setAttribute('fill', origFill);
    dot.el.removeAttribute('stroke');
    dot.el.removeAttribute('stroke-width');

    return dot;
  }

  // Roll a fresh dot across the top step, fall off, bounce once on the floor,
  // then arc UP onto an apex position on top of a cluster. Used for step 3.
  // The final arc clears the cluster's left edge (clusterLeftX) so the dot
  // never overlaps the cluster's existing dots.
  async function bounceDownStairsToTop(id, finalLandX, finalLandY, clusterLeftX, colorName) {
    const landings = stairLandings();
    const launchX = clusterLeftX - 2 * DOT_R;
    const minFallDx = 85;
    const firstBounceX = Math.max(landings[0].x + minFallDx,
                                   (landings[0].x + launchX) / 2);

    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot(id, startX, startY, colorName);
    const origFill = dot.el.getAttribute('fill');
    dot.el.setAttribute('fill', '#ffffff');
    dot.el.setAttribute('stroke', '#000');
    dot.el.setAttribute('stroke-width', '1.2');
    await sleep(150);
    const angleRef = dot.angleRef;

    await animateRollMove(dot.el, startX, startY, landings[0].x, landings[0].y,
                          1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    await animateFallOff(dot.el, landings[0].x, landings[0].y,
                          firstBounceX, DOT_REST_Y, 500, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    const peakLift = Math.max(50, Math.abs(DOT_REST_Y - finalLandY) + 15);
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y,
                           finalLandX, finalLandY, 900, angleRef, peakLift);
    dot.cx = finalLandX; dot.cy = finalLandY;

    await waitForTapOnDot(dot);
    dot.el.setAttribute('fill', origFill);
    dot.el.removeAttribute('stroke');
    dot.el.removeAttribute('stroke-width');

    return dot;
  }

  // ─── EXPLICIT PER-STEP CHOREOGRAPHY ──────────────────────────
  //
  // Each transition n-1 → n is hand-choreographed to match the requested
  // physics:
  //   • Existing dots NEVER move rightward to make room. The new dot rolls in
  //     from the left and stops where it would touch the cluster.
  //   • When physics would require an existing dot to be in the new-dot's
  //     spot, that existing dot pops UP (and possibly sideways) to its new
  //     position. The new dot's continued forward motion drives this — the
  //     cluster reshapes BECAUSE of the incoming dot's push.
  //   • No two dots ever cross paths. Cascades are timed so the displaced dot
  //     is well clear by the time the new dot occupies its old slot.
  //
  // Coordinate system: CENTER_X = 130, floor y = DOT_REST_Y (161.75),
  // d = 2r = 44, triH ≈ 38.1.

  // Find the dot nearest to (x, y) — used to pick which existing dot to move
  // when choreography references "the bottom-left dot" etc.
  function findDotAt(x, y) {
    let best = null, bestDist = Infinity;
    for (const id in dotsById) {
      const dot = dotsById[id];
      const dist = Math.hypot(dot.cx - x, dot.cy - y);
      if (dist < bestDist) { bestDist = dist; best = dot; }
    }
    return best;
  }

  // Shorthand y values (some formations stack triangularly, some stack by d).
  const Y_FLOOR = () => DOT_REST_Y;
  const Y_MID   = () => DOT_REST_Y - triH;     // mid row in tri stacks
  const Y_TOP2  = () => DOT_REST_Y - 2 * triH; // 2 rows above floor in tri stacks
  const Y_TOP3  = () => DOT_REST_Y - 3 * triH; // 3 rows above floor in tri stacks
  const Y_ROW2  = () => DOT_REST_Y - d;        // row directly above floor in square stacks
  const Y_ROW3  = () => DOT_REST_Y - 2 * d;    // row 2 above floor in square stacks

  async function step2() {
    // From #1: d1 at (CENTER_X, f).
    // To #2: floor at (86, 130). Original behavior — d2 rolls in tangent,
    // then BOTH dots nudge right by 4 units (small reaction to contact).
    highlightCell(1);
    const d1 = dotsById['d1'];
    const contactX = d1.cx - d;
    const newDot = await rollDotInToStopX('d2', contactX, NUMBER_COLOR[2]);

    // Small nudge: 4 units each (matches the original addition HTML).
    const NUDGE = 4;
    await Promise.all([
      animateRollMove(d1.el, d1.cx, d1.cy, d1.cx + NUDGE, d1.cy, 350, (t) => 1 - Math.pow(1 - t, 2), { value: 0 }),
      animateRollMove(newDot.el, contactX, DOT_REST_Y, contactX + NUDGE, DOT_REST_Y, 350, (t) => 1 - Math.pow(1 - t, 2), newDot.angleRef)
    ]);
    d1.cx = d1.cx + NUDGE;
    newDot.cx = contactX + NUDGE;

    recolorAll([d1.el, newDot.el], NUMBER_COLOR[2]);
    setNum(2);
    highlightCell(2);
    populateNumberLineCell(2);
    await sleep(Math.max(150, MS - 2650));
  }

  async function step3() {
    // From #2: floor at (86, 130).
    // To #3: floor (86, 130), apex (108, f-T).
    // Choreography (from original addition HTML): d3 rolls across the top
    // step, falls off the edge, bounces ONCE on the floor, then ARCS UP onto
    // the apex between d1 and d2. Bottom row dots stay completely still.
    highlightCell(2);

    const d1 = dotsById['d1'];
    const d2 = dotsById['d2'];
    const apexX = (d1.cx + d2.cx) / 2;
    const apexY = Y_MID();
    const clusterLeftX = Math.min(d1.cx, d2.cx);

    // Use the original "bounce down stairs onto top of cluster" routine.
    await bounceDownStairsToTop('d3', apexX, apexY, clusterLeftX, NUMBER_COLOR[3]);

    const d3 = dotsById['d3'];
    recolorAll([d1.el, d2.el, d3.el], NUMBER_COLOR[3]);
    setNum(3);
    highlightCell(3);
    populateNumberLineCell(3);
    await sleep(Math.max(150, MS - 2800));
  }

  async function step4() {
    // From #3: floor (86, 130), apex at (108, f-T).
    // To #4 (2x2 square): floor (86, 130), row2 (86, f-d), (130, f-d).
    //
    // Choreography (from original HTML): d4 rolls in across the top step, falls
    // off, bounces once on the floor, then arcs UP onto the square's top-LEFT
    // position. As d4 lands, the apex dot (currently at (108, f-T)) gets KNOCKED
    // aside — it rolls along the curved surface of the bottom-right dot up and
    // over to the square's top-RIGHT position. Bottom row stays still.
    highlightCell(3);

    const dot1 = dotsById['d1'];
    const dot2 = dotsById['d2'];
    const dot3 = dotsById['d3'];   // currently at apex (108, f-T)

    const leftCx = Math.min(dot1.cx, dot2.cx);   // 86
    const rightCx = Math.max(dot1.cx, dot2.cx);  // 130

    const sqTopLeft = { x: leftCx, y: Y_ROW2() };
    const sqTopRight = { x: rightCx, y: Y_ROW2() };

    const launchX = leftCx - 2 * DOT_R;          // 42 (tangent-left of cluster)

    // Standard "rollNewDotIn but ends at the arc target" setup.
    const landings = stairLandings();
    const minFallDx = 85;
    const firstBounceX = Math.max(landings[0].x + minFallDx, (landings[0].x + launchX) / 2);

    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot4 = addDot('d4', startX, startY, NUMBER_COLOR[4]);
    await sleep(150);
    const angleRef = dot4.angleRef;

    // Roll across top step (1100ms, linear).
    await animateRollMove(dot4.el, startX, startY, landings[0].x, landings[0].y, 1100, (t) => t, angleRef);
    dot4.cx = landings[0].x; dot4.cy = landings[0].y;

    // Fall off the edge to the floor.
    await animateFallOff(dot4.el, landings[0].x, landings[0].y, firstBounceX, DOT_REST_Y, 500, angleRef);
    dot4.cx = firstBounceX; dot4.cy = DOT_REST_Y;

    // One ballistic arc that carries d4 directly to top-left of the square.
    const peakLift = Math.max(40, Math.abs(DOT_REST_Y - sqTopLeft.y));
    const dot4FinalArc = animateBallistic(dot4.el, firstBounceX, DOT_REST_Y,
                                          sqTopLeft.x, sqTopLeft.y, 750, angleRef, peakLift);

    // Identify which bottom dot is on the right — dot3 will roll along its surface.
    const bottomRightDot = (dot1.cx > dot2.cx) ? dot1 : dot2;

    // After d4 is about 85% through its arc (~640ms), dot3 gets knocked aside —
    // it rolls along the curved surface of the bottom-right dot from the apex
    // position (-120° in math angle relative to pivot) to the top-right position
    // (-90° = directly above pivot).
    await sleep(640);
    const dot3SpinRef = { value: 0 };
    const dot3Roll = animateRollAroundPivot(
      dot3.el,
      bottomRightDot.cx, bottomRightDot.cy,
      -2 * Math.PI / 3, -Math.PI / 2,
      110,
      (t) => 1 - Math.pow(1 - t, 2),
      dot3SpinRef
    );

    await Promise.all([dot4FinalArc, dot3Roll]);
    dot4.cx = sqTopLeft.x; dot4.cy = sqTopLeft.y;
    dot3.cx = sqTopRight.x; dot3.cy = sqTopRight.y;

    recolorAll([dot1.el, dot2.el, dot3.el, dot4.el], NUMBER_COLOR[4]);
    setNum(4);
    highlightCell(4);
    populateNumberLineCell(4);

    // Total elapsed ≈ 150+1100+500+750 = 2500ms.
    await sleep(Math.max(150, MS - 2700));
  }

  async function step5() {
    // From #4 (2x2 square) to #5 (3 floor + 2 mid).
    //
    // PHYSICS PASS: d5 bounces ONCE off the stair (no second floor bounce),
    // lands well left of the cluster, then rolls in with CONSTANT VELOCITY
    // (real momentum). On contact:
    //   • the bottom row gets KNOCKED right (sharp impulse ease, ~6 units)
    //   • the top dots FALL DOWN into the valleys (gravity-driven y, fast
    //     ease-out x — they tip off the bottom-row dots that are sliding
    //     out from under them)
    // The cluster reshape is driven by d5's momentum, not a separately
    // choreographed slide.
    highlightCell(4);

    const dot1 = dotsById['d1'];
    const dot2 = dotsById['d2'];
    const dot3 = dotsById['d3'];
    const dot4 = dotsById['d4'];

    // Identify by position (more robust than by id).
    const floorDots = [dot1, dot2, dot3, dot4]
      .filter(dt => Math.abs(dt.cy - DOT_REST_Y) < 2)
      .sort((a, b) => a.cx - b.cx);
    const topDots = [dot1, dot2, dot3, dot4]
      .filter(dt => Math.abs(dt.cy - (DOT_REST_Y - 2 * DOT_R)) < 2)
      .sort((a, b) => a.cx - b.cx);
    const botL = floorDots[0], botR = floorDots[1];
    const topL = topDots[0],   topR = topDots[1];

    // d5 final floor position (NUDGE shifts everyone right by 6 to give a
    // small reaction to contact, matching the original feel).
    const NUDGE = 6;
    const d5Final = botL.cx - 2 * DOT_R + NUDGE;
    const botL_final = botL.cx + NUDGE;
    const botR_final = botR.cx + NUDGE;
    // Valley positions: top dots end up tangent to the two floor dots on
    // either side. Since the floor row spans tangent (d5–botL–botR), the
    // valleys are equilateral-triangle apexes above each adjacent pair.
    const topL_final_x = (d5Final + botL_final) / 2;
    const topR_final_x = (botL_final + botR_final) / 2;
    const valleyY = DOT_REST_Y - triH;   // tangent valley y

    // ── d5 ENTRY: stair roll → fall off → land on floor, no extra bounces ──
    // Land on the floor BEFORE the cluster so d5 has momentum to roll in.
    const preContactX = botL.cx - 3 * DOT_R;   // 1r left of tangent contact

    const landings = stairLandings();
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const d5 = addDot('d5', startX, startY, NUMBER_COLOR[5]);
    await sleep(150);
    const angleRef = d5.angleRef;

    // 1) Roll across the top stair.
    await animateRollMove(d5.el, startX, startY,
                           landings[0].x, landings[0].y,
                           1100, (t) => t, angleRef);
    d5.cx = landings[0].x; d5.cy = landings[0].y;

    // 2) Fall off the stair edge onto the floor at preContactX. This is the
    //    ONE and ONLY bounce.
    await animateFallOff(d5.el, landings[0].x, landings[0].y,
                          preContactX, DOT_REST_Y, 500, angleRef);
    d5.cx = preContactX; d5.cy = DOT_REST_Y;

    // 3) Two-phase contact-driven motion:
    //    Phase A: d5 rolls from preContactX to tangent-contact with botL
    //             (covers the 1r gap). 280ms snappy roll-in.
    //    Phase B: On contact, d5 + bottom row shove right together by NUDGE
    //             (they're now tangent, sharing momentum). 320ms cascade.
    //             At the same time, top dots tip off and fall into valleys
    //             (gravity y, ease-out x). Top fall runs slightly longer
    //             (480ms) so it reads as a gravity-driven fall, not a quick
    //             snap-into-place.
    const contactX = botL.cx - 2 * DOT_R;          // d5 tangent to botL here
    const phaseADur = 280;                          // d5 rolls in
    const phaseBDur = 320;                          // bottom shove
    const topFallDur = 480;                         // top dots fall
    const impulse = (t) => 1 - Math.pow(1 - t, 2.2);

    // Phase A — d5 rolls from preContactX to contactX at constant velocity.
    await animateRollMove(d5.el, preContactX, DOT_REST_Y,
                           contactX, DOT_REST_Y,
                           phaseADur, (t) => t, angleRef);
    d5.cx = contactX; d5.cy = DOT_REST_Y;

    // Phase B — d5 + bottom row shove right by NUDGE. Top dots fall.
    function rollMoveProm(dot, dx, dur, ease) {
      return animateRollMove(dot.el, dot.cx, dot.cy, dot.cx + dx, dot.cy,
                              dur, ease, dot.angleRef || { value: 0 })
        .then(() => { dot.cx = dot.cx + dx; });
    }

    function fallTop(dot, toX, toY, dur) {
      return new Promise(res => {
        const x1 = dot.cx, y1 = dot.cy;
        const dx = toX - x1, dy = toY - y1;
        const totalRotation = (Math.abs(dx) / (2 * Math.PI * DOT_R)) * 360 * 1.3;
        const rotSign = dx < 0 ? -1 : 1;
        const startAngle = dot.angleRef.value || 0;
        const startTime = performance.now();
        function step(now) {
          const t = Math.min(1, (now - startTime) / dur);
          // x eases out quickly (tip-off).
          const ex = 1 - Math.pow(1 - t, 1.6);
          // y is gravity (t²) — accelerating fall.
          const ey = t * t;
          const cx = x1 + dx * ex;
          const cy = y1 + dy * ey;
          dot.el.setAttribute('cx', cx); dot.el.setAttribute('cy', cy);
          const angle = startAngle + totalRotation * ex * rotSign;
          dot.el.setAttribute('transform', `rotate(${angle}, ${cx}, ${cy})`);
          if (t < 1) requestAnimationFrame(step);
          else {
            dot.angleRef.value = (startAngle + totalRotation * rotSign) % 360;
            dot.el.setAttribute('transform', `rotate(${dot.angleRef.value}, ${toX}, ${toY})`);
            dot.cx = toX; dot.cy = toY;
            res();
          }
        }
        requestAnimationFrame(step);
      });
    }

    await Promise.all([
      rollMoveProm(d5,   NUDGE, phaseBDur, impulse),
      rollMoveProm(botL, NUDGE, phaseBDur, impulse),
      rollMoveProm(botR, NUDGE, phaseBDur, impulse),
      fallTop(topL, topL_final_x, valleyY, topFallDur),
      fallTop(topR, topR_final_x, valleyY, topFallDur),
    ]);

    recolorAll([dot1.el, dot2.el, dot3.el, dot4.el, d5.el], NUMBER_COLOR[5]);
    setNum(5);
    highlightCell(5);
    populateNumberLineCell(5);
    await sleep(Math.max(150, MS - 2900));
  }

  async function step6() {
    // From #5 (3 floor + 2 mid) to #6 (triangle 3-2-1).
    //
    // d6 bounces ONCE on the floor LEFT of the cluster, then arcs UP and
    // OVER everything, then drops vertically straight down onto the apex
    // (the valley between the two mid dots). The existing 5 dots do not
    // move. The trajectory NEVER overlaps any existing dot — geometry is
    // chosen so:
    //   • Floor bounce x is far enough LEFT of d5 (the leftmost floor dot)
    //     that d6's body clears d5's body when sitting on the floor.
    //   • The arc rises STEEPLY (peakLift ≈ 80) so by the time it crosses
    //     over the mid-row column it's well above the 2r exclusion zone
    //     around mL/mR.
    //   • The descent is PURELY VERTICAL at x = apexX, so distance to mL
    //     and mR stays equidistant and bottoms out at exactly 2r at apex.
    highlightCell(5);

    const midDots = dots.filter(dt => Math.abs(dt.cy - Y_MID()) < 2)
                        .sort((a, b) => a.cx - b.cx);
    const floorDots = dots.filter(dt => Math.abs(dt.cy - Y_FLOOR()) < 2)
                          .sort((a, b) => a.cx - b.cx);
    const mL = midDots[0];
    const mR = midDots[1];
    const leftmostFloorX = floorDots[0].cx;   // d5 sits here after step 5

    // Apex sits in the valley between the two mid dots, tangent to both.
    const apexX = (mL.cx + mR.cx) / 2;
    const apexY = mL.cy - triH;

    // Floor bounce position: 2.5r LEFT of d5's center so there's clear
    // buffer (≥ r=22 between d6's body and d5's body when resting on floor).
    const firstBounceX = leftmostFloorX - 2.5 * DOT_R;

    const landings = stairLandings();
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const dot = addDot('d6', startX, startY, NUMBER_COLOR[6]);
    await sleep(150);
    const angleRef = dot.angleRef;

    // 1) Roll across top step.
    await animateRollMove(dot.el, startX, startY,
                           landings[0].x, landings[0].y,
                           1100, (t) => t, angleRef);
    dot.cx = landings[0].x; dot.cy = landings[0].y;

    // 2) Fall off the edge to the floor bounce point (well LEFT of cluster).
    await animateFallOff(dot.el, landings[0].x, landings[0].y,
                          firstBounceX, DOT_REST_Y, 500, angleRef);
    dot.cx = firstBounceX; dot.cy = DOT_REST_Y;

    // 3) Natural ballistic arc directly onto the apex. d6 leaves the floor
    //    bounce moving up-and-right, peaks above the cluster, then descends
    //    on a curving path that LANDS at the apex coming in at an angle —
    //    not straight down. Looks like a real ball trajectory.
    //
    //    The arc misses every cluster dot by construction: the only
    //    cluster dot that gets near the arc is mL, and the trajectory's
    //    minimum distance to mL is exactly 2r (tangent) right at the apex
    //    landing — never closer along any earlier portion of the arc.
    //    (Verified by simulation in this iteration.)
    const peakLift = 80;
    await animateBallistic(dot.el, firstBounceX, DOT_REST_Y,
                            apexX, apexY, 900, angleRef, peakLift);
    dot.cx = apexX; dot.cy = apexY;

    const allEls = [];
    for (let i = 1; i <= 6; i++) if (dotsById['d' + i]) allEls.push(dotsById['d' + i].el);

  async function step7() {
    // From #6 (triangle 3-2-1) to #7 (flower 2-3-2).
    //
    // PHYSICS PASS: d7 keeps moving. No stop-tangent-then-push. d7 lands on
    // the floor a bit before contact, then rolls in ONE continuous motion all
    // the way to its destination (mL's old column at floor level). The
    // cluster dots get KNOCKED out of the way by the impact — they all start
    // moving the moment d7 arrives at the cluster's left edge, driven by
    // d7's momentum (sharp ease-out, like a collision impulse), not by a
    // separate choreographed slide.
    highlightCell(6);

    const dots = Object.values(dotsById);
    const floorDots = dots.filter(dt => Math.abs(dt.cy - Y_FLOOR()) < 2).sort((a,b) => a.cx - b.cx);
    const midDots   = dots.filter(dt => Math.abs(dt.cy - Y_MID()) < 2).sort((a,b) => a.cx - b.cx);
    const apexDot   = dots.filter(dt => Math.abs(dt.cy - Y_TOP2()) < 2)[0];

    const fL = floorDots[0], fM = floorDots[1], fR = floorDots[2];
    const mL = midDots[0], mR = midDots[1];
    const ap = apexDot;

    const newFloorLeftX  = mL.cx;             // d7's destination
    const newFloorRightX = mR.cx;             // mR drops here
    const newMidLeftX    = fL.cx;
    const newMidMidX     = fM.cx;
    const newMidRightX   = fR.cx;
    const newTopLeftX    = mL.cx;
    const newTopRightX   = mR.cx;

    // d7 falls onto the floor well-clear of the cluster (one ball-radius back
    // from the contact point) so the cluster doesn't even know it's coming
    // yet. Then the SINGLE big roll begins.
    const contactX = fL.cx - d;          // tangent-LEFT of fL
    const preContactX = contactX - DOT_R;  // d7's floor landing, 1r short of contact

    const landings = stairLandings();
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;
    const newDot = addDot('d7', startX, startY, NUMBER_COLOR[7]);
    await sleep(150);
    const d7AngleRef = newDot.angleRef;

    await animateRollMove(newDot.el, startX, startY, landings[0].x, landings[0].y,
                           1100, (t) => t, d7AngleRef);
    newDot.cx = landings[0].x; newDot.cy = landings[0].y;

    // Fall to preContactX (not contactX) — d7 lands on the floor with
    // momentum BEFORE reaching the cluster.
    await animateFallOff(newDot.el, landings[0].x, landings[0].y,
                          preContactX, DOT_REST_Y, 600, d7AngleRef);
    newDot.cx = preContactX; newDot.cy = DOT_REST_Y;

    // ── ONE CONTINUOUS ROLL from preContactX → newFloorLeftX ──
    //   d7 rolls smoothly at constant velocity. The cluster dots are knocked
    //   away by the impact — they all begin moving the moment d7 first
    //   contacts the cluster (1/3 of the way through d7's roll, since the
    //   pre-contact gap is 1r and total roll covers 3r+gap).
    //   Displaced dots use a sharp ease-out (impulse-like).
    const rollDist = newFloorLeftX - preContactX;
    const rollDur = Math.max(650, rollDist * 8);   // ~tuned to look like real momentum
    const impulse = (t) => 1 - Math.pow(1 - t, 2.2);   // shoved feel

    // d7's roll: linear (constant velocity — no slowdown, real momentum).
    const d7Roll = animateRollMove(newDot.el, preContactX, Y_FLOOR(),
                                    newFloorLeftX, Y_FLOOR(),
                                    rollDur, (t) => t, d7AngleRef);

    // Displaced dots: delayed start so they begin AT THE MOMENT OF CONTACT
    // (when d7 has covered the 1r pre-contact gap, ≈ 1/(3r/1r+1) of the
    // total). After delay, each runs over the remainder of rollDur with a
    // sharp impulse ease.
    const contactRatio = DOT_R / rollDist;          // when d7 first touches cluster
    const contactDelay = rollDur * contactRatio;
    const remaining = rollDur - contactDelay;

    function knock(dot, toX, toY, peakLift) {
      return new Promise(res => setTimeout(async () => {
        await animateGlideEased(dot, toX, toY, remaining, peakLift, impulse);
        res();
      }, contactDelay));
    }

    await Promise.all([
      d7Roll,
      knock(fL, newMidLeftX, Y_MID(), 70),   // floor-LEFT punted UP with high arc
      knock(fM, newMidMidX,  Y_MID(), 18),
      knock(fR, newMidRightX, Y_MID(), 14),
      knock(mL, newTopLeftX,  Y_TOP2(), 22),
      knock(ap, newTopRightX, Y_TOP2(), 12),
      // mR drops to floor-right with a small hop so it doesn't pass through
      // the rising fR. Same impulse timing.
      knock(mR, newFloorRightX, Y_FLOOR(), 50),
    ]);
    newDot.cx = newFloorLeftX; newDot.cy = Y_FLOOR();

    const allEls = [];
    for (let i = 1; i <= 7; i++) if (dotsById['d' + i]) allEls.push(dotsById['d' + i].el);
    recolorAll(allEls, NUMBER_COLOR[7]);
    setNum(7);
    highlightCell(7);
    populateNumberLineCell(7);
    await sleep(Math.max(150, MS - 2600));
  }

  async function step8() {
    // From #7 (flower 2-3-2) to #8 (3x3 minus center).
    //
    // PHYSICS PASS: d8 lands on the floor BEFORE the cluster and rolls in as
    // ONE continuous motion. The cluster reshapes because d8 slams into it
    // — top dots fan outward, middle row pushes up, floor dots get shoved
    // right. The reshape stages chain-react quickly from impact (small
    // stagger to keep adjacent dots from passing through each other), with
    // sharp impulse easing so it reads as a collision, not a polite slide.
    highlightCell(7);

    const dots = Object.values(dotsById);
    const floorDots = dots.filter(dt => Math.abs(dt.cy - Y_FLOOR()) < 2).sort((a,b) => a.cx - b.cx);
    const midDots   = dots.filter(dt => Math.abs(dt.cy - Y_MID()) < 2).sort((a,b) => a.cx - b.cx);
    const topDots   = dots.filter(dt => Math.abs(dt.cy - Y_TOP2()) < 2).sort((a,b) => a.cx - b.cx);

    const fL = floorDots[0], fR = floorDots[1];
    const mL = midDots[0],   mM = midDots[1],   mR = midDots[2];
    const tL = topDots[0],   tR = topDots[1];

    const colLeftX  = mL.cx;
    const colMidX   = mM.cx;
    const colRightX = mR.cx;

    // d8 lands on the floor one ball-radius short of contact, so it carries
    // momentum INTO the cluster instead of stopping and then pushing.
    const contactX = fL.cx - d;
    const preContactX = contactX - DOT_R;

    const landings = stairLandings();
    const startX = -200;
    const startY = STAIR_TOP_Y - DOT_R - 1.25;

                           1100, (t) => t, d8AngleRef);
    newDot.cx = landings[0].x; newDot.cy = landings[0].y;

    await animateFallOff(newDot.el, landings[0].x, landings[0].y,
                          preContactX, DOT_REST_Y, 600, d8AngleRef);
    newDot.cx = preContactX; newDot.cy = DOT_REST_Y;

    // ── ONE continuous roll from preContactX → colLeftX (final spot) ──
    const rollDist = colLeftX - preContactX;
    const rollDur = Math.max(720, rollDist * 9);
    const impulse = (t) => 1 - Math.pow(1 - t, 2.2);

    // d8 rolls at constant velocity (real momentum).
    const d8Roll = animateRollMove(newDot.el, preContactX, Y_FLOOR(),
                                    colLeftX, Y_FLOOR(),
                                    rollDur, (t) => t, d8AngleRef);

    // Cluster reshape — chain reaction starting at contact (when d8 has
    // covered the pre-contact gap). The stages must still respect the
    // no-overlap geometry, so they fire in quick succession rather than
    // truly simultaneously, but each is sharply impulse-eased and the
    // gaps are small enough to read as one collision event.
    const contactRatio = DOT_R / rollDist;
    const contactMs = rollDur * contactRatio;     // moment of first contact
    const postContact = rollDur - contactMs;       // time remaining

    // Stage durations as fractions of postContact, with slight overlap.
    const stage1Dur = postContact * 0.40;          // tops fan out
    const stage2Dur = postContact * 0.55;          // mM pushes up
    const stage3Dur = postContact * 0.32;          // mL, mR up
    const stage4Dur = postContact * 0.50;          // floor dots shoved right

    const stage1Start = contactMs;
    const stage2Start = contactMs + postContact * 0.18;
    const stage3Start = contactMs + postContact * 0.45;
    const stage4Start = contactMs + postContact * 0.50;

    function fire(delayMs, fn) {
      return new Promise(res => setTimeout(async () => { await fn(); res(); }, delayMs));
    }

    await Promise.all([
      d8Roll,
      // Stage 1: tL, tR get smacked outward to row-3 outer.
      fire(stage1Start, () => Promise.all([
        animateGlideEased(tL, colLeftX,  Y_ROW3(), stage1Dur, undefined, impulse),
        animateGlideEased(tR, colRightX, Y_ROW3(), stage1Dur, undefined, impulse),
      ])),
      // Stage 2: mM punched straight up through the (now-empty) center to row 3.
      fire(stage2Start, () => animateGlideEased(mM, colMidX, Y_ROW3(), stage2Dur, 25, impulse)),
      // Stage 3: mL, mR knocked up a notch to row 2.
      fire(stage3Start, () => Promise.all([
        animateGlideEased(mL, colLeftX,  Y_ROW2(), stage3Dur, undefined, impulse),
        animateGlideEased(mR, colRightX, Y_ROW2(), stage3Dur, undefined, impulse),
      ])),
      // Stage 4: floor dots get shoved right by d8's momentum.
      fire(stage4Start, () => Promise.all([
        animateRollMove(fL.el, fL.cx, fL.cy, colMidX,   Y_FLOOR(), stage4Dur, impulse, { value: 0 }),
        animateRollMove(fR.el, fR.cx, fR.cy, colRightX, Y_FLOOR(), stage4Dur, impulse, { value: 0 }),
      ])),
    ]);
    fL.cx = colMidX;  fL.cy = Y_FLOOR();
    fR.cx = colRightX; fR.cy = Y_FLOOR();
    newDot.cx = colLeftX; newDot.cy = Y_FLOOR();

    const allEls = [];
    for (let i = 1; i <= 8; i++) if (dotsById['d' + i]) allEls.push(dotsById['d' + i].el);
    recolorAll(allEls, NUMBER_COLOR[8]);
    setNum(8);
    highlightCell(8);
    populateNumberLineCell(8);
    await sleep(Math.max(150, MS - 3500));

    //
    // Implementation:
    //   1. d9 rolls down the stairs, falls off, and bounces along the floor
    //      until it's tangent-LEFT of the cluster's leftmost floor dot.
    //   2. The impact "bounces" d9 UP-AND-OVER the floor-left dot — d9 rolls
    //      around floor-left's curved surface, ending directly ABOVE it at
    //      row2-LEFT (48, f-d). This is the "bounce into the center row".

    const floorDots = dots.filter(dt => Math.abs(dt.cy - Y_FLOOR()) < 2).sort((a,b) => a.cx - b.cx);

    const r2R = r2dots[1];

    const floorLeftDot = floorDots[0];              // d9 will pivot around this

    // === Phase 1: roll across the top step, fall off, bounce along the floor ===
    //  d9 rolls in until it's tangent-LEFT of the cluster's leftmost floor dot.
    const landings = stairLandings();
    const launchX = floorLeftDot.cx - 2 * DOT_R;   // tangent-left, where d9 stops to bounce off
    const minFallDx = 85;

    // side of the 8 on the second layer"). No extra floor hop after — the
    // very next motion is d9 rolling up onto row 2.
    await animateFallOff(dot9.el, landings[0].x, landings[0].y,
                          launchX, DOT_REST_Y, 600, angleRef);
    dot9.cx = launchX; dot9.cy = DOT_REST_Y;

    // === Phase 2: d9 rolls UP-AND-OVER floor-left to row2-left, while r2L slides ===
    //
    // Geometric constraint: d9 sweeps a quarter-circle of radius 2r around
    // floor-left's center. r2L starts at d9's endpoint. They must stay ≥ 2r
    // apart at all times. d9 first reaches distance = 2r from r2L at angle
    // 7π/6 (= π + π/6), which is 1/3 of the way through the sweep. Before
    // that, d9 is more than 2r from r2L — so r2L can stay put. From that

    //

    const rollPhase2a = 240;   // free-roll segment (1/3 of total)
    const rollPhase2b = 480;   // synchronized push segment (2/3 of total)

    await animateRollAroundPivot(dot9.el, floorLeftDot.cx, floorLeftDot.cy,
                                  Math.PI, 7 * Math.PI / 6, rollPhase2a,

      animateRollAroundPivot(dot9.el, floorLeftDot.cx, floorLeftDot.cy,
                              7 * Math.PI / 6, 3 * Math.PI / 2, rollPhase2b,

    dot9.cx = floorLeftDot.cx;

    const triCenter = F2.cx;             // keep cluster center fixed
    const r = DOT_R;

    // New floor positions:

    const newF1 = triCenter - r;

    // Upper rows of #10 triangle:

    // ── ONE continuous roll: preContactX → newF0 ──
    //   d10 rolls at constant velocity (real momentum). At the moment of
    //   contact, the cluster gets knocked:
    //   • floor dots shoved RIGHT (sharp impulse ease)
    //   • upper rows fall into triangle positions (also impulse-eased so the
    //     whole reshape reads as ONE collision event)
    const rollDist = newF0 - preContactX;
    const rollDur = Math.max(720, rollDist * 9);
    const impulse = (t) => 1 - Math.pow(1 - t, 2.2);

    const d10Roll = animateRollMove(newDot.el, preContactX, Y_FLOOR(),
                                     newF0, Y_FLOOR(),
                                     rollDur, (t) => t, d10AngleRef);

    const contactRatio = DOT_R / rollDist;
    const contactMs = rollDur * contactRatio;
    const postContact = rollDur - contactMs;

    function fireAt(delayMs, fn) {
      return new Promise(res => setTimeout(async () => { await fn(); res(); }, delayMs));
    }

    await Promise.all([
      d10Roll,
      // Floor row: shoved right on impact.
      fireAt(contactMs, () => Promise.all([
        animateRollMove(F1.el, F1.cx, F1.cy, newF1, Y_FLOOR(), postContact, impulse, { value: 0 }),
        animateRollMove(F2.el, F2.cx, F2.cy, newF2, Y_FLOOR(), postContact, impulse, { value: 0 }),
        animateRollMove(F3.el, F3.cx, F3.cy, newF3, Y_FLOOR(), postContact, impulse, { value: 0 }),
      ])),
      // Upper rows: start falling into triangle slots slightly after the
      // floor row has begun moving (otherwise row 2 would land on top of
      // a still-stationary floor dot). Small stagger keeps it reading as
      // one collision while preserving the no-overlap order.
      fireAt(contactMs + postContact * 0.15, () => Promise.all([
        animateGlideEased(r2dots[0], t_row2L, yRow2T, postContact * 0.85, undefined, impulse),
        animateGlideEased(r2dots[1], t_row2M, yRow2T, postContact * 0.85, undefined, impulse),
        animateGlideEased(r2dots[2], t_row2R, yRow2T, postContact * 0.85, undefined, impulse),
        animateGlideEased(r3dots[0], t_row3L, yRow3T, postContact * 0.85, undefined, impulse),
        animateGlideEased(r3dots[1], t_topX,  yTopT,  postContact * 0.85, undefined, impulse),
        animateGlideEased(r3dots[2], t_row3R, yRow3T, postContact * 0.85, undefined, impulse),
      ])),
    ]);
    newDot.cx = newF0; newDot.cy = Y_FLOOR();
    F1.cx = newF1; F2.cx = newF2; F3.cx = newF3;

    drawTriangleOutline(newF0);

    const allEls = [];
    for (let i = 1; i <= 10; i++) if (dotsById['d' + i]) allEls.push(dotsById['d' + i].el);
    recolorAll(allEls, NUMBER_COLOR[10]);
    setNum(10);
    highlightCell(10);
    populateNumberLineCell(10);
    await sleep(Math.max(150, MS - 2900));
  }

  // Triangle outline for #10. Computes the three vertices to be PERPENDICULAR-
  // OFFSET by r from the centerlines of the outermost dots, so each edge is
  // tangent to every outer dot it passes:
  //   • Bottom edge: tangent to the bottom of the bottom row of 4 dots
  //     (centers at y=f, so edge at y = f + r).
  //   • Left edge: tangent to the LEFT side of every leftmost-in-row dot.
  //   • Right edge: tangent to the RIGHT side of every rightmost-in-row dot.
  //
  // Pass `bottomLeftX` = the x of the leftmost-bottom dot. The cluster's
  // center is then bottomLeftX + 3r (since the 4-dot row spans 6r and is
  // symmetric around the center).
  function drawTriangleOutline(bottomLeftX) {
    const r = DOT_R;
    const f = DOT_REST_Y;
    const cx = bottomLeftX + 3 * r;  // triangle center x
    const baseY = f + r;             // tangent to bottom of bottom dots
    // Equilateral triangle. Half-width at the base = 3r + r·√3 (the r·√3
    // extension comes from offsetting the left edge by r perpendicular to
    // the centerline, which has slope -√3).
    const halfWidth = 3 * r + r * Math.sqrt(3);
    const blX = cx - halfWidth;
    const brX = cx + halfWidth;
    // Top vertex: y such that triangle is equilateral.
    // height = halfWidth * √3
    const topY = baseY - halfWidth * Math.sqrt(3);

    const tri = document.createElementNS(SVG_NS, 'polygon');
    tri.setAttribute('points',
      `${blX},${baseY} ${brX},${baseY} ${cx},${topY}`);
    tri.setAttribute('fill', 'none');
    tri.setAttribute('stroke', '#000');
    tri.setAttribute('stroke-width', '3');
    tri.setAttribute('stroke-linejoin', 'round');
    tri.setAttribute('id', 'tenTriangle');
    tri.style.opacity = '0';
    tri.style.transition = 'opacity 0.6s ease-in';
    dotGroup.parentNode.appendChild(tri);
    requestAnimationFrame(() => { tri.style.opacity = '1'; });
  }

  // ─── COUNT-UP SEQUENCE ───────────────────────────────────────
  //
  // After step 10 finishes, "count" each of the 10 dots in the triangle in
  // reading order (top-down, left-right within each row). For each n:
  //   • recolor all counted-so-far dots to NUMBER_COLOR[n] (the color
  //     associated with the current count number)
  //   • write a small numeral INSIDE the newly-counted dot
  //   • update the big digit at the top (stays at lockedDigitX)
  //   • play the digit-word audio
  // Before counting starts, ALL dots are recolored white so the color
  // sequence reads as "the count colors them in" — one orange, two oranges,
  // three yellows, etc.
  // When the count reaches 10 (all dots red again), the inscribed numerals
  // STAY VISIBLE at the end.

  async function countUp10() {
    // Collect all 10 dots and sort top → bottom, then left → right.
    const dots = [];
    for (let i = 1; i <= 10; i++) if (dotsById['d' + i]) dots.push(dotsById['d' + i]);
    dots.sort((a, b) => a.cy - b.cy || a.cx - b.cx);

    // Pause before counting begins — give the eye time to register the
    // finished triangle.
    await sleep(900);

    // Recolor every dot to WHITE first. Slow gentle transition so kids see
    // the colors fade out and understand the triangle is "ready to count".
    for (const dt of dots) {
      dt.el.style.transition = 'fill 0.7s ease-in-out';
      dt.el.setAttribute('fill', '#ffffff');
    }
    await sleep(900);

    for (let i = 0; i < dots.length; i++) {
      const dt = dots[i];
      const n = i + 1;
      const color = COLORS[NUMBER_COLOR[n]];

      // Recolor all counted-so-far dots to the current count's color.
      // (Transitions are already set on each dot's style.)
      for (let j = 0; j <= i; j++) {
        dots[j].el.setAttribute('fill', color);
      }

      // Inscribe the count numeral inside the just-counted dot. White text
      // with a thin black stroke reads against every color.
      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', dt.cx);
      t.setAttribute('y', dt.cy);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('dominant-baseline', 'central');
      t.setAttribute('font-family', 'Nunito, sans-serif');
      t.setAttribute('font-weight', '800');
      t.setAttribute('font-size', n === 10 ? '20' : '26');
      t.setAttribute('fill', '#ffffff');
      t.setAttribute('stroke', '#000');
      t.setAttribute('stroke-width', '0.8');
      t.setAttribute('paint-order', 'stroke');
      t.style.pointerEvents = 'none';
      t.style.transformOrigin = `${dt.cx}px ${dt.cy}px`;
      t.style.transformBox = 'fill-box';
      t.style.transform = 'scale(0)';
      t.style.transition = 'transform 0.32s cubic-bezier(0.34, 1.56, 0.64, 1)';
      t.textContent = String(n);
      dotGroup.appendChild(t);
      requestAnimationFrame(() => { t.style.transform = 'scale(1)'; });

      // Update the big digit at the top (stays at lockedDigitX).
      setNum(n);

      // Pause between dots — DELIBERATE teacher pace so kids can absorb
      // each count. The audio is only ~0.5s; the rest is breathing room.
      await sleep(1400);
    }

    // Numerals stay drawn; dots stay red. End of animation.
  }

  // Top-level dispatcher (replaces the old generic stepN).
  async function stepN(n) {
    switch (n) {
      case 2: return step2();
      case 3: return step3();
      case 4: return step4();
      case 5: return step5();
      case 6: return step6();
      case 7: return step7();
      case 8: return step8();
      case 9: return step9();
      case 10: return step10();
    }
  }

  // ─── DRIVER ──────────────────────────────────────────────────

  let playing = false;

  function setInitialStairs() {
    rampPath.setAttribute('d', pathFromCorners(getStairCorners()));
  }

  // === GAME MODE: tap-to-advance pacing =====================================
  // One tap = one number added. After 10 dots are placed, one more tap kicks
  // off the count-up. First tap starts the game (and unlocks audio).
  let gameStarted = false;
  let tapResolve = null;
  let tapsPending = 0;
  function waitForTap() {
    return new Promise((resolve) => {
      if (tapsPending > 0) { tapsPending--; resolve(); return; }
      tapResolve = resolve;
    });
  }
  document.addEventListener('click', () => {
    if (!gameStarted) {
      gameStarted = true;
      setTimeout(play, 100);
      return;
    }
    if (tapResolve) {
      const r = tapResolve; tapResolve = null;
      r();
    } else {
      tapsPending++;
    }
  });

  // Wait for a tap while the given dot is glowing. The outline starts as a
  // pulsing black "bold/not bold" glow; after 10s it flashes between black and
  // red; after 20s it stays solid red, still pulsing — keeps challenging the
  // kid to tap until they do. Used for dots 2-10 (current behavior).
  async function waitForTapOnDot(dot) {
    const el = dot.el;
    el.removeAttribute('stroke');
    el.removeAttribute('stroke-width');
    el.classList.add('wait-dot');
    let cleared = false;
    const t1 = setTimeout(() => {
      if (cleared) return;
      el.classList.remove('wait-dot');
      el.classList.add('wait-dot-warn');
    }, 10000);
    const t2 = setTimeout(() => {
      if (cleared) return;
      el.classList.remove('wait-dot-warn');
      el.classList.add('wait-dot-urgent');
    }, 20000);
    try {
      await waitForTap();
    } finally {
      cleared = true;
      clearTimeout(t1); clearTimeout(t2);
      el.classList.remove('wait-dot', 'wait-dot-warn', 'wait-dot-urgent');
    }
  }

  // First-dot wait — refined timing.
  // 0-3s:  no animation, white dot sits still with a thin black border
  // 3-10s: black bold/not-bold pulse
  // 10-20s: black/red flash pulse
  // 20s:   dot auto-fills solid red with a black border and the step continues
  //        (a real tap at any time short-circuits all of this and recolors red)
  // Returns true if the 20s auto-fill happened, false if the kid tapped.
  async function waitForFirstTap(dot) {
    const el = dot.el;
    el.removeAttribute('stroke');
    el.removeAttribute('stroke-width');
    let cleared = false;
    let autoFilled = false;
    const t1 = setTimeout(() => {
      if (cleared) return;
      el.classList.add('wait-dot');
    }, 3000);
    const t2 = setTimeout(() => {
      if (cleared) return;
      el.classList.remove('wait-dot');
      el.classList.add('wait-dot-warn');
    }, 10000);
    const t3 = setTimeout(() => {
      if (cleared) return;
      el.classList.remove('wait-dot-warn');
      el.style.transition = 'fill 0.5s ease-out, stroke 0.5s ease-out, stroke-width 0.5s ease-out';
      el.style.fill = '#d92525';
      el.style.stroke = '#000';
      el.style.strokeWidth = '1.4';
      setTimeout(() => {
        if (cleared) return;
        autoFilled = true;
        if (tapResolve) {
          const r = tapResolve; tapResolve = null;
          r();
        } else {
          tapsPending++;
        }
      }, 550);
    }, 20000);
    try {
      await waitForTap();
    } finally {
      cleared = true;
      clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
      el.classList.remove('wait-dot', 'wait-dot-warn', 'wait-dot-urgent');
      if (autoFilled) {
        // Bake the final state into attributes so clearing inline style
        // doesn't flash back to white.
        el.setAttribute('fill', '#d92525');
        el.setAttribute('stroke', '#000');
        el.setAttribute('stroke-width', '1.4');
      }
      el.style.transition = '';
      el.style.fill = '';
      el.style.stroke = '';
      el.style.strokeWidth = '';
    }
    return autoFilled;
  }

  async function play() {
    if (playing) return;
    playing = true;
    try {
      buildNumberLine();
      clearDots();
      lockedDigitX = 96;
      setNum('');
      highlightCell(0);
      setInitialStairs();
      await sleep(400);

      // Each step's roll-in pauses (with the glowing-outline prompt) for a
      // tap to recolor the white dot, so play() runs straight through.
      await step1();
      for (let n = 2; n <= 10; n++) {
        await stepN(n);
      }
      await countUp10();
    } catch (err) {
      console.error('ERROR:', err);
      const errDiv = document.createElement('div');
      errDiv.style.cssText = 'position:fixed;top:50px;left:50%;transform:translateX(-50%);background:red;color:white;padding:20px;z-index:9999;max-width:90%;';
      errDiv.textContent = 'ERROR: ' + err.message;
      document.body.appendChild(errDiv);
    }
    playing = false;
  }

  window.addEventListener('load', () => {
    buildNumberLine();
    setInitialStairs();
    // The single document 'click' listener above drives both the start tap
    // and subsequent tap-to-advance taps.
  });
</script>

</body>
</html>
